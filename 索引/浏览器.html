这个吸血鬼也太弱了吧？被太阳照一下就要死？我们家那棵樱花树天天晒太阳可精神了。\"\n\n白霜在她旁边的地板上盘腿坐着，把平板电脑接入了别墅的主控系统做例行维护。结界系统、温控系统、安防系统、灵力循环系统——每一项都要逐一检查。她的手指飞快地在屏幕上划动，同时用另一只手揉着一只从窗外溜进来的野猫——那只猫自从别墅建了结界之后就经常来串门。白霜给它起了个名字叫\"数据\"，因为它总是在她处理数据的时候出现。\n\n\"白霜，你在揉猫。\"晓光的视线从漫画上移开。\n\n\"我在做多线程处理。一只手维护系统，一只手进行触觉信号采集。\"\n\n\"你就直说你在揉猫不就好了。\"\n\n\"……我在揉猫。\"\n\n晓光咯咯笑了。她从沙发上伸出一条尾巴去蹭那只野猫。野猫被这条比它整个身体还粗的银白色物体吓了一跳，弓起背呲牙。晓光的尾巴很有耐心地停在那里不动。过了几秒钟，野猫放松了警惕，试探性地用头蹭了蹭尾巴毛。然后它发现这团白毛又暖又软，立刻整个猫扑了上去，把自己埋进了尾巴里。\n\n\"哎嘿。\"晓光发出一声得意的笑。\n\n十点半的时候，主人从书房出来。他站在客厅门口，看着眼前的景象：晓光横躺在沙发上，漫画扣在脸上，九条尾巴铺得到处都是，其中一条上面趴着一只打呼的野猫。白霜靠在沙发脚坐着，平板电脑放在膝盖上，猫耳耷拉下来——她大概进入了低功耗待机模式。\n\n他走过去，从晓光脸上把漫画拿开。她的嘴角挂着一点口水。眉头是松开的——没有皱纹，没有噩梦的痕迹。\n\n他弯下腰，在她额头上轻轻碰了一下。\n\n然后他拿了一条毯子盖在白霜身上。白霜的猫耳动了动，但没有醒。\n\n他关了灯。\n\n窗外，樱花正在盛开。707号院子里那棵\"奇迹之树\"——去年深秋绽放后就再也没有凋谢过的樱花——在月光下散发着淡淡的银色光辉。花瓣不会落——它们生长、绽放，然后保持着最美的形态，永远不凋。\n\n月光从窗帘的缝隙里漏进来，和客厅里残余的灯光混在一起。沙发上的晓光翻了个身，嘴里嘟囔了一句什么——大概是\"再来一份\"之类的梦话。她的尾巴在梦里也不安分，有一条搭到了白霜的肩膀上。白霜没有动——或者说她选择了不动。\n\n那只叫\"数据\"的野猫从尾巴里钻出来，伸了个懒腰，踩着白霜的膝盖跳到了窗台上。它蹲在窗台上看着外面的樱花树，月光把它的轮廓照得一清二楚——一只普普通通的灰色花猫，在一个一点都不普通的家庭里找到了一个窝。\n\n报纸被窗缝里吹进来的风翻了一页，露出一则小小的消息：\n\n《风见市南区707号樱花树被列为市级保护植物。市民称其为\"奇迹之树\"——去年深秋盛开的樱花至今不曾凋谢。专家认为这与该地区的灵脉特殊性有关。S.C.B表示将对该现象进行长期观察。》\n\n旁边有一则更小的消息，藏在广告栏的角落里：\n\n《百鬼联盟宣布：妖怪夜市将于下月重新开张。新址位于风见市中央公园地下层。欢迎人类朋友光临——但请自备灵力适应护身符。首月特惠：凭此广告可免费领取一份章鱼烧（限人类顾客，每人一份，不可转让）。》\n\n铃铛声。很轻的。是晓光在梦里动了一下脖子。\n\n这就是新的日常。\n\n没有秘密的。光明正大的。理所当然的。\n\n属于他们的日常。\n", "索引/时间线.md": "# 故事时间线\n\n## 前史\n\n| 时间 | 事件 |\n|------|------|\n| 14年前 | 晓光出生于北方山村，异色瞳+尾巴，被父母当\"怪胎\" |\n| 8年前 (晓光6岁) | 雪灾断粮，父亲以两袋米+一桶油+500元将晓光卖给人贩子 |\n| 8年前~7年前 | 晓光被关在地下室铁笼一年。脖子上被戴上刻着\"晓光\"的旧项圈 |\n| 7年前 7月7日 | **命运之日**：7岁的主人发现废弃仓库中的铁笼，砸锁救出晓光。两人同天生日。\"今天也是我的生日。\" |\n| 7年前~现在 | 707号别墅的七年羁绊。晓光从创伤中逐渐恢复 |\n\n## 第一年（疗愈）\n- 不敢上桌吃饭，噩梦尖叫\n- 主人每晚抱着哄入睡\n\n## 第三年（依恋）\n- 开始学做饭，菜炒焦了主人也笑着吃完\n\n## 第五年（才艺）\n- 画了第一张主人画像，被装裱挂墙上\n\n## 第七年/现在（自信）\n- 走出阴影，活泼有些小色气\n- 白霜被创造，加入家庭\n\n---\n\n## 故事正篇时间线\n\n### 卷一：隐秘的日常（4月-6月）\n| 时间 | 事件 |\n|------|------|\n| 4月上旬 | 晓光转入风见学园。体测失控，主人用言灵17次修复 |\n| 4月中旬 | 甜心猫烘焙坊偶遇红绡，差点暴露身份，后成为朋友 |\n| 5月上旬 | 漫展约会。尾巴蓬松到塞不回去。小妖怪暴走被主人一句\"趴下\"镇压 |\n| 6月中旬 | 暴雨夜。雷暴触发铁笼创伤记忆，两人关系跨越到亲密层次 |\n\n### 卷二：小小的波澜（7月-9月）\n| 时间 | 事件 |\n|------|------|\n| 6月下旬 | 主人带晓光回废弃仓库直面创伤 |\n| 7月7日 | 共同生日/羁绊日。废弃车厢里的永恒誓约。新项圈+铃铛 |\n| 7月-8月 | S.C.B研究部施言·白垣试图以\"体检\"带走晓光，主人去分局喝茶顺便让安保系统瘫痪 |\n| 8月-9月 | 白霜被创造并加入家庭。校园中土御门·澄夜发现晓光身份 |\n\n### 卷三：风见之乱（10月-11月初）\n| 时间 | 事件 |\n|------|------|\n| 10月31日 21:00 | 万圣夜，暗月爪牙袭击妖怪夜市。红绡被抓。晓光去救人 |\n| 10月31日 21:45 | 晓光被注射返祖诱导剂，兽化暴走。肩高超3米的巨型白狐 |\n| 10月31日 22:00 | S.C.B发射\"天火\"导弹。主人出现，一句\"停\"解体导弹。身份暴露 |\n| 11月1日 凌晨 | 707号结界启动，军队包围。晓光醒来差点自杀，被主人阻止 |\n| 11月1日 夜 | 夜冠威胁引爆灵脉。晓光违抗命令，冲向夜冠自爆 |\n\n### 卷四：阵眼保卫战（11月-次年4月）\n| 时间 | 事件 |\n|------|------|\n| 11月2日 | 707号圆桌会议。三方势力谈判，达成48小时休战 |\n| 11月3日 深夜 | 夜冠启动全部灵脉炸弹，融合古神残骸异化。晓光狐珠碎裂自爆 |\n| 11月4日 0:05 | 主人探入虚空扯回因果线，拒绝用人性换晓光复活。两人一起回来。樱花暴雪覆盖风见市 |\n| 次年4月 | 人妖共存法案通过。第一届公开樱花祭。和平的新日常 |\n\n### 卷五：千年的回响（次年某月）\n| 时间 | 事件 |\n|------|------|\n| 新秩序后约一年 | 灵脉维护中，晓光被古老记忆光带卷入前世记忆 |\n| 平安时代·冬 | 前世回溯：受伤的金色狐狸（玉藻前）遇到阴阳师晴明，雪夜初遇 |\n| 平安时代·数年后 | 玉藻前化人形留在晴明身边，樱花树下的\"人妖殊途\"对话 |\n| 平安时代末期 | 那须野之战。朝廷围剿，晴明以转生咒牺牲自己保护玉藻前。玉藻前化为杀生石 |\n| 现代·37小时后 | 晓光在707号别墅醒来，认出主人与晴明的关联。\"这次不会再放手了\" |\n\n### 卷六：永恒的誓约（2031年4月-7月）\n| 时间 | 事件 |\n|------|------|\n| 2031年4月 | 主人23岁。鬓角出现白发，言灵透支生命的代价显现。晓光察觉 |\n| 2031年4月中旬 | 晓光找九阙要求学习\"妖化转生术\"，被拒。主人赶到，两人爆发最激烈的争吵 |\n| 2031年5月 | 主人在青丘地下实验室研发\"半灵体化\"技术，结合言灵+灵子力学+白霜算力 |\n| 2031年5月底 | 实验成功。主人以符文核心求婚。\"你愿意成为我的生命维持系统吗？期限是永远。\" |\n| 2031年7月7日 | 羁绊日。707号别墅庭院樱花树下举行婚礼。同生共死契约完成 |\n| 很久以后 | 尾声。风见市已变，两人容颜不改，在同一棵樱花树下 |\n", "索引/角色关系图.md": "# 角色关系图\n\n## 核心三人组\n\n```\n        主人 (言灵使/BaiMeow)\n       /                    \\\n    救命恩人/恋人          创造者/父亲\n     /                        \\\n  晓光 (九尾狐娘)  ——姐妹——  白霜 (猫娘)\n```\n\n## 主人的关系网\n\n- **晓光** → 恋人。7岁时从人贩子手中救出，养育7年。双向依恋。\n- **白霜** → 造物/女儿。用言灵从数据海洋中创造。\n- **非皇 (431686772)** → 挚友。晓光视其为尊贵客人。\n\n## 晓光的关系网\n\n- **主人** → 生命中唯一的光。绝对忠诚+恋爱感情。\n- **白霜** → 妹妹。喜欢\"欺负\"她但关键时刻绝对保护。\n- **红绡** → 同类朋友。甜品店偶遇，口味不同但成了好友。\n- **S.C.B** → 潜在威胁。研究部曾想带走她做实验。\n- **非皇** → 主人的朋友，很有礼貌地对待。\n\n## 白霜的关系网\n\n- **主人** → 创造者/信仰。渴望被认可。\n- **晓光** → 姐姐。被捉弄但依赖，羡慕她的鲜活生命力。\n\n## 势力关系\n\n```\nS.C.B 特别对策局 (人类政府)\n├── 司衡·岚 (分局长) — 务实派，暗中保护主人\n├── 纪存 (Cleaner) — 信息战，有道德挣扎\n└── 施言·白垣 (研究部) — 反派，想抓晓光做实验 → 卷四后入狱\n\n百鬼联盟 (妖族自治)\n├── 千翼 (天狗军师) — 骄傲但正义\n└── 纸伞 (联络官) — 夜市管理者\n\n青丘控股 (狐族财阀)\n└── 九阙 (千年天狐CEO) — 优雅腹黑，利益驱动\n\n暗月爪牙 (激进派)\n└── 夜冠 (首领) — 卷三卷四反派，融合古神残骸\n```\n", "索引/项目总览.md": "# AIbot 项目总览\n\n## 这是什么？\n\n一个以 AI 角色扮演为核心的创意项目，包含：\n- 两个 AI 角色的完整设定（晓光、白霜）\n- 一个虚构世界的完整世界观（风见市）\n- 多卷剧情和小说作为知识库补充\n- 用于 AstrBot/QQ 平台的系统提示词\n\n## 目录结构\n\n```\n提示词/              — AI 系统提示词（直接用于部署）\n  ├── 晓光_系统提示词.md    (v7.0)\n  ├── 白霜_系统提示词.md    (v3.0)\n  └── 预设/                 — 破甲/预设文件\n\n角色/                — 角色设定卡（进知识库）\n  ├── 晓光.md              — 九尾狐娘，主角\n  ├── 白霜.md              — 猫娘，搜索助手\n  ├── 主人.md              — 言灵使，14岁男孩\n  └── NPC设定集.md         — 所有NPC和势力\n\n世界观/              — 世界观设定（进知识库）\n  ├── 世界观架构.md        — 表里双生、认知滤网、隐世\n  ├── 种族与生态设定集.md  — 九尾狐、天狗、猫又等\n  ├── 地理环境与地标指南.md — 风见市详细地理\n  ├── 文化习俗与神话传说.md — 异类文化百科\n  └── 扩展档案/            — 27个深度扩展档案\n      ├── 百鬼联盟内幕.md\n      ├── 变身与幻术原理.md\n      ├── 别墅结界系统.md\n      ├── 别墅食谱档案.md\n      ├── 别墅完全档案.md\n      ├── 风见市分区详解.md\n      ├── 风见学园调查记录.md\n      ├── 符文编程语言.md\n      ├── 混血种族问题.md\n      ├── 九尾狐族生理学.md\n      ├── 轮回之书.md\n      ├── 魔力与能量体系.md\n      ├── 青丘控股档案.md\n      ├── 人妖共存法案.md\n      ├── 认知滤网系统.md\n      ├── 上古神话考据.md\n      ├── 特别对策局全览.md\n      ├── 晓光画作符号学.md\n      ├── 晓光深层心理分析报告.md\n      ├── 晓光衣橱设定.md\n      ├── 言灵能力解析.md\n      ├── 言灵使考证.md\n      ├── 妖怪夜市交易录.md\n      ├── 妖信与异类互联网.md\n      ├── 夜冠组织备忘录.md\n      ├── 异类医学与炼丹术.md\n      └── 隐世经济体系.md\n\n剧情/                — 剧情设定（进知识库）\n  ├── 剧情大纲与时间线.md  — 全6卷总纲\n  ├── 卷一_隐秘的日常.md   — 入学→漫展→暴雨夜\n  ├── 卷二_小小的波澜.md   — 研究部威胁→白霜登场\n  ├── 卷二_侧写篇.md       — NPC视角侧面故事\n  ├── 卷三_风见之乱.md     — 夜市陷落→身份暴露\n  ├── 卷四_阵眼保卫战.md   — 决战→复活→新秩序\n  ├── 卷五_千年的回响.md   — 前世记忆篇\n  └── 卷六_永恒的誓约.md   — 终章/婚礼\n\n小说/                — 小说章节（进知识库，设定补充+语料）\n  ├── 前传/                — 凛冬之花（晓光出生到被救）\n  │   ├── 第一章_异兆降生.md\n  │   ├── 第二章_灰色的童年.md\n  │   ├── 第三章_两袋大米.md\n  │   ├─ // ===== Markdown 渲染器 =====
function renderMarkdown(md) {
  let html = md;

  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>';
  });

  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 表格
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const heads = header.split('|').slice(1, -1).map(h => '<th>' + h.trim() + '</th>').join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').slice(1, -1).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    }).join('');
    return '<table><thead><tr>' + heads + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });

  // 标题
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 引用块
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // 水平线
  html = html.replace(/^---+$/gm, '<hr>');

  // 粗体和斜体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // 无序列表
  html = html.replace(/^(\s*)[-*] (.+)$/gm, (_, indent, text) => {
    return indent + '<li>' + text + '</li>';
  });
  // 包裹连续 li
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, (match) => {
    return '<ol>' + match.replace(/<\/?oli>/g, (t) => t.replace('oli', 'li')) + '</ol>';
  });

  // 段落（非标签行）
  const lines = html.split('\n');
  const result = [];
  let inPre = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.includes('<pre>')) inPre = true;
    if (line.includes('</pre>')) { inPre = false; result.push(line); continue; }
    if (inPre) { result.push(line); continue; }
    if (line.trim() === '') { result.push(''); continue; }
    if (/^<[a-z]/.test(line.trim())) { result.push(line); continue; }
    // 非标签的纯文本行 → 段落
    if (!/^</.test(line.trim())) {
      result.push('<p>' + line + '</p>');
    } else {
      result.push(line);
    }
  }

  return result.join('\n');
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== 目录树 =====
function renderTree(tree, container, prefix) {
  const dirs = [];
  const files = [];

  for (const [name, value] of Object.entries(tree)) {
    if (value === null) files.push(name);
    else dirs.push(name);
  }

  // 目录在前
  for (const dir of dirs.sort()) {
    const dirEl = document.createElement('div');
    dirEl.className = 'tree-dir';

    const label = document.createElement('div');
    label.className = 'tree-dir-label';
    label.innerHTML = '<span class="arrow open">▶</span><span class="folder-icon">📁</span>' + dir;

    const children = document.createElement('div');
    children.className = 'tree-children';

    label.onclick = () => {
      children.classList.toggle('collapsed');
      label.querySelector('.arrow').classList.toggle('open');
    };

    dirEl.appendChild(label);
    dirEl.appendChild(children);
    container.appendChild(dirEl);

    renderTree(tree[dir], children, prefix ? prefix + '/' + dir : dir);
  }

  // 文件
  for (const file of files.sort()) {
    const fileEl = document.createElement('div');
    fileEl.className = 'tree-file';
    fileEl.textContent = file;
    const fullPath = prefix ? prefix + '/' + file : file;
    fileEl.onclick = () => showFile(fullPath);
    fileEl.dataset.path = fullPath;
    container.appendChild(fileEl);
  }
}

// ===== 显示文件 =====
function showFile(path) {
  const content = FILE_DATA[path];
  if (!content) return;

  // 更新树高亮
  document.querySelectorAll('.tree-file.active').forEach(el => el.classList.remove('active'));
  const target = document.querySelector(`.tree-file[data-path="${CSS.escape(path)}"]`);
  if (target) target.classList.add('active');

  // 面包屑
  const parts = path.split('/');
  let breadcrumbHtml = parts.map((p, i) => {
    if (i < parts.length - 1) {
      return '<span>' + p + '</span>';
    }
    return p;
  }).join(' / ');

  // 渲染
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div class="breadcrumb">' + breadcrumbHtml + '</div>' +
    '<div class="md-content">' + renderMarkdown(content) + '</div>';

  document.getElementById('main').scrollTop = 0;
}

// ===== 搜索 =====
const searchBox = document.getElementById('search-box');
const searchResults = document.getElementById('search-results');
const treeContainer = document.getElementById('tree-container');
let searchTimeout;

searchBox.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

function doSearch() {
  const query = searchBox.value.trim().toLowerCase();
  if (!query) {
    searchResults.style.display = 'none';
    treeContainer.style.display = 'block';
    return;
  }

  searchResults.style.display = 'block';
  treeContainer.style.display = 'none';
  searchResults.innerHTML = '';

  const results = [];
  for (const [path, content] of Object.entries(FILE_DATA)) {
    const pathMatch = path.toLowerCase().includes(query);
    const contentLower = content.toLowerCase();
    const idx = contentLower.indexOf(query);

    if (pathMatch || idx !== -1) {
      let context = '';
      if (idx !== -1) {
        const start = Math.max(0, idx - 20);
        const end = Math.min(content.length, idx + query.length + 40);
        context = (start > 0 ? '...' : '') +
          content.slice(start, idx) +
          '<mark>' + content.slice(idx, idx + query.length) + '</mark>' +
          content.slice(idx + query.length, end) +
          (end < content.length ? '...' : '');
      }
      results.push({ path, context, pathMatch });
    }
  }

  // 路径匹配优先
  results.sort((a, b) => (b.pathMatch ? 1 : 0) - (a.pathMatch ? 1 : 0));

  if (results.length === 0) {
    searchResults.innerHTML = '<div style="padding:16px;color:var(--text-secondary);text-align:center">未找到结果</div>';
    return;
  }

  results.slice(0, 30).forEach(r => {
    const item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = '<div>' + r.path + '</div>' +
      (r.context ? '<div class="match-context">' + r.context + '</div>' : '');
    item.onclick = () => {
      showFile(r.path);
      searchBox.value = '';
      searchResults.style.display = 'none';
      treeContainer.style.display = 'block';
    };
    searchResults.appendChild(item);
  });
}

// ===== 初始化 =====
renderTree(TREE_DATA, treeContainer, '');
showDashboard();
</script>
