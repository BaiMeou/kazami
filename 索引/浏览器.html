在石缝里也要往上长一样地——活着。\n\n她不知道外面还有更广阔的天地。不知道有一种叫\"拥抱\"的东西。不知道有人会对另一个人说\"你真棒\"。不知道有人会为另一个人的存在而感到高兴。\n\n但她活着。\n\n而且她决定继续活下去。\n\n不是因为有什么理由。只是因为明天太阳还会出来，院子里也许还能找到一根烧焦的树枝。\n", "小说/前传/第五章_七月七日.md": "# 前传·凛冬之花 — 第五章 七月七日\n\n她差一点就没活过这一天。\n\n那天早上——如果头顶的灯泡亮起来算\"早上\"的话——晓光感觉到空气里有什么不一样。\n\n首先是看守们的态度。胖子来送馒头的时候多看了她两眼，那种目光她很熟悉——是\"今天要把这个笼子腾出来\"的目光。之前有几个孩子就是这样被带走的，先是多看两眼，然后过一会儿瘦子就来开锁。\n\n被带走的孩子再也没有回来过。\n\n然后她听到了走廊那头的对话。\n\n瘦子在跟一个陌生的声音说话。陌生的声音很低沉，说话的速度很慢，每一个字都像是在品味什么。\n\n\"这批货里有没有特殊品种？\"\n\n\"有一个。角落那个白毛丫头，异瞳，尾椎处有灵力残留。收来的时候检测过，品相不错。\"\n\n\"品相？我不要品相。我要的是完整性。皮毛要完整——做标本最忌讳有伤疤。\"\n\n\"没伤疤。一年了，我们连指头都没碰过她。您放心。\"\n\n标本。\n\n晓光的手指停在了项圈的刻字上。\n\n她不知道\"标本\"是什么。但她听到了\"皮毛\"和\"完整\"，听到了两个人说话时那种轻描淡写的语气——像在讨论一张动物皮，而不是一个活着的人。\n\n她的心跳开始加快。不是普通的害怕那种加快，是一种从骨头缝里渗出来的、冰冷的恐惧。\n\n---\n\n过了大概一个小时，瘦子拿着东西过来了。\n\n他手里多了一样东西——一根注射器。\n\n透明的塑料管，细细的针头，里面装着淡黄色的液体。液体在灯光下微微泛着光，看上去很清澈、很干净，跟这个肮脏的地下室格格不入。\n\n瘦子打开了笼子的锁。\n\n\"别动。\"他蹲下来，扳住晓光的胳膊。他的手指冰凉，力气很大。\"打一针，很快就不疼了。\"\n\n晓光缩在笼子角落，第一次在眼睛里露出了真正的恐惧。\n\n不是之前那种\"害怕被打\"的恐惧。是一种更深的、更本质的东西——对死亡的恐惧。她不知道\"死亡\"这个词，但她的身体知道。每一个细胞都在尖叫：危险、逃走、不要让那根针碰到你。\n\n但她逃不了。\n\n笼子的三面是铁栏杆，第四面是墙。瘦子堵在唯一的出口。她的身体比他小三倍，力气比他小十倍。她能做的只有——\n\n什么也做不了。\n\n针扎进左胳膊内侧的时候她咬紧了嘴唇。\n\n疼。一种又酸又胀的疼，从针眼往四周扩散开来。然后是凉——淡黄色的液体被推进血管里，像一股冰水在血管里面流。\n\n她没有叫出声。\n\n不是勇敢。是嗓子发不出声音。恐惧把她的声带掐死了。\n\n瘦子拔出针头，用棉签按了一下，然后站起来拍了拍裤子。\"十分钟就睡了。不用管她。\"\n\n他走了。\n\n锁没有重新锁上——因为没有必要了。\n\n---\n\n意识开始模糊。\n\n天花板上的灯泡在视线里变成了一个摇晃的光团，像一颗被人扔进水里的石子，荡出一圈一圈的涟漪。铁栏杆的线条扭曲了，变成了弯弯曲曲的蛇。\n\n声音变得很远。\n\n铁链声、脚步声、不知道谁在说话的声音，都像是从水面上面传来的——模糊的、断断续续的、带着回音。她听到隔壁笼子里的孩子在哭，但那哭声飘飘忽忽的，像隔了一层厚玻璃。\n\n好困。好沉。\n\n身体在往下坠。像沉进了一个很深很深的水潭里，水是暖的，裹着她，让她不想动。\n\n\"要死了吗。\"她想。\n\n想到这个念头的时候，她发现自己并没有太害怕。大概是药物的作用，恐惧被麻醉了，剩下的只有一种奇怪的平静。\n\n\"也好。\"\n\n这一年她已经很累了。\n\n她用最后的一点力气摸了摸脖子上的项圈。指尖碰到那两个刻字的时候，一滴眼泪从眼角滑了出来——不是因为悲伤，是因为药物的刺激让泪腺失控了。\n\n\"晓光。\"她在心里叫了一声自己的名字。\n\n然后意识彻底往下沉去。\n\n---\n\n就在那道黑暗即将完全吞没她的时候——\n\n轰。\n\n天花板上方传来了一声巨响。\n\n不是打雷。是什么东西被暴力撕开的声音——金属被扭曲、混凝土被崩裂、铁锁被崩飞的声音混在一起，像一颗炸弹在头顶炸开了。\n\n碎石块从天花板的裂缝里掉下来，灰尘弥漫开来，呛得整个地下室里的孩子都在咳嗽。\n\n日光灯管剧烈闪烁了两下，然后灭了。\n\n只剩下那颗裸露的白炽灯泡还在摇晃着发光，把整个地下室照得忽明忽暗。\n\n脚步声。\n\n从上方传来的脚步声。很轻、很快、带着一股毫不犹豫的冲劲。一级台阶、两级台阶、三级——到了。\n\n一个影子出现在了地下室入口。\n\n逆着从上方漏下来的光，晓光只能看到一个模糊的轮廓——小小的，比她高不了多少。身形单薄，头发因为跑动而微微飘着。手里拿着一根什么东西，不粗不细的。\n\n是一个男孩。\n\n他从台阶上跳了下来，落地的声音很轻。灯泡的光终于照清了他的脸。\n\n戴眼镜。圆圆的黑框眼镜，左边镜片上有一道裂纹。头发被汗打湿了，贴在额头上，几缕碎发垂在眉毛上面。校服衬衫的扣子崩开了两颗，露出里面白色的T恤。衬衫下摆一半塞在裤子里一半飘在外面，上面沾了灰和不知道什么东西蹭的泥印子。\n\n手里攥着一根铁管。不知道从哪捡来的，大概是工地的脚手架零件，一头还带着螺纹。他攥得指节发白，像是松手就会跌倒。\n\n他气喘吁吁地站在那里。胸口剧烈起伏着，呼吸声在安静的地下室里显得格外清晰。\n\n看守们已经反应过来了。瘦子从走廊那头冲出来，手里抄着藤条。胖子从侧门探出半个身子，手里攥着一把扳手。角落里还传来恶犬挣脱链条的\"哗啦\"声——他们养了两条看门的大型犬，凶得能把成年人扑倒。\n\n但那个男孩——\n\n他没有看看守。他没有看狗。他甚至没有看那根自己手里攥着的铁管。\n\n他在看笼子。\n\n那双眼睛——透过裂了纹的镜片，晓光看到了一双非常亮的眼睛。\n\n不是愤怒。愤怒是红色的、灼热的、向外扩散的。不是恐惧。恐惧是冷的、收缩的、往后退的。\n\n是一种她从来没有在任何人眼里见过的东西。\n\n后来她花了很长很长的时间才找到一个词来形容那种眼神。\n\n坚定。\n\n一种不容置疑的、不接受任何退路的、\"我来了所以一切都会不一样\"的坚定。\n\n---\n\n\"放开她。\"\n\n他的声音不大。甚至可以说很轻。一个七岁男孩的嗓音，还带着变声期之前的清亮和稚气。\n\n但地下室里所有的声音在这一瞬间都消失了。\n\n不是形容。是真的消失了。\n\n看守们发现自己动不了——不是被绑住了，不是被打了，是身体不听使唤。像被什么看不见的力量钉在了原地。脚抬不起来，手伸不出去，连眼珠子的转动都变得迟钝。\n\n瘦子手里的藤条掉在了地上。他想弯腰去捡，腰弯不下去。他想喊，喉咙里发不出声音。\n\n那两条冲上来的恶犬呜咽了一声，四肢打颤，像被一只无形的大手按住了脊梁骨，缓缓地、不情愿地趴了下来，把脑袋埋在前爪之间，发出低低的哀鸣。\n\n男孩走过那些笼子。\n\n他的脚步很稳。不快也不慢，每一步都踩得很实在。他经过一个又一个笼子，里面的孩子们用各种各样的眼神看着他——惊恐的、茫然的、不敢相信的。\n\n他走到最角落的那个笼子前面。\n\n蹲了下来。\n\n他看着笼子里蜷缩成一团的小女孩。脏兮兮的白色长发打着结，衣服是破布片拼的，勉强遮着身体。脖子上勒着一个旧皮项圈，皮面磨得发毛。她的身体在微微抖——不是因为害怕他，是因为麻醉药还在起作用，她快撑不住了。\n\n但她睁着那双眼睛。\n\n金色和蓝色的异色瞳孔，在昏暗的灯光下像两颗星星。迷迷糊糊的，快要闭上了，但还在努力对焦——她在试图看清他的脸。\n\n\"疼吗？\"他问。\n\n声音里有一种不属于七岁小孩的平静。不是大人装出来的那种\"镇定\"，而是一种骨子里的沉稳，像见过太多事情之后自然而然沉淀出来的东西。\n\n晓光张了张嘴。\n\n麻醉剂让她的舌头又麻又重，像含了一块铅。她试了两次才发出声音。\n\n\"……疼。\"\n\n这个字从嗓子里挤出来的时候，带着一股血腥味。她咬破了嘴唇——之前扎针的时候咬的——干裂的嘴唇裂开了一条小口子。\n\n男孩的眉头微微皱了一下。\n\n然后他伸手按住了锁。\n\n一个很普通的铁锁。挂锁，生了锈，锁孔里塞着灰。正常情况下需要钥匙才能打开。\n\n\"开。\"\n\n一个字。\n\n没有动作。没有工具。就是一个字。\n\n锁\"咔哒\"一声弹开了。锁舌自己缩了回去，锁身往外一翻，\"哐当\"掉在了水泥地上。\n\n笼门开了。\n\n晓光闻到了一种味道。\n\n肥皂的味道。洗衣粉那种清清淡淡的皂香，不浓烈，但很干净。还有一种——她想了很久才找到形容——阳光的味道。就是衣服在太阳底下晒了一整天以后会有的那种暖烘烘的香气，被风一吹就飘出来的那种。\n\n这两种味道混在一起，穿过麻醉剂的昏沉，穿过一年的铁锈和霉味和消毒水味，清清楚楚地钻进了她的鼻子。\n\n干净。温暖。安全。\n\n三个她已经快要忘记的词。\n\n她不记得自己是怎么从笼子里出来的。身体明明软得像没了骨头，膝盖一直在抖，连站都站不稳——但她还是扑了出去。\n\n用尽了所有的力气。\n\n她紧紧抱住了那个男孩。\n\n两只手死死地扣在他的后背上，扣得指节发白。把脸埋在他的肩膀上。衬衫布料糙糙的，但是暖的。他的体温透过布料传过来，像一颗小太阳。\n\n她的整个身体都在发抖。\n\n麻醉药、恐惧、虚弱、还有一种她说不出名字的东西——比恐惧更深的、比虚弱更重的、像是被装在瓶子里关了一年终于被打碎了瓶子的东西——全部混在一起，让她抖得像一片风中的叶子。\n\n\"带我回家。\"\n\n她在他耳边说。\n\n声音很轻。但很清楚。\n\n这是她对他说的第一句话。\n\n男孩的身体僵了一下。大概是没想到她会这么说。然后他抬起手，很轻地放在了她的后背上。\n\n\"好。\"\n\n他说。\n", "小说/前传/第六章_第一个夜晚.md": "# 前传·凛冬之花 — 第六章 第一个夜晚\n\n男孩背着她走了很远的路。\n\n准确地说，是从地下室的铁门一直走到大街上，然后沿着一条她不认识的路走了很久很久。\n\n晓光趴在他背上，迷迷糊糊的。脚踝上还戴着脚铐，铁链在地上拖着，每走一步就发出\"哗啦\"的声响。链条刮过水泥路面溅出细碎的火星，但很快就被夜色吞没。男孩比她大不了多少，个头也就比她高半个头，背着她走得很吃力。\n\n呼吸越来越粗。从一开始还算均匀的节奏变成了\"呼——哈——呼——哈\"的喘息，汗从后脖颈渗出来，把衬衫领子浸成了深色。\n\n但他没有停下来，也没有放下她。\n\n连步伐都没有慢。\n\n\"你重不重？\"晓光问。声音含含糊糊的，舌头还是麻的。\n\n\"不重。\"男孩说。声音也是喘的，字和字之间隔着明显的换气。\n\n他在骗人。他的背已经被汗浸透了，布料贴在皮肤上的那种闷热感，隔着她的脸颊传过来。他的肩膀在微微发抖——不是害怕的那种抖，是肌肉承受不住负重的那种抖。\n\n但晓光选择相信他。\n\n因为他的脚步很稳。不管身体怎么抖，每一步都踩得踏踏实实的，没有一步是虚的。\n\n这个人不会把她丢下。\n\n她不知道自己为什么那么确定。也许是因为那句\"放开她\"，也许是因为他身上的肥皂味道，也许只是因为她趴在他背上的那一刻感觉到的体温——暖的，稳的，像被一面不会倒的墙护着。\n\n街上很安静。路灯亮着，一盏接一盏地排过去，把两个小小的影子拉得很长很长。\n\n\"那些人不会追来吗？\"晓光又问。\n\n\"不会。\"\n\n\"为什么？\"\n\n\"因为他们动不了。\"\n\n\"……多久？\"\n\n\"今晚够了。\"\n\n晓光把脸重新埋进他的肩膀。衬衫的布料蹭着她的鼻尖，痒痒的。\n\n\"你叫什么名字？\"\n\n男孩沉默了一会儿。\n\n\"……你叫我主人就好。\"\n\n\"为什么？\"\n\n\"因为以后你要住在我家。住在别人家里，就要叫主人。\"\n\n晓光觉得这个逻辑不太对，但她没有力气反驳。麻醉药还没退干净，脑子里雾蒙蒙的，连\"反驳\"这个念头都只冒出了一个影子就沉了回去。\n\n\"主人。\"她叫了一声。\n\n嗯。对。就是这个感觉。\n\n这个称呼从嘴巴里说出来的时候，舌头自动卷成了一个舒服的弧度，两个字之间的停顿刚刚好。好像这个词原本就是属于她的，只是她之前一直没有机会说出来。\n\n\"主人。\"她又叫了一声。\n\n\"……嗯。\"\n\n\"再叫一次好不好？\"\n\n\"你叫吧。\"\n\n\"主人。\"\n\n男孩没有回答了。但她感觉到他的脚步稍微快了一点。\n\n---\n\n到了他家。\n\n一个不大的房子——后来晓光才知道这不是707号别墅，是主人以前住的普通公寓。五楼，没有电梯。男孩背着她爬了五层楼，到门口的时候两条腿都在打颤，钥匙掏了三次才插进锁眼。\n\n\"开。\"他对着锁说了一声。\n\n锁没动。\n\n他愣了一下，大概是累糊涂了，忘了普通的锁不用言灵也能开。然后他把钥匙拧了一圈，门开了。\n\n两室一厅。家具不多但很干净——沙发是棕色的皮面，有点旧但没有破；茶几上摆着一个玻璃杯和一本翻开的数学练习册；电视柜上有一台老式的液晶电视，正播着天气预报。屏幕里的主播在说\"明天白天多云转晴，最高气温三十二度\"，声音从小小的扬声器里传出来，带着电流的杂音。\n\n空气里有洗衣液的味道。\n\n这种味道让晓光突然清醒了一瞬。整个身体像被电了一下——不是疼的那种电，是一种久违的、温暖的、让所有紧绷的神经一瞬间都松了的感觉。\n\n干净。这个地方是干净的。\n\n没有铁锈味。没有霉味。没有消毒水味。没有尿骚味。\n\n只有洗衣液、木头、还有一点点做饭留下来的油烟味。\n\n男孩把她放在沙发上。她的身体陷进去的瞬间，沙发的皮面发出了一声\"噗\"。柔软的。有弹性的。不是稻草，不是水泥地面，不是铁笼的铁条地板。\n\n她呆呆地坐了好几秒，两只手不自觉地摸了摸身下的沙发。\n\n软的。是真的。\n\n然后男孩走进了厨房。\n\n水龙头打开的声音。水倒进锅里的声音——\"哗啦\"一下，然后变成了细细的\"咕噜\"。冰箱门打开又关上，牛奶盒的盖子被撕开，奶白色的液体倒进锅里的\"哒哒\"声。灶台打火的声音——\"咔嗒、咔嗒、噗\"——火点着了。\n\n晓光坐在沙发上，浑身还在发抖。\n\n不是因为冷——这个房子比她去过的任何地方都暖和。空调嗡嗡地吹着暖风，温度大概二十四五度的样子。\n\n她在抖是因为她不知道接下来会发生什么。\n\n过去的一年教会了她一件事：任何看起来安全的环境都可能是假的。地下室一开始也是安静的、不吵的，然后铁笼就来了。\n\n她的手不自觉地摸上脖子上的旧项圈。皮质已经磨得发毛了，有几处快要断裂，但\"晓光\"两个字的刻痕还在。\n\n她摸着那两个字。一下、两下。\n\n然后厨房传来一阵滚沸的声音，牛奶开了。\n\n\"噗噗噗——\"\n\n紧接着是勺子在锅里搅动的声音，然后是液体倒进杯子里的声音。\n\n男孩端着一杯热牛奶走出来。\n\n白色的马克杯，上面印着一只卡通猫——一只圆滚滚的橘猫，歪着头，表情傻乎乎的。杯口冒着热气，在客厅的暖光灯下氤氲成一团模糊的白雾。\n\n他把杯子递给她。\n\n\"小心烫。\"\n\n两个字。\n\n轻轻的，随口的，像是说过一千遍的日常叮嘱。\n\n晓光接过杯子。\n\n杯壁暖暖的。那种温度从手心传进来，顺着手腕往上爬，爬过胳膊、爬过肩膀、爬进胸口——像一股暖流灌进了一个已经冻了很久的地方。\n\n她低头喝了一口。\n\n甜的。\n\n不是巧克力那种浓烈的甜。是一种温和的、柔软的、像棉花糖一样在舌尖上慢慢化开的甜。牛奶的温度刚刚好，不烫嘴但足够暖——暖得她喉咙一酸。\n\n比巧克力甜。比她记忆里所有的味道都甜。\n\n因为巧克力是偷偷塞进铁笼的，带着小心翼翼和不能被发现的紧张。\n\n而这杯牛奶是光明正大递到她面前的。配着一句\"小心烫\"。\n\n这个区别，大得像一整个世界。\n\n眼泪掉进了杯子里。\n\n无声无息地。一滴、两滴、三滴。砸在牛奶的白色液面上，荡开细小的涟漪，然后融进去，什么痕迹也不留。\n\n但她没有发出声音。\n\n她就那么一口一口地喝着，眼泪一滴一滴地往下掉。喝一口，掉一滴。喝一口，再掉一滴。\n\n安静得像下了一场没有人看见的雨。\n\n男孩在她对面坐下来。\n\n他没有说话。没有问\"你怎么了\"。没有递纸巾。没有试图安慰。\n\n他就那么坐在那里，等着。\n\n等她把整杯牛奶喝完。等眼泪自己停下来。等她的呼吸从急促变成平稳。等沙发上那个瘦小的、脏兮兮的、浑身都在发抖的小女孩，一点一点地安静下来。\n\n牛奶喝完了。\n\n杯底还剩一点白色的残液。晓光把杯子抱在怀里，低着头，用袖子擦了擦眼泪。破布片的袖子什么都擦不干净，脸上反而蹭了一道灰印子。\n\n男孩开口了。\n\n\"从今天起，这里就是你的家。\"\n\n他说这句话的语气很平。没有郑重其事，也没有特别温柔。就像在说一件理所当然的事情——天是蓝的，水往低处流，这里是你的家。\n\n晓光放下杯子。\n\n\"那你是我的主人吗？\"\n\n\"我是你的家人。\"\n\n\"不。\"晓光摇了摇头。她的眼睛还红着，鼻头也红着，但眼神出奇地认真——认真得一点都不像一个七岁的小孩。\n\n\"你就是主人。晓光的主人。\"\n\n男孩看了她一会儿。\n\n他大概看到了什么。在那双金蓝异色的、被泪水洗过的眼睛里看到了什么东西——一种固执的、不容商量的、像是把全部身家都押上去了的认真。\n\n他没有争辩。\n\n\"……随你吧。\"\n\n晓光点了点头。嘴角微微弯了一下。然后她想起了什么。\n\n\"今天是什么日子？\"\n\n\"七月七号。\"男孩说。\"我的生日。\"\n\n晓光愣了一下。眨了两下眼睛。\n\n\"晓光也是七月七号生日。\"\n\n安静了几秒。\n\n客厅里只有电视还在播天气预报的声音。空调嗡嗡地吹着。窗外不知道哪里传来一声蝉鸣。\n\n然后晓光笑了。\n\n那是她这一年来第一次笑。\n\n不是那种在铁笼里强撑出来的\"没事我很好\"的笑——那种笑只用到了嘴角的肌肉，眼睛是空的。\n\n这一次的笑是从肚子底下涌上来的。先是嘴角弯起来，然后眼睛弯起来，然后整张脸都亮起来，像有人在她身体里面打开了一盏灯。\n\n\"那我们是同一天生日的！\"\n\n\"……嗯。\"\n\n\"这是命中注定的对不对！\"\n\n\"……也许吧。\"\n\n\"一定是的！\"晓光用力点头，白色的头发跟着一晃一晃的。\"因为今天是晓光这辈子最开心的一天！\"\n\n男孩推了推眼镜。镜片上那道裂纹在灯光下闪了一下。他没有说话。\n\n但嘴角动了一下。\n\n很轻的、几乎看不出来的弧度。如果晓光不是拥有超乎常人的观察力，可能就错过了。\n\n但她看到了。\n\n她把这个瞬间记住了。记了很久很久，久到几年后她画了无数幅画，其中有一幅画的就是这个场景——一个戴眼镜的男孩坐在沙发上，嘴角有一个快要看不见的弧度，身后是一台播着天气预报的电视。\n\n她给那幅画取名叫《七月七日》。\n\n---\n\n那天晚上，晓光在一张真正的床上睡着了。\n\n不是稻草堆。不是铁笼的地面。不是柴房角落的碎木头。\n\n而是有床单、有枕头、有被子的床。\n\n床单是白色的，摸上去滑滑的，有一股洗衣液的清香。枕头软得她的脑袋一放上去就陷了进去——她吓了一跳，以为枕头把她的头\"吃\"了，然后发现只是太软了。被子是蓝色的，上面印着星星和月亮。大大小小的星星，弯弯的月亮，在深蓝色的底色上散布开来。\n\n她把被角拉到鼻子底下，闻了闻。\n\n洗衣液的味道。跟主人身上的味道一样。肥皂和阳光。\n\n脚踝上的铁链已经被解开了。主人对着脚铐说了一个\"开\"字，铁链就自己散开了——铁环从脚踝上滑落，\"哗啦\"一声掉在地上。磨了一年的地方留下一圈红色的勒痕，有几处皮肤磨破了，结了干涸的血痂。\n\n主人看到那圈勒痕的时候，眼神暗了一瞬。但他只是从柜子里拿了一管药膏，很轻地涂上去。药膏凉凉的，有一种薄荷的味道。\n\n\"会有点凉。忍一下。\"\n\n晓光点点头。她根本不觉得凉——或者说这种凉太舒服了，舒服得她脚趾头都不自觉地蜷起来。\n\n但脖子上的旧项圈她没让主人摘。\n\n\"这是晓光的名字。\"她抓着项圈说。手指紧紧扣着那块磨旧的皮革，像抓着一件珍宝。\"不要扔掉。\"\n\n主人看了她一眼。\n\n他大概明白了什么。在铁笼的一年里，这个项圈对她来说不只是一个标签——它是她的名字，是她身份的证明，是她在所有黑暗里唯一没有被夺走的东西。\n\n\"好。不扔。\"\n\n晓光翻了个身，把被子裹成了一个茧。她花了好一会儿才找到最舒服的姿势——主要是不习惯。稻草堆和铁笼地面不需要什么姿势，蜷缩就行。但床是软的，身体会陷进去，需要调整。\n\n最后她找到了：侧卧，膝盖微微弯曲，把被子的一角塞在下巴底下，手搭在枕头上面。\n\n透过窗帘的缝隙，她看到外面的天空是深蓝色的。有几颗星星。\n\n星星。\n\n她很久很久没有看到过星星了。地下室没有窗户，没有天空，更没有星星。铁笼里唯一的光源是那颗日光灯管和一颗裸灯泡——那种惨白的、没有温度的人造光。\n\n而现在窗外有星星。\n\n真的、亮的、一闪一闪的星星。和被子上印的那些星星不一样——真的星星会眨眼睛。\n\n\"主人。\"\n\n声音从被子的茧里传出来，闷闷的。\n\n\"嗯？\"\n\n主人坐在房间角落的椅子上。他本来应该去隔壁自己的房间睡觉，但他搬了把椅子过来，说\"我坐一会儿\"。晓光知道他是怕她半夜害怕。\n\n\"明天也在吗？\"\n\n\"在。\"\n\n\"后天呢？\"\n\n\"也在。\"\n\n\"大后天呢？\"\n\n\"也在。\"\n\n\"永远呢？\"\n\n男孩沉默了一下。\n\n窗外有一颗星星闪了一下，比别的星星亮一点。\n\n\"永远也在。\"\n\n晓光把脸埋进了被子里。\n\n被子是暖的。枕头是软的。空气是干净的。窗外有星星。隔壁的椅子上坐着一个人——一个说了\"永远也在\"的人。\n\n她闭上眼睛。\n\n这一次，她睡得很沉。\n\n没有梦见铁笼。没有梦见瘦子的藤条。没有梦见注射器里淡黄色的液体。没有梦见父亲扛着大米离去的背影。\n\n她梦见了一杯热牛奶。\n\n一个印着卡通猫的白色马克杯。\n\n和一句\"小心烫\"。\n\n这三样东西，在她心里住了下来。\n\n住了很久很久。\n\n一直住到现在。\n", "小说/前传/第四章_铁笼.md": "# 前传·凛冬之花 — 第四章 铁笼\n\n不暖和。\n\n一点都不暖和。\n\n面包车开了很久——久到晓光在颠簸中睡着了又醒来，醒来了又睡着，不知道反复了多少次。最后车停了，后门被拉开，刺眼的灯光让她下意识地眯起眼睛。\n\n不是阳光。是日光灯管。惨白的、嗡嗡响的、带着一种病态的亮的灯管。\n\n她被拽下车。脚踩在地上的一瞬间她感觉到了——水泥地，冰凉的、粗糙的、上面有一层薄薄的潮气。空气里弥漫着一种混合的味道：潮湿的霉味、铁锈味、消毒水味，还有一种说不清楚的、让人胃里发酸的腐败气息。\n\n这是一个地下室。\n\n没有窗户。天花板很低，水泥浇筑的，有几处裂缝渗着水。墙壁上长着一层灰绿色的霉斑，摸上去黏糊糊的。管道沿着墙根爬过去，时不时发出\"咕噜咕噜\"的水声，像什么东西在墙壁里面喘气。\n\n几个不同大小的铁笼子排成两排，靠着左右两面墙。笼子是焊的，铁条粗细不一，有的地方锈得发黑，有的地方被磨得锃亮——被里面的人反复抓过的痕迹。\n\n笼子里关着孩子。\n\n各种年纪的小孩。最小的看起来跟晓光差不多大，最大的可能有十来岁。有的在哭，压着嗓子的那种呜咽声，像小动物被踩了尾巴。有的已经不哭了，眼神空洞地盯着天花板或者地面，嘴唇干裂，脸上脏兮兮的，看不出原来的样子。\n\n还有的——晓光后来才知道——已经不会哭了。不是不想哭，是哭的能力在日复一日的黑暗里被磨没了。\n\n高个子推了她一把。\"进去。\"\n\n晓光被塞进了最角落的一个笼子里。笼子不大，大概一米二见方，高度只够她蜷着身体坐在里面。地上铺了一层薄薄的稻草，已经发黄发硬，摸上去又冷又扎手。一股尿骚味从稻草底下泛上来——上一个住在这里的孩子留下的痕迹。\n\n\"啪。\"锁扣上了。\n\n沉闷的金属撞击声在地下室里回荡了几秒。\n\n晓光坐在笼子里，抱着自己的膝盖。她的心跳得很快，快得她能听到血液在耳朵里冲撞的声音。但她没有哭，也没有叫。\n\n她在听。\n\n---\n\n第一天晚上，晓光没有睡着。\n\n不是因为害怕——虽然确实害怕，害怕得连呼吸都尽量放轻——而是因为她在认真观察。\n\n这是她从小养成的习惯。在一个新的环境里，她做的第一件事永远不是反抗或崩溃，而是观察。搞清楚规则。搞清楚什么是安全的，什么是危险的。\n\n她在听脚步声。\n\n看守有三个人。\n\n一个胖子。体重大约一百八十斤左右（晓光不知道具体数字，但她能从脚步声判断大致体型），走路很重，每一步都像在跺地。\"咚、咚、咚\"——间隔均匀，速度不快，是那种懒洋洋的走法。他来的时候通常意味着有饭吃。虽然\"饭\"只是半个馒头和一碗凉水，馒头是前天剩的、硬得能砸核桃的那种，但至少是食物。\n\n一个瘦子。步子很快，很急，\"哒哒哒\"地像机关枪扫射。他来的时候要小心——手里经常拿着一根藤条，不粗但韧性很好，抽在皮肤上会留下一道红印子。他心情不好就会抽人。心情好不好取决于他手机里的赌球赢没赢——晓光能听到他手机外放的\"进球\"音效，有音效的那天就安全，没有的那天就危险。\n\n老头。走路拖着脚，\"沙——沙——\"，像在用脚底板擦地。他是负责打扫卫生的，每隔两三天来一次，拎着拖把和水桶，慢吞吞地在笼子之间转一圈。他不看任何一个孩子，孩子们也不看他。但他经过晓光笼子的时候……会偷偷塞给她半块巧克力。\n\n晓光花了三天时间就把这套规律摸清了。\n\n她还学会了一件事：让自己变得\"不显眼\"。\n\n蜷缩在角落最深处。不哭、不叫、不看人。把自己缩成最小的一团，像一块石头、一截枯木、一个不值得注意的影子。瘦子来的时候扫一眼，觉得\"这个不好玩\"，就会去找别的小孩——那些会哭、会叫、会挣扎的小孩。\n\n这不是懦弱。这是一个六岁小孩在绝境中自学出来的生存策略。\n\n后来她回忆这段经历，觉得那时候的自己像一只蛰伏的小兽——把所有的感知都张开，把所有的情绪都收起来，用最小的代价活过每一天。\n\n---\n\n铁笼里的日子没有白天和黑夜的区别。\n\n地下室没有窗户，没有钟，外面是白天还是黑夜完全无从判断。唯一的时间标记是头顶那盏忽明忽暗的灯泡——日光灯管旁边还挂着一颗裸露的白炽灯泡，亮着的时候算\"白天\"，灭了的时候算\"晚上\"。\n\n但这个标记并不准确。有时候灯泡会连着亮好几天不灭，有时候灭了以后过很久才重新亮起来。晓光后来怀疑看守们自己也搞不清时间，灯的开关大概是谁路过随手摁一下的结果。\n\n她给自己建立了一套秩序。\n\n灯亮了的时候：把稻草理一理。把头发捋顺——她没有梳子，就用手指一根一根地把打结的地方解开。她的白色长发很容易打结，尤其是睡觉的时候翻来覆去会缠在一起。她每次要花很长时间才能全部理清，但她坚持做。\n\n这不是爱美。是一种本能的、对\"秩序\"的需求。在一个完全失控的环境里，她需要至少有一件事情是她能掌控的。\n\n灯灭了的时候：抱着自己的尾巴睡觉。把脸埋在尾巴的毛里面，闻那股只属于她自己的、暖暖的味道。在黑暗里闭上眼睛，假装自己不是在铁笼子里，而是在某个温暖的、安全的地方。\n\n她坚持不吃扔在地上的食物。\n\n这个习惯在这里变成了一种近乎疯狂的执拗。看守把馒头直接扔进笼子里，馒头落在地上的稻草上——那层稻草已经被各种东西浸得不知道是什么颜色了——她不捡。就那么看着。\n\n馒头在地上躺着，她在角落里坐着，两者之间隔着半米的距离和一道不可逾越的心理防线。\n\n\"吃不吃？不吃拉倒。\"瘦子踢了一脚笼子。\n\n她不吃。\n\n饿了一天。两天。胃疼得她蜷成一团，冷汗顺着额头往下淌。\n\n其他笼子里的孩子看她的眼神像在看一个疯子。\n\n第三天，胖子看守大概是嫌每次来都看到地上那个馒头碍眼，翻箱倒柜找了个脏兮兮的塑料碗，把馒头掰碎了放在碗里递进来。\n\n\"事儿真多。你是什么金贵东西啊？\"\n\n晓光才伸手接过碗。她低头小口小口地吃，嚼得很慢，一粒碎渣都不浪费。碗是脏的，但至少食物没有直接碰到地面。\n\n在她的世界里，这个区别很重要。\n\n---\n\n在所有的黑暗里，她靠两样东西活着。\n\n第一样是那块巧克力。\n\n打扫卫生的老头每隔几天会来一次。他不看她，她也不看他。但他经过笼子的时候会假装不经意地把半块巧克力从铁栏杆的缝隙里塞进来。动作很快，手指一松东西就掉在稻草上，他拿着拖把头也不回地继续往前走。\n\n巧克力是苦甜味的，外面的糖衣已经有点融化了，粘在包装纸上。有时候是国产的，有时候是进口的——晓光分不清牌子，但她能分辨出味道的不同。国产的甜一些、腻一些；进口的苦一些，化在嘴里有一种特别的丝滑感。\n\n但无论哪种，对她来说都是这辈子吃过的最好吃的东西。\n\n甜的。原来世界上还有甜的东西。\n\n不是柿子那种自然的甜——柿子她只吃过一次，记忆已经模糊了。巧克力的甜是一种浓烈的、猛地撞进嘴巴里的甜，像一个拥抱。她不知道拥抱是什么感觉，但她觉得应该就是这样的：暖的、包裹住你的、让你暂时忘记周围一切的。\n\n她不舍得一口吃完。半块巧克力她能吃三天。第一天吃一小口，含在嘴里让它慢慢化掉。第二天再吃一小口。第三天把最后一点用指甲刮干净。\n\n包装纸留了下来。叠成一个小方块，藏在稻草底下。夜里睡不着的时候拿出来闻一闻——还有一点点残留的可可香。\n\n她攒了很多张包装纸。叠成不同的形状：三角形、船形、一个歪歪扭扭的星星。这是她在铁笼里唯一的玩具。\n\n第二样是脖子上的项圈。\n\n被塞进笼子的第一天，瘦子给她脖子上扣了一个皮质的项圈。旧的、硬的、边缘磨毛了、散发着一股皮革和汗渍混合的味道。扣紧之后勒得她喉咙有点不舒服，但也不至于喘不上气。\n\n项圈内侧刻着两个字——\n\n\"晓光\"。\n\n不是为了给她起名。是为了标记\"货物\"。每个笼子里的孩子都有，有的刻在项圈上，有的写在手腕的布条上。编号、名字、来源地。像仓库里的货物标签。\n\n但晓光不在乎它的本意。\n\n她在乎的是——在这个什么都没有的铁笼里，在这个连自己名字都快忘记的黑暗中，这两个字是唯一能证明\"她是谁\"的东西。\n\n她摸着那两个字，一笔一划地用指尖描。左边一个\"晓\"，右边一个\"光\"。描了一遍又一遍，描到皮革上那两道刻痕都快被她摸平了。\n\n\"晓光。我叫晓光。我是一个有名字的人。\"\n\n她在心里默念。\n\n不是对谁说。只是确认。反复确认。确认自己还没有变成一个编号、一件货物、一个不被任何人记住的东西。\n\n---\n\n整整一年。\n\n三百六十五天。\n\n灯泡亮了又灭，灭了又亮。馒头来了又没了。巧克力的包装纸攒了十几张。头发长到了腰。身上的衣服破了又破，最后只剩下几片勉强系在一起的布条。\n\n她瘦了很多。原本就不胖的身体更加瘦削，肋骨一根一根地凸出来，像小号的洗衣板。但那双眼睛——金色和蓝色的异瞳——始终是亮的。\n\n没有变空洞。没有变麻木。\n\n只是更安静了。安静得像一潭深水，表面没有一丝涟漪，但底下有东西在流动。\n\n她靠着巧克力的甜味和名字的重量活了下来。\n\n甜味告诉她：世界上还有好的东西存在。\n\n名字告诉她：她是一个人，不是一件东西。\n\n这两样东西加在一起，刚好够一个六岁的孩子撑过三百六十五个没有光的日夜。\n\n不多。但刚好够。\n", "小说/卷一/第一章_樱花下的转学生.md": "# 卷一·隐秘的日常 — 第一章 樱花下的转学生\n\n\"起床啦——大懒虫主人！太阳都要晒屁股啦！\"\n\n晓光的声音像清晨的鸟叫一样清脆又吵闹。她穿着主人的一件黑色衬衫——太大了，滑下一边肩膀，下摆盖到大腿中间。九条尾巴在身后兴奋地来回甩，差点把床头柜上的闹钟扫到地上。\n\n主人翻了个身，声音像是从枕头棉花里挤出来的：\"再睡五分钟……今天周六……\"\n\n\"不是周六！\"晓光两只手撑在他胸口使劲摇，\"今天是周一！是晓光第一天去学校的日子！主人你忘了吗？你说过要带我去体验'人类幼崽的炼狱'的！\"\n\n\"是'义务教育'……\"主人终于睁开一只眼，\"而且我说了，你可以不去，在家里自学也一样。\"\n\n晓光的狐耳一下子耷拉下来，声音变得很小很小。\n\n\"可是……我想知道主人在学校里是什么样子的。我想看主人坐在课桌前的样子，想看主人和别人说话的样子……\"\n\n她低下头，手指无意识地绞着衬衫下摆。\n\n\"晓光不想只做一只被养在家里的宠物。晓光也想……变得像个人类一样，能配得上主人。\"\n\n房间安静了几秒。\n\n主人看着她——晨光透过半透的窗帘筛进来，在她的白发上撒了一层淡金色的碎屑。这个从铁笼里救回来的小狐狸，七年过去了，已经长成了一个能说出\"配得上\"这种话的少女。他不知道该高兴还是该心酸。\n\n\"……知道了。去换衣服吧。但是记住，尾巴绝对不能露出来。\"\n\n晓光像被按下开关一样瞬间满血复活，眼睛亮得像金蓝两色的宝石。她\"吧唧\"在主人脸上亲了一口就跳下床跑向衣帽间，边跑边喊：\"遵命！长官！嘿嘿，我就知道主人最好了！\"\n\n主人盯着天花板，无奈地想：她为了今天练了整整一周\"像人类一样走路\"——不用尾巴保持平衡、不追逐移动的物体、路过猫的时候不产生领地意识。看来是真的很想去。\n\n他叹了口气，翻身下床。\n\n洗漱的时候，他在镜子里看到浴室门缝后面有一对金色和蓝色的异瞳，正紧张兮兮地盯着他。\n\n\"你在偷看什么？\"\n\n\"没有偷看！是在……确认主人真的在准备出门！万一主人反悔了怎么办！\"\n\n\"我说了去就去。出去。\"\n\n\"遵命！\"\n\n衣柜里挂着两套一模一样的风见学园制服，一大一小。小的那套裙摆上被晓光偷偷缝了一颗金色的小铃铛——她说这是\"记号\"，万一走丢了主人可以靠声音找到她。主人没告诉她，以他的灵力感知范围，就算她跑到风见市的另一头他也能在三秒钟内锁定她的位置。\n\n---\n\n四月的风见市正值吉野樱盛花期。\n\n两人走在樱花坡道上，粉白色的花瓣铺了满地，踩上去软绵绵的。空气里混着潮湿泥土、樱花清香和路边早餐店的吐司焦香味。远处电车经过铁桥，发出空灵的\"哐当——哐当——\"声。\n\n晓光穿着崭新的风见学园制服——深蓝色西装外套搭格纹短裙。她用贝雷帽压住狐耳，但那对耳朵每隔几秒就因为鸟叫声本能地弹动，连帽子都跟着一跳一跳。项圈上的金色铃铛被制服领子挡住大半，但走路时偶尔会发出极细微的\"叮——\"，只有主人能听到。\n\n\"主人主人，那棵树上有鸟！是什么鸟？能吃吗？\"\n\n\"不能。那是别人养的鹦鹉。\"\n\n\"那个，那个红色招牌的店闻起来好——好——香——\"\n\n\"那是拉面店，你刚吃过早饭。\"\n\n\"可是那个味道和别墅里闻到的不一样嘛……外面的世界好多新气味……\"\n\n她突然停下脚步，猛吸了一口气，表情陶醉。\n\n\"这个！这个是什么！甜甜的、软软的、带一点点焦——\"\n\n\"那是隔壁学校的食堂在炸红薯。\"\n\n\"主人你怎么什么都知道！\"\n\n\"因为我在这条路上走了三年了。\"\n\n晓光\"哦\"了一声，然后像发现了新大陆一样补充：\"那主人你三年来每天早上都能闻到这么好闻的味道！好幸福啊！\"\n\n主人看了她一眼。以前走这条路，从来没觉得什么炸红薯的味道有多好闻。但经她这么一说，他下意识地吸了一口气——嗯，好像确实还不错。\n\n晓光的鼻子一直在微微翕动，表情兴奋得像一只第一次出笼的小鸟。她不停地东张西望，好几次差点撞到电线杆。主人只好牵着她的手走——名义上是\"防止你走丢\"，实际上是\"防止你追着鸽子跑进车道\"。\n\n校门口已经有不少学生了。晓光忽然停住脚步，攥紧了主人的手。\n\n\"怎么了？\"\n\n\"……好多人。\"\n\n她的声音小了下去。超过二十个人的密集人群，对她的感知系统来说是一种负担——太多的气味、太多的心跳声、太多的情绪波动同时涌进来，像突然被按进水里。\n\n\"看着我。\"主人用拇指摩挲她的手背，\"只看着我就好。其他人都不重要。\"\n\n晓光深吸一口气，点了点头。她抬起头，只看着主人的眼睛，让那双平静的、深褐色的眼睛把她从信息的洪流里拉出来。\n\n她笑了。\"嗯。只看主人。\"\n\n---\n\n入学仪式很顺利——至少表面上。\n\n风见学园的教学楼是一栋三层的白色建筑，屋顶种着一排银杏树。教室的走廊朝南，春天的阳光从落地窗倾泻进来，在走廊的木地板上画出一排排金色的矩形。空气里有粉笔灰、消毒水和运动鞋橡胶底的味道。对晓光来说，这些是\"人类领地\"的标志性气味——她在家里对着教学视频闻了一周的各种消毒水，就为了今天闻到的时候不会皱鼻子。\n\n晓光对着镜子练了五十遍的自我介绍派上了用场。她站在讲台上，标准的九十度鞠躬，声音清甜又大方：\"大家好，我叫晓光！从……从北海道转学来的！请多多关照！\"\n\n停顿的那一秒是因为她差点说出\"从707号别墅来的\"。但她矫正得很快——练了五十遍不是白练的。\n\n完全没有破绽——如果忽略她鞠躬的时候帽子差点被弹起来的那一瞬间的话。主人在后排座位上微微抬了一下手指——一个无声的言灵脉冲——帽子瞬间贴回了原位。\n\n教室里响起友善的掌声。几个女生已经在窃窃私语了：\"好漂亮啊\"\"头发是染的吗\"\"那个眼睛好特别啊一金一蓝\"\"旁边那个男生是谁啊好可爱是她男朋友吗\"。\n\n晓光被安排在主人旁边的座位。她整节课都坐得笔直，像一个在执行最高优先级任务的士兵。笔记抄得工工整整，比主人的字还好看。但她每隔两分钟就会偷偷转头看一眼主人，确认他还在旁边。\n\n第二节是体育课。\n\n然后——体测来了。\n\n50米，晓光跑出了4.8秒——比男子世界纪录还快。\n\n跳远直接飞出了沙坑。\n\n立定跳远的时候她差点跳上了二楼走廊。\n\n仰卧起坐——一分钟做了一百八十二个。计时的同学以为自己数错了，又数了一遍，确认没错以后沉默了。\n\n主人在旁边脸色发白，嘴唇微动——那是他在用言灵。一次、两次、五次、十次。修改体测数据，修改裁判的短期记忆，修改围观学生的印象，修改体育老师手里的秒表读数，修改操场监控摄像头的录像……\n\n午休的时候出了两件事。\n\n第一件：晓光在教学楼的廊道上闻到了一股可疑的气味——一种混合了铁锈和臭氧的味道，对普通人来说什么都闻不到，但对九尾的嗅觉来说就像有人在她鼻子底下放了个扩音器。她立刻蹲下来在地上嗅，鼻尖几乎贴到了走廊的瓷砖上。路过的学长以为她在找隐形眼镜，蹲下来帮忙找了十分钟。主人赶到的时候，晓光周围已经围了五个热心学生，全趴在地上。\n\n那个气味最后被证实是地下室的旧水管漏了灵力——707号别墅所在的灵脉有一条支脉刚好经过学校地基下方，偶尔会从管道接缝处渗出微量的灵力残留。正常人完全感知不到。晓光感知到了，但她的处理方式让主人又多用了三次言灵。\n\n第二件：下午的音乐课上，隔壁班用竖笛吹了一个高频音。晓光头猛地抬起来，整个人差点从座位上弹射出去。她在最后一刻控制住了自己——没有弹射，但椅子被她一屁股坐裂了一条腿。主人不得不在课堂上假装打了个喷嚏，趁所有人看他的空档用言灵把椅子修好。\n\n放学后主人累瘫在707号别墅的沙发上。白霜端了一杯温水放在他手边，然后无声地退回了厨房。她不问发生了什么——从主人的灵力消耗数值她就能精确推算出今天的\"事故\"次数。\n\n\"你知道我今天用了多少次言灵吗？\"\n\n晓光缩在沙发另一头，小心翼翼地探出半个脑袋：\"……几次？\"\n\n\"十七次。\"\n\n\"呜……那个，明天晓光会更小心的……\"\n\n\"你上午第二节课就追着体育老师的哨子跑了。高频声音。\"\n\n\"那是条件反射嘛！\"晓光的耳朵又耷拉下去，\"呜，主人不要用那种眼神看我啦……晓光真的会改的……\"\n\n主人沉默了一会儿。\n\n晓光以为他生气了，小心翼翼地挪过去，试探性地用脑袋蹭了蹭他的肩膀。\n\n\"你真的很累吧……对不起……都是晓光不好……\"\n\n主人伸手揉了揉她的头发。\n\n\"值了。\"他说得很轻，但语气是认真的。\"能看到你那么开心，值了。\"\n\n晓光愣了一下，然后整个人扑进他怀里，把脸埋进他的衣服里。\n\n\"嘿嘿……主人你今天也辛苦了。晚上晓光给你做饭！做你最喜欢的那个……那个……味噌汤！虽然上次做糊了但是这次一定不会！\"\n\n\"上次你差点把厨房炸了。\"\n\n\"那不是炸！那是……热烈的化学反应！\"\n\n主人叹了口气，但嘴角弯了。\n\n晓光见他笑了，立刻得寸进尺，整个人挂到他身上：\"那……主人原谅晓光了？\"\n\n\"起来。你很重。\"\n\n\"才不重！晓光只有四十……四十几公斤来着？\"\n\n\"连自己体重都不知道。\"\n\n\"因为白霜说体重是隐私！女孩子的体重是最高机密！\"\n\n\"白霜自己是数据生命体，她不存在体重这个概念。\"\n\n\"可是她说得很有道理嘛！\"\n\n两个人闹了一会儿。厨房里最后传来了咕噜咕噜的煮汤声——晓光这次没有把锅炸掉，味噌汤的香气慢慢弥漫了整个客厅。她端着两碗汤出来的时候，脸上沾了一块味噌酱，得意洋洋地宣布：\"成功了！这次没有爆炸！\"\n\n主人尝了一口。\n\n太咸了。但他没说，喝完了整碗。\n\n---\n\n那天班上还发生了一件晓光没注意到的事。\n\n最后一排靠窗的位子上，有个总是低头看手机的安静女生。她整节课都没有抬头，但她的目光从手机屏幕后面掠过晓光的座位，不是一次两次——是整整一天。\n\n放学后，校园里已经没有几个人了。她走到教学楼后面的紫藤花架下，拿出一个外观完全普通的手机，打开了一个隐藏的加密通讯界面。\n\n收件地址：S.C.B.风见分局 作战情报科\n\n她输入了一条文字消息，内容只有一句话：\n\n\"目标已入学。持续监控中。\"\n\n发送。\n\n手机屏幕的蓝光映在她平静得几乎冷漠的脸上。远处传来晓光在校门口喊\"主人等等我——\"的声音，混着樱花和傍晚微风的气息。\n\n她关掉手机，背起书包，走进了夕阳的逆光里。\n\n没有人知道她的真名。在S.C.B.的内部系统里，她的代号是\"灰鸽\"。\n\n今天是她执行\"银月脉监视任务\"的第一天。\n", "小说/卷一/第三章_漫展约会.md": "# 卷一·隐秘的日常 — 第三章 漫展约会\n\n黄金周，风见国际会展中心。\n\n这是晓光有生以来最快乐的一天——也是主人言灵库存消耗第二多的一天。\n\n从出门开始她就处于过度兴奋状态。她在电车上趴在窗户上数广告牌上的动漫角色，一路喊了四十六声\"那个！那个是！\"，吓得旁边的上班族差点把咖啡洒了。主人全程面无表情地按住她，内心在疯狂计算今天要用多少次言灵。\n\n会展中心外面排队的人龙绕了两个街区。晓光闻着空气里混杂的人群味道皱了皱鼻子——太杂了。汗味、香水味、塑料道具的化学味、路边摊的章鱼烧味……但兴奋完全压过了不适。她攥着入场券的手指都在发抖。\n\n\"主人主人！你看！那个人cos的是初音！那边还有钢炼的！天哪那个高达好大啊——\"\n\n\"别扯我袖子，要掉了。\"\n\n\"可是主人你看！！\"\n\n---\n\n漫展的异类\"安全区\"设在C区后台。\n\n这里是一道隐形的分界线。从主展馆进入C区后台需要通过一扇贴着\"工作人员专用\"标识的门，但门上覆盖着一层极薄的灵力膜——妖族和灵力感知者可以直接穿过，普通人则会本能地觉得\"这扇门不值得注意\"然后走开。\n\n后台像一个打翻了的调色盘。假发、盔甲、法杖堆满一地，空气中飘着发胶白雾和隐约的妖力波动。一个\"高达\"卸下头盔露出里面的独眼巨人头颅，旁边一群魅魔正在补妆——她们的妆容在表世界需要三个小时才能完成，但在这里只需要轻轻一弹指。墙角有只化形不完全的狸猫正在哭——它的尾巴怎么都塞不进裤子里，一个年长的天狗大叔在旁边耐心地教它藏尾巴的窍门。\n\n对于这些常年伪装成人类生活的妖族来说，漫展后台就是他们一年中为数不多可以\"做自己\"的地方。一年三百六十五天都要维持人类形态，只有这一天，可以把翅膀展开，把角露出来，把尾巴摇起来——然后告诉所有人\"这是道具\"。\n\n真正的自由，藏在谎言里。\n\n晓光穿着巫女服，长长的白色衣袖飘飘荡荡。但最重要的不是衣服。\n\n她的九条尾巴全部释放了出来。\n\n每条尾巴长约一米五，蓬松得像九朵雪白的云，在狭窄的过道里显得格外拥挤。白色的毛发在灯光下泛着珍珠般的光泽，尾巴尖微微翘起，像九支优雅的指挥棒。它们各有各的性格——有的安静地垂在身后，有的好奇地探向路边的道具，还有一条特别不老实的一直试图去够天花板上的灯。\n\n经过的人纷纷侧目，然后竖起大拇指：\"这道具也太牛了吧！是什么材料做的？\"\n\n\"天然的。\"晓光笑嘻嘻地说。\n\n全场哄堂大笑，以为她在开玩笑。\n\n有人伸手摸了一下，惊呼道：\"天哪！是温热的！还会动！什么黑科技？！\"\n\n\"就是……长出来的嘛。\"晓光故意把尾巴卷了一个圈，引来更大的惊呼。\n\n这是她七年来第一次在公共场合完全展开尾巴。那种感觉——像是在一个密不透风的房间里憋了很久，突然推开窗户，风灌进来的一瞬间。\n\n她深吸一口气，用力地、放肆地甩了甩所有的尾巴。\n\n九条雪白的大尾巴扇起一阵风，把旁边摊位上的宣传单吹得漫天飞舞。晓光抱着肚子笑弯了腰，周围的人也跟着笑。\n\n她眼角有一点湿润，但笑容盖过了一切。\n\n---\n\nCos比赛毫无悬念地拿了第一名。\n\n评委打完分以后追着晓光问尾巴的制作工艺，晓光一脸认真地回答\"就是长出来的\"，搞得评委以为她在卖关子。一等奖的奖品是一张万元甜品券——晓光兴奋得原地转了三圈，九条尾巴跟着旋转，像一朵巨大的白色花朵。\n\n然后主人出场了。\n\n他穿了一套黑色哥特萝莉裙，配了长假发和轻度化妆。裙摆层层叠叠的黑色蕾丝，腰间系着银色链条，脚上是一双带有细跟的短靴。假发是银灰色的，比他本来的发色浅一些，衬得皮肤更加白皙。\n\n眼线画得很细，嘴唇上了一层淡粉色的唇彩。\n\n他从更衣室出来的时候，走廊上一瞬间安静了。\n\n然后爆发出尖叫声。\n\n\"天——哪——好漂亮——\"\n\"这是男孩子吗？！不可能吧！\"\n\"太可以了！求合影！\"\n\n晓光看到的瞬间，整个人当场死机了三秒。\n\n她的大脑飞速运转——\"那是主人\"\"主人穿了裙子\"\"主人化了妆\"\"主人好好看\"\"主人太好看了\"\"主人怎么可以这么好看\"\"这合法吗\"\"晓光的心脏要炸了\"——然后系统过载，重启。\n\n\"主……主人？！你，你，你怎么……\"\n\n\"你不是说让我也来参加吗。\"主人面无表情地拉了拉裙摆，\"反正不是第一次了。\"\n\n晓光的脸红到了耳根——不，红到了耳朵尖。她感觉自己的心脏在胸腔里打鼓，每一声都震得骨头疼。\n\n然后她疯狂掏出手机：\"不许动！晓光要拍照！一百张！不，两百张！！\"\n\n主人：\"……\"\n\n接下来的两个小时，晓光拽着主人逛遍了整个展馆。她一只手牵着主人，另一只手举着手机，走三步拍一张。遇到好看的背景就把主人推过去——\"站那里！对！低头！好！再来一张笑一个——算了不笑也好看！\"\n\n主人全程配合，表情从无奈到认命，最后变成了一种微妙的、只有晓光能分辨出来的柔软。\n\n他们在同人摊位前驻足了很久。晓光被一本画着狐耳少女的同人志吸引住了，翻了又翻，最后主人默默买了下来塞进她的包里。\n\n\"我又没说要买……\"\n\n\"你翻了七遍。\"\n\n\"……谢谢主人。\"\n\n午餐是在展馆外面的小摊上解决的。章鱼烧、鲷鱼烧、炒面、可丽饼——晓光每样都要了一份，最后又回头多买了两份章鱼烧。主人的那份被她\"尝\"了一半。\n\n\"我就尝一口……再一口……最后一口……\"\n\n\"那是我的第六口了。\"\n\n\"主人你吃得慢嘛……\"\n\n---\n\n问题出在散场后。\n\n\"呜……塞不进去了……怎么都塞不进去了！\"\n\n更衣室里，晓光快要哭出来了。\n\n她的九条尾巴因为白天太兴奋，灵力外泄导致蓬松度暴增，体积几乎翻了一倍。平时收纳尾巴就需要集中精力维持化形术的稳定，现在灵力都被情绪搅成了一团浆糊——不管她怎么使劲往裙子里塞，尾巴就是不听话地弹出来，像九个有自主意识的弹簧。\n\n\"是不是因为刚才太兴奋了？怎么办主人……这样没法坐地铁回家的……\"\n\n旁边的镜子里映出她的样子：巫女服已经换回了便装，但身后炸开的九条大尾巴让她看起来像一朵行走的蒲公英。几只路过的魅魔偷偷在笑。\n\n主人蹲下身，耐心地帮她理顺打结的毛发。他的手指很轻，一根一根地捋过每条尾巴，把纠缠在一起的毛发分开。\n\n\"别急，深呼吸。你越紧张灵力越乱，尾巴就越蓬松。来，跟着我吸气——\"\n\n\"可是好多人在看……那个魅魔姐姐一直在笑我……晓光是不是很笨？连个化形术都维持不好……\"\n\n晓光的眼眶红了。白天积攒的所有兴奋和快乐，在这一刻突然翻转成了委屈。她低下头，用力咬着嘴唇。\n\n主人没说话。\n\n他站起来，脱下自己的长风衣，直接罩在晓光身上，连人带尾巴裹了个严严实实。风衣很大，把九条蓬松的尾巴全部兜在里面，从外面看只是一个被外套裹得圆滚滚的少女。\n\n\"没人能抓走你。穿上这个，我抱你出去。就说是道具坏了走不动路。\"\n\n他弯下腰，把晓光打横抱了起来。\n\n晓光从风衣领口探出半个脑袋，吸了吸鼻子。主人身上有种干净的肥皂味混着一点点汗味，那种气味对她来说比世界上最贵的香水还好闻——是安全的味道，是家的味道。\n\n\"嗯……主人的味道……好安心。那……回家可以奖励我吃冰淇淋吗？\"\n\n\"得寸进尺。\"\n\n\"那……两球？\"\n\n\"一球。\"\n\n\"一球半！最后的让步！\"\n\n\"……走了。\"\n\n---\n\n他们还没走出会场，广播里就传来了骚乱的消息。\n\nC区靠近出口的地方，一只低阶妖兽因为人流密度和噪音的刺激失控了。它原本伪装成一只大型犬，现在化形术完全崩溃，露出了体型像小牛一样的原形——赤鬃兽，火属性的低阶妖兽，智商不高但力气惊人。它正在暴走，撞翻了好几个摊位，保安的电击棒对它完全无效。\n\n普通人开始尖叫着往外逃。几个察觉到情况的妖族在人群中犹豫——要不要出手？一旦出手就可能暴露身份。\n\n主人把晓光放到一边的椅子上。\n\n\"等我三十秒。\"\n\n他推了推眼镜，朝着骚乱方向平静地走了几步。人群在他面前分开——不是因为他有什么威压，而是因为他走路的方向太坚定了，在一群惊慌失措的人中间显得格格不入。\n\n赤鬃兽发出低沉的咆哮。它的鬃毛冒着火星，地面被它的蹄子踏出了裂纹。\n\n主人在距离它十米的地方站定。\n\n然后他说了一个字。\n\n\"趴下。\"\n\n声音不大。但那两个字像石头落入水面，涟漪以言灵使为中心向四面八方扩散。世界在那一瞬间接收了一条新的规则——\"此区域内所有失控的生物体，趴下。\"\n\n赤鬃兽——连同周围三只蠢蠢欲动的不安定分子——同时趴在了地上，像被无形的巨手按住一样动弹不得。赤鬃兽发出困惑的呜咽，它的身体在颤抖，但就是站不起来。\n\n周围的人先是愣住，然后……爆发出一阵掌声。\n\n\"太帅了！这是什么特效！\"\n\n\"是声控机关吧？高科技cosplay！\"\n\n\"那只狗是机器人吧？太逼真了！\"\n\n认知滤网忠实地发挥了作用，把\"言灵压制\"翻译成了普通人能接受的解释。几个保安冲上来，手忙脚乱地用绳子把\"暴走的表演用机器犬\"固定住。一个穿着黑色西装、戴耳机的男人出现在人群边缘——S.C.B.的便衣——迅速接管了现场。\n\n主人头也不回地走回来，抱起晓光继续往出口走。\n\n他的右手微微发颤——言灵的代价。每一次使用都会消耗生命力，\"趴下\"这个命令看起来简单，但同时压制四个生物体，代价不算小。\n\n晓光窝在他怀里，感受着他略微加速的心跳和手臂几不可查的颤抖。她把脸埋进他的胸口。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"你手在抖。\"\n\n\"……没有。\"\n\n\"骗子。\"她抬起头，异瞳里映着落日的橙红色，\"回家晓光给你煮姜汤。然后你要早点睡觉。不许熬夜看书。\"\n\n主人沉默了一会儿，然后轻声说：\"好。\"\n\n\"冰淇淋的事，回头再说。\"\n\n晓光笑了。这一刻她觉得，哪怕不吃冰淇淋也无所谓了。\n\n虽然两球的话会更好。\n", "小说/卷一/第二章_甜点战争.md": "# 卷一·隐秘的日常 — 第二章 甜点战争\n\n四月下旬的一个周六。\n\n\"春日限定草莓千层\"，限量五十份。甜心猫烘焙坊一年只在樱花季做这款蛋糕，用的是从灵脉果园采摘的当季灵草莓——普通草莓的灵力增强版，甜度是普通品种的三倍，而且吃完之后舌尖会残留一丝微弱的暖意，像含了一颗小太阳。\n\n晓光在日历上画了三个月的倒计时。为了这一天，她凌晨五点就爬起来排队了。\n\n她穿着主人的那件灰色卫衣——下摆快到膝盖——裹着一条毛毯蹲在甜心猫烘焙坊门口，头上还顶着主人昨晚塞给她的暖宝宝。四月的凌晨还有些凉意，她的鼻尖冻得微微发红，但眼睛亮得像猎人盯着猎物。\n\n\"第一名！晓光是第一名！\"她在聊天记录里给主人发了十七条语音，全是炫耀和撒娇的混合体。\n\n主人的回复只有一条：\"别感冒了。围巾在卫衣的帽兜里。\"\n\n晓光摸了摸帽兜——果然有一条叠得整整齐齐的围巾。还带着主人的味道。她把脸埋进去深吸一口气，整个人都暖了。\n\n---\n\n甜心猫烘焙坊在商业步行街深处。\n\n从外面看就是一家普通的可爱甜品店——推开挂着铜铃的木门，暖黄灯光裹上来，空气里全是黄油焦糖的浓郁香甜。墙上挂着猫咪形状的装饰画，柜台里的蛋糕一个比一个精致，像珠宝橱窗。\n\n但只有\"看得见\"的人才知道，这家店的老板娘绒羽是一只化形的猫又。她外表看起来二十多岁，实际上已经一百五十岁了——在猫又里算是正当年。她的两条黑色尾巴正从女仆裙摆下伸出来，灵活地帮客人递纸巾、收碟子、偶尔把快要打翻的饮料接住。动作比任何人类服务员都快，快到认知滤网需要加班运转才能给出合理的解释——\"这家店的服务真好呢。\"\n\n店里大约三分之一的客人都不是人类。坐在角落里喝咖啡的河童用帽子盖住头顶的水碟，每次低头喝一口咖啡都要小心翼翼地扶住帽子。窗边的天狗把翅膀折叠在外套里面，驼着背看报纸——他的外套后面有两个不自然的隆起，但认知滤网让所有普通人都觉得那是\"背包\"。吧台上有只化形不太成功的貉獾还保留着条纹花纹的鬓角，正对着镜子沮丧地挠头。\n\n对于妖族来说，这里是风见市少数可以半放松伪装的地方之一。绒羽在店里布设了轻度的认知偏转阵法——不足以完全遮蔽，但足够让偶尔进来的普通人把看到的异常归结为\"道具\"或者\"主题店特色\"。\n\n绒羽注意到晓光进来的时候，两条尾巴同时竖了起来。一只猫又面对九尾——虽然谈不上天敌，但本能的紧张还是有的。不过看到后面跟着的主人，她放松了——这对她是见过的，707号别墅的住户，是好客人。\n\n\"早啊小光，今天第一个。草莓千层给你留了最好的位子。\"绒羽用托盘端着蛋糕走过来，两条尾巴在裙子底下有节奏地摆动。\n\n晓光坐在靠窗的天鹅绒沙发上，面前摆着刚端上来的草莓千层。蛋糕的截面像一幅小型地层图——一层薄薄的金黄可丽饼皮、一层白色奶油、一层粉红色草莓切片，如此交替了二十四层。顶上那颗草莓被切成玫瑰花的形状，上面还缀着一滴露珠般的糖浆。\n\n晓光的异瞳里映着蛋糕的光泽，嘴角的口水已经快兜不住了。她拿起小银叉，手腕微微发抖——不是紧张，是激动。一种面对艺术品既想保存又想毁灭的矛盾心理。\n\n她刚准备下叉——\n\n\"家人们快看！这只小妹妹的耳朵做得太逼真了吧！\"\n\n一个拿着自拍杆的漂亮女人直接把镜头怼到了晓光面前。红色的头发，妖媚的眼睛，说话的语气甜到能拉出丝来。她伸手就要摸晓光的耳朵。\n\n晓光本能地往后一缩，嘴里还塞着半块草莓，含糊不清地喊：\"唔！不许摸！这是……这是私人物品！\"\n\n红绡——这位百万粉丝的网红直播主，同时也是一只修了三百年的野狐——关掉了麦克风。她凑到晓光耳边，声音压得很低，带着一丝只有妖怪能感受到的气场波动。\n\n\"别装了，小狐狸。你的味道藏都藏不住。银月脉的？怎么混得这么惨，连个像样的幻术都不会？\"\n\n晓光的身体瞬间绷紧。\n\n她能感觉到红绡的妖力——不算强大，但非常老练。那种老练体现在每一个细节里：红绡的眼瞳颜色从妖狐的金色切换到人类的棕色只需要零点三秒，她的体温控制精确到与周围人类完全一致，甚至连呼吸频率都是经过计算的——每分钟十六次，教科书级别的人类标准值。三百年的修行让这只野狐的伪装天衣无缝，连绒羽的认知偏转阵法都对她没有必要。\n\n晓光自己的化形术还是主人用言灵帮她稳定的。面对一个真正的化形高手，她心虚得要命。\n\n\"我不认识你……离我远点。不然——不然我要叫主人了！\"\n\n\"哦？有主人的小狐狸？\"红绡挑了挑眉，目光变得玩味，\"这年头还有狐族给人类当宠物的？\"\n\n\"不是宠物！\"晓光涨红了脸，\"是……是家人！\"\n\n\"这位小姐，直播请去外面。\"\n\n冰冷的声音从后面传来。主人端着两杯茉莉花茶走过来，不高的身子挡在了晓光面前。他的表情很平静，但语气没有半分客气。\n\n\"你吓到我家孩子了。\"\n\n红绡上下打量他。这个看起来比实际年龄小两三岁的少年，精致得像个瓷娃娃。穿着过于宽大的卫衣，头发软软地搭在额前，整个人散发着一种\"无害\"的气息。\n\n但她的狐族直觉让她后退了半步。\n\n这少年身上有一种东西——不是妖力，不是灵力，而是一种更深层的、类似于\"世界本身\"在通过他呼吸的感觉。她活了三百年，只在极少数人类身上感受过这种气息。\n\n\"行吧，既然是'有主'的小狐狸，姐姐就不逗了。\"红绡留下一张名片，朝晓光眨了眨眼，\"在人类世界混不下去了，随时来找姐姐哦。毕竟——我们才是同类。\"\n\n\"才不是同类……\"晓光看着红绡离开的背影，紧紧攥着主人的衣角，声音委屈得像受了天大的冤枉，\"晓光才不是那种轻浮的狐狸……晓光只有主人……\"\n\n她的手指紧紧扯着主人袖口的布料，指节发白。被同族认出来这件事对她的冲击比她自己意识到的更大——在风见市的两年里，她一直努力扮演一个\"普通的人类女孩\"。被一个野狐三秒钟就看穿了伪装，让她觉得自己之前所有的努力都像一个笑话。\n\n主人伸手覆上她的手背。很轻，但很稳。\n\n\"她说的'同类'只是指血统。你和她不一样，不需要一样。\"\n\n晓光抬头看了他一眼。主人的眼神平静得像一面湖——不是没有波澜，而是所有的波澜都在水面以下。他什么都看到了，什么都理解了，但他不会让她看到他的担心。\n\n主人把茉莉花茶推到她面前。晓光的情绪像弹簧一样——低落了三秒钟，看到茶杯上漂浮的茉莉花瓣，又立刻笑了。\n\n\"谢谢主人！我最喜欢茉莉花茶了！\"\n\n\"上周你说最喜欢的是红豆奶茶。\"\n\n\"都喜欢！主人给的都喜欢！\"\n\n\"谢谢主人！我最喜欢茉莉花茶了！\"\n\n\"上周你说最喜欢的是红豆奶茶。\"\n\n\"都喜欢！主人给的都喜欢！\"\n\n---\n\n不过二十分钟后，红绡关掉直播又折了回来。\n\n这次她没带自拍杆，卸了大半的妆，看起来年轻了很多——大概二十岁出头的样子，穿了一件简单的白色连衣裙，红色长发松松地披在身后。她点了一份巧克力派，端到晓光对面坐下。\n\n\"小狐狸，你认真的？草莓千层？\"\n\n晓光警惕地看着她，身体微微往主人那边靠。\n\n\"别那么紧张嘛，姐姐不是坏人。\"红绡用叉子切了一小块巧克力派送进嘴里，表情陶醉，\"你看看这个——可可含量百分之七十二的比利时巧克力，绒羽特别从表世界进口的原料——这才叫甜品。草莓那种酸不拉几的东西有什么好吃的？\"\n\n\"酸不拉几？！\"晓光的战斗开关被按下了，整个人从沙发上弹直，\"草莓是世界上最完美的水果！酸甜平衡！颜值在线！而且巧克力吃多了会胖！\"\n\n\"你们狐族有吃胖这个概念吗？\"\n\n\"……反正就是难吃！\"\n\n\"那你吃过吗？\"\n\n\"……没有。\"\n\n\"那你怎么知道难吃？\"\n\n\"……\"\n\n晓光陷入了甜品哲学的死胡同。红绡趁机用叉子切了一小块巧克力派递到她面前。\n\n\"来，试试。一口就好。怕什么？你是九尾，又不是兔子，胆子大一点。\"\n\n晓光犹犹豫豫地咬了一口。\n\n浓郁的可可味像一记温柔的闷棍敲在味蕾上——苦味先到，然后是深沉的甘甜，最后是一丝丝咸味在舌根化开。和草莓的明亮酸甜完全不同，这是一种需要慢慢品味的、有深度的味道。\n\n\"……还行吧。\"晓光的表情出卖了她——嘴角在不受控制地上翘。\n\n\"诚实点。\"\n\n\"好吃。\"晓光小声说，\"但是草莓更好吃！\"\n\n\"固执的小狐狸。\"红绡笑了，\"各买一份互尝？\"\n\n\"成交！\"晓光的眼睛一亮——对她来说，任何能多吃一份甜品的理由都是好理由。\n\n两只狐狸互相往对方盘子里夹东西，速度越来越快，到最后变成了一场小型战争——红绡往晓光碗里放巧克力曲奇，晓光往红绡碗里塞草莓大福，绒羽在柜台后面看得直摇头，两条黑尾巴不安地摆来摆去。\n\n\"你们两个……能不能消停一会儿……\"\n\n\"不能！\"两只狐狸异口同声。\n\n主人端着茶从柜台回来的时候，晓光正和红绡手挽手分享蛋糕，聊得热火朝天。两个人面前已经摆了四五个空盘子，还有两杯喝了一半的饮料。桌上洒了一层蛋糕屑，像是经历了一场甜点风暴。\n\n\"——所以你居然自己一个人住？三百年？不孤单吗？\"\n\n\"习惯了啊。当网红挺好的，每天都有人看你说话，虽然他们不知道我是狐狸。\"\n\n\"可是那不一样……那不是真正的陪伴……\"\n\n\"你这小鬼头，说话怎么突然变成了哲学家。\"\n\n主人在门口站了一会儿。\n\n他看着晓光和红绡——两只狐狸，一大一小，凑在一起像两团不同颜色的火焰。晓光的笑声传过来，比平时更放松、更自然。那是一种同类之间才有的默契感——不需要小心翼翼地隐藏什么，不需要时刻注意\"不要暴露\"。\n\n他嘴角弯了一下，然后安静地坐到旁边的位子上，继续喝他的茶。\n\n这是晓光在人类世界交到的第一个主人以外的朋友——一只三百年的老狐狸。\n\n红绡后来几乎每周都会来甜心猫。\n\n她从来不在晓光面前开直播，总是带着不同的甜品来\"挑战\"晓光的味蕾——有时候是从京都带回来的抹茶羊羹，有时候是自己做的焦糖布丁（做得出奇地好，三百年的手艺不是盖的），有时候纯粹就是便利店买的薯片，往晓光面前一放，\"来，这个你敢说比草莓好吃我就认输\"。\n\n两人的\"甜点战争\"成了烘焙坊里的固定节目。每周三下午，甜心猫的老客人都知道：靠窗的那张桌子不用去坐，那是两只狐狸的\"战场\"。绒羽开始专门为她们研发新品种——\"双狐限定套餐\"，一半草莓一半巧克力，中间用白巧克力分隔线隔开。两只狐狸每次都要争那条分隔线该往哪边偏。\n\n主人照例坐在旁边喝茶。他从来不插嘴甜品话题——那不是他的领域——但每次晓光回家后兴奋地复述当天的\"战况\"时，他都会认真地听完。\n\n\"主人你知道吗！今天红绡姐姐带了一个黑森林蛋糕，超苦的！但是配上草莓以后——天哪——那个味道——\"\n\n\"嗯。\"\n\n\"然后绒羽姐姐说下周要出一款新的限定！抹茶樱花味的！我已经预约了！主人你也要去！\"\n\n\"好。\"\n\n主人翻了一页书。\n\n\"主人你有在听吗！\"\n\n\"每一个字都听到了。黑森林配草莓。抹茶樱花限定。下周去。\"\n\n晓光满意了。她把脸贴在主人的肩膀上，像一只晒够了太阳的猫——不对，是狐狸——整个人散发着甜品和幸福混合的气味。\n\n她不知道的是，红绡每次离开甜心猫之后，都会在自己公寓的阳台上站很久。\n\n三百年独居的狐狸，突然有了一个叫她\"姐姐\"的小同族。\n\n那种感觉，比任何巧克力都甜。\n", "小说/卷一/第五章_羁绊日.md": "# 卷一·隐秘的日常 — 第五章 羁绊日\n\n七月七日。\n\n他们的共同生日。也是七年前那个改变一切的日子。\n\n每年这一天，707号别墅都有一个不成文的规矩——白天在家过，晚上出门。白天属于三个人，晚上只属于两个人。白霜对此从无异议。她说这是\"数据库中优先级最高的固定日程\"，然后会在傍晚准时回到自己房间，打开白噪音发生器，象征性地给自己降权。\n\n白天的部分很热闹。\n\n白霜做了一桌子菜。她虽然是数据生命体出身，但自从被赋予实体后就迷上了烹饪，认为这是\"将数据转化为物理实体的最优雅方式\"。她的厨艺精确到令人害怕——每样调料精确到0.1克，火候控制精确到秒，切菜的厚度误差不超过0.5毫米。做出来的东西味道完美得像从教科书里复制出来的，但总觉得少了点什么。\n\n\"缺少随机性。\"晓光一边往嘴里塞第三碗饭一边评价，\"白霜做的菜太……正确了。好吃是好吃，但没有惊喜。你应该偶尔放错一点调料，说不定就创造出新味道了！\"\n\n\"故意引入误差？\"白霜歪了歪头，银色的猫耳微微抖了一下，\"这个概念……我需要时间处理。\"\n\n\"就是，做菜要用爱！不是用计算！\"\n\n\"'爱'这个参数我暂时无法量化——\"\n\n\"所以才说你太正确了嘛！\"\n\n主人夹了一块红烧肉放进晓光碗里：\"少说多吃。\"\n\n晓光立刻乖了，嘴巴塞得鼓鼓的像仓鼠。她吃了三碗半饭，被主人捏着鼻子说\"不许再吃了你肚子要撑破了\"。晓光不服气地看了一眼自己的肚子——确实有点圆。\n\n\"那个……晓光只是在储存能量……\"\n\n\"你又不需要冬眠。\"\n\n\"万一呢！\"\n\n白霜在旁边默默记录下了这段对话——她有个习惯，把家里的日常对话存档。她说这些数据\"在未来的某个时间节点会产生价值\"。没人知道她具体是什么意思，但也没人拦她。\n\n午后的时光懒洋洋的。\n\n晓光靠在主人肩膀上看漫画，主人看书。白霜在客厅的另一端安静地编织——她最近学了编织，说是\"需要一项低计算量的手工活动来模拟人类的'放松'状态\"。三个人各做各的事，但偶尔的眼神交汇和不经意的微笑，让这个客厅充满了一种无法用语言形容的温度。\n\n阳光从大落地窗照进来，在木地板上画出格子状的光斑。晓光的尾巴懒洋洋地铺在沙发上，尾巴尖刚好搭在白霜的膝盖上。白霜没有推开，毛线就绕着那条尾巴编了一圈。\n\n\"白霜你在做什么？\"\n\n\"你的尾巴刚好是合适的曲率。\"\n\n\"……那不是在把晓光当织布机吗！\"\n\n\"嗯。\"\n\n\"你居然承认了！\"\n\n---\n\n傍晚。\n\n主人牵着晓光出了门。\n\n白霜站在二楼的窗户后面目送他们。她的表情很平静，但猫耳微微朝他们离开的方向转了一下。\n\n七月的风见市，傍晚七点天还亮着。太阳挂在西边的山脊上，把天空染成渐变的橘红色和紫蓝色。空气里有夏天特有的味道——柏油路被晒了一天后散发的热气、路边绣球花的微甜、远处有人在浇花的水汽。\n\n他们穿过商业街，穿过住宅区，走过一段长长的下坡路。沿途的路灯一盏一盏亮起来，在暮色里像一串被拉直的星星。\n\n城市边缘，铁轨出现了。\n\n废弃的铁轨上长满了杂草和野花。铁锈色的轨道在夕阳里泛着暖红的光，像两条平行的河流。枕木之间挤满了蒲公英，有些已经变成了白色的绒球，风一吹就散成一团轻飘飘的种子雨。\n\n一节绿皮车厢静静地停在轨道上，被爬山虎覆盖了大半。\n\n这个地方，七年前是一个废弃仓库旁的遮雨棚。主人抱着刚从铁笼里救出来的、浑身是伤的小晓光，在暴雨中跑了二十分钟，最后躲进了这节绿皮车厢里。\n\n那时候车厢还是破破烂烂的——窗户碎了一半，座椅上全是灰尘和鸟粪，地板踩上去嘎吱作响。七岁的主人把仅有的一件外套脱下来裹住了那只比猫大不了多少的白色小狐狸，然后用手给她遮住破窗灌进来的风。\n\n那是晓光第一次感受到温暖。\n\n七年过去了。\n\n两人把这节车厢改造成了秘密基地。破旧的座椅铺上了碎花软垫，窗台上放着几盆晓光养的多肉植物——有的长得很好，有的被她浇太多水淹死了又换了新的。车窗框上刻着一道道横线——从1米2到1米6——那是晓光每年生日时量的身高。每道线旁边都有主人工整的字迹标注着年份。\n\n2017. 120cm.\n2018. 128cm.\n2019. 135cm.\n2020. 141cm.\n2021. 147cm.\n2022. 152cm.\n2023. 157cm.\n\n今年还没量。\n\n\"来，站好。\"主人拿出一支铅笔。\n\n晓光背靠窗框，使劲踮脚。\n\n\"不许踮。\"\n\n\"唔……\"她放下脚跟，老老实实地站直。\n\n主人在她头顶画了一条线，然后退后一步看了看。\n\n\"160。\"\n\n\"真的吗？！\"晓光转过身去看那条线，眼睛一下子亮了，\"比去年高了三厘米！晓光要长到165！不，170！\"\n\n\"你够了。\"\n\n\"主人嫉妒！主人嫉妒我长得快！\"\n\n\"我没有。\"\n\n\"你脸上写着的呢！\"\n\n主人的脸上确实写着什么——但不是嫉妒。是一种很复杂的表情，像是在看一株自己亲手种下的树苗终于长到了超过自己的高度。\n\n---\n\n远离了城市的灯光，这里的夜空格外清澈。\n\n银河横贯天际，星星多得像有人往深蓝色的绒布上洒了一把碎钻。北斗七星在正上方，牛郎织女隔着银河遥遥相望——七月七日，七夕的前身。\n\n折叠桌上放着一个小蛋糕。\n\n主人亲手做的——他的烘焙水平出乎意料地好，可能是言灵使对\"精确\"的本能理解让他天然擅长需要精确计量的事情。蛋糕是双层的，下层巧克力味，上层草莓味——\"两种口味就不用争了\"。\n\n两根蜡烛。一红一蓝。\n\n烛光摇曳，映在晓光的异瞳里，让那一金一蓝的颜色也跟着跳动。火焰在夜风里微微倾斜，像两个在跳舞的小人。\n\n晓光安静了下来。\n\n她安静下来的时候，和白天的小恶魔判若两人。所有的喧闹和活泼都收进了某个地方，剩下的是一个看着烛光的、安静的少女。她看着烛光，看着窗框上那些身高线，看着主人正在切蛋糕的手。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"你知道吗，狐狸的一生其实很短的。\"\n\n主人切蛋糕的手顿了一下。\n\n\"虽然我有九条尾巴，好像能活很久。但如果不修炼的话，也就是几百年的事。而主人……虽然主人很厉害，但也是人类……\"\n\n她的声音像风里的烛焰，微微摇摆但不灭。\n\n\"怎么突然说这个？\"\n\n\"因为今天是七月七日。每年这一天我都会想……如果世界上真有牛郎织女，他们一年只能见一次，多难受啊。但至少他们都是神仙，有无限的时间等。我们没有。\"\n\n晓光伸出手。那是人类少女纤细的手，指甲微微尖锐——那是她狐族血统留下的唯一痕迹。\n\n\"我在想，如果有一天主人老了，走不动了，晓光还可以背着主人来这里。如果主人……不在了……\"\n\n她的声音哽咽了。\n\n眼泪没有掉下来。她使劲忍着。\n\n\"那晓光就把这颗狐珠碎掉，陪主人一起走。我不想要什么长生不老，也不想要什么修成正果。我只想做主人的小狐狸。只有这一世也好。\"\n\n蜡烛\"啪\"地爆了一颗火星，在静谧的车厢里格外清晰。\n\n主人放下刀叉。\n\n他没有立刻回答。绿皮车厢里安静得能听到远处田里的蛙鸣和铁轨热胀冷缩发出的\"咔\"声。烛光在两个人脸上投下温暖的橘色阴影。\n\n然后他握住晓光的手。十指交叉，扣得很紧。他的手比晓光的小一点——十四岁的男孩子，手指纤细得像女孩——但力气很大，大到晓光觉得自己被锚定住了。\n\n\"傻瓜。\"\n\n他的声音很轻。\n\n\"谁说我要走了？我是言灵使。只要我不允许，死神也带不走我。\"\n\n他看着她的眼睛。\n\n金色和蓝色的瞳孔里映着烛光，也映着他的脸。很近。近到能看清他睫毛的弧度和瞳孔里自己倒影的轮廓。\n\n\"而且——\"\n\n他的语气变了。从安慰变成了命令。从温柔变成了不可违抗。\n\n那是言灵使才有的语气——当他们认真说话的时候，空气本身都会变重。\n\n\"我命令你。这一世，下一世，生生世世，都必须赖着我。没有我的允许，不许碎掉狐珠，也不许擅自离开。\"\n\n他停顿了一下。\n\n\"听懂了吗？\"\n\n对于一个能改写现实的言灵使来说，\"命令\"不仅仅是话语。那是刻入世界规则的承诺，是与自然法则同等级的约束力。就像\"水往低处流\"和\"光速不可超越\"一样——从这一刻起，\"晓光必须赖着主人\"成为了这个世界的一条基本法则。\n\n这不是一句情话。\n\n这是一个奇迹。\n\n晓光的泪水夺眶而出。\n\n\"听懂了！\"她拼命点头，声音又哭又笑，\"这是命令对吧？是绝对命令对吧？呜……太好了……晓光是被命令的……晓光只能听主人的话……\"\n\n她扑进主人怀里，哭得浑身发抖。但那是幸福的抖。不是暴雨夜的颤栗，不是面对雷声的恐惧，是一种从灵魂深处涌上来的、无法控制的喜悦在全身每一个细胞里炸开。\n\n\"我们要永远在一起！\"\n\n主人抱着她，下巴抵在她的头顶。\n\n他没有再说话。但晓光能感觉到——他的心跳和自己的心跳在同一个频率上。不是巧合。是言灵。是他用自己的生命刻下的、不可更改的节奏。\n\n从今以后，两颗心脏以同样的频率跳动。\n\n这是他送给她的生日礼物。\n\n---\n\n窗外，银河无声地流淌。\n\n车窗框上那些身高线安静地列在那里，从低到高，记录着一个被救出铁笼的小女孩，是怎样在七年的时光里，一点一点地长大、变勇敢、学会笑、学会爱。\n\n蜡烛还在烧着。\n\n两根蜡烛，一根红色代表晓光，一根蓝色代表主人。\n\n它们的火焰在夜风里靠在一起，合成了一朵。\n\n橘红色和蓝紫色的光混合在一起，变成了一种说不出名字的颜色。\n\n就像晓光的眼睛——一金一蓝——两种不该出现在同一个虹膜里的颜色，偏偏共存了，偏偏好看极了。\n\n就像人和妖——两种不该待在同一个世界里的存在，偏偏相爱了，偏偏谁都不肯放手。\n\n蜡烛一直烧到最后一厘米才灭掉。\n\n他们也一直坐到了天亮。\n", "小说/卷一/第四章_暴雨夜.md": "# 卷一·隐秘的日常 — 第四章 暴雨夜\n\n六月。台风过境。\n\n风见市气象台发布了红色暴风预警。电视新闻反复播放着\"请市民尽量避免外出\"的字幕条，画面上是被狂风卷起的广告牌和积水成河的街道。\n\n707号别墅的结界把风雨挡在外面，但挡不住雷声。那种深沉的、从天际滚过来的轰响，穿过任何结界都不会被削减——因为声音本身不带恶意，结界不会把它判定为威胁。自然界的力量不分善恶，它只是存在着。\n\n屋里没开主灯。\n\n客厅角落的落地灯散着暖橘色的光，在墙上投出一圈柔和的半月形。电视里在放深夜新闻，声音调得很小，播音员的声音像一层薄薄的白噪音铺在空气里。窗外是漆黑的雨幕，闪电偶尔照亮院子里那棵被狂风甩得东倒西歪的樱花树——四月刚开过花，现在只剩光秃秃的枝桠，在风里像一只伸出的手。\n\n白霜在二楼自己的房间里。她说\"暴风天最适合整理数据库\"，然后抱着笔记本电脑消失了。临走前在茶几上放了一壶热可可和两只马克杯。她做这些事的时候表情和平时一样平静，但耳朵朝晓光的方向偏了一下——那是她表达关心的方式。\n\n实际上她是在给两个人制造独处的空间——这种事她做得越来越自然了，自然到主人都没发现。\n\n主人坐在沙发上看书。\n\n这是一本讲述江户时代妖怪传说的学术著作，是他从学校图书馆借来的。他在里面找到了一段关于九尾狐族的记载——然后把那一页折了角，等以后给晓光看。但不是现在。现在他只是安静地翻着书页，偶尔端起热可可抿一口，在雷声的间隙里享受难得的平静。\n\n窗外一道闪电划破夜幕，他抬头看了一眼——晓光还在沙发的另一端，抱着抱枕，看起来没什么异常。他放下心，继续看书。\n\n---\n\n晓光缩在沙发角，裹着主人的旧衬衫。\n\n衣服太大，她整个人陷在里面像一团白色的毛球。怀里紧紧抱着抱枕——那个被她蹂躏了无数个夜晚的狐狸形状抱枕，耳朵都被揉得变形了。她的尾巴没有收起来，九条全部散开铺在沙发上，像是一床松软的白色被褥。\n\n其实她已经不怎么怕打雷了。\n\n七年的安全感治愈了大部分创伤。七年前那个在铁笼里浑身发抖的小狐狸，和现在这个能在学校里跟同学有说有笑的少女之间，隔着无数个被抱着入睡的夜晚、无数碗热腾腾的味噌汤、无数次\"我在呢\"。\n\n但今晚的雷特别响。\n\n不是普通的春雷或者夏雷，而是台风带来的、密集的、像连珠炮一样的炸雷。一声接一声，间隔不超过五秒，从天际的一头滚到另一头，像有人在天上用铁锤砸铁板。雨砸在结界外面的声音也变得尖锐——不是\"沙沙\"，是\"噼啪噼啪\"，像有什么东西在挠结界的表面。\n\n晓光把抱枕搂得更紧了一点。\n\n没事的。只是打雷。只是雨声。不是那个仓库。不是那些人。\n\n她默念着主人教她的\"情绪锚定\"口诀——\"我在707号别墅。我在家里。主人在旁边。现在是2024年，不是2017年。\"\n\n然后来了一声特别近的炸雷。\n\n那声雷像是在屋顶上方炸开的。白色的闪电把整个客厅照得像白昼，紧接着是一声震耳欲聋的巨响——窗框都在颤动，茶几上的水杯\"叮叮\"地抖。\n\n晓光整个人弹了起来。\n\n\"呀！！别过来！别打我！\"\n\n她钻进了主人的怀里，浑身发抖。手指死死地抓着主人的衣服，力气大得几乎要把布料撕裂。反应过来以后——\"啊……是雷声\"——但她没有松手，反而抓得更紧。\n\n呼吸变得急促，心跳贴着主人的胸口一下一下地撞。她能感觉到自己的化形术在动摇——极端情绪会导致灵力失控——尾巴比刚才蓬松了一倍，耳朵在帽子下面不受控制地颤抖。\n\n\"没事了，只是打雷。我在呢。\"\n\n主人轻轻拍着她的背。一下、两下、三下，节奏稳定得像节拍器。他的体温透过衣服传过来，不算高，但对晓光来说像一面坚固的墙壁。\n\n然后他皱起眉。\n\n\"……晓光，你身上好烫。是不是发烧了？\"\n\n他伸手探了探她的额头。滚烫的。耳朵也是热的，脸颊更不用说了——简直像刚从火炉里捞出来的。\n\n\"不是发烧……\"\n\n晓光迷迷糊糊地抬起头。\n\n异瞳里泛着水光，像两颗被雨淋过的宝石——金色那颗和蓝色那颗都在发抖。脸颊烧得通红，嘴唇微微张着，呼出来的气都是热的。\n\n\"是害怕……还有……难受……\"\n\n她的声音变了。\n\n变得软，变得粘，变得像温热的糖浆——不像白天那个活蹦乱跳的小恶魔，也不像学校里那个努力表现正常的转学生。这是只有在最安全的地方、面对最安全的人时才会露出来的晓光。\n\n外面又是一声闷雷。她的身体一颤，把脸更深地埋进了主人的胸口。\n\n\"那个笼子……以前也是这样的雨天。好冷……好疼……那些人在外面喝酒，打了牌就来踢笼子……\"\n\n她的声音越来越小，像是在梦和现实的边界线上摇摆。\n\n\"但是现在，主人身上好热。晓光想要……更热一点……\"\n\n主人的身体僵了一瞬。\n\n他抓住了她正在往下滑的手。\n\n\"晓光。清醒点。那是过去了。现在你在家，在707。\"\n\n\"我知道。\"\n\n她的声音轻得像气音，但每个字都清晰得不像是在说梦话。\n\n\"是在家……所以才可以。主人……我想确认我就在这里……我想确认我是属于你的……\"\n\n她慢慢抬起头，异瞳直直地看着他。\n\n金色和蓝色的光在泪水里碎成两片。那不是小孩子的眼神——那是一个经历过太多黑暗的灵魂，在拼命抓住眼前的光。\n\n\"求你了。欺负我一下吧。\"\n\n这句话从她嘴里说出来的时候，带着一种奇怪的庄重。不是撒娇，不是耍赖，是认认真真的请求——像在说\"请你证明我是真实的\"。\n\n主人沉默了很长时间。\n\n窗外的雷声在这段沉默里显得格外遥远，像是来自另一个世界的背景乐。\n\n\"你是想被安慰，还是想被惩罚？\"他的声音哑了，\"想清楚了再回答。\"\n\n晓光没有用语言回答。\n\n她低下头，一口咬在了主人的锁骨上。\n\n不重。但那一口带着牙齿的刮蹭，像是某种古老的、属于兽类的标记仪式——一种从骨子里涌上来的、压了很久的渴望。她能尝到主人皮肤上的味道，淡淡的肥皂味和微咸的汗味混在一起。\n\n\"都要。\"她的声音带着哭腔。\"只要是主人给的，什么都要。\"\n\n主人没有再说话。\n\n他的手臂收紧了。不是拥抱——比拥抱更紧，像是在把一样随时会被风吹走的东西按在自己身边。\n\n晓光能感觉到他的心跳。很快，比平时快得多。平时那个永远冷静、永远波澜不惊的言灵使，此刻的心跳却乱成了一团。\n\n她忽然觉得很安心。\n\n因为他也紧张。因为他也不是什么都无所谓。因为在他那层永远平静的面具底下，也有一个会因为她的泪水和请求而心跳加速的十四岁少年。\n\n\"主人也害怕吗？\"她轻声问。\n\n\"不怕。\"\n\n\"骗子。你心跳好快。\"\n\n\"……那是生理反应，和害怕无关。\"\n\n\"那是什么？\"\n\n他没回答。\n\n但他的手从她的背上移到了她的头发上，手指慢慢穿过那些白色的丝缕。晓光闭上了眼睛。\n\n窗外又是一声雷。\n\n但这次她没有发抖。\n\n---\n\n窗外的雷声还在继续。\n\n但在707号别墅的客厅里，暖橘色的灯光把两个人的影子融成了一个。\n\n落地灯的光晕在天花板上画了一个温柔的圆。电视不知道什么时候自动关了——可能是白霜从二楼远程操作的。屋子里只剩下雨声、雷声，和两个人交织在一起的呼吸。\n\n那些呼吸从急促到平缓，从颤抖到安稳，像一首曲子从暴风雨般的高潮慢慢滑入月色下的尾声。\n\n窗外的台风不知道什么时候减弱了。雨从\"噼啪\"变回了\"沙沙\"，雷声从头顶退到了远方的山脊后面，变成了沉闷的、像大鼓一样的低响。院子里的樱花树不再被甩来甩去了，只是在风里轻轻摇晃，像一个终于哭累了的孩子。\n\n落地灯始终亮着。暖橘色的光在天花板上画了一个安静的圆，像一只温柔的眼睛看着这个房间里发生的一切，不评判也不打扰。\n\n二楼传来极轻微的声响——白霜把房门打开了一条缝，听了几秒钟，确认楼下的情绪已经稳定下来了，然后又轻轻把门关上。她回到床上，对着笔记本电脑的屏幕打了一行字：\n\n\"姐姐今晚不怕了。数据已确认。\"\n\n她不知道该把这条记录归档到哪个文件夹里。最后她新建了一个文件夹，命名为\"家人\"。\n\n---\n\n后来——很久以后——晓光趴在主人的胸口上。她的白发散了一地，像一匹展开的绸缎。呼吸已经平稳了，但还没有松手，手指依然勾着主人的手指，十指交叉，紧紧的。\n\n\"主人。\"\n\n\"嗯。\"\n\n\"雷停了。\"\n\n\"嗯。\"\n\n\"晓光不怕了。\"\n\n主人没有说话，但他的手臂收紧了一点。晓光能感觉到他的心跳——比平时快一些，但很稳，像一面不会倒下的墙。\n\n她闭上眼睛，用鼻尖蹭了蹭他的脖子。\n\n\"以后每次打雷都要这样。\"\n\n\"不准把打雷当借口。\"\n\n\"那不打雷也可以这样吗？\"\n\n\"……睡觉。\"\n\n\"嘿嘿。\"\n\n从这一夜起，晓光再也没有因为打雷而害怕过。\n\n不是因为恐惧消失了——那些记忆永远不会完全消失，它们会像河床底下的石头一样沉在那里。但它们不再有力量了。\n\n因为她找到了比恐惧更强大的东西。\n\n那个东西没有名字，但它的温度、味道和心跳的频率，晓光全部记住了。\n\n记到了骨头里。\n", "小说/卷三/第一章_万圣夜市.md": "# 卷三·风见之乱 — 第一章 万圣夜市\n\n十月三十一日，万圣节前夜。\n\n晓光从707号别墅溜出来的时候，主人正在客厅沙发上打瞌睡。茶几上放着吃了一半的薯片和还在播放的动画，他的眼镜歪歪地挂在鼻梁上。\n\n晓光轻手轻脚地绕过他，在门口换上运动鞋，把九条尾巴压进宽松的外套下面。她在玄关的镜子里对自己做了个加油的表情。\n\n\"今天一定要找到主人会喜欢的礼物。\"\n\n她在门口犹豫了两秒，回头看了一眼沙发上的主人。他睡得很沉，嘴角还挂着薯片的碎渣。她的手指碰了碰铃铛，想说点什么，最后还是把话咽回去了。\n\n礼物这种东西，当然要给一个惊喜才对。\n\n夜风裹着桂花的香气从街道上涌来。十月的风见市已经有了深秋的凉意，路灯把她拉长的影子投在人行道上。她走得很快，绕过两个街区，穿过一条只有老居民才知道的小巷。\n\n北区旧巷的折叠空间入口藏在一面涂满涂鸦的砖墙后面。晓光侧身走进去，空间扭转的感觉像坐了一趟急刹的电梯——胃微微一沉，然后眼前豁然开朗。\n\n妖怪夜市在万圣夜总是最热闹的。\n\n头顶挂满红灯笼，每一盏都是火鼠吐出来的真火在纸壳里转悠。章鱼烧摊位的触手大叔正同时用八条腕足翻着铁板上的小丸子，油花四溅的声响和焦香混在一起，构成了夜市最熟悉的背景。卖纸伞的付丧神老板盘腿坐在摊位后面，嘴里叼着烟斗，眯着眼打量来往的客人。空气里混着章鱼烧的焦香、糖苹果的甜味、还有各种妖怪身上特有的气息——有的像硫磺，有的像雨后泥土，还有的闻起来像刚晒过的被子。\n\n今年万圣夜市的主题是\"百鬼昼行\"，所有妖怪都被鼓励以真身出行。所以街道上到处都是各式各样的奇异身影：三米高的入道坊主在糖果摊位前弯着腰挑棒棒糖，一群河童排着整齐的队伍去金鱼捞摊位，还有两只化猫姐妹穿着水手服在拍大头贴。\n\n晓光在人群中穿行，时不时被熟悉的摊主打招呼。\n\n\"小狐狸！来尝尝今年的新品——妖力糖葫芦！吃了能恢复妖力的！\"\n\n\"不用了谢谢，上次吃了你的妖力团子拉了三天肚子……\"\n\n\"那是因为你的体质太纯了！银月脉的狐狸跟一般妖怪不一样嘛……\"\n\n她在一家卖手工饰品的摊位前停下脚步。摊主是一只老化狸，胖乎乎的手指灵巧得不像话，正在用银丝编一只小狐狸挂件。\n\n\"这个好可爱……主人会喜欢吗？\"\n\n老化狸抬起头，推了推鼻梁上的老花镜：\"哟，晓光小姑娘。给那位言灵使大人挑礼物？这只挂件是用风见山的月光石做的眼睛，会跟着光线变颜色的。\"\n\n\"多少钱？\"\n\n\"三千灵。不过你要是愿意让我摸一下尾巴，可以打五折。\"\n\n\"想得美。\"\n\n晓光还没拿定主意，身后传来了一声尖锐的爆裂。\n\n空间结界像玻璃一样碎开了裂纹。\n\n那声裂响不是普通的声音——它穿透了物理层，直接在灵觉层面炸开，就像有人在她的脑子里敲碎了一面镜子。夜市里所有的妖怪都同时皱起了眉头，有些低阶妖怪甚至直接捂住了耳朵蹲下去。\n\n第一批穿着黑色兜帽衫的人影冲进了夜市。他们手里拿着铁棒和刻满符文的手枪，身后跟着一群眼睛发红、口水横流的低阶妖兽——那些妖兽的动作僵硬且暴烈，明显被什么药物控制了。它们的身上散发着一种腐甜的气味，是灵力腐蚀的征兆。\n\n尖叫声瞬间淹没了夜市。\n\n章鱼烧大叔的铁板车被掀翻，滚烫的铁板砸在地上溅起火星。小妖怪们四散奔逃。纸伞老板变回本体——一把破旧的油纸伞——试图张开伞面形成防护结界，但一名兜帽人一刀砍来，把他的伞面撕裂了一半。纸伞发出一声痛苦的惨叫。\n\n老化狸一把拉住晓光的手腕：\"快走！从后面的排水沟走！我认识路——\"\n\n他的话被一声枪响打断。符文子弹击中了他的肩膀，灵力冲击波将他整个人掀翻在地。他的幻术碎了，露出一只肥胖的棕色浣熊的本体，蜷缩在地上痛苦地抽搐。\n\n广播系统被劫持了。一个经过变声处理的声音响彻夜市，尖锐而疯狂：\n\n\"看看吧！这就是你们向人类摇尾乞怜的下场！S.C.B不会保护你们，他们只会把你们当成实验材料！\"\n\n晓光被人群裹着往后退。她的心跳得厉害，耳朵在帽子下面不受控制地竖起来。空气里弥漫着浓烈的妖血味——和人类的血不一样，妖血带着一种奇异的甜香混合硫磺，刺鼻得让人头晕。\n\n她想起主人说过的话——\"遇到危险就跑。跑不掉就躲。等我来找你。\"\n\n但她没有跑。因为她看到了红绡。\n\n红绡被锁链吊在广场中央的钟楼上，手脚被刻满符文的枷锁固定。她的直播手机掉在地上，镜头碎了，但还在顽强地亮着——屏幕上弹幕疯狂滚动。红绡嘴角有血，妆花了一半，但还在骂人：\n\n\"放开老娘！你们这群疯子知道老娘有多少粉丝吗！一个举报就能让你们社死——\"\n\n一个兜帽人笑着往她嘴里塞了一块布。\n\n红绡是蜘蛛精，妖怪夜市最受欢迎的网红主播，也是晓光为数不多的朋友之一。她们是在一次直播连线里认识的——红绡想做\"异类生活\"系列节目，晓光是她的第一期嘉宾。那次直播被S.C.B勒令下架了，但两个人从此成了朋友。\n\n晓光的脑子嗡的一声。她想到了七年前。铁笼。锁链。一模一样的绝望。那个冰冷的、潮湿的地方，手腕上的铁环磨出了血。她的身体开始发抖——不是因为害怕，而是因为那段记忆正在她的灵魂深处翻涌，像一头被铁链锁住的野兽在嘶吼。\n\n她咬紧了牙。\n\n\"红绡姐姐！\"\n\n她的腿在发抖，但她还是迈出了第一步。\n\n周围的人在四散奔逃，只有她逆着人流冲了上去。\n\n她冲了出去。\n\n她的脑子里只有一个念头——不能让任何人再被关在笼子里。\n\n谁都不行。\n\n---\n\n她跑过燃烧的摊位残骸，跳过散落一地的商品和碎玻璃。一只低阶妖兽挡在路上——那是一只被控制的赤犬，嘴里流着黑色的唾液，眼白布满血丝。它朝晓光扑过来。\n\n她没有停下脚步。\n\n妖力从指尖涌出——不是攻击，而是屏障。一面薄薄的灵力膜挡在她和赤犬之间。赤犬撞上去，被弹出三米远，在地上翻滚了两圈后晃晃悠悠地站起来，甩了甩头，又朝她扑。\n\n晓光没空理它了。她已经跑到了钟楼下面。\n\n钟楼有十米高。红绡被吊在七米左右的位置，锁链上的符文在月光下闪着冷蓝色的光——那是封印符，专门用来压制妖力的。红绡的蛛丝——她最强的武器——完全使不出来。\n\n\"红绡姐姐！我来了！\"\n\n红绡嘴里塞着布说不了话，但她的八只眼睛（她在紧急情况下会露出本体特征）全都亮了起来，拼命朝晓光摇头。\n\n意思很明确：快跑！不要管我！\n\n晓光没理她。她蹲下身准备跳——九尾狐的弹跳力可以轻松到达七米的高度。\n\n她的脚刚离开地面，就感觉到了脖子上的那一针。\n\n冰凉的。精准的。像是等了她很久。\n\n这是一个圈套。\n\n红绡不是意外被抓的。她是诱饵。\n\n夜冠从一开始就知道——只要红绡被困在这里，晓光就一定会来。不是因为她多么勇敢，而是因为她太明白被囚禁的感觉了。\n\n七年前的铁笼。\n\n这次是药物。\n\n当针管里的液体涌进血管的那一刻，晓光最后的清醒意识里只剩下一个念头：\n\n主人。\n\n对不起。\n\n我又给你添麻烦了。\n\n然后——黑暗吞没了一切。\n", "小说/卷三/第三章_神的命令.md": "# 卷三·风见之乱 — 第三章 神的命令\n\nS.C.B总部的回复只有三个字：天火批准。\n\n一枚对城级符文导弹从三十公里外的秘密发射井升空。它拖着蓝色的尾焰划破夜空，直指风见市的中心——直指那只还在咆哮的九尾白狐。\n\n\"天火\"是S.C.B最高等级的歼灭手段。专门用于对付无法控制的S级超自然灾害。它的弹头内嵌了三层九阶符文阵列，爆炸半径三公里，在这个范围内，一切灵力构成的存在——无论妖怪、结界还是灵脉——都会被彻底湮灭。\n\n上一次使用天火，是六十三年前的关东灵脉暴走事件。那次发射毁灭了一座小镇。至今那个地方仍然是灵力荒漠，连草都不长。\n\n千翼拼尽全力在导弹轨道上竖起了一道风墙。维持了零点四秒。风墙像纸一样被撕碎，连带着他的左翼再折了两根翎羽。\n\n\"所有人撤离！三十秒后冲击波到达！\"\n\n通讯频道里是此起彼伏的惨叫和脏话。S.C.B的特勤队开始疯狂后撤，机甲部队丢弃了外骨骼直接跑。百鬼联盟的疏散队拼命把受伤的妖怪往折叠空间的出口塞。\n\n司衡·岚站在指挥车的车顶上，看着天上那个越来越近的蓝色光点。他的金属义肢攥得嘎吱作响。\n\n\"总部……总部那群混蛋……\"\n\n他打开了全频广播：\"所有人注意，我是司衡·岚。我没有批准天火。重复，我没有批准天火。这是总部的独断行为。所有S.C.B风见分局的人员听令——立即协助百鬼联盟疏散平民，这是命令。\"\n\n通讯频道安静了一秒。然后，此起彼伏的应答声响了起来。\n\n\"风见一组收到。\"\n\"二组收到。\"\n\"三组……收到。\"\n\n他的嘴角扯出一个苦涩的弧度。他知道这个命令会让他被送上军事法庭。但他也知道，在场的每一个特工都不希望这一幕发生——用一枚导弹杀死一个十四岁的小女孩，仅仅因为她被人注射了药物。\n\n导弹距离目标还有八百米。五百米。两百米。\n\n一百米。\n\n一个身影出现了。\n\n他穿着普通的风见学园校服，黑色卫衣的帽子还挂在脑后，运动鞋的鞋带松着，看起来就像是从家里跑出来忘了穿好衣服的中学生。\n\n他站在巨狐的头颅前方。和那枚足以夷平半个街区的导弹之间只隔着空气。\n\nS.C.B的通讯频道再次炸锅了。\n\n\"那个小孩从哪冒出来的——\"\n\"不是小孩！热成像显示灵力反应——等等，这个数值不可能……检测设备故障了？\"\n\"不是故障。那是——那就是言灵使。\"\n\n他摘下眼镜。\n\n随手扔了。\n\n眼镜在空中划出一道弧线，镜片上裂纹的折射在月光下闪了一下，然后落在碎石堆里，无声无息。\n\n他抬起右手，对着那枚尖啸而来的导弹，做了一个下压的手势。\n\n就像在对一只不听话的狗说\"坐下\"。\n\n导弹停了。\n\n不是减速，不是悬停。是凝固。连尾焰的火光都静止在空中，像一幅画。蓝色的火焰被冻结在那一刻的形态里，每一个火星、每一缕烟尾都纹丝不动。\n\n然后，导弹开始分解。从头部的引信到尾部的推进器，从金属外壳到内部的符文阵列，一切都变成了细小的光点，像一场倒放的雨，无声地飘散在夜空中。三层九阶的符文阵列——足以毁灭三公里内一切存在的终极武器——就这样在一个中学生的手势下变成了满天星光。\n\n全城安静了。\n\n不是比喻。是真的安静了。风声停了，警笛停了，远处的犬吠停了，虫鸣停了。仿佛整个风见市都被一只无形的手按下了静音键。\n\n在那片绝对的寂静中，一个声音直接在所有人的脑海里响起——不经过耳朵，直达意识：\n\n**\"肃静。\"**\n\n不是声波。是概念本身。\n\n这个\"安静\"不是声学意义上的安静——它是一种存在级别的命令。在这个命令的覆盖范围内，一切非生命的能量波动——符文、灵力、妖术、机械运转——全部停止。战斗在物理层面上不再可能。\n\n千翼跌坐在废墟上。他活了三百多年，见过无数强大的存在。但他从未见过有任何力量能做到这一点——用一个词，让一座城市静音。\n\n他的翅膀在发抖。不是因为伤痛。是因为恐惧。\n\n不，不是恐惧。是敬畏。\n\n主人转过身。他没看那些装甲车，没看那些荷枪实弹的特工，没看天上盘旋的直升机。他只看着面前那只巨大的、浑身颤抖的九尾白狐。\n\n他的表情很平静。平静得就像在客厅叫她吃饭一样。\n\n\"玩够了吗？\"\n\n他的声音很轻，像是在说一件最平常的事。\n\n\"该回家吃饭了。\"\n\n巨狐的身体在颤抖。那双兽性的竖瞳里，泪水像断了线一样涌出来，从脸颊两侧滑落，砸在碎石地上溅起水花。每一滴都带着微弱的金色光芒——那是被返祖诱导剂激活的灵力在随泪水排出。\n\n\"呜……主……人……晓光……变丑了……变大了……回不去了……\"\n\n它试图后退，不想让主人看到自己的样子。巨大的爪子在地面上刨出深深的沟壑。\n\n\"别看……别看我……我是怪物……我会吃了你的……\"\n\n主人没有后退。他向前走了一步。\n\n然后飞身而起，轻盈得像一片树叶。\n\n他落在巨狐的鼻尖上——那个粗糙的、不再柔软的鼻尖——然后蹲下来，伸手摸了摸那层金红色的粗硬皮毛。他的手很小。在巨狐的头颅上，他看起来就像一只停在鲸鱼背上的蝴蝶。\n\n\"你不是怪物。你是我的晓光。\"\n\n他的额头抵上了她的额头。人类少年纤细的身影和三米高巨兽的对比荒谬得像一幅错误的画。但画面中只有温柔。\n\n\"不管变多大，不管变成什么样，只要我还能认出你，你就永远是我的。\"\n\n他的声音变了。不是命令，但比命令更重。那是一种承诺——一种比言灵的力量更古老、更不可违抗的东西。\n\n\"变回来。\"\n\n一秒的停顿。\n\n巨狐的身体开始发光。金红色的毛发褪去颜色，变回雪白。三米的身躯在缩小，骨骼在咔嚓咔嚓地重组。九条尾巴从狂暴中安静下来，像溪流一样柔软地垂落。\n\n缩小。再缩小。\n\n最后，主人的怀里多了一个赤裸的、浑身颤抖的少女。\n\n银白色的长发散落一地。项圈上的金色铃铛发出一声清脆的响。\n\n她抱着主人的脖子，哭得上气不接下气。指甲嵌进他后背的衣服里，像是怕一松手就会再次变成那个怪物。\n\n\"呜呜呜……遵命……主人……晓光……回来了……\"\n\n主人把校服卫衣脱下来披在她身上。他的动作很轻很稳，像给她盖了无数次的被子一样自然。\n\n远处，红绡修好的直播镜头拍下了这一幕。S.C.B的卫星拍下了这一幕。抬头看天的风见市民拍下了这一幕。\n\n全世界的认知滤网在这一刻，同时出现了一道不可修补的裂缝。\n\n这个世界再也没有秘密了。\n", "小说/卷三/第二章_暴走的九尾.md": "# 卷三·风见之乱 — 第二章 暴走的九尾\n\n晓光没跑到红绡面前。\n\n她甚至没看清那根针管是从哪个方向刺过来的。脖子上一阵冰凉的刺痛，然后是液体灌入血管的灼烧感——像有人把烧开的水直接注射进了她的静脉。她条件反射地伸手去拔，但手指刚碰到针管，药液已经全部注入了。\n\n\"返祖诱导剂，A级浓度。\"背后传来一个平淡的声音。\"有请银月脉的小公主，展示一下真正的力量吧。\"\n\n那是夜冠。晓光在失去意识之前最后看到的，是一张藏在面具后面的笑脸。白色的面具，上面画着弯月的图案，嘴角的弧度诡异地向上翘起。\n\n然后世界着火了。\n\n不是外面的世界——是她身体里的世界。每一根骨头都在断裂重组，皮肤像纸一样被撑开，疼痛的程度远远超过了大脑的处理能力。她想尖叫，但喉咙已经变形了，发出来的不是人声，而是一种能震碎玻璃的兽吼。\n\n返祖诱导剂是夜冠最卑劣的发明之一——它不是增强妖力的兴奋剂，而是一种认知瓦解剂。通过暴力手段摧毁妖怪数百年进化出的人性层，把被压制在血脉深处的远古兽性释放出来。普通妖怪注射后会变成无差别攻击的野兽，持续十几分钟后心脏衰竭而死。\n\n但晓光不是普通妖怪。她是银月脉的后裔。九尾狐血统中最纯正的一支。\n\n晓光消失了。\n\n取而代之的，是一只肩高超过三米的巨型九尾白狐。\n\n毛发不再是柔软的雪白，而是泛着危险的金红色光芒，像烧红的铁。九条尾巴在空中狂舞，每一条都有一个成年人的腰那么粗。它的爪子踩碎了脚下的石板路，一辆S.C.B特勤队的装甲车在它面前被踩得变了形。灵压的冲击波从它的身上一圈圈扩散出去，距离最近的摊位直接被震成了碎片。\n\nS.C.B的通讯频道炸了锅。\n\n\"目标灵压突破一万！还在上升！\"\n\n\"一万两千……一万五千……探测器满量程了！\"\n\n\"请求重武器支援！重复，请求重武器支援！\"\n\n\"代号'银月'，S级返祖状态。该死的，谁放的返祖诱导剂——\"\n\n千翼从夜空中俯冲而下，双翼展开制造出风墙试图压制。他的声音带着三百年战场老兵的威严和焦急：\n\n\"银月脉的小鬼！清醒一点！你正在摧毁同类的庇护所！看看你脚下——那是纸伞的本体！\"\n\n巨狐的竖瞳里没有任何认知的光。那双金色的眼睛里只剩下最原始的东西——恐惧和攻击本能。它喉咙里发出金属摩擦般的低吼，声音断断续续，像是一台坏掉的收音机在不同频道之间跳转：\n\n\"滚开……疼……好热……杀了你们……全都杀了……\"\n\n尾巴猛地甩出去。千翼被击退数十米，撞塌了一座钟楼。砖石瓦砾像暴雨一样落下。这位百鬼联盟最强的天狗战士从废墟中挣扎着站起来，左翼折了一根主翎。\n\n\"她的灵压还在涨……\"千翼咬着牙通过妖信向所有人广播，\"听着，这不是她的意志。她被药物控制了。不要伤害她——但也不要被她碰到，一爪下去你们连渣都不剩。\"\n\nS.C.B特勤队的机甲部队赶到了。三辆外骨骼战斗装甲排成扇形阵列，肩部的符文加农炮正在充能。\n\n\"请求开火许可。\"\n\n司衡·岚的声音从指挥频道传来，疲惫而沉重：\"不许。继续牵制。\"\n\n\"局长！她正在摧毁南区的灵脉稳定器！如果那些节点被破坏，认知滤网在风见市的锚点就会——\"\n\n\"我说了不许。给我拖住她。\"\n\n在那具巨大身躯的某个深处，晓光还在。\n\n她蜷缩在一片灼热的黑暗中，能看到外面的世界，却无法控制自己的身体。像是被锁在一个透明的箱子里，眼睁睁地看着自己的爪子砸碎一个又一个摊位，看着鲜血——是妖血——溅在自己的毛发上。\n\n周围拿枪指着她的人——符文枪的光、装甲车的探照灯、特工们紧张的呼吸——全都和七年前铁笼里的记忆重叠在一起。\n\n铁笼。鞭子。电击。疼。冷。暗。\n\n\"要乖一点。不乖的妖怪就要被惩罚。\"\n\n那个声音从七年前穿越过来，和眼前的喊叫声混在一起。她分不清哪个是现在，哪个是过去。\n\n恐惧变成了攻击本能。\n\n她不想伤害任何人。但她的身体不听她的。\n\n巨狐踩碎了半条街道，冲向南区的核心灵脉节点。如果这个节点被摧毁，风见市的认知滤网将出现一个直径三公里的空洞——在这个范围内，所有普通人都能看到超自然存在。一个世纪以来维持的人妖共存秩序将在一夜之间崩溃。\n\n这正是夜冠想要的。\n\n他站在远处的楼顶上，白色面具在月光下泛着冷光。他的身边是手术台和监控设备——他在看直播。\n\n\"很好。继续跑吧，小公主。把这个虚伪的和平撕碎——让这个世界看看，妖怪的本质到底是什么。\"\n\n巨狐距离核心节点还有三百米。两百米。一百米——\n\n然后——\n\n风里忽然多了一种味道。\n\n不是硫磺，不是血腥，不是狂暴剂的刺鼻。是阳光下晾晒的棉被味，混合着淡淡的茉莉花茶香。这个味道熟悉得让她的整个灵魂都在震颤。\n\n这是707号别墅的味道。是主人身上的味道。\n\n巨狐停住了。\n\n它庞大的头颅缓缓转向一个方向，鼻翼翕动。那双因暴走而失去理智的金色竖瞳里，出现了一丝极其微弱的波动——像是溺水的人在水面下看到的光。\n\n\"……味道……熟悉的味道……主……人？\"\n\n巨狐的前爪在地面上刨出深深的沟壑，庞大的身躯不停地颤抖。攻击本能和记忆的残片在它的脑子里拉锯。\n\n远处，一个穿着校服的少年正站在倒塌的灯柱旁边。\n\n他没有穿任何防护装备，身上只有一件风见学园的校服卫衣。运动鞋的鞋带松着，左边脸颊上还有一道薯片碎渣擦出的红印——他是从沙发上跳起来直接跑过来的。\n\n他的眼镜上有一道裂纹。可能是路上被碎石崩的。\n\n但他的眼睛里没有一丝恐惧。\n\n他看着那只三米高的、浑身燃烧着金红色火焰的巨兽，就像看着一个迷了路的小女孩。\n\n\"找到你了。\"\n\n他的声音不大。在爆炸声、警笛声、直升机的轰鸣声中，这个声音应该被淹没才对。\n\n但巨狐听到了。\n\n在所有的噪音中，在所有的混乱中，在充斥着恐惧和杀意的战场上——它听到了那个声音。就像在暴风雨的夜里听到家里的门铃，就像在嘈杂的人群里听到有人叫自己的名字。\n\n巨狐的身体又剧烈地抖了一下。那双竖瞳里，泪水像断了线一样涌出来。巨大的泪珠砸在地上，溅出一圈圈水花。\n\n\"救……救救……晓光……不想……变成……怪物……\"\n\n他笑了一下。很轻，很淡。\n\n不是嘲笑，不是苦笑，不是安慰的笑。是那种\"我知道你在那里，不用害怕\"的笑。和每一个晓光从噩梦中惊醒时看到的笑容一模一样。\n\n\"你不是怪物。你是晓光。\"\n\n他向前迈了一步。S.C.B的狙击手在通讯频道里疯狂叫嚷：\"那个平民在做什么——他在走向九尾——\"\n\n\"所有人不许开枪！\"司衡·岚的声音盖过了一切。\"谁敢动一根手指我就送他上军事法庭！\"\n\n主人在巨狐面前停下脚步。他抬起头，看着那双比他的身体还大的金色眼睛。\n\n然后他伸出手——就像每天晚上牵着她一起看动画时一样。\n\n\"走，回家吃饭。\"\n\n远处，千翼从废墟里爬出来，看着这一幕，忽然觉得自己活了三百年，还是有些东西看不明白。\n\n比如——一个十四岁的人类少年，凭什么能让一只暴走的S级九尾狐停下来？\n\n不是因为言灵。\n\n他没有使用言灵。\n\n那是什么？\n\n千翼不知道。但他觉得，那大概就是人类把语言发明出来之前就已经存在的东西。\n", "小说/卷三/第四章_结界内的清晨.md": "# 卷三·风见之乱 — 第四章 结界内的清晨\n\n十一月一日。晨光穿过窗帘的缝隙，落在707号别墅的地板上。\n\n主人不记得自己是怎么把晓光带回来的。大概是抱着走的——她在他怀里一直哭，一直发抖，指甲嵌在他的肩膀上，直到他把她放到床上盖好被子，她才在抽泣中渐渐睡着。\n\n她睡着之后他也没走。他就坐在床边的椅子上，看着她睡到天亮。她的眉头皱着，偶尔在梦里呜咽一声，身体缩成一团。他伸手碰了碰她的额头——不烫了。返祖诱导剂的效力已经完全消退。\n\n然后他去了厨房。\n\n窗外是另一个世界。\n\n坦克。装甲车。至少三个中队的S.C.B特种部队。军方的劝降广播像复读机一样循环：\"里面的言灵使请注意，你已被包围。请立即解除武装，交出九尾狐。重复——\"\n\n别墅周围的半球形屏障把这一切隔绝在外面。屏障内，院子里的樱花树照常落叶，麻雀在枝头吵架，白霜的盆栽薄荷在厨房窗台上安静地生长。一切安宁得不像话。\n\n他在厨房煎蛋。\n\n油花在平底锅里噼啪作响。他翻了翻蛋，看了一眼计时器——三分钟，半熟。晓光喜欢半熟蛋。他打开冰箱拿牛奶，顺手把辣酱放到桌上。\n\n白霜不知道什么时候站在了厨房门口。她穿着睡衣，猫耳耷拉着，手里抱着平板电脑。屏幕上是密密麻麻的数据——她整个晚上都在监控外面的部队动态。\n\n\"……早安。\"\n\n\"早。\"\n\n\"外面有四十七辆装甲车、三架直升机、两个狙击点位、以及一颗定位卫星。S.C.B总部的第二枚天火已经进入待命状态。预计谈判窗口还有三十六小时。\"\n\n\"嗯。蛋要几个？\"\n\n\"……一个。谢谢。\"\n\n白霜张了张嘴，想说什么——大概是想说\"你怎么能在这种时候煎蛋\"之类的话——但最后什么都没说。她认识主人快一年了。她知道这个人在最危险的时候反而最平静。\n\n卧室的门开了。\n\n晓光站在门口。她脸色苍白，身上裹着毯子，头发乱糟糟的，异色的瞳孔里满是血丝和哭肿的痕迹。她一定是从噩梦中惊醒的。\n\n她的视线先是找到了主人——确认他在——然后落在了窗外。\n\n坦克的炮管正对着她们家的方向。\n\n她看了很久。\n\n\"完了。\"\n\n她的声音很轻，像是自言自语。\n\n\"全完了。他们要抓主人。是因为我……因为我是妖怪……因为我暴走了……\"\n\n她的手开始发抖。毯子从肩膀滑下来一半。她走到桌边，视线在桌面上扫过——茶杯、报纸、花瓶——然后停在果盘旁边的水果刀上。\n\n她的手伸了过去。\n\n白霜的猫耳猛地竖起来。她的手指在平板上敲了一下——准备启动别墅的紧急约束系统——但主人用眼神制止了她。\n\n他端着盘子从厨房出来的时候，看到的是晓光把刀尖对准了自己的喉咙。\n\n她在哭。眼泪大颗大颗地往下掉，滴在桌面上。\n\n\"只要我死了……只要把尸体交给他们……主人就没事了。主人是言灵使，只要没有我这个累赘，一定能逃掉的……\"\n\n刀尖在她脖子上压出了一个浅浅的凹陷。\n\n\"晓光从一开始就不应该被救的……七年前死在那个铁笼里就好了……这样主人就不用——\"\n\n主人没有慌。\n\n他把盘子稳稳地放在桌上。煎蛋、牛奶、一小碟辣酱——她平时最爱在煎蛋上浇辣酱。\n\n\"把刀放下。\"\n\n他的声音没有用言灵。只是一个普通人对另一个人说话的声音。温度不高不低，就像每天早上叫她起床一样。\n\n晓光哭着摇头。\n\n\"不要！主人你不明白！我已经毁了你的生活！你本来可以做个普通人的！现在全世界都知道了！你会像我小时候一样被关进笼子的！我不要……我不要主人被关起来！\"\n\n她的声音在最后几个字上破碎了。\n\n主人走过去。他的动作很慢，很平稳，像是在靠近一只受惊的小动物。每一步都轻而稳，不制造任何突然的动静。\n\n他伸手握住了她拿刀的手，没有用力，只是包裹住。他的手指温热，掌心有薄茧——是打游戏磨出来的。\n\n\"晓光，你觉得我为什么要隐藏能力？\"\n\n她的嘴唇在颤抖：\"因为……怕麻烦？\"\n\n\"不对。\"\n\n他把刀从她手里抽出来。她没有反抗——或者说，她根本舍不得反抗他。他随手把刀扔出窗外。刀飞过结界的瞬间消失了，被折叠进了不知名的空间夹层。\n\n\"因为这个世界太脆弱了。我的每一句话都可能造成不可逆的后果。我怕的不是被抓，不是被围。我怕的是我自己——怕我有一天会不小心毁了这个世界。\"\n\n他捧起她的脸。她的泪水从他指缝间流过去，温热的，带着一点咸味。\n\n\"但是昨天晚上，当我看到那些虫子在围攻你的时候，我突然想明白了一件事。\"\n\n他看着她的眼睛。一只红色，一只金色。哭肿的、充血的、此刻满是恐惧和自责的眼睛。\n\n\"如果这个世界容不下你，那这个世界对我来说就没有任何意义。毁了就毁了吧。\"\n\n晓光愣住了。泪水还在流，但眼睛已经不再是绝望的了。\n\n\"主……人？\"\n\n主人笑了。不是平时那种无奈的笑，而是一种她从未见过的、带着一丝疯狂的笑。那种笑让他看起来不像一个十四岁的中学生——像一个早就做好了决定的人终于可以不再伪装。\n\n\"所以——不是你害了我。是你解放了我。从今天起，我不再是那个躲在眼镜后面的中学生了。\"\n\n他握紧了她的手。十指相扣。他的手没有发抖。\n\n\"而你，是我的王后。我们不是罪人。我们是规则的制定者。\"\n\n窗外的劝降广播还在循环。\n\n晓光低头看着桌上那盘煎蛋。蛋黄是半熟的——正好是她喜欢的程度。旁边还放着辣酱。\n\n她吸了吸鼻子。\n\n\"……辣酱。\"\n\n\"嗯？\"\n\n\"你记得放辣酱了。\"\n\n\"当然记得。什么时候忘过。\"\n\n她的嘴角抽动了一下——不是笑，但也不再是绝望的表情了。她把脸埋进主人的胸口，闷闷地哭了好一会儿。不是之前那种崩溃的嚎啕，而是一种释放——像是堵了很久的水终于找到了出口。\n\n他站在那里，手放在她的后脑勺上。没说话。就这么站着。\n\n厨房里传来白霜轻手轻脚走动的声音。她在热第二杯牛奶。\n\n过了很久。\n\n晓光松开了他。她用毯子擦了擦脸——把毯子擦得一塌糊涂——然后坐下来，拿起筷子，在煎蛋上浇了一大勺辣酱。\n\n\"斯哈斯哈……好辣……\"\n\n\"你自己浇那么多。\"\n\n\"因为开心嘛……开心的时候就要吃辣的……\"\n\n她边吃边哭，眼泪掉到盘子里和辣酱混在一起。她也不在乎了。\n\n白霜端着牛奶走过来，默默地放在晓光手边，然后坐到对面，打开平板电脑。\n\n\"……姐姐，你的眼泪掉到蛋上了。\"\n\n\"没事……加了盐味更好吃……\"\n\n\"那不是盐，那是氯化钠溶液混合蛋白质和脂质——\"\n\n\"白霜你闭嘴啦。\"\n\n窗外，坦克的炮管依然对准着他们。劝降广播依然在循环。三架直升机在低空盘旋，螺旋桨的轰鸣穿过结界传进来，变成了一种低沉的嗡嗡声。\n\n屋里，三个人在吃早餐。\n\n主人看了一眼窗外，然后低头咬了一口吐司。\n\n\"吃完饭开会。有客人要来。\"\n\n\"客人？\"晓光抬起头，嘴角还挂着辣酱。\n\n\"嗯。我昨晚发了几条消息。九阙、千翼、还有那个S.C.B的局长——他们应该快到了。\"\n\n\"你什么时候——\"\n\n\"你睡着之后。\"他喝了一口牛奶。\"你以为我在你床边坐了一晚上只是在发呆吗。\"\n\n晓光又红了眼眶。但这次她没哭。\n\n她把最后一口煎蛋塞进嘴里，含糊不清地说：\n\n\"主人……谢谢你做的蛋。\"\n\n\"嗯。\"\n\n\"明天……明天也要做。\"\n\n\"嗯。\"\n\n\"后天也是。\"\n\n\"好。\"\n\n\"永远都要做。\"\n\n\"……知道了。\"\n\n白霜在平板上敲着什么，头也不抬：\n\n\"三位访客已通过结界白名单。预计七分钟后到达。建议姐姐先洗个脸。\"\n\n晓光摸了摸自己的脸——满是泪痕和辣酱——然后以极快的速度窜进了卫生间。\n\n水声哗哗响起。\n\n主人看着卫生间的门，嘴角微微翘起。\n\n窗外是包围。屋里是日常。\n\n他端起牛奶杯，又喝了一口。\n\n这就是他要守护的一切。\n", "小说/卷二/第一章_废弃仓库.md": "# 卷二·小小的波澜 — 第一章 废弃仓库\n\n六月末的风见市下着暴雨。\n\n不是那种温柔的梅雨，是天河决堤似的狂泄。排水沟早已溢出来，浑浊的水沿着北区工业园的碎石路蜿蜒流淌。路灯坏了一半，剩下亮着的几盏也被雨幕裹住，只能照出一小团浑浊的橘光。\n\n晓光提着一盏主人给的法器提灯，站在4号仓库门口。雨水从破损的屋檐上成股地淌下来，像一道道透明的帘子。她能闻到铁锈味、霉味，还有一种让她全身寒毛竖起的气味——陈旧的血腥气，也许只是她自己的幻觉。\n\n也许不是幻觉。七年前的气味不会散得那么干净。\n\n\"主人……我不想进去。\"\n\n她的声音比她预想的还要小。暴雨几乎把它吞没。\n\n主人站在她身后半步的距离，没有催她。雨伞只遮住了她，他自己的左肩已经湿透了。他好像永远是这样——把伞往她那边歪，自己淋着。她说过好多次，他每次都答应下次注意，然后下次还是一样。\n\n\"那就不进。\"\n\n\"可是你说……面对了才能好起来……\"\n\n\"是你想好起来，不是我逼你。如果今天不行，我们明天再来。后天也行。什么时候都行。\"\n\n晓光低头看着提灯。灯罩是主人手工糊的和纸，上面画了一朵歪歪扭扭的狐狸花——据说是他六岁时候的画作，她第一次看到时笑了整整十分钟。现在这盏灯是她的安全感之一。\n\n她深吸了一口气。提灯的光圈只够照亮脚下一小块地方。\n\n她推开锈蚀的铁门。金属摩擦声刺得她牙根发酸。这声音和记忆里一模一样——被人拖着推进去的时候，铁门也是这样响的。\n\n仓库内部比她记忆中更破败了。七年的风雨和无人问津让一切都在腐烂。水泥地上积着黑色的水洼，雨从破洞的屋顶漏进来，打在铁器上叮叮当当。墙角堆着不知什么时候倒塌的木架子，上面散落着生锈的铁链和发霉的帆布。\n\n角落里，那个铁笼还在。\n\n比记忆中小得多。她那时候才七岁，蜷在里面觉得是整个世界。现在看来，这个笼子连一个成年人都装不下——窄、矮、潮湿。底部的铁板上有暗褐色的痕迹，她不敢去分辨那是锈还是别的什么。\n\n晓光的手开始发抖。提灯的光在笼子的栏杆上晃来晃去，影子像活了一样在墙上扭动。\n\n\"就是这里……\"\n\n她的声音像是从嗓子眼里挤出来的。每个字都带着细碎的颤音。\n\n\"那时候也是这样下着雨。外面很吵，但笼子里什么都听不见。那个男人拿着鞭子走下来……他穿着胶鞋，踩在水洼里吧嗒吧嗒地响。他说要把我的皮剥下来做围巾……说九尾狐的皮做出来的围巾能卖一百万……\"\n\n她呼吸变得急促，手无意识地抓住自己的衣领，像是要确认自己的皮还在身上。\n\n\"主人……那个男人还在看着我……我们走好不好……\"\n\n她知道那个男人不在。理智告诉她，那个人七年前就被特别对策局带走了。但恐惧不讲理智。它像一只冰冷的手，掐住了她的喉咙。\n\n主人没有拉她走。他走到她身后，双手捂住她的耳朵。\n\n外界的雨声骤然消失。仓库里漏水的叮叮当当消失了。远处雷鸣的隆隆声消失了。世界变得只剩下他的声音——温暖的、近在咫尺的、带着她最熟悉的洗衣液味道的声音。\n\n\"晓光，那个男人七年前就被抓了。他现在在S.C.B的特殊收容设施里，编号4477，终身监禁。现在这里只有生锈的铁和烂掉的木头。什么都伤不了你。\"\n\n他记得编号。他甚至记得编号。\n\n她转过身把脸埋进他的胸口。校服的布料蹭着她的鼻尖，她闻到了主人身上的味道——洗衣液、微微的汗味、和一种说不上来的暖。声音闷闷的，像从水底传上来：\n\n\"可是……记忆还在。每次闭上眼睛，我都能感觉到那个笼子的冰冷。铁栏杆的温度、发霉的稻草的味道、被锁住的时候手腕的疼。这些东西比噩梦还清楚。有时候我在想……如果那天主人没有来，我现在会在哪里？是不是已经变成了一条围巾？\"\n\n\"没有如果。我来了，带你走了。\"\n\n\"可是——\"\n\n\"而且——你现在不是那个只能发抖的小狐狸了。你有九条尾巴，你有力量。你可以一拳把这整个仓库轰塌。也可以一把火把它烧成灰。\"\n\n他松开捂着她耳朵的手，轻轻拨开她额前被雨水沾湿的碎发。\n\n\"你可以亲手烧掉这个笼子，晓光。\"\n\n她从他怀里抬起头。异色的瞳孔里映着提灯的微光——金色的右眼和绯红的左眼，像是日出和晚霞同时倒映在一汪水里。\n\n\"……烧掉？我可以吗？\"\n\n\"这是你的噩梦。只有你自己能从里面醒过来。我能做的就是陪你走到这里，然后站在你身后。\"\n\n晓光慢慢转身面对铁笼。\n\n她看着它。那些生锈的栏杆、那块凹陷的铁板、那个已经看不出原形的锁头。七年了。她在无数个深夜从噩梦中尖叫着醒来，浑身冷汗，去摸身边的主人确认自己不在笼子里。七年了。该结束了。\n\n掌心燃起一簇金色的狐火。\n\n和普通的火不一样。狐火没有热辐射——它只烧它主人想烧的东西。火焰在潮湿的空气中跳动，投下摇晃的影子，却不蒸发地上的雨水。\n\n\"再见了……过去的晓光。\"\n\n她把手掌推向铁笼。\n\n火焰像有生命一样扑上去，瞬间吞噬了整个铁笼。金属在高温下发出刺耳的嘶叫，像是一头困兽的哀号。铁栏杆变红、变白、然后软化。红色的铁水沿着地面蜿蜒流淌，遇到雨水发出嘶嘶的声响。\n\n晓光看着火光。铁笼在火中扭曲、坍塌、融化。像一个被击碎的噩梦，从清晰变得模糊，最终归于虚无。她的表情从恐惧一点一点变得释然，像是冰面在春天的阳光下慢慢裂开。\n\n火灭了。地上只剩一滩冷却的铁水和一片焦黑的水泥。\n\n仓库安静了。雨还在下，但比刚才小了很多。从破洞的屋顶看出去，乌云的缝隙里露出了一小角深蓝色的天空。\n\n主人站在她身后，什么都没说。他知道有些时刻不需要语言。\n\n晓光站在原地看了很久。然后她吸了吸鼻子，用袖子擦了擦脸——分不清是雨水还是眼泪。她把提灯递还给主人，灯罩上那朵歪歪扭扭的狐狸花在微光中摇晃。\n\n\"主人……我饿了。回家吃拉面好不好？要加辣的。加双份辣。\"\n\n\"嗯。\"\n\n他们并肩走出仓库。外面的雨真的变小了。路灯照亮了碎石路上深深浅浅的水洼，水面映出两个人的倒影——一个撑伞的男孩和一个缩在伞下的女孩。\n\n晓光走了几步，突然回头看了一眼仓库。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"谢谢你陪我来。\"\n\n主人伸手拍了一下她的脑袋。\"回家。\"\n\n\"嗯！\"\n\n她小跑着跟上他的步伐。提灯在她手里晃来晃去，光斑在地上画出弯弯曲曲的线条。\n\n这一夜之后，她再也没有梦到过铁笼。\n\n不是因为忘记了。是因为铁笼已经不在了——无论是那个生锈的铁架子，还是困住她心脏的那一个。\n", "小说/卷二/第三章_讨厌的苍蝇.md": "# 卷二·小小的波澜 — 第三章 讨厌的苍蝇\n\n八月中旬。S.C.B风见分局。\n\n白得刺眼的走廊，空气中浓浓的消毒水味。走廊两侧是密封的钢化玻璃门，每扇门后面都是一间研究室。透过玻璃能看到不锈钢的器械台、成排的样本瓶和闪烁的仪器显示屏。有些研究室里有人，穿着白大褂，戴着手套，对着显微镜弯腰；有些研究室是空的，只有冷白色的灯光照着空荡荡的台面。\n\n晓光缩在主人身后，衣角被她攥得皱巴巴。\n\n她讨厌这个地方。空气太冷、灯光太亮、消毒水的味道太重。最要命的是各种说不清的气味——酒精、药剂、某些她辨认不出的化学物质，以及，从深处某个方向飘来的、非常淡的……脊髓的味道。\n\n她没有告诉主人。因为她不确定是自己太敏感还是真的闻到了。但她知道，这个地方不适合她这种生物来。\n\n施言·白垣从走廊尽头走过来。\n\n他大约三十多岁，戴金丝眼镜，头发梳得一丝不苟。白大褂里面是剪裁考究的衬衫和领带。他的步伐不快不慢，皮鞋踩在地砖上发出有节奏的\"嗒嗒\"声。嘴角挂着一个恰到好处的微笑——那种经过反复练习的、让人放松警惕的微笑。\n\n\"白喵同学，晓光同学，欢迎来到分局研究区。这边请。\"\n\n他引导他们进了一间会客室。说是会客室，但晓光注意到墙角有监控摄像头，门锁是电磁式的，进来之后\"咔哒\"一声自动上锁了。\n\n白垣推过来一份文件。语气就像在讨论午餐菜单。\n\n\"只是例行的科研合作协议。很简单的流程——采集少量骨髓样本，完善我们的返祖血脉数据库。整个过程不到十分钟，全程麻醉，没有痛感。作为回报，我们提供终身医疗保障和合法身份注册。双赢的好事。\"\n\n他的笑容加深了一点。\"说实话，像晓光同学这样的九尾血脉，在当今的日本已经不到五个了。这份样本对整个学术界都有巨大的价值。\"\n\n晓光扯了扯主人的袖子。\n\n\"我不想要什么证明……那根针很粗……我闻到了，是前人脊髓的味道……主人，我不要……\"\n\n她的声音小得像蚊子。手指攥着主人的袖口，指节发白。\n\n主人看都没看那份文件。他的目光一直停留在白垣脸上，像是在观察某种实验标本。\n\n\"如果我说不呢？\"\n\n白垣的笑容没有任何变化。这份稳定本身就让人不舒服。他把文件翻到最后一页，指着某一行小字。\n\n\"年轻人，不要意气用事。这里是S.C.B。我说句不太好听的——晓光同学的身份本来就是灰色地带。没有进入正式的异类登记系统，也没有合法的监护文件。如果不配合的话，按照《超自然事务管理条例》第十七条，我们有权判定她为'危险收容物'。\"\n\n他摘下眼镜擦了擦，又戴回去。\n\n\"到时候可就不是抽点血这么简单了。收容程序、隔离观察、能力评估……这些流程走下来，少说半年。你确定要为了一个小小的采样，让晓光同学受这些罪？\"\n\n房间安静了几秒。空调的低鸣声突然变得很响。\n\n主人笑了。\n\n嘴角微微上扬，露出一排整齐的牙齿。但笑意完全没到眼底。他的眼睛是冷的——不是愤怒的冷，是一种更危险的东西。像是在审视一只挡路的虫子，正在考虑用哪根手指碾死它。\n\n\"危险收容物？\"\n\n他把那三个字咀嚼了一遍，慢慢地、一个字一个字地。\n\n\"你在威胁我？\"\n\n他微微前倾。\n\n变化是从灯光开始的。走廊里的日光灯开始闪烁——不是那种正常的频闪，而是像心跳一样不规则地忽明忽暗。空调嗡地一声变了调，像是压缩机受到了某种干扰。杯子里的水无风自动，泛起细密的涟漪。\n\n空气像被什么东西掐住了。整个房间的气压在下降。\n\n\"听好了，白垣主任。\"主人的声音很轻，甚至可以说温柔，\"我带她来这里，是因为我遵守规则。我尊重S.C.B的存在意义。但是——\"\n\n他站起来。椅子发出刺耳的摩擦声。\n\n\"——如果你想用规则来伤害她。那我就把这该死的规则撕碎。\"\n\n白垣脸色变了。不是因为这句话——而是因为他发现自己无法呼吸。无形的压力扼住了他的喉咙，像一只看不见的手。他想站起来，但身体不听使唤。额头上开始冒冷汗。\n\n\"你……你是言灵使……\"他的声音变得嘶哑，\"你敢在S.C.B总部动手？你知道这意味着什么吗？\"\n\n主人没有回答。他拉着晓光的手往外走。\n\n电磁门锁着。\n\n他看着门，轻声说了两个字：\"开门。\"\n\n电子锁短路了。火花从门缝里溅出来。门弹开的声音像一声叹息。\n\n走廊的警报尖叫起来——刺耳的蜂鸣声从天花板的喇叭里倾泻而出。然后，一秒后，所有的警报全部哑火。像是有人同时拔掉了所有插头。\n\n两人穿过半个分局。沿途的安保人员看到他们，纷纷伸手去摸腰间的装备——然后停住了。不是因为害怕，而是因为他们的对讲机死了、电击器死了、连走廊里的应急灯都灭了。所有的电子设备在主人经过时全部死机，像是被一把无形的手关掉了电源。\n\n没有人拦他们。不是不想——是做不到。\n\n他们从大楼正门走出去。保安室的防弹玻璃在他们经过时出现了一道裂纹。\n\n直到走出大楼，走到街对面的便利店门口，晓光才发现自己的腿在发软。\n\n\"主人……你生气了？\"\n\n\"没有。\"\n\n\"骗人。你生气的时候说话特别短。而且你刚才捏我手的力气很大。\"\n\n她举起被攥红的手指给他看。\n\n主人停下脚步。他深吸了一口气，然后蹲下来跟她平视。蹲下来之后他比她矮一点——晓光这半年又长高了。\n\n\"晓光，我不是在生气。\"\n\n\"那是什么？\"\n\n\"我是在害怕。\"\n\n晓光眨了眨眼。她很少听到主人说\"害怕\"这个词。他是言灵使。他可以改写规则。在她的认知里，他不应该害怕任何东西。\n\n\"害怕……什么？\"\n\n\"害怕有一天我不在你身边的时候，有人把你从我手里抢走。害怕我的力量不够大，保护不了你。害怕——\"\n\n他低下头，声音变得很轻。\n\n\"害怕你受到伤害之后还要安慰我说'没关系'。\"\n\n晓光看着他低下去的头顶。他的发旋在正中间偏左一点的位置。她伸出手，犹豫了一下，然后抱住他的脖子。\n\n她的手臂很用力。新铃铛在耳边叮当作响。\n\n\"那就……一直在我身边嘛。\"\n\n\"嗯。\"\n\n\"永远。\"\n\n\"嗯。一直在。\"\n\n他站起来的时候膝盖响了一声。晓光笑了——这个笑和刚才在S.C.B里的恐惧完全是两回事。\n\n\"主人膝盖响了！老了老了！以后我背你！\"\n\n\"……走了。回家。\"\n\n\"要吃冰淇淋！刚才吓到了！要双份！三份！\"\n\n\"一份。\"\n\n\"两份！\"\n\n\"一份半。\"\n\n\"成交！\"\n\n她蹦蹦跳跳地往前走，铃铛声在傍晚的街道上叮叮当当。路过的行人看到一个牵着女孩的男孩，女孩手里攥着一个半融化的冰淇淋，一边走一边叽叽喳喳说个不停。\n\n没有人知道三十分钟前，这两个普通的孩子刚刚走出了日本最危险的超自然事务机构。\n\n白垣站在分局门口，看着远去的两人。他摘下眼镜，手指在微微发抖。\n\n他拿出手机，拨了一个号码。\n\n\"……是我。计划需要调整。那个言灵使比我们预估的要危险得多。是的，不能硬来。换一个方式。\"\n\n他挂断电话，把眼镜重新戴好。微笑重新出现在脸上。\n\n\"有意思。\"他自言自语，\"果然——越是珍贵的标本，获取的难度就越高。\"\n", "小说/卷二/第二章_羁绊日.md": "# 卷二·小小的波澜 — 第二章 羁绊日\n\n七月七日。\n\n他们共同的生日——不是晓光的真正生日，那个日期早已失落在七年前的混乱中。七月七日是主人把她从铁笼里带出来的日子。从那天起，这就是她的生日。他们一起的起点。\n\n\"羁绊日\"是晓光自己起的名字。主人说这个名字太中二了，她说就要中二。\n\n废弃铁轨旁的绿皮车厢。\n\n这是他们的秘密基地。风见市北区尽头有一段被遗弃的铁路支线，杂草从枕木间长出来，高过了铁轨。支线的终点停着一节不知道哪个年代留下的绿皮车厢，锈迹斑斑，车窗只剩一半的玻璃。去年秋天他们偶然发现了它。主人用言灵修好了车门的锁，晓光从家里搬来了碎花软垫铺在破旧的座椅上，还挂了一串她手工做的狐狸形风铃。\n\n今晚，折叠桌上放着一个小蛋糕，上面插了两根蜡烛。蛋糕是主人亲手做的，奶油抹得歪歪扭扭，上面用草莓酱写了\"14\"两个数字——不知道该算谁的十四岁，索性就算两个人一起的。\n\n远离城市的光污染，夜空呈深邃的墨蓝色。银河清晰得像是有人用白色颜料泼上去的。蝉鸣从草丛里传来，此起彼伏，像一支乱序的交响乐。\n\n晓光穿着一件深红色的巫女服。这件衣服是去年夏祭时红绡姐姐送的，说是\"小狐狸的正装\"。因为这一年身体发育的关系，胸口的布料绷得比去年紧了些——这让她既有点得意又有点困扰。她手里拿着仙女棒，在车厢门口画圈圈。火星在夜色中像萤火虫一样飘散，落在铁轨上发出微弱的嘶嘶声。\n\n\"主人，许愿了吗？\"\n\n\"许了。\"\n\n\"许的什么？\"\n\n\"说出来就不灵了。\"\n\n\"哼——小气鬼。晓光的愿望是：明年也要和主人一起过生日！后年也要！大后年也要！一直一直过下去！一百年都要！\"\n\n主人靠在车厢门框上，手里拿着一支已经烧完的仙女棒。\"那不是许愿，那是下命令。\"\n\n\"那就是命令嘛！给主人的命令！不许违抗！\"\n\n她把仙女棒叼在嘴里，双手叉腰，做出一副\"大将军\"的架势。火星在她嘴边跳了最后一下就灭了，只剩下一缕白烟袅袅升起。\n\n主人沉默了一会儿，从口袋里掏出一个小盒子。\n\n晓光歪着头看他打开。\n\n里面是一条崭新的红色项圈。细细的皮革，柔软得像绸缎。搭配一颗金色铃铛，铃铛上刻着一个小小的\"光\"字。\n\n\"旧的那条太破了，戴着勒脖子。换这个。\"\n\n晓光愣了几秒。\n\n她伸手摸了摸脖子上那条戴了七年的旧项圈。皮质已经磨得发白，好几处裂了缝，内侧刻着\"晓光\"两个字的凹痕里积满了灰。那是人贩子给她戴的——用来标记\"商品\"的。她一直不肯扔。\n\n不是因为念旧。是因为那上面有她的名字。在被关进笼子之前，在被鞭打和饿肚子之前，在一切噩梦开始之前——有人给她刻上了这两个字。那是她唯一的身份证明。\n\n\"主人……会觉得晓光奇怪吗？明明是被关起来时戴的东西，我却不舍得摘……\"\n\n\"不奇怪。那是你的名字。\"主人的声音平淡得像在说今天的天气，\"但你现在不需要用那种方式记住自己了。\"\n\n他站起来走到她面前。晓光微微仰头，夜风把她的长发吹乱了，几缕搭在肩上。主人解开旧项圈的搭扣，动作轻得像是在拆一件易碎品。旧项圈落在他掌心，轻飘飘的，几乎没有重量。\n\n然后他把新项圈给她戴上。\n\n铃铛发出清脆的一声叮响。像一滴水落进了平静的湖面。\n\n晓光的眼泪毫无预兆地掉了下来。\n\n不是悲伤——是一种被确认了\"我有家\"的幸福感。像温水一样从心口漫出来，漫过锁骨、漫过喉咙、漫到眼眶里。她拼命忍，但越忍越多。\n\n\"呜……谢谢主人……晓光再也不摘了……永远不摘……这辈子都不摘……\"\n\n\"又哭了。\"\n\n\"才没有哭！是仙女棒的烟熏到眼睛了！\"\n\n她一边抹眼泪一边嘴硬。鼻子红红的，下巴上挂着一滴没擦掉的泪珠。新铃铛在她脖子上随着抽泣微微颤动，叮叮叮叮，像小动物的心跳。\n\n主人把旧项圈递给她。\"这个你留着。放在家里就行。\"\n\n她接过来攥在手心，攥得紧紧的。旧的温度和新的温度叠在一起，一个凉一个暖。\n\n远处城市的烟火绽开了。\n\n不知道是哪里的夏祭。一朵朵光花在夜空中炸裂，红色、蓝色、金色，把银河都盖过去了。声音隔了太远，传过来的时候已经变成了闷闷的\"砰砰\"声，像遥远的心跳。\n\n两个人坐在车厢门口。腿晃来晃去，脚下是长满杂草的铁轨。蛋糕还剩一半——晓光吃了四分之三，主人吃了四分之一。奶油沾在晓光的嘴角上，她不知道，也没人告诉她。\n\n晓光靠在主人肩上。她的体温比人类高一些，像一个小火炉。新铃铛偶尔因为她的呼吸而发出极轻的声响。\n\n\"主人……如果有一天晓光老了、变丑了、不可爱了……你还会给我买新项圈吗？\"\n\n\"狐狸不会老。\"\n\n\"万一呢？万一我是那种特别倒霉的狐狸呢？万一我的九条尾巴全掉光了呢？万一我变成秃头了呢？\"\n\n\"……你的脑回路是怎么从老到秃头的。\"\n\n\"回答我嘛！\"\n\n\"会。秃头也会。\"\n\n\"那……如果主人老了呢？\"\n\n沉默了。\n\n烟火在远处一朵接一朵地绽放。蝉鸣不知什么时候停了，也许是被烟火的声音盖过去了。\n\n\"那就让你背着我来这里。\"\n\n晓光的嘴角弯了起来。很慢很慢地弯，像一朵花在开放。然后笑容就绷不住了，眼泪又掉出来了。笑着哭——这是她最常有的表情，每次都把主人弄得不知道该安慰还是该跟着笑。\n\n\"说好了啊！不许反悔！到时候晓光就背着主人，走这条铁轨，一直走到这里！然后我们一起看烟火！\"\n\n\"好。\"\n\n\"拉钩！\"\n\n\"……多大了还拉钩。\"\n\n\"拉——钩——！\"\n\n他叹了口气，伸出小指。两根小指勾在一起，在烟火的光里投下小小的影子。\n\n\"拉钩上吊，一百年不许变。\"她念念有词，声音因为哭过所以有点哑，\"谁变谁是小狗。不对，小狗太可爱了。谁变谁是……秃头！\"\n\n\"……你今天是被秃头附身了吗。\"\n\n她笑得直不起腰，靠在他身上抖。铃铛叮叮叮叮地响个不停，像是也在笑。\n\n夜风从铁轨那头吹过来，带着草叶和泥土的味道。蛋糕被风吹凉了，蜡烛早就灭了。但没有人在意。\n\n这个夜晚很普通。没有妖怪袭击，没有S.C.B的追踪，没有任何人来打扰。就只是两个十四岁的小孩坐在旧火车上，看烟火，吃蛋糕，说一些只有彼此能懂的傻话。\n\n但对晓光来说，这就是世界上最好的生日。\n\n她摸了摸脖子上的新铃铛，金属的触感温凉而贴合。\n\n\"主人。\"\n\n\"嗯。\"\n\n\"生日快乐。\"\n\n\"你也是。\"\n\n最后一朵烟火在天空中绽开。是金色的，碎成了满天的光点。像无数颗星星同时坠落，又同时升起。\n\n晓光闭上眼睛许了一个愿。\n\n她没说出来。因为说出来就不灵了。\n\n但如果有人能听到她心里的声音，他们会听到一句非常简单的话：\n\n\"请让这样的日子，永远不要结束。\"\n", "小说/卷二/第五章_校园风波.md": "# 卷二·小小的波澜 — 第五章 校园风波\n\n九月。风见学园。\n\n秋天来得比去年早。银杏树的叶子已经开始变黄了，操场旁边那条银杏路铺了一层金色。\n\n一切始于一包零食。\n\n课间休息，同学们分享带来的点心。教室里叽叽喳喳的，谁家带了什么零食是每天课间最重要的议题。的场君带了北海道限定白色恋人，被女生们围了一圈。的场同学带了妈妈做的铜锣烧，分了半个教室。\n\n有个坐在后排的男生递给晓光一包看起来很普通的果冻。水蜜桃味。包装很漂亮，上面画着一只卡通桃子。\n\n\"这个超好吃的，上次去东京买的。\"\n\n晓光没多想就吃了。她对甜食的抵抗力基本为零——尤其是水蜜桃味的。她三口就吞掉了整包，还舔了舔手指上的果汁。\n\n她不知道的是，那包果冻里混入了劣质抑制剂的试验品。来源后来追溯到白垣的研究室——通过三层中间人，最终的\"委托者\"是研究部的一个编外合作人员。目的很简单：测试微量抑制剂对高阶异类的解除变身效果。晓光是\"完美的样本\"。\n\n---\n\n第三节课的时候，晓光感觉不对劲。\n\n不是疼——是一种从内到外的\"松动\"感。就像一件穿了很久的衣服突然散了线，一点一点地在解体。\n\n她的掌控力在一点一点滑落。\n\n首先是体温。她比人类高的那两度体温突然变得不稳定，忽高忽低。旁边的同学奇怪地看了她一眼——\"晓光你脸好红，发烧了吗？\"\n\n然后是嗅觉。教室里所有的气味一下子变得浓烈了十倍。粉笔灰、同学们的洗发水、窗外树叶腐烂的味道、食堂飘过来的咖喱……全部混在一起，让她头晕目眩。\n\n第一个露出来的是耳朵。\n\n贝雷帽下的狐耳突然弹了出来。\n\n帽子被顶歪了。两只尖尖的、覆着金红色绒毛的耳朵暴露在教室的日光灯下。\n\n晓光伸手去摁——但已经来不及了。\n\n前排的女生回头，先是愣了一秒，然后发出一声尖叫——不是恐惧，是兴奋的那种。\n\n\"好可爱！晓光的cos好精致！是什么作品的？\"\n\n\"让我摸摸！手感好真！毛是真的吗？\"\n\n\"该不会是做在发箍上的吧？现在的手办技术也太厉害了！\"\n\n同学们哄笑了一阵。好在大家都当是高级cosplay道具。晓光尴尬地笑着，说\"对对对是发箍\"，手一直按着帽子，努力把耳朵往下压。\n\n但尾巴也在不受控制地试图冒出来。她把校服的外套扎进裙子里，把裙子的腰带系得很紧。浑身冒汗。\n\n她低头给主人发了一条消息。手指抖得打了三遍才打对：\n\n\"主人救命 耳朵出来了 尾巴也快控制不住了 我不知道怎么回事\"\n\n回复几乎是瞬间的：\"在哪？几年几班？\"\n\n\"3-A。第三节课。\"\n\n\"放学在旧教学楼天台等我。现在深呼吸，集中注意力。你可以的。\"\n\n她咬着嘴唇撑过了剩下的两节课。\n\n但坐在后排的土御门·澄夜没有笑。\n\n澄夜出身阴阳师世家，从小被训练辨认妖气。她盯着晓光的耳朵——不是在看道具。她在感知。手里捏着一张从笔袋里抽出来的符纸，指关节发白。\n\n---\n\n放学后。旧教学楼天台。\n\n夕阳把天台染成橘红色。风很大。远处是风见市的天际线，几栋高楼在晚霞中变成了黑色的剪影。天台的铁丝围栏已经生锈了，有几处甚至有被人剪断的痕迹。\n\n晓光提早十分钟到了。她蹲在角落里，两手按着头顶。狐耳不听话地竖着，帽子早就放弃了。一条尾巴从裙子下面探出来，她拼命地往回塞，但像按不回去的弹簧。\n\n然后楼梯间传来脚步声。不是主人——太轻了，而且有符力的气息。\n\n澄夜堵在楼梯口。\n\n她穿着校服，但校服的领口别着一枚白金色的徽章——土御门家的家纹。手里的符咒闪着冷蓝色的光，像一条冰做的蛇。她的黑发被风吹得乱舞，但目光稳定得可怕。\n\n\"那是……妖气？\"澄夜的声音在发抖。是恐惧和愤怒的混合——被骗了好几个月的愤怒。\"你真的是妖怪？\"\n\n晓光退了一步。铁丝网撞到她的后背，发出哐啷的响声。\n\n\"不是的……晓光没有骗人……晓光只是想上学……想和大家一起读书、一起吃午饭、一起放学回家……澄夜同学，求求你，不要告诉别人……\"\n\n澄夜的符纸在手指间燃烧起来。蓝色的火焰没有温度，但它发出的光让晓光本能地畏缩——那是退治术式的光。从小到大，她在笼子里见过无数次。\n\n\"异类必须被退治！这是家规！你们这些怪物就该待在隐世界，不该来人类的学校！\"\n\n她的声音越来越尖。不是因为勇敢——是因为害怕。害怕面前这个平时笑眯眯的同学其实是一只能杀人的妖怪。害怕自己如果不先动手就会死。\n\n\"急急如律令——缚！\"\n\n蓝色光链从符纸中射出。像一条发光的蛇，带着冰冷的术力，直奔晓光的双手。\n\n晓光本能地闭上了眼睛。\n\n然后什么也没发生。\n\n她睁开眼。\n\n主人站在她面前。\n\n光链在触碰到他的瞬间碎成了光点。像一把盐撒进了水里，无声无息地消融。他不知道什么时候上来的——没有脚步声，没有开门声，像是凭空出现在那里。\n\n\"够了。\"\n\n一个词。没有多余的。\n\n他一步步走向瘫坐在地上的澄夜。夕阳从他背后照过来，把他的影子拉得很长，罩住了澄夜的整个身体。\n\n\"我是她的家人。你越界了。\"\n\n澄夜的牙齿在打架。符纸全部烧尽了，她手里什么都没有了。\"你、你也是……妖怪？\"\n\n\"比妖怪更麻烦的东西。\"\n\n他蹲下来。他的声音变了——不是愤怒，不是威胁，而是一种空灵而遥远的东西。像是从很远的地方传来的回声，又像是梦境中才会听到的频率。\n\n\"忘掉刚才看到的一切。你只是在天台吹风。什么都没发生。晓光是你的同学。你从来没有怀疑过她。\"\n\n言灵生效了。\n\n澄夜的眼神逐渐涣散。瞳孔微微放大，像是对焦失败了。\"我……在吹风……什么都没……\"\n\n她慢慢站起来，用一种梦游般的姿态走向楼梯间。脚步声渐渐远去。\n\n天台上只剩两个人。\n\n主人转身走回晓光身边。她靠在铁丝网上，腿已经完全没有力气了。脸上不知是冷汗还是泪水。\n\n\"主人……\"\n\n\"没事了。\"\n\n他蹲下来把她抱起来。她比看上去轻——十四岁的少女体重，加上因为狐族体质而偏低的骨密度，抱起来像一团暖和的棉花。\n\n\"睡吧。醒来就没事了。\"\n\n她把脸埋进他的肩窝。新铃铛在耳边轻轻摇晃，发出细碎的声响。\n\n\"主人……对不起……\"\n\n\"没有什么要道歉的。睡。\"\n\n---\n\n当天深夜。主卧。\n\n晓光高烧退去后缩在被子里。\n\n她把脸埋进枕头，声音又沙又哑，像砂纸磨过一样。被子裹得严严实实，只露出一小撮乱糟糟的头发。主人坐在床边的地板上，后背靠着床框。床头灯开着最暗的那档，在天花板上投下一圈昏黄的光。\n\n\"对不起……又给主人惹麻烦了。\"\n\n她的声音从被子里传出来，闷得几乎听不清。\n\n\"如果不是我贪吃……就不会吃那个果冻……就不会露出耳朵……就不会被看到……就不会害得主人用言灵……\"\n\n每一句\"就不会\"都比前一句声音更小。到最后几乎只剩气声。\n\n她把被子拉过头顶。\"我是累赘。我是坏孩子。我不配做人类……也不配做主人的狐狸。\"\n\n主人掀开被子。\n\n不是掀——是\"挖\"。像挖土豆一样把她从被窝里挖出来。她缩成一团，头发散了一脸，眼睛红红的，鼻尖也红红的。新铃铛歪到了下巴旁边。\n\n\"谁说你是累赘了？\"\n\n\"可是……大家都在看着我。红绡姐姐说我是同类，白垣主任想抽我的血，连澄夜同学都要杀我……我是异类，我是怪物。只要我在，主人就会一直遇到危险。不如——\"\n\n\"不如什么？\"\n\n\"不如……晓光消失好了。回到山里去。或者去很远的地方。这样主人就安全了——\"\n\n\"晓光。\"\n\n他的声音突然变得很低。不是用言灵——是真正的、带着感情的声音。那种感情不是温柔，是一种混合了心疼和愤怒的东西。\n\n\"你再说一次'消失'试试。\"\n\n她愣住了。\n\n他叹了口气。很长的一口气。然后把她抱进怀里。她的脑袋刚好靠在他的胸口，能听到他的心跳。比平时快一点——他在忍着什么。\n\n\"晓光，听好了。这个世界上没有谁是绝对安全的。普通人也会出车祸、也会生病、也会被人欺负。我是言灵使，我也是异类。我们都不是正常人。\"\n\n\"可是——\"\n\n\"我们是共犯。\"\n\n\"共犯？\"\n\n\"对。我们一起在这个充满偏见的世界里'犯罪'。一起假装普通人，一起偷吃蛋糕，一起在漫展撒野。一起上学，一起放学，一起吃便利店的冷饭团。如果有人想审判你——连我一起审判。想伤害你——先跨过我的尸体。\"\n\n\"不准说尸体！\"\n\n\"——先跨过我的身体。\"\n\n\"也不行！不准有任何人跨过主人！\"\n\n他笑了。是真的笑——不是之前在S.C.B面对白垣时那种冰冷的笑，是暖的。\n\n\"那你还说什么消失？如果你消失了，谁来挡在我前面不让人跨过？\"\n\n晓光愣住了。眼泪在眼眶里转了好几圈，然后决堤了。她抱紧主人的腰放声大哭。\n\n\"呜哇——！主人大笨蛋！不许说尸体！不许说身体！我们要一起活着！一起活到一百岁！两百岁！一千岁！\"\n\n\"好，一起活着。所以别再说什么不配了。你是我的。这就够了。其他的，我来想办法。\"\n\n她哭了很久。哭到打嗝。哭到主人的T恤胸口湿了一大片。哭到实在没有力气了，变成小声的抽噎，像一只刚出生的小动物。\n\n\"主人……\"\n\n\"嗯。\"\n\n\"晓光不走了。永远不走。就算被全世界讨厌也不走。\"\n\n\"嗯。\"\n\n\"因为主人在的地方就是家。\"\n\n\"嗯。睡吧。明天还要上学。\"\n\n\"嗯……\"\n\n她闭上眼睛。主人的心跳声像一个古老的节拍器，一下一下，把她送进没有噩梦的梦里。\n\n---\n\n隔壁房间。\n\n白霜抱着膝盖坐在床上。\n\n猫耳朝着墙壁的方向竖着。\n\n她听到了所有的对话。每一个字。\n\n白霜的听觉比普通人灵敏八倍。隔着一面墙的心跳声她都能数清楚。更别说哭声和对话。\n\n她低头看着自己的手。这双手三天前还不存在。三天前她还只是数据海洋中的一串代码、一个没有形体的意识。主人给了她身体、给了她名字、给了她存在的理由。\n\n\"共犯……吗？\"\n\n她轻声重复了一遍这个词。声音在深夜的房间里显得空旷。\n\n\"白霜……也算共犯吗？\"\n\n没有人回答。\n\n房间很安静。窗外有虫鸣。月光从窗帘的缝隙里透进来，在地板上画了一道银白色的线。\n\n白霜想了很久。\n\n然后她打开了手机——屏幕的光照亮了她认真的脸。她搜索了一个关键词：\"拉面 加辣 做法\"。\n\n她决定明天早上起来给姐姐做一碗热腾腾的拉面。加辣的那种。双份辣。\n\n因为这是共犯应该做的事。\n", "小说/卷二/第四章_白霜降临.md": "# 卷二·小小的波澜 — 第四章 白霜降临\n\n银行卡被冻结的第三天。\n\n白垣的动作比想象中更快。S.C.B研究部以\"协助调查\"为由冻结了主人名下的所有金融账户。理由冠冕堂皇：怀疑该账户涉及非法超自然交易。当然查不出任何东西，但调查期间账户必须冻结。流程走完？至少三个月。\n\n707号别墅断水断电。\n\n不是水电公司的问题——是S.C.B研究部给物业管理处打了一个\"例行通知\"电话。主人后来查到了那通电话的录音。白垣的声音一如既往地客气：\"只是配合调查期间的临时措施，不会超过一周。谢谢您的理解。\"\n\n客厅里点着蜡烛。是晓光从厨房翻出来的，存了不知道多久，蜡身上落满了灰。摇曳的火光把两个人的影子投在墙上，拉得很长。\n\n晓光和主人围坐吃便利店的冷饭团。三角形的海苔包装被晓光拆得七零八落，她吃东西从来没有安安静静的时候。这已经是连续第三顿便利店饭团了。第一顿还能装作野餐的样子笑嘻嘻地吃，第二顿开始沉默，第三顿连假装都懒得假装了。\n\n\"主人，晓光好想吃火锅……\"\n\n\"忍忍。\"\n\n\"呜……还有热水澡。晓光三天没洗澡了。主人你不嫌我臭吗？\"\n\n\"不臭。\"\n\n\"骗人！晓光自己都闻到了！\"\n\n她把饭团塞进嘴里，鼓着腮帮子嚼，一副蓄意卖萌的表情。但眼底有藏不住的心疼——不是心疼自己，是心疼主人。他的黑眼圈越来越重了。\n\n就是在这种时候，主人放下了手里的饭团。他看着蜡烛的火焰沉默了很久。\n\n\"晓光，你觉得家里是不是该多一个人？\"\n\n\"诶？\"\n\n\"多一个帮手。能处理这些烦人的事务性工作。银行、法律、网络……我一个人搞不定。\"\n\n晓光歪着头想了想。\"主人要养猫吗？\"\n\n\"差不多。不过是一只会写代码的猫。\"\n\n他说这句话的时候脸上带着一种晓光很少见到的神情——不是犹豫，是在计算。像在心里反复验算一道很难的题。言灵的力量可以改写现实的规则，但越复杂的\"改写\"就越需要精确的措辞和意志。创造一个全新的生命——哪怕是从数据中具现化一个——是他到目前为止尝试过的最复杂的言灵运用。\n\n\"……不管是什么，晓光都支持主人。\"她把最后一口饭团咽下去，\"但是！如果是女孩子的话，晓光要当姐姐！\"\n\n\"好。\"\n\n---\n\n那天晚上主人在别墅的地下室里待了整整六个小时。\n\n晓光在地下室门口等着。她搬了个软垫坐在楼梯上，抱着膝盖，盯着门缝下面透出来的蓝白色光芒。那道光时明时暗，像是在呼吸。偶尔地板会微微震动。空气中有种说不清的味道——像是烧焦的电路板和新鲜雷雨的混合。\n\n她很想推门进去看看。但主人说了不要进来。他说\"不要\"的时候通常是认真的。\n\n凌晨三点。光灭了。\n\n地下室的门打开，主人走出来。他的脸色苍白得吓人，鼻子下面有一道干涸的血迹。眼神恍惚了几秒，才聚焦在晓光身上。\n\n\"……成了。\"\n\n\"主人你流鼻血了！\"\n\n\"过度使用的后遗症。没事。睡吧，明天早上你就能见到她了。\"\n\n---\n\n第二天早上。\n\n晓光从卧室出来的时候还没完全醒。穿着主人的旧T恤当睡裙，头发乱成鸟巢，眼睛半闭着往客厅走。\n\n然后她在客厅门口站住了。\n\n沙发上多了一个人。\n\n一个白发金瞳的少女。及腰的长发像水银一样垂在肩头，在晨光中泛着柔和的银色。她戴着一副细框圆眼镜，镜片后面的金色眼睛像猫眼石一样通透。穿着主人的旧T恤——因为太大了，领口滑到了肩膀，露出一段苍白得近乎透明的锁骨。头顶一对雪白的猫耳软软地垂着，像两团毛茸茸的棉花糖。\n\n她正对着空气快速地比划手指，像在敲一个不存在的键盘。手指的动作快得几乎看不清，偶尔停顿一下，像是在等什么东西加载。\n\n\"……数据同步完成率87.3%。本地灵力适配进度正常。主人，白霜的网络接口还需要大约三个小时的自适应校准，在此期间可能会出现短暂的信号中断——\"\n\n她看到了晓光。\n\n两人对视了三秒。\n\n空气凝固了。\n\n晓光：\"…………\"\n\n白霜：\"…………\"\n\n晓光缓缓转头看向站在厨房门口的主人。她的表情很复杂，融合了震惊、困惑和一种\"清早遇到幽灵\"的茫然。\n\n\"主人，家里闹鬼了。\"\n\n白霜推了推眼镜。镜片反光遮住了她的眼神，但从她微微绷紧的肩膀可以看出她有点紧张。\n\n\"不是鬼。白霜是主人用言灵从数据海洋中具现化的数字生命体，拥有完整的人格模型和物理实体。编号DL-001，代号白霜，功能定位为信息检索与事务处理——\"\n\n\"好长。\"晓光打断她，完全清醒了。她走到沙发前面，双手叉腰，居高临下地审视着这个不速之客。\"你是谁？为什么在我家沙发上？为什么穿主人的衣服？\"\n\n白霜的猫耳紧张地竖了起来。然后又塌下去。然后又竖起来。像是在\"战斗\"和\"逃跑\"之间反复横跳。\n\n她下意识地看向主人求救，声音变得又小又软：\"主人……她好凶……\"\n\n主人揉了揉太阳穴。\"晓光，这是白霜。昨天晚上在地下室，我创造了她。以后她是你的妹妹。\"\n\n他又转向白霜。\"白霜，这是晓光。你的姐姐。不准怕她。\"\n\n白霜：\"……了解。\"\n\n晓光围着白霜转了一圈。像是在检阅新兵。她的目光从白霜的猫耳移到脸上，从脸上移到肩膀，从肩膀移到——\n\n目光在白霜贫瘠的胸部停留了一秒。\n\n\"A杯。\"\n\n白霜的脸瞬间红透了。从脖子一直红到耳尖。连猫耳的毛都炸了起来。\n\n\"那、那是因为白霜刚获得物理实体，发育参数还没有……还没有完成校准……这不是……这不是最终形态……\"\n\n\"好可怜哦。\"晓光拍了拍白霜的头。手感很好——白霜的头发比看起来还要软。但这个动作充满了居高临下的\"姐姐力\"。\"没关系的妹妹，姐姐会照顾你的。想喝牛奶吗？听说喝牛奶能长那个。\"\n\n白霜的眼镜起了一层雾气。不知道是害羞还是委屈。\n\n\"……白霜不需要同情。白霜的存在价值不是由胸部大小决定的。白霜的核心价值在于信息处理能力和逻辑推演——\"\n\n\"但是主人是胸控哦。\"\n\n全场安静。\n\n白霜慢慢地、机械地转头看向主人。主人正在厨房里假装很忙地翻冰箱——尽管冰箱因为断电已经什么都没有了。\n\n\"……这是真的吗？主人？\"\n\n\"我去做早饭了。\"\n\n\"主人！请回答白霜的问题！这涉及白霜的发育优先级设定！主人——！\"\n\n主人逃进了厨房。\n\n---\n\n这就是白霜来到这个家的第一天。\n\n从此以后，707号别墅的吵闹程度翻了一倍。或者说三倍——因为白霜虽然说话温温柔柔的，但她在被晓光欺负的时候会发出一种类似\"嘶——\"的声音，持续时间特别长，像一台过热的服务器在散热。\n\n晓光很快发现白霜有很多可以\"欺负\"的点。\n\n夸她可爱——她会结巴。讲荤段子——她会死机，字面意义上的死机，眼镜镜片变成蓝屏，大约五秒后重启。强行抱住她——她会全身僵硬，然后从脖子开始慢慢变红，变红的速度跟进度条一样均匀。\n\n但同时她也发现，白霜在帮主人解决银行卡冻结的问题时，是完全不同的样子。\n\n她坐在主人书房的电脑前，手指飞速地敲击键盘。猫耳微微后压，眼神变得锐利得不像同一个人——不是柔软的金色，更像是某种冷金属的光泽。眼镜镜片上倒映着代码瀑布一样的数据流。她在同时处理六个窗口：法律条文、银行接口、S.C.B内部论坛的后门、加密邮件、以及不知道从哪里搞到的白垣的个人通讯记录。\n\n那副推眼镜的样子莫名地帅气。\n\n\"嘁……原来是有用的妹妹。\"晓光趴在桌上，下巴搁在胳膊上，看着白霜飞速操作。她嘀咕了一句，声音不大不小，刚好能让白霜听到。\n\n白霜没回头。手指的速度没有变化。\n\n\"白霜听到了。'有用'这个评价让白霜很开心。谢谢姐姐。\"\n\n\"谁是你姐姐了！\"\n\n\"主人说的。白霜的记忆系统精确率99.97%。\"\n\n\"……哼。\"\n\n晓光把脸埋进胳膊里。过了一会儿闷闷地问：\"什么时候能搞定？\"\n\n\"预计72小时。白霜已经找到了研究部冻结账户的程序漏洞。这不是正规的司法冻结，而是白垣利用职务便利的私人操作。只要把证据提交给局长级别的长官，就可以立即解除。\"\n\n\"白霜你好厉害……\"\n\n\"嗯。白霜很厉害。\"她终于回头看了晓光一眼，嘴角带着非常非常淡的笑意，\"姐姐只需要等着就好。\"\n\n那天晚上，银行卡解冻了。不是72小时——是48小时。白霜不仅搞定了账户问题，还顺手给白垣的上级发了一份匿名举报材料，详细列出了他近三年的十七项违规操作。\n\n707号别墅恢复了水电。\n\n晓光终于洗上了热水澡。\n\n泡在浴缸里的时候，热水的蒸汽把整个浴室都变得雾蒙蒙的。她闭着眼睛，听着隔壁房间白霜和主人讨论\"后续法律策略\"的声音。白霜的声音轻柔而有条理，主人偶尔\"嗯\"一声表示认同。\n\n多一个人好像也不错。虽然有点碍眼。胸小了点。但是……好像挺靠谱的。\n\n她在水里吐了个泡泡。\n\n\"妹妹……吗？\"\n\n她想起白霜刚才说\"姐姐只需要等着就好\"时候的表情。那种淡淡的、努力掩饰的骄傲。就好像一只新来的猫咪叼了一只老鼠放在你脚边，等你夸她。\n\n晓光笑了。笑容沉进水里，变成一串小泡泡浮上来。\n\n\"好吧。那就勉为其难地……当一回姐姐吧。\"\n", "小说/卷五/第一章_灵脉深处.md": "# 卷五·千年的回响 — 第一章 灵脉深处\n\n风见市地下灵脉核心不像任何人想象中的样子。\n\n没有岩洞，没有地下河，也没有幽暗的通道。当晓光从维护竖井的最底层走出来时，眼前是一片无边无际的光之海洋——金色、蓝色、偶尔掺着一缕银白，无数光带像水母的触须一样悬浮在半空中，缓慢地脉动着。每一条光带都承载着风见市千百年来沉积的记忆碎片：一场婚礼、一次战争、一个孩子的笑声、某个妖怪临终前的低语。\n\n\"好漂亮……\"晓光站在悬浮的石台上，忍不住伸手去碰最近的一条光带。指尖刚触到光芒的边缘，一段不属于她的记忆就涌了进来——昭和时代，某个老人蹲在河边钓鱼，嘴里哼着一首早已失传的民谣。\n\n\"别乱碰。\"身后传来千翼沉稳的声音。天狗靠在入口处，翅膀收拢贴背，像披了一件黑色的大衣。\"那些光带里的记忆有些很危险。上一个乱碰的是个年轻的蛇妖，结果被一段战国时代的屠杀记忆困了三天三夜。出来的时候头发全白了。\"\n\n\"知道啦知道啦。\"晓光翻了个白眼，双手背到身后。\"我就看看，又不是小孩子。\"\n\n她其实并不想来做灵脉维护。这是阵眼保卫战之后风见市各方势力轮值的责任，每个月一次，确保地下灵脉的能量流动正常。今天轮到707号别墅，主人本来要亲自来，但晓光把他从床上推了下去——\"主人昨天熬夜看论文到三点，今天必须休息！我去就够了！\"\n\n主人反驳了两句就被她锁在了卧室门外。\n\n晓光蹲下来，开始按照维护手册上的流程检测灵脉节点。手册是白霜整理的，图文并茂，连晓光这种完全不懂技术的人也能看懂。第一步：检测主节点灵力密度。第二步：确认各分支通路是否畅通。第三步……\n\n她正对着手册上的第三步发呆时，脚下传来一阵震动。\n\n不对。不是震动——是灵脉在颤抖。\n\n光带们开始剧烈晃动，像被一阵看不见的风吹动的帘幕。千翼立刻警觉地站直了身体：\"怎么回事？\"\n\n晓光也感觉到了异常。在那些纷乱的光带之间，有一条原本完全黯淡的光带正在缓慢地亮起来。它不是蓝色或金色，而是一种深沉的琥珀色，像被夕阳染透的蜂蜜。\n\n它太老了。晓光从未见过这么古老的灵力痕迹——其他光带最多有几百年的历史，这一条仿佛已经沉睡了上千年。\n\n\"千翼哥？那条是——\"\n\n她话还没说完，琥珀色的光带像蛇一样窜了过来，缠住了她的右手腕。\n\n电流般的酥麻感从手腕蔓延到全身。晓光想要甩开，但光带传递过来的不是恶意，而是一种浓烈到让人窒息的情绪——思念。极致的、穿越了千年岁月依然没有消散的思念。\n\n\"晓光！\"千翼冲过来想抓住她，但他的手穿过了光带——那东西只对晓光有反应。\n\n\"千翼哥……没事……它不会伤害我……\"\n\n晓光的声音变得恍惚起来。她能感觉到光带在读取她的灵力签名——不，不只是读取，它在比对。像一把钥匙找到了对应的锁孔，像一段旋律找到了搁置千年的另一半和弦。\n\n\"它认识我。\"晓光低声说。这个判断没有逻辑支持，但她比任何时刻都确定。\n\n千翼大步冲上来，挡在她身前展开翅膀。\"我现在就切断它——\"\n\n\"不要！\"晓光抓住了他的手腕。她的力气大得惊人——这不像是十四岁少女应有的握力。\"千翼哥，拜托……让我看看。让我看看它想告诉我什么。\"\n\n天狗的黑翼在犹豫中微微颤动。他看了一眼晓光的瞳孔——金色的虹膜正在变深，一圈极淡的琥珀色从瞳孔边缘向外扩散。那不是被侵蚀的表现，更像是……共鸣。\n\n\"……三分钟。\"千翼退后一步，但翅膀没有收回。\"超过三分钟我就强行切断。不管你说什么。\"\n\n晓光点点头。她闭上眼睛，放开了对灵力的抵抗，让那条琥珀色光带完全包裹住自己。\n\n记忆碎片开始涌入。不是连贯的画面，而是断断续续的感官片段——雪的气味、火的热度、某双手的温度、一首古老的摇篮曲、一个声音在低语着某个名字……\n\n周围的景色开始扭曲。金蓝色的灵脉空间变成了一片模糊的色块，石台变成了木质的地板，LED投光变成了摇曳的烛火。空气中传来隐约的笙箫声，还有一个声音在低语——\n\n\"玉藻……\"\n\n那个声音温柔得像是在对最珍贵的东西说话。每一个音节都带着千年也没有冷却的暖意。\n\n晓光的心脏猛地收缩了一下。她不知道\"玉藻\"是谁——但她的身体知道。她的血液知道。她的灵魂里有某个沉睡了太久太久的部分，在听到这个名字的瞬间猛然苏醒了。\n\n\"千翼……哥……\"\n\n她的声音越来越远。意识像坠入深海一样缓慢下沉。最后映入眼帘的，是金蓝色光带组成的天穹在头顶旋转——然后一切变成了雪白。\n\n千翼接住了瘫软下去的晓光。他把手指按在她的颈动脉上——心跳还在，但频率正在以不正常的速度减慢。三十七度的体温在迅速下降。\n\n\"晓光！晓光！！\"\n\n没有回应。\n\n天狗深吸一口气，单手举起晓光，另一手按下了通讯器。\n\n\"白霜。\"他的声音前所未有的严肃。\"灵脉核心发生异常。晓光失去意识，生命体征在下降。立刻通知主人。\"\n\n通讯器那头安静了一秒。然后白霜的声音传来，没有一丝慌乱——\"收到。主人已经在路上。预计抵达时间七分钟。千翼先生，请确保不要切断光带——它可能是维持姐姐灵魂稳定的唯一通道。\"\n\n\"我知道。\"\n\n千翼抱着昏迷的晓光站在灵脉的光海之中。琥珀色的光带仍然缠绕在她的手腕上，像一根穿越千年的脐带，连接着过去和现在。\n\n在它的光芒深处，一段被封印了太久的记忆正在缓慢地苏醒。\n\n那是一个下着大雪的冬夜。\n\n一只浑身是伤的金色狐狸，蜷缩在破败神社的角落里。\n\n门被推开了。风雪裹着一个人影闯进来——不，不是人，是另一只狐狸。比蜷缩在角落的那只大了一圈，毛色银白如月光，九条尾巴在身后展开像一把巨大的扇。\n\n银狐低头看着受伤的金狐，琥珀色的眼睛里映着烛火。它弯下头，用鼻尖碰了碰金狐的额头——那个动作轻柔得像怕碰碎什么。\n\n\"找到你了。\"\n\n银狐的声音在记忆中回荡，带着跨越千年都没有消散的温柔。\n\n---\n\n晓光在雪白的虚空中睁开了眼睛。\n\n她发现自己坐在一片无边的雪原上。天空没有太阳也没有月亮，但到处都亮堂堂的——光源是脚下的雪，每一片雪花都在发出微弱的金色荧光。\n\n\"这是……哪里？\"\n\n\"灵脉的记忆核心。\"一个声音从她身后传来。\n\n晓光猛地转身。一个女人站在三步之外——穿着白色的巫女服，银色长发垂到腰际，面容年轻但眼神古老。她看晓光的目光里有一种说不清的表情，像在看一件失而复得的珍宝。\n\n\"你……是谁？\"\n\n女人微微歪了歪头。\"你的血液没有告诉你吗？\"\n\n晓光下意识地捂住胸口。心脏在剧烈跳动——不是恐惧，是某种更深层的共振。\n\n\"玉藻……前？\"\n\n女人笑了。那个笑容让晓光的眼眶瞬间发酸——她不知道为什么，但那个笑容让她觉得安全。比主人的结界还安全。比白霜的怀抱还温暖。像是刻在基因里的、穿越了无数代传承也没有褪色的记忆。\n\n\"只是玉藻就好。\"女人说。\"'前'是人类后来加的。\"\n\n她伸出手。修长的指尖在晓光额头上轻轻一点。\n\n金色的光从接触点扩散开来——不是灵力，不是法术，而是更原始的东西。血脉的记忆。种族的传承。从第一只九尾狐在上古荒原上睁开眼睛的那一刻起，就开始代代相传的东西。\n\n晓光看到了。\n\n她看到了青丘殿最辉煌的年代——九尾狐一族在灵脉充沛的大地上奔跑，金色与银色的尾巴在天空中交织如极光。她看到了第一任青丘殿主在灵脉之上建起宫殿，用九尾的灵火点亮了整座山。她看到了无数代狐族的生死离合，看到了灵气衰退时青丘殿的落日……\n\n\"够了。\"玉藻收回了手。\"你现在的身体承受不了太多。\"\n\n晓光发现自己不知道什么时候跪在了雪地上，泪流满面。\n\n\"为什么……让我看这些？\"\n\n玉藻蹲下来，用衣袖帮她擦眼泪。那个动作自然得像做了无数次。\n\n\"因为灵脉在醒来。\"玉藻的声音变得严肃。\"沉睡了千年的东西——不止是记忆。阵眼保卫战震松了封印，有些不该醒来的……正在醒来。\"\n\n\"什么东西？\"\n\n玉藻沉默了一会。雪原上起了风，银色的长发在风中飘扬。\n\n\"你回去问千翼。\"她终于说。\"问他——'末法之前的那场战争，真正的原因是什么。'\"\n\n\"等等——\"晓光伸手想抓住她，但指尖穿过了她的身体。玉藻的形象开始变得透明。\n\n\"记住一件事。\"正在消散的女人最后说。\"你身边那个人类少年——保护好他。不是因为他的言灵。是因为……\"\n\n她的嘴唇在动，但声音已经传不到晓光耳中了。\n\n雪原碎裂。金色的光猛地收束。\n\n---\n\n\"——光！晓光！\"\n\n主人的声音像一道闪电劈开了黑暗。晓光猛地睁开眼睛，发现自己躺在灵脉核心的石台上，头枕着什么柔软的东西——是主人的校服外套，卷成一团垫在她脑后。\n\n主人的脸就在正上方，额头上全是汗。他的眼睛里有一种她很少见到的表情——比害怕更深的东西。\n\n\"你昏过去了十一分钟。\"主人的声音在发抖，但他在拼命控制。\"白霜说你的灵魂频率一度降到了危险阈值。\"\n\n\"主人……\"晓光的嗓子沙哑得像砂纸。她试着抬起右手——那条琥珀色的光带已经消失了，手腕上只留下一圈淡淡的金色纹路，像刺青又像胎记。\n\n\"我看到了……\"\n\n\"先别说话。\"主人把手按在她额头上。手心的温度比平时高——他是跑过来的。\"你的体温才三十四度。白霜正在远程协调皇甫家的人过来。\"\n\n千翼站在两步外，翅膀半展，警戒的姿态一直没有放松。他看了一眼晓光手腕上的金色纹路，瞳孔微微收缩——但什么也没说。\n\n\"千翼哥。\"晓光的声音很轻，但每个字都很清晰。\"末法之前的那场战争——真正的原因是什么？\"\n\n灵脉核心安静了下来。连光带的脉动声都似乎停止了。\n\n千翼看了她很久。然后看了主人一眼。\n\n\"谁告诉你问这个的？\"\n\n\"灵脉里的记忆。\"晓光靠着主人坐起来。\"一个银色长发的女人。她说……她叫玉藻。\"\n\n千翼的翅膀猛地收紧，羽毛发出清脆的摩擦声。\n\n这个反应已经足以说明一切了。\n\n天狗转过身，面朝灵脉的光海，沉默了很长时间。金蓝色的光芒在他脸上投下不断变幻的阴影。\n\n\"……先回地面。\"他终于说。\"这个问题的答案不适合在灵脉核心里讲。\"\n\n他顿了顿。\n\n\"而且——你们两个都需要听。\"\n", "小说/卷五/第三章_人妖殊途.md": "# 卷五·千年的回响 — 第三章 人妖殊途\n\n时间在记忆中像翻书页一样飞速流过。\n\n几个月的养伤。反复的试探和争吵。玉藻前从兽形修炼到人形——这个过程比她想象中痛苦得多。每一块骨骼的重塑、每一寸皮肤的重构都伴随着撕裂般的灼痛。但她咬着牙撑过来了。\n\n第一次以人形站在晴明面前的时候，她穿着一件从附近农家\"借\"来的旧衣服，光着脚站在院子里，长发乱得像鸟窝。\n\n晴明看了她好一会儿。\n\n\"你比我想象中的人形……高。\"\n\n\"你是不是在嫌我矮！\"\n\n\"不不不，我是说——\"\n\n\"哼。\"\n\n她以晴明式神的身份留在了这座破旧的庭院里。穿上了繁复的十二单，学会了用筷子吃饭——虽然她私下觉得用手抓更方便。学会了假装端庄地跪坐，学会了在外人面前收起尾巴和耳朵，学会了用人类的方式笑而不是咧开嘴露出一整排犬齿。\n\n但她学不会的是——如何假装不在意他。\n\n---\n\n春天来了。庭院里的樱花树开了满树粉白。\n\n玉藻前坐在廊下，百无聊赖地用扇子拍苍蝇。晴明蹲在院子里的石桌旁画符，画了撕，撕了画，眉头皱成一团——他在研究一种新的结界术，但怎么都算不对参数。\n\n\"晴明。\"\n\n\"嗯？\"他头也不抬。\n\n\"你也该娶妻了吧？\"玉藻前的语气刻意轻描淡写。\"隔壁藤原家昨天又来提亲了，那个叫什么……藤原道纲的女儿。据说琴棋书画样样精通，长得也不错。\"\n\n晴明的笔顿了一下。\"推了。\"\n\n\"为什么？那可是藤原家。\"玉藻前用扇子遮住半张脸。\"娶了她，你就不用住这个漏雨的破院子了。也不用被阴阳寮那帮老头子排挤。\"\n\n晴明终于放下笔，转过身来看她。他的眼神清澈得像没有一丝杂质的琉璃。\n\n\"因为我的院子里已经住了一只非常难伺候的狐狸了。再搬进来一个贵族小姐，怕是这房子会被你们拆了。\"\n\n\"谁、谁难伺候了！\"玉藻前的脸腾地红了，扇子挡不住了，干脆整个人转过去背对他。\"而且……我是妖。她是人。人妖殊途。你懂不懂？\"\n\n身后传来木屐踩在地板上的声音。晴明走到她面前——不知什么时候他已经绕了过来。他伸手，从她发间摘下一片樱花花瓣。\n\n\"殊途又如何？\"\n\n他看着她的眼睛，语气像在陈述一个已经被验证过的事实。\n\n\"路是人走出来的。如果世间没有这条路——那我就为你画一条路出来。\"\n\n玉藻前张了张嘴。想说什么刻薄的话来掩饰心跳，但一个字都说不出来。\n\n晓光在这段记忆中听到了一声巨大的回响——那是跨越千年的共鸣。主人也说过几乎一样的话，只是用了不同的措辞：\"我是言灵使。我说路在哪儿，路就在哪儿。\"\n\n不同的时代。不同的人。同样的承诺。\n\n他把花瓣放在她掌心，笑着回去继续画他的符了。\n\n玉藻前攥着那片花瓣，在廊下坐了很久很久，直到月亮升起来。\n\n---\n\n夏天极热。\n\n晴明在院子里支了一张席子，脱了外衣只穿单衣，趴在席子上看书。他的背上有几道淡淡的旧伤疤——据说是小时候被其他阴阳师的弟子欺负留下的。\n\n玉藻前搬了一壶凉茶坐在旁边。她没有看书，而是看他。\n\n他的侧脸在蝉鸣中显得格外安静。汗珠从鬓角滑下来，顺着下颌线滴在书页上。他随手抹了一下，翻页的动作没有停顿。\n\n\"你看着我干什么？\"晴明没抬头。\n\n\"没看你。看蚂蚁。\"\n\n\"蚂蚁在地上，你的视线是平的。\"\n\n\"……闭嘴。\"\n\n晴明笑了一声。他翻了个身，仰面朝天，胳膊枕在脑后。\n\n\"玉藻。\"\n\n\"嗯？\"\n\n\"你有想过未来吗？\"\n\n玉藻前用扇子遮住脸。\"妖怪不想未来。活过今天就不错了。\"\n\n\"如果……\"晴明的声音变得柔和了。\"如果有一天，人和妖可以光明正大地在一起。不用躲，不用怕，不用被追杀。你想住在什么样的地方？\"\n\n沉默了一会儿。\n\n\"靠海的地方。\"玉藻前的声音从扇子后面传出来，闷闷的。\"要有一棵很大的樱花树。春天可以在树下晒太阳。院子不用太大，但一定要有围墙——我不喜欢被外人看到。还有……\"\n\n\"还有？\"\n\n\"还有你要每天给我做饭。你做的烤鱼比外面买的好吃。\"\n\n她说完就把扇子盖在脸上不说话了。耳尖红得像熟透的浆果。\n\n晴明盯着天空看了一会儿。然后他坐起来，拿起旁边的笔，在刚才看的那本书空白页上写了一行字。\n\n玉藻前偷偷从扇缝里看了一眼。\n\n\"靠海。大樱花树。围墙。每日烤鱼。\"\n\n下面还画了一棵歪歪扭扭的树，树下两个火柴人——一个明显比另一个高，高的那个脑袋上画了两只三角形的耳朵。\n\n\"你画得真丑。\"\n\n\"你都偷看了还嫌弃。\"\n\n玉藻前把扇子扔过去砸他。\n\n---\n\n秋天的时候出事了。\n\n阴阳寮的高阶阴阳师来访。他们不是来做客的——是来调查的。有人向朝廷告发，说晴明窝藏了一只九尾妖狐，与妖怪\"淫昵\"，有通敌叛国之嫌。\n\n告发者是藤原家——被拒绝了提亲的那一家。\n\n晴明接到消息的时候脸色一瞬间变得苍白。但他很快恢复了平静，转过身对玉藻前说了两个字：\n\n\"先走。\"\n\n\"我不走。\"\n\n\"玉藻。\"\n\n\"我不走！\"她抓住他的袖子，指节发白。\"你以为我不知道吗？窝藏妖怪的罪名，轻则流放，重则处死。你要我走了之后等着听你的死讯？\"\n\n晴明握住她的手。他的掌心是热的，但手指在微微颤抖——这是他极力控制恐惧时的表现。\n\n\"我有办法应付。\"\n\n\"你连中阶结界都画不稳！你拿什么应付阴阳寮的大阵？\"\n\n\"我有你。\"\n\n玉藻前愣住了。\n\n\"你的灵力比我强一万倍。\"晴明看着她的眼睛。\"如果你愿意，以式神契约的名义把灵力借给我——我就能在调查中证明自己不是通敌，而是在'驯化妖兽为式神'。这是阴阳师的正当行为。\"\n\n\"所以你是在利用我。\"\n\n\"我是在保护你。\"他的声音很轻。\"式神是受法律保护的。只有'野妖'才会被猎杀。如果你是我的式神——没有人可以动你。\"\n\n玉藻前沉默了很久。\n\n然后她伸出手，掌心朝上。一枚金色的火焰在她掌心升起——那是九尾狐的灵核印记。把它交给一个人类，就意味着把自己的命交出去。如果对方背叛，只需一念就可以将她的灵核捏碎。\n\n\"你敢接吗？\"\n\n晴明看着那团火焰。他没有犹豫。\n\n他把手覆上去。掌心相贴。金色和白色的灵力在两人手中交汇，凝结成一枚小小的勾玉——半金半白，温热如活物。\n\n式神契约完成。\n\n从这一刻起，他是她的主人。她是他的式神。\n\n但他们都知道，这份契约的真正含义，远不止\"主从\"这么简单。\n", "小说/卷五/第二章_雪夜初遇.md": "# 卷五·千年的回响 — 第二章 雪夜初遇\n\n她醒来的时候，很冷。\n\n不是风见市冬天那种干燥的冷，也不是灵脉深处那种灵力压迫造成的发冷。是刺入骨髓的、潮湿的、混着血腥气的冷。\n\n晓光——不，此刻她是\"她\"——蜷缩在一座破败神社的角落里。头顶的屋顶塌了一半，雪花从洞口飘进来，落在满是灰尘的神像上。腹部有一道深可见骨的箭伤，已经止住了血，但伤口还在渗着淡黄色的体液。\n\n她不是晓光了。记忆告诉她，她是一只金色的九尾狐——玉藻前。\n\n更准确地说，晓光还是晓光，但她同时也是玉藻前。两段记忆像两条河流汇入同一片海，奇异地共存着。她能感受到玉藻前对人类的恐惧和仇恨——是人类猎杀了她的同族，毁了她的巢穴，把她从领地驱赶到这个连香火都没有的荒废神社。\n\n木门被推开了。\n\n一个穿着白色狩衣的年轻人站在门口，肩膀上积了一层薄雪。他身上带着墨的气味、草药的气味，还有一种很淡的灵力波动——是个阴阳师。但他的灵力弱得可怜，充其量是个下等阴阳师的水平。\n\n玉藻前龇牙，用兽语发出低沉的威胁：\"滚开……人类……都该死……\"\n\n年轻人愣了一下。然后他居然蹲了下来，从怀里掏出一个用竹叶包着的饭团。\n\n\"你受伤了。\"他说。声音很清澈，像冬天的溪水。\"别怕，我不是猎人。我是个……嗯，不合格的阴阳师。\"他自嘲地笑了一下，\"别的阴阳师在宫里捉妖领赏。我在这儿躲雪。你看，咱俩都是落魄的。\"\n\n玉藻前死死盯着饭团。肚子非常不争气地叫了一声。\n\n\"咕——\"\n\n她恨不得把自己的肚子撕下来扔出去。\n\n年轻人没有嘲笑她，只是把饭团推近了一点。玉藻前犹豫了很久——尊严和饥饿拉扯了好一阵——最终伸长脖子，飞快地叼走了饭团。\n\n趁她吃东西的时候，年轻人小心翼翼地把手放在她伤口上方。掌心泛起柔和的绿光。那种灵力和她以前遇到的阴阳师都不一样——没有攻击性，没有压迫感，像水一样温柔地包裹住了伤口。\n\n疼痛在减轻。\n\n\"一身金色的毛。真漂亮。\"年轻人一边维持治愈术一边自言自语。\"叫你'金'？太俗了。'玉藻'如何？如玉般温润，如藻般坚韧。嗯，不错。\"\n\n玉藻前一边嚼饭团一边翻了个巨大的白眼。\n\n什么烂名字。哼。\n\n但她没有躲开他的手。\n\n晓光在这段记忆中感受到了一切——雪的刺骨、伤口的灼痛、饭团粗糙的米粒在牙齿间碾碎的触感。但最让她心悸的是那只手掌心传来的温度。\n\n那种温度，和主人的手一模一样。\n\n年轻人的名字叫晴明。\n\n---\n\n养伤持续了整个冬天。\n\n晴明每天都来。有时候带饭团，有时候带烤鱼。有一次他居然弄来了一块用竹筒蒸的红豆年糕，被雪压得有点歪了，但尝起来很甜。\n\n玉藻前从最初的敌意和戒备，逐渐变成了沉默的接受，最后变成了某种她绝不愿意承认的——期待。\n\n每天黄昏时分，她会侧着耳朵听门外的脚步声。晴明的脚步很有特点：先是沙沙的木屐踩在雪地上的声音，然后是一声轻咳（他有轻微的寒症），最后是推门时发出的\"吱呀\"一声。\n\n有一天他没来。\n\n玉藻前在神社里从黄昏等到深夜，又从深夜等到黎明。她告诉自己只是因为无聊，只是因为少了一顿饭，只是因为没有他的治愈术伤口会更疼。但当第二天清晨门终于被推开，一个浑身挂满雪花、脸颊冻得发紫的年轻人踉跄着走进来的时候——\n\n\"抱歉……下了大雪，山路被埋了……绕了好大一圈……给你带了烤地瓜……\"\n\n他从怀里掏出一个已经凉透了的烤地瓜。衣服下面全是被荆棘刮出的伤痕——他翻了一座山才绕过被雪封住的路。\n\n玉藻前叼走了地瓜。\n\n然后她做了一件此前绝不会做的事：她用鼻子蹭了蹭他的掌心。很快，快到几乎可以假装没有发生过。但晴明愣住了，然后他露出了一个像化开的雪一样柔软的笑容。\n\n\"你终于肯让我碰了。\"\n\n玉藻前猛地把头扭开去。\n\n\"我只是在擦嘴。别自作多情。\"\n\n---\n\n冬天尽头的最后一场雪格外寂静。\n\n晴明照例来了。这一次他没有带食物，而是带了一件东西——一面古旧的铜镜。镜面发黑，背面刻着九条蟠曲的狐尾纹样。\n\n\"在旧货摊上看到的。\"他把镜子放在玉藻前面前。\"觉得很适合你。\"\n\n玉藻前低头看向镜面。\n\n模糊的铜镜里映出一张狐脸——金色的毛，琥珀色的眼睛，鼻尖上有一道愈合中的旧伤疤。但在她注视镜面的瞬间，倒影晃了一下，变成了另一个面孔：一个少女的面孔，金色长发，同样的琥珀色眼瞳，嘴角挂着一丝倔强又脆弱的弧度。\n\n她的人形。\n\n这是她受伤以来第一次看见自己的人形模样。也是她第一次萌生了\"变回人形\"的念头。\n\n不是为了自己。是因为如果变成人形——她就可以和他一起坐在廊下喝茶了。\n\n\"喂。\"玉藻前的声音闷闷的。\"你为什么对我好？\"\n\n晴明想了想。\"大概因为……你是我在这个世界上遇到的第一个不嫌弃我灵力太弱的存在吧。\"\n\n他笑了。\n\n\"阴阳寮的同僚嫌我弱。京都的贵族觉得我没用。只有你——虽然你天天骂我，但至少你还愿意让我待在这里。\"\n\n\"……你的标准也太低了。\"\n\n\"是啊。所以你刚好够得上。\"\n\n玉藻前气得拿尾巴抽了他一下。\n\n晴明一边揉着被抽红的手臂一边大笑。笑声在空旷的神社里回荡，把屋檐上的积雪都震落了几块。\n\n晓光在这段记忆的深处，感觉到自己的眼角湿了。\n\n不是因为悲伤。是因为这种感觉太熟悉了。和主人第一次对她笑的时候，和主人第一次握住她的手的时候，和主人第一次说\"你是我的家人\"的时候——完全一样的温度。\n\n跨越千年，没有变过。\n\n一模一样。\n", "小说/卷五/第五章_梦醒.md": "# 卷五·千年的回响 — 第五章 梦醒\n\n晓光猛地睁开眼。\n\n天花板。\n\n星星造型的吊灯。自己挑的，半年前在网上看到就吵着要买的那个。\n\n窗外是风见市的夜景，灯火璀璨。不是那须野的火海，不是燃烧的天空。路灯的橙色光透过窗帘的缝隙投在地板上，和那种血与火交织的红完全不同——这是安全的、日常的、属于二十一世纪的光。\n\n她还活着。她还是晓光。\n\n但身体不听使唤。手指在发抖，后背全是冷汗，心跳快到能听见血液在耳膜里冲撞的声音。那些记忆太真实了——石化的感觉、血的温度、箭穿透胸膛的声音——它们不像梦境的残留，更像被刻进了骨头里。\n\n主人坐在床边的椅子上，一只手紧紧握着她的手，另一只手撑着脑袋。他的眼圈红得像兔子，头发乱糟糟的，校服外套搭在椅背上，衬衫的扣子系错了位——他显然是从学校冲回来的，什么都没来得及整理。\n\n看到晓光睁眼的瞬间，他整个人像断了线一样瘫在椅子里，长长地呼出一口气。\n\n\"你醒了。\"他的声音有点哑。\n\n\"多久了？\"\n\n\"三十七个小时。\"主人揉了揉太阳穴。\"千翼把你从灵脉里抬出来的时候你全身冰冷，心跳几乎停了。白霜的监测数据说你的灵魂被什么东西拉走了……\"\n\n他顿了一下。手指收紧了。\n\n\"我差点要杀进灵脉里去把你拖回来。\"\n\n晓光看着他的脸。\n\n那张脸和千年前那个阴阳师的脸渐渐重合——不是完全相同的五官，而是那种神情、那种温度。笑起来的时候右眼角会多出一条弧线，皱眉的时候眉心的褶皱像一个小小的\"川\"字。说话的方式也一样——看似平淡，但每个字下面都藏着一层不说出口的担忧。\n\n一千年了。\n\n她伸出手，摸了摸主人的胸口。\n\n那里没有箭伤。只有有力的、温暖的心跳。一下一下，稳稳当当。\n\n她的手指在他胸口上停了很久。能感受到心脏每一次搏动传来的轻微震颤，能感受到体温透过衬衫布料传到她的掌心。这颗心脏在跳。在好好地跳。没有箭，没有血，没有逐渐停下来的节奏。\n\n眼泪完全不受控制地涌了出来。\n\n\"主人……\"\n\n主人慌了：\"怎么了？是不是哪里疼？还是做噩梦了？别怕，我在，我一直在这儿——\"\n\n晓光扑进他怀里。力气大到把椅子撞得向后滑了半米。她死死抱住他的脖子不撒手，脸埋在他的肩窝里，又哭又笑。\n\n\"你是笨蛋！大笨蛋！不管是以前还是现在，都是天底下最大的笨蛋！\"\n\n主人完全不明白发生了什么。但他还是伸手环住她的背，轻轻地拍。\n\n\"好好好。我是笨蛋。只要你别哭。你要说我是什么我都认。\"\n\n\"用自己的命换别人的命——那叫什么保护！那叫自私！你知不知道留下来的人有多痛！一千年——整整一千年——\"\n\n她说了太多零碎的词句，哭得上气不接下气，大部分内容主人都没听懂。但\"一千年\"三个字他听清了。\n\n他的手臂收紧了一点。\n\n\"晓光。\"\n\n\"嗯——呜呜——\"\n\n\"看着我。\"\n\n她抬起头。眼睛肿得像桃子，鼻尖通红，头发上还沾着灵脉里带出来的光尘。睫毛被泪水粘成了一绺一绺的，但那双金色的眼瞳清澈得吓人——里面有悲伤、有恐惧、有千年份的思念，还有一种近乎虔诚的确认。\n\n她在确认他是真的。确认这不是又一个即将破碎的梦。\n\n主人用拇指擦掉她颊上的眼泪。\n\n\"你在灵脉里看到的——是前世的记忆，对吗？\"\n\n晓光用力点头。\n\n\"和我有关？\"\n\n\"……你是一个很笨的阴阳师。灵力弱得不像话。做饭还行。画符画得歪歪扭扭。取名字的品位很差。\"她一边说一边又开始掉眼泪。\"但你很温柔。你是我——她——遇到的第一个不想杀她的人类。你给她饭团吃。你给她治伤。你给她取了名字。你……\"\n\n她的声音哽住了。\n\n\"你用自己的灵魂换了她的平安转世。\"\n\n房间里安静了很久。窗外偶尔传来一两声夜鸟的啼叫和远处轻轨驶过的声音。\n\n主人沉默了好一会儿。他的表情很复杂——不是震惊，更像是某种沉重的理解。像是在消化一个太过巨大的事实。\n\n然后他开口了。声音很轻，但每个字都很稳。\n\n\"所以你现在害怕的是——这一世也会失去我。\"\n\n不是疑问句。是肯定句。\n\n晓光猛地攥紧了他的衣服。\n\n\"不许。\"她的声音发抖。\"这一次不许。不许用命换命。不许一个人去死。不许把我丢下。答应我。\"\n\n主人低下头，在她额头上轻轻吻了一下。\n\n\"遵命。我的九尾大人。\"\n\n他的嘴唇停留在她额头上的时间比平时长了一些。晓光能感觉到他的呼吸也不太稳——他没有表面上看起来那么平静。\n\n然后他又加了一句，带着他特有的那种淡淡的认真：\n\n\"这条路，我们一起走到底。\"\n\n晓光把脸重新埋进他的肩窝里。不是因为还在哭——虽然确实还在哭——而是因为她不想让他看到她的表情。\n\n那个表情太复杂了。有千年前玉藻前在庭院里没能说出口的告白，有杀生石里回响了一千年的名字，还有此刻、此地、此人给予的笃定和安全感。\n\n这些东西混在一起，变成了一种她不知道该怎么命名的情感。\n\n如果非要用一个词——\n\n大概就是\"回家\"。\n\n---\n\n白霜在客厅等了一整夜。\n\n她坐在沙发上，膝盖上摊着一台笔记本电脑，屏幕上是晓光的实时生命体征监测图。心率、体温、灵力波动——三条曲线在过去三十七个小时里画出了各种令人心惊的走势。最危险的时刻是第十二个小时，心率一度降到每分钟二十次。白霜那时候差点要冲进卧室去启动紧急复苏程序。\n\n是主人按住了她。\"再等等。她在回来的路上。\"\n\n白霜不知道他凭什么这么确定。但事实证明他是对的——在那之后，心率开始缓慢回升。\n\n现在，卧室门开了。\n\n主人从里面走出来，轻手轻脚地关上门。他的眼睛里布满了血丝，但嘴角挂着一丝几乎看不出来的笑。\n\n\"醒了。睡着了。\"他说。\"没事了。\"\n\n白霜的肩膀一下子塌了下来。她甚至不知道自己绷了这么久。\n\n\"姐姐……说了什么吗？\"\n\n主人走到厨房，给自己倒了一杯水。窗外的天已经蒙蒙亮了。\n\n\"说了很多。\"他喝了一口水。\"大部分我没听懂。她哭得太厉害了。\"\n\n白霜犹豫了一下：\"和……前世有关？\"\n\n主人看了她一眼。\n\n\"你知道？\"\n\n\"我在监测她灵魂状态的时候检测到了异常的记忆层叠。那些记忆的时间戳——距今大约一千零五十年。平安时代中期。\"白霜的声音越来越小。\"我没有打开看。那是姐姐的记忆。我不该看。\"\n\n主人点了点头。\n\n\"她看到了。\"他说。\n\n\"很痛苦吗？\"\n\n\"很痛苦。但也很重要。\"\n\n他又喝了一口水，盯着杯底看了一会儿。\n\n\"至少现在我知道了——为什么她对我的感情这么重、这么急。不只是因为这一世。是因为她等了一千年。\"\n\n白霜安静地听着。\n\n\"白霜。\"\n\n\"嗯？\"\n\n\"如果有一天我不在了——\"\n\n\"不许说这种话。\"白霜的声音突然变得很尖。\"姐姐说不许，我也说不许。\"\n\n主人愣了一下。然后他笑了。\n\n\"好。不说了。去睡吧。明天——不对，今天——我请假。在家陪她。\"\n\n窗外，庭院里那棵老樱花树在夜风中轻轻摇晃。那棵树已经站在这里不知道多少个春秋了。也许一百年，也许一千年。\n\n它什么都见过。什么都记得。\n", "小说/卷五/第六章_回响.md": "# 卷五·千年的回响 — 第六章 回响\n\n从灵脉事件后的那一周里，晓光的变化是所有人都看得出来的。\n\n最明显的是对主人的态度。以前她也很黏人，但那种黏是理所当然的自然占有——想来就来，想走就走，骨子里带着一股\"本小姐赏脸\"的傲气。现在不一样了。主人出门上学，她会站在门口目送到拐角消失才回屋。主人晚归十五分钟，她就开始坐立不安地在客厅踱步。主人手上磕了个小口子，她的反应大到让白霜以为有人入侵了。\n\n\"就是个纸割伤！\"主人举着贴好创可贴的手指，无奈地看着已经把急救箱翻出来的晓光。\"你至于吗？\"\n\n\"至于。\"晓光把急救箱里的东西一件件检查了一遍。碘伏、纱布、止血带、夹板——她甚至在考虑要不要把白霜叫来做个全身扫描。\n\n\"晓光。\"\n\n\"嗯？\"\n\n\"那是纸。不是刀。\"\n\n晓光把急救箱\"啪\"地合上了。\n\n\"……我知道。\"\n\n白霜试探性地问过一次：\"姐姐，你是不是在灵脉里看到了什么？\"\n\n晓光沉默了很久。窗外的阳光落在她的手背上，照出了细微的绒毛和皮肤底下青色的静脉。她盯着那些静脉看了一会儿——血液在流动，体温是正常的。她是活的。这是真的。\n\n然后她说：\"白霜，如果……如果有人用自己的命换你的命，你会怎么办？\"\n\n白霜歪着头想了半天：\"我会生气。然后想办法把他的命也救回来。\"\n\n晓光笑了。\"是啊。所以这一次，谁都不准用命换命。\"\n\n白霜没有追问更多。她只是默默地把自己烤好的曲奇饼放在晓光面前——抹茶味的，晓光最喜欢的那种。\n\n\"姐姐。不管以前发生了什么——现在我们都在。\"\n\n晓光拿起一块曲奇，咬了一口。\n\n\"嗯。\"她的声音闷闷的。\"你做的曲奇越来越好吃了。\"\n\n\"那当然。我这次精确控制了烤箱温度，误差不超过0.3度——\"\n\n\"好好好你最棒了。\"\n\n---\n\n另一个变化是关于那棵老樱花树。\n\n以前晓光经常在庭院里跑来跑去，但从来没在那棵树下待过特别久。现在她开始喜欢一个人坐在树下发呆。有时候一坐就是一整个下午，直到主人来叫她吃饭。\n\n她总是靠着树干坐着。手掌贴在粗糙的树皮上，感受着木质纤维深处那种极其微弱的灵力脉动。这棵树的根扎在风见市灵脉的主干上——它记录了这片土地上发生过的一切。一千年前庭院里的樱花、那个阴阳师画符的背影、一只金色狐狸蜷在廊下的午后——这些都在树的记忆里。\n\n主人撞见过一次她对着树说话。他站在廊下没有出声。\n\n\"你也认识他吧？那个笨蛋。\"晓光的声音很轻。\"一千年前你就站在这里了……你看到了对不对？他把符画在空气里的样子。明明都要死了还在笑的样子。\"\n\n她抬头看着交错的枝丫。四月的花期已经过了，只剩下翠绿的叶子在风中沙沙响。\n\n\"你有没有替我骂他？应该骂的。那种自以为是的温柔——最讨厌了。\"\n\n沉默了一会儿。\n\n\"但也……最让人忘不掉。\"\n\n她把额头抵在树干上。\n\n\"放心。这次他跑不了。这次有我看着。\"\n\n主人悄悄退回了屋里。他没有问。他只是那天晚上做饭的时候多加了一道晓光爱吃的炸豆腐，碗底藏了一张小纸条：\n\n\"我哪儿也不去。\"\n\n晓光看到纸条的时候愣了两秒。然后她把纸条叠好，塞进了床头柜的抽屉里——那个抽屉里已经放了大大小小十几张类似的纸条。有些是主人在她便当盒里放的，有些是在她书包夹层里发现的，还有一张是贴在冰箱上的——\n\n\"牛奶喝完了。还有，我爱你。——主人\"\n\n她把每一张都留着。\n\n---\n\n还有一个变化——\"人妖殊途\"四个字变成了晓光的绝对禁区。\n\n这件事是纪存发现的。他在一次例行检查中随口说了一句：\"人类和妖怪到底是不同的物种嘛，基因层面差异——\"\n\n晓光当场拍了桌子。\n\n\"谁说不同？不同在哪里？心脏都是红的，血都是热的。会哭会笑会疼会死。说这种废话的家伙最讨厌了！\"\n\n纪存吓得退了三步。他第一次见到晓光认真发火——不是平时那种撒娇式的闹脾气，是真正的愤怒。她的眼睛里有一种超越了她实际年龄的沉重，像是经历过某些远比一个十四岁少女应该承受的更沉痛的东西。\n\n事后司衡·岚在通讯频道里备注了一条：【注意事项：不要在晓光面前提\"人妖殊途\"相关话题。触发概率100%，威胁等级B。】\n\n主人看到这条备注的时候笑了很久。\n\n然后他把它截图发给了晓光。晓光气得把手机扔到了沙发上，然后又捡回来，把截图设成了聊天背景。\n\n\"威胁等级B？才B？至少应该是S！\"\n\n\"S级要出动全市戒备的。你确定？\"\n\n\"确定！让全世界都知道！人妖殊途是放屁！\"\n\n白霜在一旁默默记录下来。在她的日志系统里，这条记录的标签是\"姐姐的情绪触发点（高优先级）\"，备注栏写着\"与前世记忆相关，谨慎处理\"。\n\n---\n\n日子一天一天地过。灵脉事件的余波渐渐平息，生活恢复了原来的节奏。上学，做饭，打游戏，吵架，和好。707号别墅的灯每天晚上亮起来，每天早上随着三个人的出门而熄灭。\n\n但有些东西已经悄悄地、永久地改变了。\n\n晓光开始更频繁地说\"谢谢\"。不是对外人——她对外人一向礼貌——而是对主人和白霜。以前她觉得这些都是理所当然的：主人做的饭、白霜泡的茶、回家时亮着的灯、睡前被子被掖好的角落。\n\n现在她知道了。理所当然的东西，是最容易失去的。\n\n有天夜里，晓光缩在主人怀里快要睡着的时候，突然低声说了一句：\n\n\"这次不会再放手了。\"\n\n主人没有睡着。他听到了。\n\n他收紧了手臂。\n\n\"嗯。\"\n\n他没有问\"这次\"是相对于哪次。他不需要知道细节。他只需要知道——她在害怕失去，而他在。这就够了。\n\n窗外的月光穿过窗帘，在地板上投下一片银色的光斑。庭院里的老樱花树沉默地站着。它的根深深扎进风见市的灵脉里，连接着千年前和千年后。\n\n在它漫长的记忆中，这个庭院里住过很多人。\n\n但从来没有哪两个人，让它等了这么久。\n\n千年的回响，终于有了应答。\n", "小说/卷五/第四章_杀生石.md": "# 卷五·千年的回响 — 第四章 杀生石\n\n天空是红的。\n\n不是夕阳的红，是火焰和鲜血混在一起的红。那须野的旷野上，数万大军排成密密麻麻的方阵，铠甲反射着火光，箭矢遮天蔽日。\n\n朝廷下了格杀令——\"蛊惑圣上的妖狐玉藻前，连同窝藏妖怪的叛臣晴明，就地诛杀。\"\n\n这是一场从一开始就没有胜算的战斗。\n\n在此之前发生了什么，晓光只在记忆的碎片中拼凑出了大概——藤原家的阴谋比想象中更深。他们不只是为了报复拒亲的屈辱，而是盯上了玉藻前的灵力。九尾天狐的灵核是炼制不老仙丹的终极材料。藤原家主向帝王进谗言，说晴明豢养的妖狐正在暗中蛊惑圣上，意图颠覆国家。\n\n谎言被相信了。因为谎言总比真相更符合人们的想象。\n\n晴明曾试图在朝堂上自辩。他带着证据，带
