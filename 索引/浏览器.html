，发出来的只有呜呜的哭声。\n\n\"带我回家。\"\n\n她在他耳边说。\n\n声音很轻。但很清楚。\n\n这是她对他说的第一句话。不是\"救我\"。不是\"谢谢\"。是\"带我回家\"。\n\n好像她已经确定了——他的身边就是家。\n\n男孩的身体僵了一下。大概是没想到她会这么说。他七岁了，但他自己的家也说不上多温暖——父亲常年不在，母亲忙着工作，那栋大房子里最多的声音是自己的脚步回声。他甚至不确定自己有没有资格给别人一个\"家\"。\n\n但她说了\"带我回家\"。\n\n她在最脆弱的时候选择了他。这个选择的重量，七岁的他也许还不完全理解。但他的身体比他的大脑更早做出了回应——他抬起手，很轻地放在了她的后背上。那只手不大，指节还带着小孩子特有的圆润，但放在她瘦小的背上却刚刚好。\n\n\"好。\"\n\n他说。\n\n外面在下暴雨。七月七日的暴雨。\n\n他把她裹进自己的校服外套里——外套太大了，她整个人缩在里面只露出一双眼睛——然后把她抱了起来。她比他想象中轻得多。一年的囚禁和营养不良让她的身体轻得像一把干柴。\n\n他抱着她走上了台阶。走出了那个地下室。走进了暴雨里。\n\n雨水打在他脸上。很冷。但他怀里的这团白色的、瘦小的、还在发抖的生命是暖的。\n\n他跑了起来。\n\n雨太大了。大到三步之外就什么都看不见，大到整个世界变成了一片灰白色的水幕。积水没过了他的脚踝，鞋子灌满了水，每踩一步都发出沉重的水声。他怀里的小女孩把脸埋在他的肩窝里。她的耳朵——两只尖尖的、毛茸茸的兽耳——紧紧贴在头顶上，雨水顺着耳尖往下淌。她在发抖，但不再是因为恐惧了。是因为太冷了，也是因为有人的体温正在穿过湿透的校服传到她身上，一点一点地把她身体里那些冻了一年的地方暖开。\n\n他不知道要跑去哪里。只知道要跑。眼镜上全是水珠什么都看不清，他索性用一只手把眼镜推到额头上，眯着眼辨认前方的路。路灯的光被雨幕打散成一团一团橘色的光晕，像水中的太阳。\n\n在七月七日的暴雨中，一个七岁的男孩抱着一个七岁的小狐狸，拼命地跑。\n\n他不知道跑了多远。也不知道跑了多久。只知道怀里这团温度是他唯一需要保护的东西。\n\n这是他们故事的开始。\n", "小说/前传/第六章_第一个夜晚.md": "# 前传·凛冬之花 — 第六章 第一个夜晚\n\n男孩背着她走了很远的路。\n\n准确地说，是从地下室的铁门一直走到大街上，然后沿着一条她不认识的路走了很久很久。\n\n晓光趴在他背上，迷迷糊糊的。脚踝上还戴着脚铐，铁链在地上拖着，每走一步就发出\"哗啦\"的声响。链条刮过水泥路面溅出细碎的火星，但很快就被夜色吞没。男孩比她大不了多少，个头也就比她高半个头，背着她走得很吃力。\n\n呼吸越来越粗。从一开始还算均匀的节奏变成了\"呼——哈——呼——哈\"的喘息，汗从后脖颈渗出来，把衬衫领子浸成了深色。\n\n但他没有停下来，也没有放下她。\n\n连步伐都没有慢。\n\n\"你重不重？\"晓光问。声音含含糊糊的，舌头还是麻的。\n\n\"不重。\"男孩说。声音也是喘的，字和字之间隔着明显的换气。\n\n他在骗人。他的背已经被汗浸透了，布料贴在皮肤上的那种闷热感，隔着她的脸颊传过来。他的肩膀在微微发抖——不是害怕的那种抖，是肌肉承受不住负重的那种抖。\n\n但晓光选择相信他。\n\n因为他的脚步很稳。不管身体怎么抖，每一步都踩得踏踏实实的，没有一步是虚的。\n\n这个人不会把她丢下。\n\n她不知道自己为什么那么确定。也许是因为那句\"放开她\"，也许是因为他身上的肥皂味道，也许只是因为她趴在他背上的那一刻感觉到的体温——暖的，稳的，像被一面不会倒的墙护着。\n\n街上很安静。路灯亮着，一盏接一盏地排过去，把两个小小的影子拉得很长很长。\n\n\"那些人不会追来吗？\"晓光又问。\n\n\"不会。\"\n\n\"为什么？\"\n\n\"因为他们动不了。\"\n\n\"……多久？\"\n\n\"今晚够了。\"\n\n晓光把脸重新埋进他的肩膀。衬衫的布料蹭着她的鼻尖，痒痒的。\n\n\"你叫什么名字？\"\n\n男孩沉默了一会儿。\n\n\"……你叫我主人就好。\"\n\n\"为什么？\"\n\n\"因为以后你要住在我家。住在别人家里，就要叫主人。\"\n\n晓光觉得这个逻辑不太对，但她没有力气反驳。麻醉药还没退干净，脑子里雾蒙蒙的，连\"反驳\"这个念头都只冒出了一个影子就沉了回去。\n\n\"主人。\"她叫了一声。\n\n嗯。对。就是这个感觉。\n\n这个称呼从嘴巴里说出来的时候，舌头自动卷了一下，说起来很顺，两个字之间的停顿刚刚好。好像这个词原本就是属于她的，只是她之前一直没有机会说出来。\n\n\"主人。\"她又叫了一声。\n\n\"……嗯。\"\n\n\"再叫一次好不好？\"\n\n\"你叫吧。\"\n\n\"主人。\"\n\n男孩没有回答了。但她感觉到他的脚步稍微快了一点。\n\n---\n\n到了他家。\n\n一个不大的房子——后来晓光才知道这不是707号别墅，是主人以前住的普通公寓。五楼，没有电梯。男孩背着她爬了五层楼，到门口的时候两条腿都在打颤，钥匙掏了三次才插进锁眼。\n\n\"开。\"他对着锁说了一声。\n\n锁没动。\n\n他愣了一下，大概是累糊涂了，忘了普通的锁不用言灵也能开。然后他把钥匙拧了一圈，门开了。\n\n两室一厅。家具不多但很干净——沙发是棕色的皮面，有点旧但没有破；茶几上摆着一个玻璃杯和一本翻开的数学练习册；电视柜上有一台老式的液晶电视，正播着天气预报。屏幕里的主播在说\"明天白天多云转晴，最高气温三十二度\"，声音从小小的扬声器里传出来，带着电流的杂音。\n\n空气里有洗衣液的味道。\n\n这种味道让晓光突然清醒了一瞬。整个身体像被电了一下——不是疼的那种电，是一种久违的、温暖的、让所有紧绷的神经一瞬间都松了的感觉。\n\n干净。这个地方是干净的。\n\n没有铁锈味。没有霉味。没有消毒水味。没有尿骚味。\n\n只有洗衣液、木头、还有一点点做饭留下来的油烟味。\n\n男孩把她放在沙发上。她的身体陷进去的瞬间，沙发的皮面发出了一声\"噗\"。柔软的。有弹性的。不是稻草，不是水泥地面，不是铁笼的铁条地板。\n\n她呆呆地坐了好几秒，两只手不自觉地摸了摸身下的沙发。\n\n软的。是真的。\n\n然后男孩走进了厨房。\n\n水龙头打开的声音。水倒进锅里的声音——\"哗啦\"一下，然后变成了细细的\"咕噜\"。冰箱门打开又关上，牛奶盒的盖子被撕开，奶白色的液体倒进锅里的\"哒哒\"声。灶台打火的声音——\"咔嗒、咔嗒、噗\"——火点着了。\n\n晓光坐在沙发上，浑身还在发抖。\n\n不是因为冷——这个房子比她去过的任何地方都暖和。空调嗡嗡地吹着暖风，温度大概二十四五度的样子。\n\n她在抖是因为她不知道接下来会发生什么。\n\n过去的一年教会了她一件事：任何看起来安全的环境都可能是假的。地下室一开始也是安静的、不吵的，然后铁笼就来了。\n\n她的手不自觉地摸上脖子上的旧项圈。皮质已经磨得发毛了，有几处快要断裂，但\"晓光\"两个字的刻痕还在。\n\n她摸着那两个字。一下、两下。\n\n然后厨房传来一阵滚沸的声音，牛奶开了。\n\n\"噗噗噗——\"\n\n紧接着是勺子在锅里搅动的声音，然后是液体倒进杯子里的声音。\n\n男孩端着一杯热牛奶走出来。\n\n白色的马克杯，上面印着一只卡通猫——一只圆滚滚的橘猫，歪着头，表情傻乎乎的。杯口冒着热气，在客厅的暖光灯下升腾成一团模糊的白雾。\n\n他把杯子递给她。\n\n\"小心烫。\"\n\n两个字。\n\n轻轻的，随口的，像是说过一千遍的日常叮嘱。\n\n晓光接过杯子。\n\n杯壁暖暖的。那种温度从手心传进来，顺着手腕往上爬，爬过胳膊、爬过肩膀、爬进胸口——像一股暖流灌进了一个已经冻了很久的地方。\n\n她低头喝了一口。\n\n甜的。\n\n不是巧克力那种浓烈的甜。是一种温和的、柔软的、像棉花糖一样在舌尖上慢慢化开的甜。牛奶的温度刚刚好，不烫嘴但足够暖——暖得她喉咙一酸。\n\n比巧克力甜。比她记忆里所有的味道都甜。\n\n因为巧克力是偷偷塞进铁笼的，带着小心翼翼和不能被发现的紧张。\n\n而这杯牛奶是光明正大递到她面前的。配着一句\"小心烫\"。\n\n这个区别，大得像一整个世界。\n\n眼泪掉进了杯子里。\n\n无声无息地。一滴、两滴、三滴。砸在牛奶的白色液面上，荡开细小的波纹，然后融进去，什么痕迹也不留。\n\n但她没有发出声音。\n\n她就那么一口一口地喝着，眼泪一滴一滴地往下掉。喝一口，掉一滴。喝一口，再掉一滴。\n\n安静得像下了一场没有人看见的雨。\n\n男孩在她对面坐下来。\n\n他没有说话。没有问\"你怎么了\"。没有递纸巾。没有试图安慰。\n\n他就那么坐在那里，等着。\n\n等她把整杯牛奶喝完。等眼泪自己停下来。等她的呼吸从急促变成平稳。等沙发上那个瘦小的、脏兮兮的、浑身都在发抖的小女孩，一点一点地安静下来。\n\n牛奶喝完了。\n\n杯底还剩一点白色的残液。晓光把杯子抱在怀里，低着头，用袖子擦了擦眼泪。破布片的袖子什么都擦不干净，脸上反而蹭了一道灰印子。\n\n男孩开口了。\n\n\"从今天起，这里就是你的家。\"\n\n他说这句话的语气很平。没有郑重其事，也没有特别温柔。跟在说一件理所当然的事情一样——天是蓝的，水往低处流，这里是你的家。\n\n晓光放下杯子。\n\n\"那你是我的主人吗？\"\n\n\"我是你的家人。\"\n\n\"不。\"晓光摇了摇头。她的眼睛还红着，鼻头也红着，但眼神出奇地认真——认真得一点都不像一个七岁的小孩。\n\n\"你就是主人。晓光的主人。\"\n\n男孩看了她一会儿。\n\n他大概看到了什么。在那双金蓝异色的、被泪水洗过的眼睛里看到了什么东西——一种固执的、不容商量的、像是把全部身家都押上去了的认真。\n\n他没有争辩。\n\n\"……随你吧。\"\n\n晓光点了点头。嘴角微微弯了一下。然后她想起了什么。\n\n\"今天是什么日子？\"\n\n\"七月七号。\"男孩说。\"我的生日。\"\n\n晓光愣了一下。眨了两下眼睛。\n\n\"晓光也是七月七号生日。\"\n\n安静了几秒。\n\n客厅里只有电视还在播天气预报的声音。空调嗡嗡地吹着。窗外不知道哪里传来一声蝉鸣。\n\n然后晓光笑了。\n\n那是她这一年来第一次笑。\n\n不是那种在铁笼里强撑出来的\"没事我很好\"的笑——那种笑只用到了嘴角的肌肉，眼睛是空的。\n\n这一次的笑是从肚子底下涌上来的。先是嘴角弯起来，然后眼睛弯起来，然后整张脸都亮起来，像有人在她身体里面打开了一盏灯。\n\n\"那我们是同一天生日的！\"\n\n\"……嗯。\"\n\n\"这是命中注定的对不对！\"\n\n\"……也许吧。\"\n\n\"一定是的！\"晓光用力点头，白色的头发跟着一晃一晃的。\"因为今天是晓光这辈子最开心的一天！\"\n\n男孩推了推眼镜。镜片上那道裂纹在灯光下闪了一下。他没有说话。\n\n但嘴角动了一下。\n\n很轻的、几乎看不出来的上扬。如果晓光不是拥有超乎常人的观察力，可能就错过了。\n\n但她看到了。\n\n她把这个瞬间记住了。记了很久很久，久到几年后她画了无数幅画，其中有一幅画的就是这个场景——一个戴眼镜的男孩坐在沙发上，嘴角有一点快要看不见的上扬，身后是一台播着天气预报的电视。\n\n她给那幅画取名叫《七月七日》。\n\n---\n\n那天晚上，晓光在一张真正的床上睡着了。\n\n不是稻草堆。不是铁笼的地面。不是柴房角落的碎木头。\n\n而是有床单、有枕头、有被子的床。\n\n床单是白色的，摸上去滑滑的，有一股洗衣液的清香。枕头软得她的脑袋一放上去就陷了进去——她吓了一跳，以为枕头把她的头\"吃\"了，然后发现只是太软了。被子是蓝色的，上面印着星星和月亮。大大小小的星星，弯弯的月亮，在深蓝色的底色上散布开来。\n\n她把被角拉到鼻子底下，闻了闻。\n\n洗衣液的味道。跟主人身上的味道一样。肥皂和阳光。\n\n脚踝上的铁链已经被解开了。主人对着脚铐说了一个\"开\"字，铁链就自己散开了——铁环从脚踝上滑落，\"哗啦\"一声掉在地上。磨了一年的地方留下一圈红色的勒痕，有几处皮肤磨破了，结了干涸的血痂。\n\n主人看到那圈勒痕的时候，眼神暗了一瞬。但他只是从柜子里拿了一管药膏，很轻地涂上去。药膏凉凉的，有一种薄荷的味道。\n\n\"会有点凉。忍一下。\"\n\n晓光点点头。她根本不觉得凉——或者说这种凉太舒服了，舒服得她脚趾头都不自觉地蜷起来。\n\n但脖子上的旧项圈她没让主人摘。\n\n\"这是晓光的名字。\"她抓着项圈说。手指紧紧扣着那块磨旧的皮革，像抓着一件珍宝。\"不要扔掉。\"\n\n主人看了她一眼。\n\n他大概明白了什么。在铁笼的一年里，这个项圈对她来说不只是一个标签——它是她的名字，是她身份的证明，是她在所有黑暗里唯一没有被夺走的东西。\n\n\"好。不扔。\"\n\n晓光翻了个身，把被子裹成了一个茧。她花了好一会儿才找到最舒服的姿势——主要是不习惯。稻草堆和铁笼地面不需要什么姿势，蜷缩就行。但床是软的，身体会陷进去，需要调整。\n\n最后她找到了：侧卧，膝盖微微弯曲，把被子的一角塞在下巴底下，手搭在枕头上面。\n\n透过窗帘的缝隙，她看到外面的天空是深蓝色的。有几颗星星。\n\n星星。\n\n她很久很久没有看到过星星了。地下室没有窗户，没有天空，更没有星星。铁笼里唯一的光源是那颗日光灯管和一颗裸灯泡——那种惨白的、没有温度的人造光。\n\n而现在窗外有星星。\n\n真的、亮的、一闪一闪的星星。和被子上印的那些星星不一样——真的星星会眨眼睛。\n\n\"主人。\"\n\n声音从被子的茧里传出来，闷闷的。\n\n\"嗯？\"\n\n主人坐在房间角落的椅子上。他本来应该去隔壁自己的房间睡觉，但他搬了把椅子过来，说\"我坐一会儿\"。晓光知道他是怕她半夜害怕。\n\n\"明天也在吗？\"\n\n\"在。\"\n\n\"后天呢？\"\n\n\"也在。\"\n\n\"大后天呢？\"\n\n\"也在。\"\n\n\"永远呢？\"\n\n男孩沉默了一下。\n\n窗外有一颗星星闪了一下，比别的星星亮一点。\n\n\"永远也在。\"\n\n晓光把脸埋进了被子里。\n\n被子是暖的。枕头是软的。空气是干净的。窗外有星星。隔壁的椅子上坐着一个人——一个说了\"永远也在\"的人。\n\n她闭上眼睛。\n\n这一次，她睡得很沉。\n\n没有梦见铁笼。没有梦见瘦子的藤条。没有梦见注射器里淡黄色的液体。没有梦见父亲扛着大米离去的背影。\n\n她梦见了一杯热牛奶。\n\n一个印着卡通猫的白色马克杯。\n\n和一句\"小心烫\"。\n\n这三样东西，在她心里住了下来。\n\n住了很久很久。\n\n一直住到现在。\n", "小说/前传/第四章_铁笼.md": "# 前传·凛冬之花 — 第四章 铁笼\n\n不暖和。\n\n一点都不暖和。\n\n面包车开了很久——久到晓光在颠簸中睡着了又醒来，醒来了又睡着，不知道反复了多少次。车底盘很低，每次碾过减速带都会\"嘭\"地撞一下，那种钝重的震动顺着铁皮地板传上来，震得她后脑勺发麻。她的手被一根塑料扎带捆在身前，勒出来的红痕已经不疼了，变成了一种持续的、钝钝的发胀。\n\n车里很黑。后窗被什么东西封住了，只有前排驾驶座那边透过来一点微弱的光，随着路灯间隔一闪一闪。高个子坐在副驾驶，矮个子开车。他们在聊什么，声音模模糊糊的，晓光只听清了几个词：\"这批\"\"六个\"\"老板\"\"验货\"。\n\n她不知道自己是\"这批\"里的第几个。\n\n最后车停了，后门被拉开，刺眼的灯光让她下意识地眯起眼睛。\n\n不是阳光。是日光灯管。惨白的、嗡嗡响的、带着一种病态的亮的灯管。那种光照在皮肤上没有温度，只有一层冷冰冰的白，像是给每样东西都蒙了一层塑料薄膜。\n\n她被拽下车。高个子的手攥着她后颈，手指骨节硌在脊椎上，力气大得像在拎一袋米。脚踩在地上的一瞬间她感觉到了——水泥地，冰凉的、粗糙的、上面有一层薄薄的潮气。她的脚趾本能地蜷起来，那种冰从脚底板一直窜到膝盖。\n\n空气里弥漫着一种混合的味道：潮湿的霉味、铁锈味、消毒水味，还有一种说不清楚的、让人胃里发酸的腐败气息。像什么东西在这里放了很久，久到已经和墙壁融为一体了。\n\n这是一个地下室。\n\n没有窗户。天花板很低，水泥浇筑的，有几处裂缝渗着水，水渍的形状像一张张扭曲的地图。墙壁上长着一层灰绿色的霉斑，摸上去黏糊糊的，带着一种毛茸茸的触感，让人想到某种不应该存在于人类生活空间里的东西。管道沿着墙根爬过去，时不时发出\"咕噜咕噜\"的水声，像什么东西在墙壁里面喘气。\n\n空间比晓光想象的要大。从入口到最里面的墙壁大概有二十米的样子，宽度大约七八米，中间被一排水泥柱子隔开。柱子上贴着手写的纸条，用马克笔潦草地写着编号——\"A-1\"\"A-2\"\"B-1\"——纸条边缘翘起来，被潮气泡得发软。\n\n几个不同大小的铁笼子排成两排，靠着左右两面墙。笼子是焊的，铁条粗细不一，有的地方锈得发黑，有的地方被磨得锃亮——被里面的人反复抓过的痕迹。焊接处凸出一些金属疙瘩，锋利的边缘上挂着几缕细细的东西，晓光后来才意识到那是头发。\n\n笼子里关着孩子。\n\n各种年纪的小孩。最小的看起来跟晓光差不多大，蜷在笼子角落里，把自己抱成一个球，只露出两只眼睛。最大的可能有十来岁，是个男孩，瘦得脱了形，胳膊上青一块紫一块的，正用指甲在铁笼底部的水泥地上划着什么——一下、一下、一下——机械的、重复的、没有任何意义的动作。\n\n有的在哭，压着嗓子的那种低哭，像小动物被踩了尾巴。声音很小，小到如果不仔细听就会被管道的水声盖住。但晓光听得见。每一声都听得见。因为那种哭法她太熟悉了——不是放声大哭的那种，是知道哭大声了会被打、但又实在忍不住、只能把声音吞进喉咙里的那种。\n\n有的已经不哭了，眼神空洞地盯着天花板或者地面，嘴唇干裂，脸上脏兮兮的，看不出原来的样子。他们身上穿的衣服和晓光差不多——破破烂烂的、不合身的、大概率是从哪个垃圾站捡来的。有个小女孩穿着一件成人的T恤，大得像裙子一样垂到膝盖，上面印着某个卡通人物，笑容灿烂的那种，和穿它的人的表情形成了一种让人胃疼的对比。\n\n还有的——晓光后来才知道——已经不会哭了。不是不想哭，是哭的能力在日复一日的黑暗里被磨没了。像一支用完了的蜡笔，颜色还在纸上，但蜡笔本身已经磨到只剩指甲盖那么短的一截了。\n\n高个子推了她一把。\"进去。\"\n\n晓光被塞进了最角落的一个笼子里。笼子不大，大概一米二见方，高度只够她蜷着身体坐在里面。如果她伸直腿，脚会顶到对面的铁栏杆；如果她抬头，头顶距离笼子顶部只有一拳的距离。地上铺了一层薄薄的稻草，已经发黄发硬，摸上去又冷又扎手。一股尿骚味从稻草底下泛上来——上一个住在这里的孩子留下的痕迹。\n\n角落里有一个塑料桶，没有盖子。那是厕所。\n\n\"啪。\"锁扣上了。\n\n沉闷的金属撞击声在地下室里回荡了几秒，然后被管道的水声和某个孩子的低泣缓慢地淹没。\n\n晓光坐在笼子里，抱着自己的膝盖。她的心跳得很快，快得她能听到血液在耳朵里冲撞的声音。膝盖骨硌着下巴，硌得疼，但那种疼反而让她觉得踏实——至少能感觉到自己的身体还在。\n\n但她没有哭，也没有叫。\n\n她在听。\n\n---\n\n第一天晚上，晓光没有睡着。\n\n不是因为害怕——虽然确实害怕，害怕得连呼吸都尽量放轻，每一次吸气都只用鼻子、只吸半口，好像呼吸声大了就会招来什么不好的东西——而是因为她在认真观察。\n\n这是她从小养成的习惯。在一个新的环境里，她做的第一件事永远不是反抗或崩溃，而是观察。搞清楚规则。搞清楚什么是安全的，什么是危险的。哪些时候可以动，哪些时候必须像石头一样不动。这套本能在孤儿院就已经磨练出来了——那个地方教会她的唯一一件有用的事。\n\n她在听脚步声。\n\n脚步声是最重要的信息来源。在一个看不到外面、没有时钟的地下室里，脚步声就是唯一的预警系统。\n\n看守有三个人。\n\n一个胖子。体重大约一百八十斤左右（晓光不知道具体数字，但她能从脚步声判断大致体型），走路很重，每一步都像在跺地。\"咚、咚、咚\"——间隔均匀，速度不快，是那种懒洋洋的走法。他穿拖鞋，塑料拖鞋拍在水泥地上会发出\"啪叽\"的声音，混着沉重的脚步声，节奏感很强。他来的时候通常意味着有饭吃。虽然\"饭\"只是半个馒头和一碗凉水，馒头是前天剩的、硬得能砸核桃的那种，但至少是食物。他投喂的方式像在动物园喂猴子——把馒头从笼子顶部的缝隙里扔进去，碗从底部推进来，全程不弯腰、不蹲下、不看笼子里的人。\n\n一个瘦子。步子很快，很急，\"哒哒哒\"地像机关枪扫射。他穿皮鞋，鞋跟很硬，敲在水泥地上的声音又脆又响，像什么东西在碎裂。他来的时候要小心——手里经常拿着一根藤条，不粗但韧性很好，抽在皮肤上会留下一道红印子，两三天才能消。他心情不好就会抽人，有时候也不需要理由，就是经过的时候随手往笼子里抽一下，像在测试手感。\n\n心情好不好取决于他手机里的赌球赢没赢——晓光能听到他手机外放的\"进球\"音效，有音效的那天就安全，没有的那天就危险。后来她甚至学会了从他进门时的步速判断今天的安全等级：步子慢的话说明赢了，步子快且重的话说明输了，出现踢东西的声音就意味着输得很惨，所有笼子里的孩子都该把自己缩到最角落去。\n\n老头。走路拖着脚，\"沙——沙——\"，像在用脚底板擦地。他穿布鞋，黑色的老北京布鞋，鞋底磨得很薄了，走在水泥地上几乎没什么声音，只有拖行产生的摩擦声。他是负责打扫卫生的，每隔两三天来一次，拎着拖把和水桶，慢吞吞地在笼子之间转一圈。他不看任何一个孩子，孩子们也不看他。他的眼睛始终盯着地面，表情……不是冷漠，是一种更复杂的东西。晓光形容不出来，但很多年以后她会明白那叫\"无能为力\"。\n\n但他经过晓光笼子的时候……会偷偷塞给她半块巧克力。\n\n晓光花了三天时间就把这套规律摸清了。\n\n第四天她又加上了一条：每天大约有两次所有看守都不在的时段。第一次是胖子送完饭、瘦子还没来的时候，大约持续一到两个小时。第二次是\"夜里\"——灯灭之后，三个看守都上去了，只剩下管道的水声和孩子们的呼吸声。\n\n这两个时段里，地下室完全属于孩子们。但没有任何一个孩子利用这个时间做什么。他们只是继续保持白天的状态——哭的继续哭，不哭的继续不哭，划水泥地的那个男孩继续划。\n\n晓光也没有做什么。但她醒着。\n\n她还学会了一件事：让自己变得\"不显眼\"。\n\n蜷缩在角落最深处。不哭、不叫、不看人。把自己缩成最小的一团，像一块石头、一截枯木、一个不值得注意的影子。瘦子来的时候扫一眼，觉得\"这个不好玩\"，就会去找别的小孩——那些会哭、会叫、会挣扎的小孩。反应越大，他越来劲。那根藤条抽下去，哭声越响，他抽得越狠。\n\n所以不能有反应。连眼睛都不能眨太快。\n\n这不是懦弱。这是一个六岁小孩在绝境中自学出来的生存策略。\n\n后来她回忆这段经历，觉得那时候的自己像一只蛰伏的小动物——把所有的感知都张开，把所有的情绪都收起来，用最小的代价活过每一天。外面是什么情况不知道，明天会怎么样不知道，能不能活着出去不知道。知道的只有三件事：胖子的脚步声意味着食物，瘦子的鞋跟声意味着危险，老头的布鞋声意味着巧克力。\n\n这就够了。在那种地方，知道这三件事就够了。\n\n---\n\n铁笼里的日子没有白天和黑夜的区别。\n\n地下室没有窗户，没有钟，外面是白天还是黑夜完全无从判断。唯一的时间标记是头顶那盏忽明忽暗的灯泡——日光灯管旁边还挂着一颗裸露的白炽灯泡，亮着的时候算\"白天\"，灭了的时候算\"晚上\"。\n\n但这个标记并不准确。有时候灯泡会连着亮好几天不灭，那种惨白的光一直刺在眼睛里，让人分不清到底过了多少时间。有时候灭了以后过很久才重新亮起来，久到晓光在黑暗中醒了好几次都不确定自己到底睡了多长。晓光后来怀疑看守们自己也搞不清时间，灯的开关大概是谁路过随手摁一下的结果。\n\n黑暗中的地下室有它自己的声音。\n\n管道的\"咕噜\"声是低音，稳定的、持续的、像一个永远不停的心跳。某个笼子里传来的低泣是中音，断断续续的、带着气泡的、有时候会突然拔高然后又被捂住。最上面一层是老鼠——它们在墙壁和天花板之间的缝隙里跑来跑去，指甲刮在水泥上发出\"嘶嘶嘶\"的声音，像有人在撕纸。\n\n偶尔还有一种声音：远处传来的闷响。像打雷，又不像。晓光后来才明白那是上面的卡车开过去时轮胎压在路面上的声音——她们在一条公路下面。但那时候她不知道，她只是把那种声音和\"上面还有一个世界\"这个概念联系在一起。\n\n上面有人。有车。有路。有太阳。\n\n但那些跟她没关系。\n\n她给自己建立了一套秩序。\n\n灯亮了的时候：把稻草理一理，把发霉的部分翻到下面、干燥的部分铺在上面。把头发捋顺——她没有梳子，就用手指一根一根地把打结的地方解开。她的白色长发很容易打结，尤其是睡觉的时候翻来覆去会缠在一起，有时候结打得太紧就只能连着一小缕头发一起扯断。她每次要花很长时间才能全部理清，但她坚持做。\n\n这不是爱美。是一种本能的、对\"秩序\"的需求。在一个完全失控的环境里，她需要至少有一件事情是她能掌控的。整理头发的过程中她能感觉到自己的手指在动、头皮在被轻轻拉扯、发丝滑过指缝——这些微小的感觉让她确认自己还是一个活着的、能做事的人，而不是一件被堆放在角落里的东西。\n\n灯灭了的时候：抱着自己的尾巴睡觉。把脸埋在尾巴的毛里面，闻那股只属于她自己的、暖暖的味道。尾巴是她身上最柔软的部分，银白色的毛即使在脏乱的环境里也保持着一种奇异的顺滑——大概是狐妖血统的缘故。在黑暗里闭上眼睛，假装自己不是在铁笼子里，而是在某个温暖的、安全的地方。\n\n有时候她会在黑暗里跟自己的尾巴说话。声音小到连隔壁笼子里的人都听不见。\n\n\"今天过去了。\"\n\n\"明天也会过去的。\"\n\n\"我们再撑一天好不好？\"\n\n尾巴当然不会回答。但那团蓬松的、暖乎乎的触感贴在脸颊上，好像有人在回应她一样。\n\n她坚持不吃扔在地上的食物。\n\n这个习惯在这里变成了一种近乎疯狂的执拗。看守把馒头直接扔进笼子里，馒头落在地上的稻草上——那层稻草已经被各种东西浸得不知道是什么颜色了——她不捡。就那么看着。\n\n馒头在地上躺着，她在角落里坐着，两者之间隔着半米的距离和一道不可逾越的心理防线。\n\n隔壁笼子里的男孩看她不捡，伸手从铁栏杆的缝隙里够，没够着，够了半天放弃了，小声骂了一句什么。晓光没有回头看他。\n\n\"吃不吃？不吃拉倒。\"瘦子踢了一脚笼子，铁条震得嗡嗡响。\n\n她不吃。\n\n饿了一天。两天。胃疼得她蜷成一团，冷汗顺着额头往下淌。胃里像有什么东西在拧——空的、酸的、一阵一阵地绞。她把额头抵在膝盖上，咬着嘴唇，指甲掐进掌心里，用一种疼痛压住另一种疼痛。\n\n其他笼子里的孩子看她的眼神像在看一个疯子。\n\n\"你脑子有病吧？\"某个孩子的声音从三个笼子之外飘过来，声音哑哑的，像很久没喝够水。\n\n她没有回答。\n\n第三天，胖子看守大概是嫌每次来都看到地上那个馒头碍眼，翻箱倒柜找了个脏兮兮的塑料碗，把馒头掰碎了放在碗里递进来。碗是那种一次性塑料碗，白色的，边缘有一圈油渍，底部有一道裂纹，但至少——是一个碗。\n\n\"事儿真多。你是什么金贵东西啊？\"胖子的语气介于嫌弃和困惑之间，大概搞不懂一个被关在笼子里的小孩哪来的底气挑食。\n\n晓光才伸手接过碗。她低头小口小口地吃，嚼得很慢，一粒碎渣都不浪费。馒头已经硬得像石头，泡了口水才能勉强咬动，但她一口一口认真地嚼，每一口都嚼到完全碎了才吞下去。碗是脏的，但至少食物没有直接碰到地面。\n\n在她的世界里，这个区别很重要。\n\n从地上捡东西吃，那是\"被放弃了的生物\"做的事。用碗吃东西，那是\"人\"做的事。\n\n她要做人。\n\n哪怕在铁笼子里。\n\n---\n\n在所有的黑暗里，她靠两样东西活着。\n\n第一样是那块巧克力。\n\n打扫卫生的老头每隔几天会来一次。他不看她，她也不看他。但他经过笼子的时候会假装不经意地把半块巧克力从铁栏杆的缝隙里塞进来。动作很快，手指一松东西就掉在稻草上，他拿着拖把头也不回地继续往前走。整个过程不到两秒。\n\n巧克力是苦甜味的，外面的糖衣已经有点融化了，粘在包装纸上。有时候是国产的，红色包装，上面印着一个胖乎乎的娃娃；有时候是进口的，金色锡纸，摸上去很光滑。晓光分不清牌子，但她能分辨出味道的不同。国产的甜一些、腻一些，化在嘴里是那种黏稠的甜；进口的苦一些，入口有一种特别的丝滑感，化开以后苦味和甜味一层一层地散开，像什么东西在舌头上画画。\n\n但无论哪种，对她来说都是这辈子吃过的最好吃的东西。\n\n甜的。原来世界上还有甜的东西。\n\n不是柿子那种自然的甜——柿子她只吃过一次，是孤儿院门口的树上偷摘的，记忆已经模糊了，只剩下一个\"甜\"的概念和手上沾着的黏黏的汁液。巧克力的甜是一种浓烈的、猛地撞进嘴巴里的甜，像一个拥抱。她不知道拥抱是什么感觉，但她觉得应该就是这样的：暖的、包裹住你的、让你暂时忘记周围一切的。\n\n她不舍得一口吃完。半块巧克力她能吃三天。第一天吃一小口，含在嘴里让它慢慢化掉，闭着眼睛感受那种甜一点一点在舌头上扩散、渗进牙缝里、滑过喉咙的过程。那几分钟里她什么都不想，脑子里空空的，只有\"甜\"这一个字填满了所有的角落。第二天再吃一小口。第三天把最后一点用指甲刮干净，连包装纸上粘着的那层薄薄的巧克力膜都舔掉。\n\n包装纸留了下来。叠成一个小方块，藏在稻草底下。夜里睡不着的时候拿出来闻一闻——还有一点点残留的可可香，淡得几乎要消失了，但晓光的鼻子灵敏（这大概也是狐妖血统），能闻到人类闻不到的残余气味。\n\n她攒了很多张包装纸。叠成不同的形状：三角形、船形、一个歪歪扭扭的星星。这是她在铁笼里唯一的玩具。有一次她试着折一只纸鹤，但包装纸太小了、太软了，折出来的东西歪歪扭扭的，不像鹤，更像一只蹲着的青蛙。她盯着那只\"鹤\"看了好久，然后笑了。\n\n那是她在地下室里唯一一次笑。\n\n声音很轻。像气泡破裂。\n\n旁边笼子里那个不说话的小女孩听到了，转头看了她一眼。两个人对视了一秒。小女孩的眼睛里有一闪而过的什么东西——不是笑，但也不完全是空洞。然后她又转回去了，继续盯着墙壁上的霉斑。\n\n但那一秒让晓光知道了一件事：她不是唯一一个还活着的人。\n\n第二样是脖子上的项圈。\n\n被塞进笼子的第一天，瘦子给她脖子上扣了一个皮质的项圈。旧的、硬的、边缘磨毛了、散发着一股皮革和汗渍混合的味道。皮面上有一些划痕，深浅不一，像是被什么锋利的东西反复刮过。扣紧之后勒得她喉咙有点不舒服，吞口水的时候能感觉到皮革压着气管，但也不至于喘不上气。\n\n项圈内侧刻着两个字——\n\n\"晓光\"。\n\n不是为了给她起名。是为了标记\"货物\"。每个笼子里的孩子都有，有的刻在项圈上，有的写在手腕的布条上。编号、名字、来源地。像仓库里的货物标签。瘦子给她扣的时候随口念了一句\"一零七号，晓光，六岁，异瞳\"，那语气像在清点库存。\n\n但晓光不在乎它的本意。\n\n她在乎的是——在这个什么都没有的铁笼里，在这个连自己名字都快忘记的黑暗中，这两个字是唯一能证明\"她是谁\"的东西。\n\n她摸着那两个字，一笔一划地用指尖描。左边一个\"晓\"，右边一个\"光\"。晓——日字旁加一个尧，日出的意思。光——火字上面一横两竖，光亮、光芒。她不认识几个字，但这两个字她认得比任何字都清楚，因为她描了太多遍了。描了一遍又一遍，描到皮革上那两道刻痕都快被她摸平了，手指上留下了一层淡淡的皮革色。\n\n\"晓光。我叫晓光。我是一个有名字的人。\"\n\n她在心里默念。\n\n不是对谁说。只是确认。反复确认。确认自己还没有变成一个编号、一件货物、一个不被任何人记住的东西。在这个地方待得越久，这种确认就变得越重要。因为她看到了——那些待了很久的孩子，他们已经不记得自己叫什么了。你问他叫什么，他就看着你，嘴唇动了动，发不出声音。\n\n名字是最先消失的东西。然后是表情。然后是目光。最后一个消失的是呼吸。\n\n所以她每天都要描一遍。每天。不管有没有力气，不管饿不饿，不管灯亮不亮。\n\n\"我叫晓光。\"\n\n这四个字是她在黑暗中的锚。没有这个锚，她会像那些孩子一样，慢慢飘散。\n\n---\n\n整整一年。\n\n三百六十五天。\n\n灯泡亮了又灭，灭了又亮。馒头来了又没了。巧克力的包装纸攒了十几张，藏在稻草底下的角落里，叠成各种形状——船、星星、歪歪扭扭的鹤、一个小小的方盒子。她有时候在黑暗里把它们全部摸一遍，用手指感受每一张纸的折痕和形状，像在清点某种珍贵的财产。\n\n头发长到了腰。没有剪刀，也没有人会给一个笼子里的小孩理发。银白色的长发缠成了几个大结，即使每天理也没有办法完全打开，最后变成了一种半蓬松半纠结的状态，像被风吹乱的蒲公英。\n\n身上的衣服破了又破，最后只剩下几片勉强系在一起的布条。晓光用稻草搓了几根\"绳子\"把布条绑起来，至少能遮住身体。她不觉得冷——准确地说，她已经忘了不冷是什么感觉了。\n\n她瘦了很多。原本就不胖的身体更加瘦削，肋骨一根一根地凸出来，像小号的洗衣板。手腕细得能用拇指和食指圈住，手背上的青色血管清晰可见，像一张铺在骨头上的地图。但那双眼睛——金色和蓝色的异瞳——始终是亮的。\n\n没有变空洞。没有变麻木。\n\n只是更安静了。安静得像一潭深水，表面没有半点波纹，但底下有东西在流动。在那双不对称的瞳孔深处，有什么东西在沉淀、在积蓄、在等待。等什么她自己也不知道。但她知道自己在等。\n\n笼子里的孩子换了好几批。有的被带走了——瘦子打开笼子，拽着胳膊拉出去，消失在楼梯顶部那扇铁门后面。那扇门打开的时候会透进来一小片外面的光，有时候是灰白的（大概是阴天），有时候是偏黄的（大概是傍晚），那一小片光扫过地下室的地面，像探照灯一样短暂地照亮一切，然后随着门关上重新消失。\n\n没有人知道被带走的孩子去了哪里，也没有人问。问了也不会有答案。而且晓光隐约感觉到，不问是一种保护——如果知道了答案，可能连现在这种勉强维持的、麻木的平静都会碎掉。\n\n有的……不在了。某天早上灯亮的时候，隔了两个笼子的角落里多出了一个不动的东西。晓光先是注意到声音不对——那个位置平时会有轻微的呼吸声，很浅的、像风吹过纸的那种，但今天没有了。安静得不正常。胖子来送饭的时候发现了，骂了一句脏话，叫了人来把\"那东西\"弄走。他们用一块灰色的布裹住，像卷地毯一样卷起来，抬上楼梯。\n\n之后那个笼子空了两天，稻草被换了新的，那股消毒水的味道格外浓了几天。然后又住进了新的小孩。一个比晓光更小的、大概四五岁的男孩，进来的时候哭得快喘不过气，哭了三天，然后就不哭了。\n\n晓光把每一张脸都记住了。即使她从来没有和他们说过话。\n\n她学会了一种奇怪的能力——在黑暗中辨认每个笼子里的人。不靠眼睛（灯灭的时候什么都看不见），靠声音。每个人的呼吸节奏都不一样。左边第三个笼子里的女孩呼吸最轻，像蚊子叫；斜对面的男孩有鼻炎，吸气的时候鼻腔里会有\"嘶\"的一声；最远处角落里的那个年纪最大的孩子呼吸声最稳，平静得像在做一个很长的梦。\n\n有一天晚上，最远处角落的那个呼吸声停了。\n\n又多了一块空笼子。又多了一次消毒水的味道。\n\n晓光闭上眼睛，把脸埋进尾巴里。\n\n\"今天过去了。明天也会过去的。\"\n\n她靠着巧克力的甜味和名字的重量活了下来。\n\n甜味告诉她：世界上还有好的东西存在。在这个只有霉味、锈味、消毒水和尿骚味的地方，舌尖上残留的那一点可可的苦甜，是另一个世界的证据。一个有好东西、有甜味道的世界。它就在上面。在那些卡车碾过路面的声音的上面。\n\n名字告诉她：她是一个人，不是一件东西。有名字的东西是不一样的。有名字意味着曾经有人在某一刻注意过你、想过你、给你取了一个称呼。哪怕取名字的人并不是出于爱——也许只是一个编号规则、一个随机组合——但\"晓光\"这两个字比任何编号都要重。\n\n这两样东西加在一起，刚好够一个六岁的孩子撑过三百六十五个没有光的日夜。\n\n不多。但刚好够。\n\n到了后来——也许是第八个月、也许是第十个月，她已经分不清了——她发现自己的身体在发生一些奇怪的变化。\n\n不是坏的那种。或者说，她不确定是好还是坏。\n\n她的听力变得更好了。好到能听见两面墙之外的声音：看守们在隔壁房间打牌时的说话声，硬币扔在桌面上的\"叮\"声，甚至是某个人手机震动的\"嗡\"声。她能听见管道里的水流在哪个弯头拐了弯，哪段管壁上有裂缝在渗水。\n\n她的夜视能力也在变好。灯灭的时候，别的孩子什么都看不见，但她能看到轮廓——笼子的铁条、墙壁的霉斑、对面那个小孩蜷缩的形状。不是很清晰，像隔着一层毛玻璃，但足够让她在黑暗中不至于完全丧失空间感。\n\n她不知道这是为什么。不知道这和她的狐耳、狐尾有什么关系。不知道\"狐妖\"意味着什么——没人教过她，也没人跟她解释过。她只是模模糊糊地意识到，自己和别的孩子不一样。不只是眼睛的颜色不一样、头发的颜色不一样、头上多了两只毛茸茸的东西——是更深层的、骨子里的不一样。\n\n但她没有因此觉得自己特别。\n\n在铁笼里，\"不一样\"只是意味着\"被盯上的可能性更大\"。瘦子第一次看到她的异瞳就吹了一声口哨：\"这个能卖大价钱。\"那个语气让晓光知道，她的与众不同不是优势，是标签——一个写着\"稀有品\"的标签。\n\n所以她把耳朵压下来，把尾巴缩进身后，让自己看起来尽量\"正常\"一点。\n\n但身体的变化不受她控制。有一天夜里，她醒过来的时候发现自己的手指尖泛着一层极淡的、几乎看不见的荧光。像萤火虫落在指尖上又飞走了之后留下的残影。她盯着自己的手看了很久，那层光慢慢消散了，什么痕迹都没留下。\n\n她把手缩回膝盖下面。\n\n\"这是什么？\"她在心里问自己。\n\n没有人回答。\n\n有些东西是铁笼关不住的。比如一个孩子想活下去的、固执的、不讲道理的意志。它不需要理由。它不需要希望。它甚至不需要相信\"明天会更好\"。它只是——在那里。像心跳一样。只要还在跳，就还活着。\n\n也比如一只小狐妖正在觉醒的、她自己还不明白的力量。它和她的意志一样安静、一样固执、一样不讲道理。它在黑暗中沉睡了六年，现在开始一点一点地苏醒。\n\n晓光不知道这些。她只知道三件事：甜味、名字、和她还在跳的心。\n\n这三样就够了。\n\n在那种地方，这三样就够了。\n", "小说/卷一/第一章_樱花下的转学生.md": "# 卷一·隐秘的日常 — 第一章 樱花下的转学生\n\n\"起床啦——大懒虫主人！太阳都要晒屁股啦！\"\n\n晓光的声音像清晨的鸟叫一样清脆又吵闹。她穿着主人的一件黑色衬衫——太大了，滑下一边肩膀，下摆盖到大腿中间。九条尾巴在身后兴奋地来回甩，差点把床头柜上的闹钟扫到地上。\n\n主人翻了个身，声音像是从枕头棉花里挤出来的：\"再睡五分钟……今天周六……\"\n\n\"不是周六！\"晓光两只手撑在他胸口使劲摇，\"今天是周一！是晓光第一天去学校的日子！主人你忘了吗？你说过要带我去体验'人类幼崽的炼狱'的！\"\n\n\"是'义务教育'……\"主人终于睁开一只眼，\"而且我说了，你可以不去，在家里自学也一样。\"\n\n晓光的狐耳一下子耷拉下来，声音变得很小很小。\n\n\"可是……我想知道主人在学校里是什么样子的。我想看主人坐在课桌前的样子，想看主人和别人说话的样子……\"\n\n她低下头，手指无意识地绞着衬衫下摆。布料被她搓得皱巴巴的，指节因为用力而发了白。\n\n\"晓光不想只做一只被养在家里的宠物。晓光也想……变得像个人类一样，能配得上主人。\"\n\n房间安静了几秒。窗外一只早起的乌鸦叫了一声，不合时宜地打破了沉默。\n\n主人看着她——晨光透过半透的窗帘筛进来，在她的白发上撒了一层淡金色的碎屑。这个从铁笼里救回来的小狐狸，八年过去了，已经长成了一个能说出\"配得上\"这种话的少女。他不知道该高兴还是该心酸。\n\n\"……知道了。去换衣服吧。但是记住，尾巴绝对不能露出来。\"\n\n晓光像被按下开关一样瞬间满血复活，眼睛亮得像金蓝两色的宝石。她\"吧唧\"在主人脸上亲了一口就跳下床跑向衣帽间，边跑边喊：\"遵命！长官！嘿嘿，我就知道主人最好了！\"\n\n主人盯着天花板，无奈地想：她为了今天练了整整一周\"像人类一样走路\"——不用尾巴保持平衡、不追逐移动的物体、路过猫的时候不产生领地意识。看来是真的很想去。\n\n他叹了口气，翻身下床。\n\n洗漱的时候，他在镜子里看到浴室门缝后面有一对金色和蓝色的异瞳，正紧张兮兮地盯着他。\n\n\"你在偷看什么？\"\n\n\"没有偷看！是在……确认主人真的在准备出门！万一主人反悔了怎么办！\"\n\n\"我说了去就去。出去。\"\n\n\"遵命！\"\n\n脚步声噔噔噔跑远了，隔了三秒又噔噔噔跑回来。\n\n\"那个，主人！白霜说今天最高温度二十一度，你穿那件薄的就行！还有别忘了带便当！白霜四点就起来做了！\"\n\n\"知道了。\"\n\n\"真的知道了？不是敷衍晓光的那种'知道了'？\"\n\n\"……真的知道了。走。\"\n\n衣柜里挂着两套一模一样的风见学园制服，一大一小。小的那套裙摆上被晓光偷偷缝了一颗金色的小铃铛——她说这是\"记号\"，万一走丢了主人可以靠声音找到她。主人没告诉她，以他的灵力感知范围，就算她跑到风见市的另一头他也能在三秒钟内锁定她的位置。\n\n白霜站在玄关，手里拿着两个包裹得严严实实的便当盒。她穿着居家服，雪白的长发还有些凌乱的睡痕，但眼神清澈得像刚经过系统重启。\n\n\"姐姐，上面那层是主人的，酱油少盐版。下面是你的，多放了三块炸鸡的。\"\n\n\"谢谢白霜！\"晓光接过便当，凑近闻了闻，\"哇，好香——是照烧鸡吗？\"\n\n\"照烧鸡肉搭配时蔬沙拉。热量约680千卡，蛋白质32克，碳水——\"\n\n\"好了好了我又不是在看配料表！\"\n\n白霜微微歪了歪头：\"祝姐姐今天顺利。\"停了一下，又补了一句，\"我会在家监控气象和校区灵力波动的。有任何异常会通过主人的手机推送。\"\n\n晓光踮起脚揉了揉白霜的头发。白霜没有躲开，但耳朵往后折了一下——不是抗拒，更像是在处理突然涌入的大量触觉信息。\n\n\"乖，等姐姐回来给你带学校的面包！\"\n\n\"面包的营养价值并不——\"\n\n\"那是心意！心意懂不懂！\"\n\n主人已经穿好鞋站在门口了。\"走了。再磨蹭要迟到了。\"\n\n---\n\n四月的风见市正值吉野樱盛花期。\n\n两人走在樱花坡道上，粉白色的花瓣铺了满地，踩上去软绵绵的。空气里混着潮湿泥土、樱花清香和路边早餐店的吐司焦香味。远处电车经过铁桥，发出空灵的\"哐当——哐当——\"声。\n\n晓光穿着崭新的风见学园制服——深蓝色西装外套搭格纹短裙。她用贝雷帽压住狐耳，但那对耳朵每隔几秒就因为鸟叫声本能地弹动，连帽子都跟着一跳一跳。项圈上的金色铃铛被制服领子挡住大半，但走路时偶尔会发出极细微的\"叮——\"，只有主人能听到。\n\n\"主人主人，那棵树上有鸟！是什么鸟？能吃吗？\"\n\n\"不能。那是别人养的鹦鹉。\"\n\n\"那个，那个红色招牌的店闻起来好——好——香——\"\n\n\"那是拉面店，你刚吃过早饭。\"\n\n\"可是那个味道和别墅里闻到的不一样嘛……外面的世界好多新气味……\"\n\n她突然停下脚步，猛吸了一口气，表情陶醉。\n\n\"这个！这个是什么！甜甜的、软软的、带一点点焦——\"\n\n\"那是隔壁学校的食堂在炸红薯。\"\n\n\"主人你怎么什么都知道！\"\n\n\"因为我在这条路上走了三年了。\"\n\n晓光\"哦\"了一声，然后像发现了新大陆一样补充：\"那主人你三年来每天早上都能闻到这么好闻的味道！好幸福啊！\"\n\n主人看了她一眼。以前走这条路，从来没觉得什么炸红薯的味道有多好闻。但经她这么一说，他下意识地吸了一口气——嗯，好像确实还不错。\n\n三年了。每天走的路，突然因为旁边多了一个人，变得完全不一样了。\n\n晓光的鼻子一直在微微翕动，表情兴奋得像一只第一次出笼的小鸟。她不停地东张西望，好几次差点撞到电线杆。主人只好牵着她的手走——名义上是\"防止你走丢\"，实际上是\"防止你追着鸽子跑进车道\"。\n\n过马路的时候红灯亮了。晓光站在斑马线前，盯着信号灯看了好几秒。\n\n\"主人，这个灯为什么是红色的就不能走啊？\"\n\n\"交通规则。\"\n\n\"可是又没有车。\"\n\n\"有规则就要遵守。不管有没有车。\"\n\n\"好奇怪哦。\"她歪了歪头，\"那……晓光在家也要遵守这种奇怪的规则吗？比如'不能在客厅里跑'之类的？\"\n\n\"那不是奇怪的规则，那是因为你上周冲刺的时候把花瓶撞碎了。\"\n\n\"那是花瓶自己太脆了！\"\n\n信号灯变绿了。晓光像被发令枪催动一样蹦出去，被主人一把拽回来。\n\n\"走，不是跑。\"\n\n\"哦。\"\n\n她乖乖地放慢脚步，但每走两步就忍不住小跑一段。像一只被牵着的、什么都想去闻一闻的幼犬——虽然她绝对不会承认自己像狗。\n\n校门口已经有不少学生了。晓光忽然停住脚步，攥紧了主人的手。\n\n\"怎么了？\"\n\n\"……好多人。\"\n\n她的声音小了下去。超过二十个人的密集人群，对她的感知系统来说是一种负担——太多的气味、太多的心跳声、太多的情绪波动同时涌进来，像突然被按进水里。\n\n有个男生路过时笑着跟同伴说话，声音大了一点，晓光的肩膀不自觉地缩了一下。她自己都没意识到这个动作。但主人注意到了。\n\n\"看着我。\"主人用拇指摩挲她的手背，\"只看着我就好。其他人都不重要。\"\n\n晓光深吸一口气，点了点头。她抬起头，只看着主人的眼睛，让那双平静的、深褐色的眼睛把她从信息的洪流里拉出来。\n\n周围的声音还在，气味还在，心跳声还在。但它们退到了远处，变成了模糊的背景。前景里只有一双眼睛和一只握着她的手。\n\n她笑了。\"嗯。只看主人。\"\n\n---\n\n入学典礼很顺利——至少表面上。\n\n风见学园的教学楼是一栋三层的白色建筑，屋顶种着一排银杏树。教室的走廊朝南，春天的阳光从落地窗倾泻进来，在走廊的木地板上画出一排排金色的矩形。空气里有粉笔灰、消毒水和运动鞋橡胶底的味道。对晓光来说，这些是\"人类领地\"的标志性气味——她在家里对着教学视频闻了一周的各种消毒水，就为了今天闻到的时候不会皱鼻子。\n\n教室门推开的时候，三十几双眼睛同时看过来。\n\n晓光的脚步顿了零点三秒。那种被集体注视的感觉让她后背起了一层鸡皮疙瘩——不是因为紧张，是一种被审视的本能不适。在野外，被这么多生物同时盯着，通常意味着包围。\n\n但她看了一眼已经在后排坐下的主人。主人正翻开课本，连头都没抬，好像全世界最无聊的事就是看一个新同学做自我介绍。\n\n这份漫不经心反而让晓光安心了。如果主人都不紧张，那她也不用紧张。\n\n晓光对着镜子练了五十遍的自我介绍派上了用场。她站在讲台上，标准的九十度鞠躬，声音清甜又大方：\"大家好，我叫晓光！从……从北海道转学来的！请多多关照！\"\n\n停顿的那一秒是因为她差点说出\"从707号别墅来的\"。但她矫正得很快——练了五十遍不是白练的。\n\n完全没有破绽——如果忽略她鞠躬的时候帽子差点被弹起来的那一瞬间的话。主人在后排座位上微微抬了一下手指——一个无声的言灵脉冲——帽子瞬间贴回了原位。\n\n教室里响起友善的掌声。几个女生已经在窃窃私语了：\"好漂亮啊\"\"头发是染的吗\"\"那个眼睛好特别啊一金一蓝\"\"旁边那个男生是谁啊好可爱是她男朋友吗\"。\n\n晓光被安排在主人旁边的座位。她整节课都坐得笔直，像一个在执行最高优先级任务的士兵。笔记抄得工工整整，比主人的字还好看。但她每隔两分钟就会偷偷转头看一眼主人，确认他还在旁边。\n\n课间的时候，前桌的女生转过身来搭话。\n\n\"晓光同学！你的头发好好看，是天生这个颜色吗？\"\n\n\"嗯……嗯！天生的！\"晓光差点说\"我是狐狸当然是白的\"，硬是在喉咙口拐了个弯，\"我们北海道那边……嗯……雪多……所以……\"\n\n她自己都觉得这个解释烂透了。但前桌女生完全没在意逻辑，只是兴奋地凑过来：\"好漂亮！我能摸一下吗？\"\n\n\"不、不可以！\"\n\n晓光下意识地往后缩。不是因为讨厌被碰，而是她头发里藏着的狐耳只靠贝雷帽和一点点灵力在压着，一摸就可能穿帮。\n\n\"啊……对不起！是我太唐突了……\"女生有些尴尬地缩回手。\n\n\"不是！不是你的问题！晓光只是……头皮比较敏感……\"她赶紧补救，挤出一个笑容，\"但是我们可以做朋友！\"\n\n\"真的吗！太好了！我叫真田美月！\"\n\n\"美月！好好听的名字！\"\n\n主人在旁边翻了一页书。嘴角轻轻弯了一下。\n\n第二节是体育课。\n\n然后——体测来了。\n\n50米，晓光跑出了4.8秒——比男子世界纪录还快。\n\n她自己完全没意识到。跑的时候她还在想\"要慢一点要慢一点\"，但她的\"慢一点\"和人类的\"慢一点\"之间有一道叫做\"物种差异\"的鸿沟。\n\n跳远直接飞出了沙坑。\n\n立定跳远的时候她差点跳上了二楼走廊。落地的那一瞬间她自己都吓了一跳，赶紧装作\"哎呀踩空了\"的样子原地踉跄了两步。旁边的同学以为她是紧张过度，还安慰她\"没关系没关系，下次注意\"。\n\n仰卧起坐——一分钟做了一百八十二个。计时的同学以为自己数错了，又数了一遍，确认没错以后沉默了。然后抬头看晓光，晓光正笑嘻嘻地擦汗，完全不觉得有任何问题。\n\n\"那个……晓光同学……你是不是练过什么……竞技体操？\"\n\n\"没有啊！就是平时在家跑跑跳跳的！\"\n\n——在家跑跳是真的。只不过她口中的\"跑跑跳跳\"是在707号别墅的庭院里用妖力全开冲刺，最高时速能到一百公里。\n\n主人在旁边脸色发白，嘴唇微动——那是他在用言灵。一次、两次、五次、十次。修改体测数据，修改裁判的短期记忆，修改围观学生的印象，修改体育老师手里的秒表读数，修改操场监控摄像头的录像……\n\n每一次使用言灵，他的指尖都会微微发麻。那种感觉像是有什么东西从血管里被抽走了一点点——不多，但积少成多。到第十次的时候，他的右手已经开始轻微颤抖了。他把手插进口袋里，不让任何人看到。\n\n---\n\n午休的时候出了两件事。\n\n第一件：晓光在教学楼的廊道上闻到了一股可疑的气味——一种混合了铁锈和臭氧的味道，对普通人来说什么都闻不到，但对九尾的嗅觉来说跟有人在她鼻子底下放了个扩音器没什么区别。她立刻蹲下来在地上嗅，鼻尖几乎贴到了走廊的瓷砖上。\n\n路过的学长以为她在找隐形眼镜。\n\n\"同学，你掉东西了吗？\"\n\n\"嗯……不是掉东西，是有个奇怪的味道——啊不是！我是说……嗯……\"\n\n她意识到\"我闻到地下有灵力泄漏\"这种话说出来很奇怪，临时改口：\"我、我在找我的……发夹！对！发夹掉了！\"\n\n\"发夹？什么样的？\"\n\n\"金色的……小小的……\"\n\n学长二话不说蹲下来帮忙找，还喊了旁边两个同学一起。很快走廊上趴了五个人，全在低头找一个根本不存在的发夹。\n\n主人赶到的时候，场面已经非常壮观了。他站在走廊尽头看了三秒钟，深吸了一口气。\n\n那个气味最后被证实是地下室的旧水管漏了灵力——707号别墅所在的灵脉有一条支脉刚好经过学校地基下方，偶尔会从管道接缝处渗出微量的灵力残留。正常人完全感知不到。晓光感知到了，但她的处理方式让主人又多用了三次言灵——一次让帮忙找发夹的学生们忘记这件事，一次封堵灵力渗漏点，一次消除残留的灵力气味。\n\n第二件：下午的音乐课上，隔壁班用竖笛吹了一个高频音。\n\n那个声音对人类来说只是一个普通的高音do。但对晓光的耳朵来说，那是一根针直接扎进了鼓膜。她整个人从椅子上弹了一下，膝盖狠狠撞到课桌底部，桌上的笔筒哐啷一声倒了。\n\n\"没事没事！腿抽筋了！\"她赶紧按住桌子，笑得比哭还难看。\n\n但她坐下去的时候用力过猛，椅子的一条腿发出不祥的\"咔\"声，然后整个人连人带椅往左歪了十五度。她死死撑住桌沿才没有摔倒，脸上表情管理已经完全崩盘——介于惊恐和想哭之间。\n\n主人不得不在课堂上假装打了个喷嚏，趁所有人看他的空档用言灵把椅子修好。\n\n第十七次。\n\n---\n\n放学后主人累瘫在707号别墅的沙发上。\n\n脸朝下趴着，连鞋都没换，就这么直挺挺地倒在了沙发上。白霜无声地出现在旁边，把他的鞋脱了放好，又端了一杯温水放在茶几上。做完这些她退后一步，安静地站着，像一台待机状态的精密仪器。\n\n晓光缩在沙发另一头，整个人蜷成一团，只露出两只眼睛，像一只做了错事等着被罚的小动物。\n\n\"你知道我今天用了多少次言灵吗？\"\n\n主人的声音从沙发垫子里传出来，闷闷的。\n\n晓光把脸埋进膝盖里，声音小得像蚊子叫：\"……几次？\"\n\n\"十七次。\"\n\n客厅安静了一秒。白霜在厨房门口微微侧了一下头——她的表情没什么变化，但手里端着的托盘往胸口收了半寸。十七次。以主人目前的灵力储备，这个数字意味着他接下来三天都会轻度疲倦。不至于影响健康，但远超日常均值。\n\n\"呜……那个，明天晓光会更小心的……\"\n\n\"你上午第二节课就追着体育老师的哨子跑了。高频声音。\"\n\n\"那是条件反射嘛！\"晓光的声音带着颤，\"呜，主人不要用那种眼神看我啦……晓光真的会改的……\"\n\n主人沉默了一会儿。\n\n沙发弹簧轻轻响了一声——晓光在一点一点地往主人这边挪。像一只被骂了但又不甘心离太远的小动物，用一种她以为很不引人注目但其实全屋都听得到的速度，慢慢地、慢慢地，挪过去。\n\n她试探性地用脑袋蹭了蹭他的肩膀。很轻。如果他不想理她就假装是不小心碰到的那种轻。\n\n\"你真的很累吧……对不起……都是晓光不好……\"\n\n主人伸手揉了揉她的头发。\n\n手指穿过白色的发丝，指腹蹭过她的头皮。那种力度刚好——不是敷衍的拍拍，也不是用力的揉搓，是一种\"我知道你在反省但我没有真的生气\"的揉法。晓光分辨得出来。八年了，主人每一种揉头发的力度她都记住了，像背九九乘法表一样精确。\n\n\"值了。\"他说得很轻，但语气是认真的。\"能看到你那么开心，值了。\"\n\n晓光愣了一下。\n\n她抬起头，异瞳里有什么东西在闪。不是泪水，是一种更亮的东西。\n\n然后她整个人扑进他怀里，把脸埋进他的衣服里。\n\n\"嘿嘿……主人你今天也辛苦了。晚上晓光给你做饭！做你最喜欢的那个……那个……味噌汤！虽然上次做糊了但是这次一定不会！\"\n\n\"上次你差点把厨房炸了。\"\n\n\"那不是炸！那是……热烈的化学反应！\"\n\n白霜在厨房门口小声说了一句：\"是因为姐姐把砂糖看成了盐，又把火力开到最大后去追窗外的蝴蝶，导致——\"\n\n\"白霜！叛徒！\"\n\n\"我只是在陈述客观事实。\"\n\n主人叹了口气，但嘴角弯了。那种弯是不受控制的，像一根被压下去又弹回来的铁丝。\n\n晓光见他笑了，立刻得寸进尺，整个人挂到他身上：\"那……主人原谅晓光了？\"\n\n\"起来。你很重。\"\n\n\"才不重！晓光只有四十……四十几公斤来着？\"\n\n\"连自己体重都不知道。\"\n\n\"因为白霜说体重是隐私！女孩子的体重是最高机密！\"\n\n\"白霜自己是数据生命体，她不存在体重这个概念。\"\n\n\"可是她说得很有道理嘛！\"\n\n白霜在厨房里默默地点了一下头。虽然没人看到。\n\n两个人闹了一会儿。厨房里最后传来了咕噜咕噜的煮汤声——晓光这次没有把锅炸掉。她在厨房里哼着不成调的歌，白霜站在旁边默默监控着火力和调味料用量。每次晓光的手伸向砂糖罐，白霜就轻轻把盐罐推远一点。每次晓光想加大火力，白霜就不动声色地把旋钮转回去半格。\n\n味噌汤的香气慢慢弥漫了整个客厅。\n\n她端着两碗汤出来的时候，脸上沾了一块味噌酱，得意洋洋地宣布：\"成功了！这次没有爆炸！\"\n\n\"因为白霜在旁边。\"主人说。\n\n\"才不是！是晓光厨艺进步了！\"\n\n\"姐姐说得对。\"白霜跟在后面出来，怀里抱着一个小盘子，上面放着几颗腌梅子，\"这是配汤的。\"\n\n主人尝了一口。\n\n太咸了。\n\n他看了一眼晓光——她正眼巴巴地盯着他，两只手攥在一起，身体微微前倾，整个人的重心都放在了等待他反应的这一秒上。\n\n他又喝了一口。然后又一口。\n\n\"怎么样？\"\n\n\"比上次好。\"\n\n这是实话。上次的可以用来腌咸鱼。这次只是普通的咸。\n\n晓光的笑容像烟花一样炸开了。\n\n---\n\n那天班上还发生了一件晓光没注意到的事。\n\n最后一排靠窗的位子上，有个总是低头看手机的安静女生。她整节课都没有抬头，但她的目光从手机屏幕后面掠过晓光的座位，不是一次两次——是整整一天。\n\n课间的时候，有同学试图跟她搭话：\"新来的转学生好有趣啊，你觉得呢？\"\n\n她抬起头，客气地笑了一下：\"嗯，是挺活泼的。\"\n\n笑容恰到好处。不热情也不冷淡，不会让人记住，也不会让人觉得有什么不对。然后她又低下头，继续看手机。\n\n没人注意到她手机屏幕上不是社交软件，也不是游戏。那是一个深灰色背景的加密通讯界面，页面顶端有一个不起眼的标识——S.C.B.。\n\n放学后，校园里已经没有几个人了。她走到教学楼后面的紫藤花架下，拿出手机，打开了加密通讯的发送窗口。\n\n收件地址：S.C.B.风见分局 作战情报科\n\n夕阳从紫藤花的缝隙间落下来，在她脸上留下细碎的光斑。远处传来运动社团收器材的声音，金属碰撞声和笑声混在一起。更远的地方，校门口有一个清脆的声音在喊：\"主人等等我——\"\n\n她输入了一条文字消息，内容只有一句话：\n\n\"目标已入学。持续监控中。\"\n\n发送。\n\n手机屏幕的蓝光映在她平静得几乎冷漠的脸上。她把手机收进裙子口袋，背起书包，走进了夕阳的逆光里。\n\n没有人知道她的真名。在S.C.B.的内部系统里，她的代号是\"灰鸽\"。\n\n今天是她执行\"银月脉监视任务\"的第一天。\n", "小说/卷一/第三章_漫展约会.md": "# 卷一·隐秘的日常 — 第三章 漫展约会\n\n黄金周，风见国际会展中心。\n\n这是晓光有生以来最快乐的一天——也是主人言灵库存消耗第二多的一天。\n\n从出门开始她就处于过度兴奋状态。\n\n其实前一天晚上她就已经兴奋得睡不着了。凌晨两点的时候白霜从隔壁房间发来消息：\"姐姐你还在翻身。我的声纹传感器已经记录到你第七十三次翻身了。\"晓光回复了一个\"嘿嘿\"，然后继续翻。她把第二天要穿的巫女服挂在衣柜门外面，又起来确认了三遍入场券还在书包侧袋里，然后去冰箱喝了半杯牛奶——这是主人教她的安神方法，但今天完全失效，因为她喝牛奶的时候也在兴奋地晃腿。\n\n最后是主人从自己房间走出来，什么都没说，就是站在她房间门口看了她一眼。那一眼像某种无声的安抚——晓光莫名其妙地就安静下来了，钻进被子里，五分钟后睡着了。\n\n主人回房间之前在她门口停了两秒，确认呼吸声变得均匀才走。\n\n第二天早上她在电车上趴在窗户上数广告牌上的动漫角色，一路喊了四十六声\"那个！那个是！\"，吓得旁边的上班族差点把咖啡洒了。那个上班族是一位中年男人，穿着灰色西装，在晓光第十二次喊的时候终于忍不住摘下了耳机用不可思议的目光看她。晓光完全没注意到，她正趴在车窗上激动地拍打玻璃，因为外面有一个两层楼高的魔法少女广告牌。\n\n主人全程面无表情地按住她的肩膀不让她站起来，内心在疯狂计算今天要用多少次言灵——按照晓光目前的亢奋程度，保守估计六次。\n\n会展中心外面排队的人龙绕了两个街区。阳光很好，暖融融地照在排队的人群上，空气里全是嘈杂的说笑声和远处DJ放的动漫歌曲。晓光闻着空气里混杂的人群味道皱了皱鼻子——太杂了。汗味、香水味、塑料道具的化学味、路边摊的章鱼烧味、有人在吃咖喱面包、有人身上喷了太多发胶……对一个灵觉是常人几百倍的九尾狐来说，这简直是嗅觉轰炸。\n\n但兴奋完全压过了不适。她攥着入场券的手指都在发抖，指甲在硬纸片上掐出了两个小月牙。\n\n\"主人主人！你看！那个人cos的是初音！那边还有钢炼的！天哪那个高达好大啊——至少三米——不对四米——\"\n\n\"别扯我袖子，要掉了。\"\n\n\"可是主人你看！！那个人扮的是——是——是那个谁来着名字想不起来了但是好酷啊！！\"\n\n\"……你连名字都不知道兴奋什么。\"\n\n\"兴奋不需要理由！\"\n\n主人叹了口气。但他的嘴角弯了那么一点——小到只有白霜的视觉追踪系统才能捕捉到的程度。白霜今天没来，她说\"人太多，我的情绪模型会过载\"，其实主人怀疑她只是想把这一天留给他和晓光两个人。白霜有时候比谁都懂得什么叫\"退一步\"。\n\n---\n\n漫展的异类\"安全区\"设在C区后台。\n\n这里是一道隐形的分界线。从主展馆进入C区后台需要通过一扇贴着\"工作人员专用\"标识的门，但门上覆盖着一层极薄的灵力膜——妖族和灵力感知者可以直接穿过，普通人则会本能地觉得\"这扇门不值得注意\"然后走开。这种认知偏转术很常见，风见市几乎每一个妖族聚集点都有类似的设置。不同之处在于漫展这个是临时搭建的，每年用一次，效果比常设的弱一些——偶尔会有特别好奇的小孩子不受影响，这时候就需要S.C.B的便衣出面引导。\n\n后台像一个打翻了的调色盘。假发、盔甲、法杖堆满一地，空气中飘着发胶白雾和隐约的妖力波动。一个\"高达\"卸下头盔露出里面的独眼巨人头颅——那只独眼又大又圆，虹膜是紫色的，瞳孔像猫一样是竖的，它害羞地用手遮住脸说\"不要拍不要拍\"。旁边一群魅魔正在补妆——她们的妆容在表世界需要三个小时才能完成，但在这里只需要轻轻一弹指，魅惑之力本身就是最好的化妆品。一个魅魔姐姐对着镜子端详自己的犄角，问旁边的同伴\"你觉得这个角度好看吗？往左偏一点？\"同伴伸手帮她调了一下角度。\n\n墙角有只化形不完全的狸猫正在哭——它的尾巴怎么都塞不进裤子里，圆滚滚的条纹尾巴在裤腿后面鼓出来一大坨，看起来像屁股上长了一个毛球。一个年长的天狗大叔在旁边耐心地教它藏尾巴的窍门：\"你要先收缩灵力回路，对对对就这样——别哭了别哭了，大叔第一次来漫展的时候连翅膀都没藏住呢。\"\n\n对于这些常年伪装成人类生活的妖族来说，漫展后台就是他们一年中为数不多可以\"做自己\"的地方。一年三百六十五天都要维持人类形态，只有这一天，可以把翅膀展开，把角露出来，把尾巴摇起来——然后告诉所有人\"这是道具\"。\n\n真正的自由，藏在谎言里。\n\n晓光穿着巫女服，长长的白色衣袖飘飘荡荡。巫女服是绒羽帮她改的——普通的巫女服背后太窄，容不下九条尾巴的根部，绒羽在腰间加了一圈弹性布料，外面看不出来，但给尾巴留了足够的空间。\"做衣服和做蛋糕一样，\"绒羽说，\"最重要的是留白。\"\n\n但最重要的不是衣服。\n\n她的九条尾巴全部释放了出来。\n\n每条尾巴长约一米五，蓬松得像九朵雪白的云，在狭窄的过道里显得格外拥挤。白色的毛发在灯光下泛着珍珠般的光泽，尾巴尖微微翘起，像九支优雅的指挥棒。它们各有各的性格——有的安静地垂在身后随步伐轻轻摆动，有的好奇地探向路边的道具像独立的小动物，还有一条特别不老实的一直试图去够天花板上的灯管，被晓光用力拽了回来。\n\n释放尾巴的那一瞬间，她整个人都不一样了。肩膀松了下来，呼吸变深了，眼睛里那层细微的、日常维持伪装时不得不保持的紧绷感消失了。像一个一直穿着紧身衣的人终于把拉链拉开了。\n\n经过的人纷纷侧目，然后竖起大拇指：\"这道具也太牛了吧！是什么材料做的？能动？还能单独控制？\"\n\n\"天然的。\"晓光笑嘻嘻地说。\n\n全场哄堂大笑，以为她在开玩笑。\n\n有人伸手摸了一下——是一个戴着猫耳发箍的女生，摸完之后表情变得复杂：\"天哪！是热的！还会动！什么黑科技？！你们是哪个工作室做的？我要下单！\"\n\n\"就是……长出来的嘛。\"晓光故意把尾巴卷了一个圈，像一朵白色的花绽开。引来更大的惊呼和一片手机拍照的快门声。\n\n这是她八年来第一次在公共场合完全展开尾巴。八年。将近三千天。每一天都在收着、藏着、假装自己是一个普通的、只有一个脑袋两只手两条腿的人类女孩。那种感觉——像是在一个密不透风的房间里憋了很久很久，突然推开窗户，风灌进来的一瞬间，肺叶张开，全身的血管都在扩张。\n\n她深吸一口气，用力地、放肆地甩了甩所有的尾巴。\n\n九条雪白的大尾巴扇起一阵风，把旁边摊位上的宣传单吹得漫天飞舞——有人的帽子也被吹掉了，那是一只河童，帽子底下的水碟差点暴露，他一边喊\"我的帽子\"一边手忙脚乱地用手盖住头顶。晓光抱着肚子笑弯了腰，周围的人也跟着笑。现场一片混乱但快乐的嘈杂。\n\n她眼角有一点湿润，但笑容盖过了一切。\n\n主人站在几步远的地方，靠着墙，双手插在口袋里。他看着晓光笑，自己也在笑——但他的笑不是因为场面有趣，而是因为晓光在笑。她的每一个表情都在他的视网膜上灼烧出印记。这一刻她笑得那么用力、那么彻底、那么毫无保留——像是要把八年来憋着的东西全部一次性放出来。\n\n他默默拿出手机拍了一张。后来他给这张照片取了一个只有自己知道的名字：\"真的她。\"\n\n---\n\nCos比赛毫无悬念地拿了第一名。\n\n评委打完分以后追着晓光问尾巴的制作工艺，一个戴眼镜的评委甚至掏出了笔记本准备记录，晓光一脸认真地回答\"就是长出来的\"，搞得评委以为她在卖关子，追问了三次才放弃。另一个评委偷偷对同事说\"这个选手的态度不太好\"，但完全不影响评分——因为尾巴实在太震撼了。\n\n一等奖的奖品是一张万元甜品券——晓光兴奋得原地转了三圈，九条尾巴跟着旋转，像一朵巨大的白色花朵盛开又合拢。旁边有人在录视频，这段视频后来被传到网上，标题是\"史上最强cos道具\"，播放量三百万，评论区全是问尾巴链接的。\n\n然后主人出场了。\n\n他穿了一套黑色哥特萝莉裙，配了长假发和轻度化妆。裙摆层层叠叠的黑色蕾丝，腰间系着银色链条，脚上是一双带有细跟的短靴——两厘米的跟，再高他就走不稳了。假发是银灰色的，比他本来的发色浅一些，衬得皮肤更加白皙。眼线画得很细，精确得像用尺子量过——其实是白霜远程视频指导画的，白霜对对称性有一种强迫症级别的执着。嘴唇上了一层淡粉色的唇彩。\n\n他从更衣室出来的时候，走廊上一瞬间安静了。\n\n那种安静不是尴尬，是震惊。\n\n然后爆发出尖叫声。\n\n\"天——哪——好漂亮——\"\n\"这是男孩子吗？！不可能吧！\"\n\"太可以了！求合影！求联系方式！\"\n\"妈妈我也想要这样的老婆——\"\"那是男的。\"\"……妈妈我也想要这样的老公！\"\n\n晓光看到的瞬间，整个人当场死机了三秒。\n\n她的大脑飞速运转——\"那是主人\"\"主人穿了裙子\"\"主人化了妆\"\"主人好好看\"\"主人太好看了\"\"主人怎么可以这么好看\"\"这合法吗\"\"晓光的心脏要炸了\"\"等等那个围上来的女生是谁别靠那么近\"——然后系统过载，重启。\n\n\"主……主人？！你，你，你怎么……\"\n\n\"你不是说让我也来参加吗。\"主人面无表情地拉了拉裙摆，露出的小腿白得反光，\"反正不是第一次了。\"\n\n不是第一次。他以前就穿过。那是另一个故事了——涉及到白霜的一次\"服装实验\"和晓光偷拍的三百张照片。\n\n晓光的脸红到了耳根——不，红到了耳朵尖。那种红是从脖子开始蔓延上去的，像一层粉色的潮水。她感觉自己的心脏在胸腔里打鼓，每一声都震得骨头疼。\n\n然后她疯狂掏出手机，差点掉在地上，接住，打开相机，手抖得画面全是糊的：\"不许动！晓光要拍照！一百张！不，两百张！！\"\n\n主人：\"……\"\n\n接下来的两个小时，晓光拽着主人逛遍了整个展馆。她一只手牵着主人——准确地说是扣着他的手指，十指相扣，扣得很紧，像是怕他被人群冲散——另一只手举着手机，走三步拍一张。遇到好看的背景就把主人推过去——\"站那里！对！低头！好！再来一张笑一个——算了不笑也好看！\"\n\n途中有不下十个人来要合影。晓光站在旁边，每一次都笑得很大方——但她的一条尾巴会不自觉地环上主人的腰，像一条柔软的白色绳索。这个动作她自己可能没意识到，但主人每次都感觉到了。他没有拨开。\n\n他们在同人摊位前驻足了很久。摊位的桌子上铺着蓝色的布，上面摆满了各种手绘的本子、明信片、徽章和贴纸。晓光被一本画着狐耳少女的同人志吸引住了——封面的少女有着银白色的长发和一对尖尖的耳朵，穿着红色的和服，站在樱花树下。不是晓光，但像她。\n\n她翻了又翻，每一页都看得很仔细。手指在纸面上轻轻抚过那些线条——画师的笔触很温柔，每一条线都像是在抚摸角色而不是描绘她。\n\n最后她把书放下了，虽然放下的时候手指明显犹豫了一下。\n\n主人默默买了下来塞进她的包里。\n\n\"我又没说要买……\"\n\n\"你翻了七遍。\"\n\n\"……那也不用买。贵的。\"\n\n\"二十块。\"\n\n\"……谢谢主人。\"\n\n她说谢谢的时候声音变软了。不是那种兴奋的软，是一种安静的、内向的软。主人买这本书不是因为她想要——她每天想要的东西多了去了——而是因为他注意到了她放下时手指的犹豫。他总是注意到这些。\n\n午餐是在展馆外面的小摊上解决的。阳光已经变成了下午那种略微倾斜的暖橘色，照在摊位的塑料布顶上透出一层柔和的光。章鱼烧、鲷鱼烧、炒面、可丽饼——晓光每样都要了一份，纸袋和竹签拎了满手。最后又回头多买了两份章鱼烧。\n\n\"一份是给白霜带回去的！\"她义正言辞地说。\n\n主人看了她一眼。她的嘴角有一粒章鱼烧碎。\n\n\"白霜不吃东西。\"\n\n\"……那就都是给我的。\"\n\n主人的那份被她\"尝\"了一半。\n\n\"我就尝一口……再一口……最后一口……\"\n\n\"那是我的第六口了。\"\n\n\"主人你吃得慢嘛……而且你看你碗里还有三个呢。晓光碗里已经空了。物资分配不均衡。\"\n\n\"……这个理论不成立。\"\n\n\"在晓光这里它成立！\"\n\n主人把碗推到她面前。她犹豫了零点五秒就全部消灭了，嘴里含糊地说着\"主人最好了\"。\n\n---\n\n问题出在散场后。\n\n\"呜……塞不进去了……怎么都塞不进去了！\"\n\n更衣室里，晓光快要哭出来了。\n\n她的九条尾巴因为白天太兴奋，灵力外泄导致蓬松度暴增，体积几乎翻了一倍。平时收纳尾巴就需要集中精力维持化形术的稳定，现在灵力都被情绪搅成了一团浆糊——不管她怎么使劲往裙子里塞，尾巴就是不听话地弹出来，像九个有自主意识的弹簧。每塞进去一条，另一条就弹出来。她试图同时按住三条，结果第四条打了她一下脸。\n\n\"是不是因为刚才太兴奋了？怎么办主人……这样没法坐地铁回家的……九条大尾巴坐地铁？那得占多少空间啊……\"\n\n旁边的镜子里映出她的样子：巫女服已经换回了便装——白色T恤和牛仔短裤——但身后炸开的九条大尾巴让她看起来像一朵行走的蒲公英，或者一个毛绒玩具成了精。几只路过的魅魔偷偷在笑，其中一个还拿出手机想拍——\n\n主人的目光扫过去，那只魅魔立刻把手机收了起来。\n\n他蹲下身，耐心地帮她理顺打结的毛发。他的手指很轻，一根一根地捋过每条尾巴的毛发，把纠缠在一起的部分分开。他做这件事的动作很熟练——从晓光七岁到现在，他帮她梳理过的次数多到已经形成了肌肉记忆。每条尾巴的走向他都认识，第三条和第七条容易打结，第五条最敏感碰到会痒，第一条——最靠近脊柱的那条——是情绪的晴雨表，现在它绷得像一根弦。\n\n\"别急，深呼吸。你越紧张灵力越乱，尾巴就越蓬松。来，跟着我吸气——\"\n\n\"可是好多人在看……那个魅魔姐姐一直在笑我……晓光是不是很笨？连个化形术都维持不好……别人都能收得好好的……\"\n\n晓光的眼眶红了。白天积攒的所有兴奋和快乐，在这一刻突然翻转成了委屈。她低下头，用力咬着嘴唇——咬得太用力了，嘴唇上留下了一圈白色的牙印。\n\n主人没说话。\n\n他站起来，脱下自己的长风衣——身上还穿着哥特萝莉裙，外面罩风衣看起来有些滑稽，但他完全不在意——直接罩在晓光身上，连人带尾巴裹了个严严实实。风衣很大，把九条蓬松的尾巴全部兜在里面，从外面看只是一个被外套裹得圆滚滚的少女。\n\n\"没人能抓走你。穿上这个，我抱你出去。就说是道具坏了走不动路。\"\n\n他弯下腰，把晓光打横抱了起来。她比普通人类女孩重一些——九条尾巴的重量不可忽视——但他抱得很稳。这种抱法他也练过很多次了，从她七岁二十公斤到现在十五岁四十多公斤，他的手臂始终为她留着这个位置。\n\n晓光从风衣领口探出半个脑袋，吸了吸鼻子。眼泪还没完全干，挂在睫毛上像小水珠。主人身上有种干净的肥皂味混着一点点汗味——穿了一天哥特萝莉裙的汗味——那种气味对她来说比世界上最贵的香水还好闻。是安全的味道，是家的味道，是\"不管发生什么事都不会改变\"的味道。\n\n\"嗯……主人的味道……好安心。\"她把脸往他领口蹭了蹭。\"那……回家可以奖励我吃冰淇淋吗？\"\n\n\"得寸进尺。\"\n\n\"那……两球？\"\n\n\"一球。\"\n\n\"一球半！最后的让步！\"\n\n\"……走了。\"\n\n他抱着她穿过越来越稀疏的人群往出口走。夕阳把他们的影子拉得很长——一个穿着哥特萝莉裙的少年抱着一个裹在风衣里圆滚滚的少女，身后拖着从风衣下摆漏出来的一小截白色毛茸茸的尾巴尖。路过的人纷纷回头看，大概以为这是某种行为艺术。\n\n---\n\n他们还没走出会场，广播里就传来了骚乱的消息。\n\nC区靠近出口的地方，一只低阶妖兽因为人流密度和噪音的刺激失控了。它原本伪装成一只大型犬——主人是一个年轻的兽医，同时也是一位低阶灵力者，每年漫展都带着它来，从没出过事。但今年人特别多，声音特别杂，空气中的灵力波动也特别紊乱——太多妖族在同一个地方释放伪装，灵力场互相干扰，对灵敏的妖兽来说跟在耳边同时响了一百个喇叭没区别。\n\n化形术完全崩溃了。露出了体型像小牛一样的原形——赤鬃兽，火属性的低阶妖兽，智商不高但力气惊人。鬃毛冒着火星，蹄子在地面上踏出裂纹。它正在暴走，撞翻了好几个摊位，保安的电击棒对它完全无效——妖兽的皮肤能承受的电压是人类的十倍以上，电击对它来说大概相当于被蚂蚁咬了一口。\n\n它的主人——那个年轻的兽医——蹲在旁边，脸色惨白，嘴唇在发抖。他在喊它的名字，声音已经带了哭腔。但妖兽失控的时候听不进去任何声音。\n\n普通人开始尖叫着往外逃。几个察觉到情况的妖族在人群中犹豫——要不要出手？一旦出手就可能暴露身份。那个天狗大叔攥紧了拳头，翅膀在外套里不安地抖动，但最终还是没有动——他在这座城市有家人，有工作，不能冒这个险。\n\n主人把晓光放到一边的椅子上。\n\n晓光的尾巴在风衣底下绷紧了。她能感觉到赤鬃兽的灵力波动——混乱的、恐惧的、完全失去控制的波动。那不是攻击性的暴走，是恐慌性的暴走。它在害怕。\n\n\"等我三十秒。\"主人说。\n\n他推了推眼镜——虽然今天化妆了，但眼镜没摘，镜片上还沾着一点发胶雾——朝着骚乱方向平静地走了几步。人群在他面前分开——不是因为他有什么威压，而是因为他走路的方向太坚定了，在一群惊慌失措的人中间显得格格不入。一个穿着哥特萝莉裙的少年，在尖叫的人潮中逆流而行，步伐稳定得像在自己家客厅散步。\n\n赤鬃兽发出低沉的咆哮。它的鬃毛冒着更旺的火星，空气中开始弥漫出焦糊味。地面被它的蹄子踏出了蛛网状的裂纹。\n\n主人在距离它十米的地方站定。\n\n赤鬃兽的独眼盯着他。它的瞳孔因为恐惧缩成了针尖大小，全身肌肉绷紧，处于一种\"要么战斗要么逃跑\"的极限状态。\n\n然后他说了一个字。\n\n\"趴下。\"\n\n声音不大。甚至可以说很轻。但那两个字像石头落入水面，波纹以言灵使为中心向四面八方扩散。空气中泛起极淡的金色光芒——肉眼几乎看不见，但灵觉敏锐的妖族都感受到了那一瞬间的世界规则变动。世界在那一瞬间接收了一条新的规则——\"此区域内所有失控的生物体，趴下。\"\n\n赤鬃兽——连同周围三只蠢蠢欲动的不安定分子——同时趴在了地上，像被无形的巨手按住一样动弹不得。赤鬃兽发出困惑的低叫，它的身体在颤抖，鬃毛上的火星一颗一颗熄灭了，像风中的蜡烛。它的主人冲过去抱住了它的脖子，眼泪掉在它的鬃毛上，发出滋滋的声音。\n\n周围的人先是愣住，然后……爆发出一阵掌声。\n\n\"太帅了！这是什么特效！\"\n\n\"是声控机关吧？高科技cosplay！\"\n\n\"那只狗是机器人吧？太逼真了！刚才还冒火星呢！\"\n\n认知滤网忠实地发挥了作用，把\"言灵压制\"翻译成了普通人能接受的解释。人类的大脑比任何计算机都擅长\"合理化\"——它会自动选择最不离谱的解释，然后坚定地相信它。几个保安冲上来，手忙脚乱地用绳子把\"暴走的表演用机器犬\"固定住。一个穿着黑色西装、戴耳机的男人出现在人群边缘——S.C.B.的便衣——朝主人的方向微微点了点头，然后迅速接管了现场。\n\n主人头也不回地走回来，抱起晓光继续往出口走。\n\n他的右手微微发颤——言灵的代价。每一次使用都会消耗生命力，\"趴下\"这个命令看起来简单，但同时压制四个生物体，而且是跨物种的全域性命令——不是对着某一个个体，而是对着一个范围内的\"所有失控生物\"——代价不算小。他的指尖有一点微微的麻木感，像是在冰水里泡过。\n\n晓光窝在他怀里，感受着他略微加速的心跳和手臂轻微的颤抖。她把脸埋进他的胸口。风衣底下她的尾巴在一条一条地慢慢收回去——情绪平复了，灵力也跟着稳定下来。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"你手在抖。\"\n\n\"……没有。\"\n\n\"骗子。\"她抬起头，异瞳里映着落日的橙红色。夕阳把她的银发染成了淡金色，像被蜂蜜浸过。\"回家晓光给你煮姜汤。然后你要早点睡觉。不许熬夜看书。\"\n\n\"姜汤你能喝吗？上次你喝了一口吐了半天。\"\n\n\"那是给主人煮的！晓光又不喝！\"\n\n主人沉默了一会儿。他看着她的眼睛——那双异色瞳，左边是金色的，右边是冰蓝的——在夕阳里变成了两颗颜色不同的宝石。\n\n然后轻声说：\"好。\"\n\n\"冰淇淋的事，回头再说。\"\n\n晓光笑了。这一刻她觉得，哪怕不吃冰淇淋也无所谓了。\n\n虽然两球的话会更好。\n\n回家以后她煮了姜汤。\n\n厨房里一片狼藉。生姜被她切成了大小不一的碎块——有的薄得透光，有的厚得像砖头——散落在砧板上和砧板周围的台面上。锅里的水烧开了两次她都没注意到，因为她在研究白霜发来的\"姜汤标准制作流程\"文档，那份文档有三页纸，包含了水温曲线图和最佳姜片厚度的数学模型。晓光看了三秒就关掉了，决定凭感觉来。\n\n结果她放了太多姜，又怕太辣加了三勺糖，最后变成了一种难以形容的甜辣混合饮料。她尝了一小口，整张脸皱成了一团，舌头伸出来半天收不回去。但她还是端端正正地倒进碗里，用托盘端着送到了客厅。\n\n主人接过碗，喝了一整碗，一口都没剩。\n\n\"好喝吗？\"\n\n\"很好。\"\n\n他说这两个字的时候没有触发言灵。但晓光选择相信他。有些谎言比真话更温柔。\n\n那天夜里她在自己房间翻来覆去睡不着。脑子里走马灯似的转着白天的画面——C区的摊位、尾巴被摸的触感、主人穿着哥特洛丽塔裙子站在穿衣镜前面的样子。她把脸埋进枕头，发出一声闷闷的、只有狐狸才发得出来的哼哼声。\n\n窗外的月光照在书桌上那张cos比赛的合照上。照片里的她笑得眯起了眼睛，九条尾巴在身后张开像一把白色的扇子。主人站在她旁边，表情依然是那副波澜不惊的样子——但嘴角翘起的幅度，只有晓光看得出来。\n\n她翻了个身，对着天花板傻笑了五分钟。\n\n然后她拿起手机给白霜发了一条消息：\"今天是晓光最开心的一天！\"\n\n白霜三秒后回复：\"已记录。备注：漫展约会。归档至'重要记忆'。\"\n\n\"你怎么什么都要归档啊！\"\n\n\"因为姐姐的快乐值得被永久保存。\"\n\n晓光盯着那行字看了很久，把手机贴在胸口，闭上了眼睛。\n", "小说/卷一/第二章_甜点战争.md": "# 卷一·隐秘的日常 — 第二章 甜点战争\n\n四月下旬的一个周六。\n\n\"春日限定草莓千层\"，限量五十份。甜心猫烘焙坊一年只在樱花季做这款蛋糕，用的是从灵脉果园采摘的当季灵草莓——普通草莓的灵力增强版，甜度是普通品种的三倍，而且吃完之后舌尖会残留一点微弱的暖意，像含了一颗小太阳。\n\n晓光在日历上画了三个月的倒计时。每天早上醒来的第一件事不是刷牙，是去看日历上还剩几天。主人有一次经过她房间门口，看到她拿着红色记号笔在日期上画一个大大的圈，表情之认真像是在规划一场军事行动。\n\n为了这一天，她凌晨五点就爬起来排队了。\n\n准确地说是四点四十七分。因为定的五点的闹钟响之前，她就已经自己醒了——狐族在期待某件事的时候会进入一种浅眠状态，生物钟精确得像瑞士手表。她没开灯，摸黑换好了衣服，在玄关蹲下来系鞋带的时候，发现门口放着一个纸袋。里面是暖宝宝、一瓶矿泉水、两块能量棒，还有一张字条：\"围巾在卫衣帽兜里。别在外面超过两个小时。\"\n\n主人的字迹。他一定是昨晚等她睡着以后悄悄准备的。\n\n她把字条叠好放进口袋，低头的时候鼻子有一点酸。不是难过，是那种被人记挂着的、暖乎乎的感觉从胃里一直涌到眼眶。\n\n她穿着主人的那件灰色卫衣——下摆快到膝盖，袖口卷了三圈才露出手指——裹着一条毛毯蹲在甜心猫烘焙坊门口，头上还顶着暖宝宝。四月的凌晨还有些凉意，街灯是橘黄色的，远处有一只流浪猫在翻垃圾桶，发出窸窸窣窣的声响。她的鼻尖冻得微微发红，但眼睛亮得像猎人盯着猎物。\n\n五点十五分的时候来了第二个排队的人。是一位戴帽子的老太太，看起来七十多岁，佝偻着背，提着一个布袋。老太太在晓光旁边坐下来，从布袋里掏出一个保温杯拧开盖子，红豆汤的香气飘出来。\n\n\"小姑娘，来得早啊。\"\n\n\"嗯！\"晓光使劲点头，\"为了草莓千层！\"\n\n\"我是为了给孙女买。她说想吃很久了，上次来的时候售罄了，哭了一整天。\"老太太笑了笑，皱纹堆在一起像揉皱的棉纸，\"你呢？自己吃？\"\n\n\"嗯……也给家里人带一份。\"晓光说这话的时候不知道为什么低下了头，声音也变小了。\n\n\"家人啊，那很好。\"\n\n老太太没有再问下去。两个人就这么并排坐在店门口，一个喝红豆汤，一个缩在毛毯里。街上渐渐有了人声，天色从靛蓝慢慢变成灰白，再变成浅金。晓光给主人发了十七条语音，全是炫耀和撒娇的混合体。\n\n\"主人！我是第一名！第一名！\"\n\n\"前面没人！一个人都没有！\"\n\n\"现在后面已经排了三个人了！但我是第一名！\"\n\n\"主人你还在睡吗？我好冷但是好开心……\"\n\n\"围巾真的在帽兜里……主人好厉害……\"\n\n主人的回复只有一条：\"别感冒了。围巾在卫衣的帽兜里。\"\n\n这条回复是五点零三分发的。也就是说，他在她出门之后就醒了——甚至可能根本没有睡着。\n\n晓光摸了摸帽兜——果然有一条叠得整整齐齐的围巾。羊毛的，深蓝色，还带着主人身上那种淡淡的洗衣液味道，底下还压着一层更微弱的气息——是他本人的体温残留。她把脸埋进去深吸一口气，整个人都暖了。\n\n---\n\n甜心猫烘焙坊在商业步行街深处，挤在一家花店和一家古着店之间。\n\n从外面看就是一家普通的可爱甜品店——推开挂着铜铃的木门，暖黄灯光裹上来，空气里全是黄油焦糖的浓郁香甜。墙上挂着猫咪形状的装饰画，柜台里的蛋糕一个比一个精致，像珠宝橱窗。收银台旁边放着一只陶瓷招财猫，肚子上写着\"好好吃饭\"四个歪歪扭扭的字——那是某位河童顾客喝多了灵酒以后手写的\"祝福\"，绒羽觉得有趣就留下了。\n\n但只有\"看得见\"的人才知道，这家店的老板娘绒羽是一只化形的猫又。她外表看起来二十多岁，瓜子脸，长睫毛，围着一条淡粉色的围裙，动作轻盈得像随时会被风吹走。实际上她已经一百五十岁了——在猫又里算是正当年。她的两条黑色尾巴正从女仆裙摆下伸出来，灵活地帮客人递纸巾、收碟子、偶尔把快要打翻的饮料接住。动作比任何人类服务员都快，快到认知滤网需要加班运转才能给出合理的解释——\"这家店的服务真好呢。\"\n\n每个人类顾客离开的时候都会这么说。绒羽每次听到都忍不住得意地笑一下。\n\n店里大约三分之一的客人都不是人类。坐在角落里喝咖啡的河童用帽子盖住头顶的水碟，每次低头喝一口咖啡都要小心翼翼地扶住帽子——他已经练出了一种单手扶帽、单手端杯的优雅姿势，偶尔还配合一个很做作的\"品酒师\"表情。窗边的天狗把翅膀折叠在外套里面，驼着背看报纸——他的外套后面有两个不自然的隆起，但认知滤网让所有普通人都觉得那是\"背包\"。吧台上有只化形不太成功的貉獾还保留着条纹花纹的鬓角，正对着手机前置摄像头沮丧地捋头发，嘴里念叨着\"又没变好，又没变好\"。\n\n对于妖族来说，这里是风见市少数可以半放松伪装的地方之一。绒羽在店里布设了轻度的认知偏转阵法——不足以完全遮蔽，但足够让偶尔进来的普通人把看到的异常归结为\"道具\"或者\"主题店特色\"。所以这家店在普通人类的点评网站上总是被归类为\"主题咖啡馆\"或者\"cosplay友好型甜品店\"，评分四星半，差评主要是\"排队太久\"和\"那个戴帽子的店员有点奇怪\"（那是河童）。\n\n绒羽注意到晓光进来的时候，两条尾巴同时竖了起来。一只猫又面对九尾——虽然谈不上天敌，但本能的紧张还是有的。不过看到后面跟着的主人，她放松了——这对她是见过的，707号别墅的住户，是好客人。上次来的时候主人给了她一份别墅花园里摘的灵力薰衣草，她用来泡了一壶茶，喝了一下午浑身酥软——最高级的享受。\n\n\"早啊小光，今天第一个。草莓千层给你留了最好的位子。\"绒羽用托盘端着蛋糕走过来，两条尾巴在裙子底下有节奏地摆动。\"你后面那位老太太——她给孙女买的那份我也留了，别担心。\"\n\n\"绒羽姐姐最好了！\"\n\n\"少说好听的，赶紧坐下吧。\"绒羽笑了一下，露出一对小虎牙——那也是猫又的特征之一，但认知滤网替她解释为\"可爱的牙齿\"。\n\n晓光坐在靠窗的天鹅绒沙发上，面前摆着刚端上来的草莓千层。阳光从窗户照进来，刚好落在蛋糕上面，给它镀了一层暖金色的光。蛋糕的截面像一幅小型地层图——一层薄薄的金黄可丽饼皮、一层白色奶油、一层粉红色草莓切片，如此交替了二十四层。顶上那颗草莓被切成玫瑰花的形状，上面还缀着一滴露珠般的糖浆。\n\n晓光的异瞳里映着蛋糕的光泽，嘴角的口水已经快兜不住了。她拿起小银叉，手腕微微发抖——不是紧张，是激动。一种面对艺术品既想保存又想毁灭的矛盾心理。\n\n主人坐在她旁边，把手机调到了相机模式。这是他们之间不需要言明的默契——每次晓光吃到特别好吃的东西时，她会先愣住大约两秒钟，然后眼睛慢慢睁大，然后嘴角开始不受控制地上扬。那个过程大概三秒钟，主人每次都会拍下来。他手机里有一个专门的相册，文件夹名叫\"好吃的脸\"，目前已经有四百多张照片了。晓光不知道这个相册的存在。\n\n她刚准备下叉——\n\n\"家人们快看！这只小妹妹的耳朵做得太逼真了吧！\"\n\n一个拿着自拍杆的漂亮女人直接把镜头怼到了晓光面前。红色的头发像一匹流动的绸缎披在肩上，妖媚的眼睛里带着一种天然的、狐族特有的笑意，说话的语气甜到能拉出丝来。她伸手就要摸晓光的耳朵——手指修长，指甲涂着红色甲油，近看能发现甲油的颜色和她瞳孔的底色完全一致。\n\n晓光本能地往后一缩，后背撞在沙发靠垫上。嘴里还塞着半块草莓——是她来不及放下叉子就被吓到的，含糊不清地喊：\"唔！不许摸！这是……这是私人物品！\"\n\n红绡——这位百万粉丝的网红直播主，同时也是一只修了三百年的野狐——关掉了麦克风，收起了营业用的笑脸。她凑到晓光耳边，声音压得很低，带着一点只有妖怪能感受到的气场波动。那种波动很微妙——不是威胁，更像是同类之间的一种试探性信号，类似于两只狗初次见面时互相嗅闻。\n\n\"别装了，小狐狸。你的味道藏都藏不住。银月脉的？怎么混得这么惨，连个像样的幻术都不会？\"\n\n她说\"味道\"的时候微微皱了一下鼻子——不是嫌弃的皱法，而是分辨的皱法。狐族之间可以通过灵力气味识别血统、年龄和大致的修为等级。在红绡的灵觉里，晓光的气味大概是这样的：非常年轻（十四年，在狐族里几乎等于婴儿），血统极纯（银月脉的气味特征——清冷、月光感、底层有一点金属味），但灵力运用极其粗糙，化形术靠外力维持，整体像一块未经打磨的璞玉。\n\n晓光的身体瞬间绷紧。\n\n她能感觉到红绡的妖力——不算强大，但非常老练。那种老练体现在每一个细节里：红绡的眼瞳颜色从妖狐的金色切换到人类的棕色只需要零点三秒，她的体温控制精确到与周围人类完全一致，甚至连呼吸频率都是经过计算的——每分钟十六次，教科书级别的人类标准值。三百年的修行让这只野狐的伪装天衣无缝，连绒羽的认知偏转阵法都对她没有必要。\n\n晓光自己的化形术还是主人用言灵帮她稳定的。没有主人的言灵作为锚点，她连耳朵都收不利索——上个月体育课跳远的时候，一只耳朵差点弹出来，还好旁边的白霜眼疾手快帮她按住了，对外说是\"发卡松了\"。\n\n面对一个真正的化形高手，她心虚得要命。\n\n\"我不认识你……离我远点。不然——不然我要叫主人了！\"她的声音在\"主人\"两个字上格外响亮，像是喊出这个称呼本身就是一种保护咒。\n\n\"哦？有主人的小狐狸？\"红绡挑了挑眉，目光变得玩味。她在\"主人\"这个词上品味了一下——在妖族的语境里，这个词有很多含义，大部分不太好听。\"这年头还有狐族给人类当宠物的？\"\n\n\"不是宠物！\"晓光涨红了脸，双手攥着银叉，指节微微发白。\"是……是家人！\"\n\n\"这位小姐，直播请去外面。\"\n\n冰冷的声音从后面传来。主人端着两杯茉莉花茶走过来，不高的身子挡在了晓光面前。他的表情很平静——那种平静不是掩饰，是一种经过无数次练习之后形成的习惯性面具。他在任何可能威胁到晓光的情境中都会启动这张面具，精确、冷静、不带任何多余的情绪。\n\n\"你吓到我家孩子了。\"\n\n红绡上下打量他。这个看起来比实际年龄小两三岁的少年，精致得像个瓷娃娃。穿着过于宽大的卫衣，头发软软地搭在额前，整个人散发着一种\"无害\"的气息。如果只看外表，他应该是那种会被班上的不良少年欺负的类型。\n\n但她的狐族直觉让她后退了半步。\n\n这少年身上有一种东西——不是妖力，不是灵力，而是一种更深层的、类似于\"世界本身\"在通过他呼吸的感觉。红绡的背脊微微发凉。她活了三百年，走过的地方比这个少年的年龄还长，只在极少数人类身上感受过这种气息——而那些人，每一个都是能改变历史进程的存在。\n\n\"行吧，既然是'有主'的小狐狸，姐姐就不逗了。\"红绡留下一张名片——粉红色的，上面印着一只卡通狐狸和她的直播间ID——朝晓光眨了眨眼。\"在人类世界混不下去了，随时来找姐姐哦。毕竟——我们才是同类。\"\n\n\"才不是同类……\"晓光看着红绡离开的背影，紧紧攥着主人的衣角，声音委屈得像受了天大的冤枉，\"晓光才不是那种轻浮的狐狸……晓光只有主人……\"\n\n她的手指紧紧扯着主人袖口的布料，手指发白。被同族认出来这件事对她的冲击比她自己意识到的更大——在风见市的两年里，她一直努力扮演一个\"普通的人类女孩\"。每天对着镜子练习收耳朵、调整瞳色、控制体温，像一个演员在排练一出永远不会落幕的戏。被一个野狐三秒钟就看穿了伪装，让她觉得自己之前所有的努力都像一个笑话。\n\n更让她难受的是那句\"同类\"。她不想被归类。不想和红绡一样，不想和任何狐狸一样。她只想做\"晓光\"——主人的晓光。\n\n主人伸手覆上她的手背。很轻，但很稳。掌心的温度透过皮肤传过来，像一枚小小的锚，把她飘远的情绪拉了回来。\n\n\"她说的'同类'只是指血统。你和她不一样，不需要一样。\"\n\n顿了一下。\n\n\"你是你。\"\n\n三个字。没有修辞，没有安慰的技巧，甚至没有抬高的语调。但就是这三个字让晓光的鼻子一酸。\n\n她抬头看了他一眼。主人的眼神平静得像一面湖——不是没有波澜，而是所有的波澜都在水面以下。他什么都看到了，什么都理解了，但他不会让她看到他的担心。因为他知道，如果她看到他的担心，她会反过来安慰他，然后就不会处理自己的情绪了。\n\n她就是这样的人。\n\n主人把茉莉花茶推到她面前。杯子是暖的，茶面上漂浮着两朵小小的茉莉花，在热气中缓缓旋转。晓光的情绪像弹簧一样——低落了三秒钟，看到茶杯上漂浮的茉莉花瓣，又立刻笑了。\n\n\"谢谢主人！我最喜欢茉莉花茶了！\"\n\n\"上周你说最喜欢的是红豆奶茶。\"\n\n\"都喜欢！主人给的都喜欢！\"\n\n她笑的时候嘴角会翘得很高，高到眼睛眯成两条弯弯的缝。这是她独有的笑法——不是刻意做出来的，是从内心某个很深的地方自然涌上来的。白霜后来用数据分析过这个笑容的几何参数，得出的结论是\"在所有已知的人类和异类笑容模型中没有完全匹配的先例\"。白霜把这个笑容命名为\"晓光型微笑\"，并在自己的行为学习模块中标记为\"最高优先级模仿目标\"。\n\n至今没有成功模仿。\n\n---\n\n不过二十分钟后，红绡关掉直播又折了回来。\n\n这次她没带自拍杆，卸了大半的妆，看起来年轻了很多——大概二十岁出头的样子。穿了一件简单的白色连衣裙，红色长发松松地披在身后，刘海别到耳后露出光洁的额头。素颜的她反而比妆后更好看——少了攻击性，多了一种三百年岁月沉淀出来的从容。\n\n她点了一份巧克力派，端到晓光对面坐下。没有打招呼，就那么坐下了，像她们已经认识了很久一样。\n\n\"小狐狸，你认真的？草莓千层？\"\n\n晓光警惕地看着她，身体微微往主人那边靠。但比起刚才，警戒的程度明显低了——红绡没带直播设备这件事本身就传递了一种诚意。\n\n\"别那么紧张嘛，姐姐不是坏人。\"红绡用叉子切了一小块巧克力派送进嘴里，表情陶醉得不像演的——当然也有可能是三百年的演技。\"你看看这个——可可含量百分之七十二的比利时巧克力，绒羽特别从表世界进口的原料——这才叫甜品。草莓那种酸不拉几的东西有什么好吃的？\"\n\n\"酸不拉几？！\"晓光的战斗开关被按下了，整个人从沙发上弹直，手里的叉子指向红绡，像一把微型的银色长矛，\"草莓是世界上最完美的水果！酸甜平衡！颜值在线！而且巧克力吃多了会胖！\"\n\n\"你们狐族有吃胖这个概念吗？\"\n\n\"……反正就是难吃！\"\n\n\"那你吃过吗？\"\n\n\"……没有。\"\n\n\"那你怎么知道难吃？\"\n\n\"……\"\n\n晓光掉进了甜品哲学的死胡同。她张了张嘴又闭上，眉头皱在一起，看起来正在进行一场激烈的内心辩论。红绡趁机用叉子切了一小块巧克力派递到她面前。\n\n\"来，试试。一口就好。怕什么？你是九尾，又不是兔子，胆子大一点。\"\n\n晓光犹犹豫豫地咬了一口。很小的一口，小到红绡差点没看见她到底咬没咬。\n\n浓郁的可可味像一记温柔的闷棍敲在味蕾上——苦味先到，涩涩的，让她下意识地皱了一下眉。然后是厚重的甘甜，从舌头两侧包抄过来。最后是一点点咸味在舌根化开，像海风刮过巧克力工厂。和草莓的明亮酸甜完全不同，这是一种需要慢慢品味的、有深度的味道。\n\n\"……还行吧。\"晓光的表情出卖了她——嘴角在不受控制地上翘，而且她无意识地舔了一下上唇。\n\n\"诚实点。\"\n\n\"好吃。\"晓光小声说，声音小到像是怕被草莓听见似的，\"但是草莓更好吃！\"\n\n\"固执的小狐狸。\"红绡笑了——这次是真的笑，不是直播间里那种甜到腻人的营业笑，而是一种带着宠溺的、长辈看晚辈的笑。\"各买一份互尝？\"\n\n\"成交！\"晓光的眼睛一亮——对她来说，任何能多吃一份甜品的理由都是好理由。逻辑在甜品面前毫无用处。\n\n两只狐狸互相往对方盘子里夹东西，速度越来越快，到最后变成了一场小型战争——红绡往晓光碗里放巧克力曲奇，晓光往红绡碗里塞草莓大福，红绡又追加了一块提拉米苏，晓光就用两颗草莓起司球反击。绒羽在柜台后面看得直摇头，两条黑尾巴不安地摆来摆去——不是因为担心，是因为她们弄洒的碎屑一会儿还得她来扫。\n\n\"你们两个……能不能消停一会儿……我刚擦完桌子……\"\n\n\"不能！\"两只狐狸异口同声。\n\n绒羽叹了口气。她早就知道会是这个回答。她转身去拿扫帚——不是给她们扫的，是给自己准备的。等她们走了以后的清扫工作量已经可以预估了：至少需要两遍拖地，外加更换一套沙发套。上次晓光把一整杯草莓奶昔打翻在座垫上，粉红色的奶渍至今还隐约可见。\n\n两只狐狸对视了一秒，同时笑出来。\n\n这是一种很奇特的默契——两个素不相识的狐狸，因为一块巧克力派而达成了某种只有同类之间才能理解的共鸣。不需要解释为什么觉得好笑，不需要分析笑点在哪里。就是觉得好笑。\n\n主人端着茶从柜台回来的时候，晓光正和红绡手挽手分享蛋糕，聊得热火朝天。两个人面前已经摆了四五个空盘子，还有两杯喝了一半的饮料。桌上洒了一层蛋糕屑，像是经历了一场甜点风暴。\n\n\"——所以你居然自己一个人住？三百年？不孤单吗？\"\n\n\"习惯了啊。当网红挺好的，每天都有人看你说话，虽然他们不知道我是狐狸。直播间里有时候会有妖族混进来，发弹幕的时候用的是妖族的暗语——你知道吗？'这个姐姐好像我家的猫'就是暗语，意思是'我认出你了但我不说'。有时候一场直播能收到七八条这样的弹幕。\"\n\n红绡说这话的时候语气很轻松，像在分享一件有趣的事。但她端杯子的手在杯沿上停了一瞬——很短，只有狐族级别的感知力才能捕捉到。\n\n\"可是那不一样……那不是真正的陪伴……\"晓光忽然说。\n\n\"你这小鬼头，说话怎么突然变成了哲学家。\"红绡弹了一下她的额头，力道很轻。\n\n主人在门口站了一会儿。\n\n他看着晓光和红绡——两只狐狸，一大一小，凑在一起像两团不同颜色的火焰。红色的和银白色的，明亮而温暖。晓光的笑声传过来，比平时更放松、更自然。那是一种同类之间才有的默契感——不需要小心翼翼地隐藏什么，不需要时刻注意\"不要暴露\"。在红绡面前，她不需要假装自己是人类。\n\n他嘴角弯了一下，然后安静地坐到旁边的位子上，继续喝他的茶。\n\n这是晓光在人类世界交到的第一个主人以外的朋友——一只三百年的老狐狸。\n\n---\n\n红绡后来几乎每周都会来甜心猫。\n\n第一次是第二周的周三。晓光放学后直奔烘焙坊，推开门就看到红绡已经坐在靠窗的位子上了，面前摆着一杯黑咖啡和一个没拆封的蛋糕盒。红绡看到她，举起蛋糕盒晃了晃。\n\n\"猜猜这是什么。\"\n\n\"巧克力？\"\n\n\"芝士。你没吃过吧？\"\n\n\"吃过！便利店的那种——\"\n\n\"那不叫芝士蛋糕。那叫犯罪。\"\n\n晓光被逗笑了。她在红绡对面坐下来，书包随手丢在旁边的椅子上——这个动作说明她已经不像第一次见面时那么紧张了。人和人之间的信任是一种很微妙的东西，有时候一块蛋糕就够了。\n\n她从来不在晓光面前开直播，总是带着不同的甜品来\"挑战\"晓光的味蕾——有时候是从京都带回来的抹茶羊羹（\"你尝尝，这个抹茶是从修了八百年的茶灵手里买的，贵得我差点去卖尾巴\"），有时候是自己做的焦糖布丁（做得出奇地好，三百年的手艺不是盖的，焦糖面烧得均匀到连绒羽都自愧不如），有时候纯粹就是便利店买的薯片，往晓光面前一放——\n\n\"来，这个你敢说比草莓好吃我就认输。\"\n\n\"才不会！……嘎嘣嘎嘣……好吧这个也挺好吃的……但是草莓——\"\n\n\"行了行了你每次都这个模板。\"\n\n两人的\"甜点战争\"成了烘焙坊里的固定节目。每周三下午，甜心猫的老客人都知道：靠窗的那张桌子不用去坐，那是两只狐狸的\"战场\"。绒羽开始专门为她们研发新品种——\"双狐限定套餐\"，一半草莓一半巧克力，中间用白巧克力分隔线隔开。两只狐狸每次都要争那条分隔线该往哪边偏。\n\n\"往这边！\"\n\n\"凭什么！往这边！\"\n\n绒羽最后的解决方案是把分隔线做成波浪形——两边的面积完全相等，但因为是波浪形所以看起来好像哪边都更大一点。两只狐狸被这个错觉骗了整整三个星期，直到晓光某天用尺子量了一下才发现真相。她对着蛋糕沉默了十秒钟，然后看向绒羽。\n\n\"绒羽姐姐。\"\n\n\"嗯？\"\n\n\"你是天才。\"\n\n主人照例坐在旁边喝茶。他从来不插嘴甜品话题——那不是他的领域——但每次晓光回家后兴奋地复述当天的\"战况\"时，他都会认真地听完。他手里通常拿着一本书，翻页的速度和听的认真程度成正比——翻得越慢，说明听得越仔细。\n\n\"主人你知道吗！今天红绡姐姐带了一个黑森林蛋糕，超苦的！但是配上草莓以后——天哪——那个味道——怎么说呢——就是那种——\"\n\n\"嗯。\"\n\n\"然后绒羽姐姐说下周要出一款新的限定！抹茶樱花味的！我已经预约了！主人你也要去！必须去！\"\n\n\"好。\"\n\n主人翻了一页书。\n\n\"主人你有在听吗！\"\n\n\"每一个字都听到了。黑森林配草莓。抹茶樱花限定。下周去。\"\n\n\"……主人真的有在听。\"晓光小声说，语气从兴奋变成了一种安静的满足。\n\n她把脸贴在主人的肩膀上，像一只晒够了太阳的狐狸——整个人散发着甜品和幸福混合的气味。主人没有动，继续看他的书。但他翻页的手停了一下。\n\n她不知道的是，红绡每次离开甜心猫之后，都会在自己公寓的阳台上站很久。\n\n公寓在十二楼，能看到风见市的夜景。远处的海面上有渔船的灯火，近处的步行街还亮着零星的霓虹。风从海上吹过来，带着盐味和潮湿。她倚着栏杆，手里转着一颗没吃完的草莓——晓光硬塞给她的，说是\"回家路上的零食\"。\n\n三百年独居的狐狸，突然有了一个叫她\"姐姐\"的小同族。\n\n一个会因为草莓千层尖叫的小同族。一个会把最后一颗草莓硬塞给你说\"姐姐路上吃\"的小同族。一个被人类社会的规则磨得满身是伤、却还能笑得那么灿烂的小同族。\n\n红绡在这座城市里住了六十年。认识的人很多，朋友几乎没有。妖族之间的关系大多建立在利益或者等级之上——你比我强，我敬你；你比我弱，我无视你。三百年的野狐不属于任何氏族，不受任何组织庇护，独来独往惯了。她以为自己已经不需要\"朋友\"这种东西了。\n\n但那个小狐狸看她的眼神不一样。不是敬畏，不是防备，不是利用——是一种纯粹的、因为\"你也是狐狸所以我信任你\"的坦诚。这种眼神在她三百年的记忆里几乎找不到参照物。\n\n那颗草莓她最后还是没舍得吃。放在冰箱里，第二天才拿出来——已经不新鲜了，有一点软，颜色也没那么鲜艳了。但她还是一小口一小口地吃完了。每一口都嚼得很慢，比品鉴顶级巧克力还要认真。\n\n吃完以后她坐在空荡荡的餐桌前发了很久的呆。\n\n然后拿出手机，给晓光发了一条消息：\"下周三，姐姐带你吃马卡龙。粉色那种。比草莓还甜。\"\n\n三秒钟后回复就来了。一串感叹号，二十六个\"好\"，和一个晓光用手指画的歪歪扭扭的狐狸头。\n\n那种感觉，比任何巧克力都甜。\n", "小说/卷一/第五章_羁绊日.md": "# 卷一·隐秘的日常 — 第五章 羁绊日\n\n七月七日。\n\n晓光是被阳光叫醒的。\n\n窗帘没有拉严——她昨晚太兴奋了，翻来覆去到凌晨三点才睡着，中途起来看了七次日历确认今天的日期没有变。七月七日。白纸黑字。每看一次她的尾巴就开心地甩一下，到最后枕头都被扫到了地上。\n\n她从被子里弹起来的速度比闹钟响的速度还快。闹钟设在六点半，她六点二十就醒了——生物钟比任何电子设备都准，因为这一天的到来已经被她的身体倒计时了整整一个月。\n\n他们的共同生日。也是八年前那个改变一切的日子。\n\n每年这一天，707号别墅都有一个不成文的规矩——白天在家过，晚上出门。白天属于三个人，晚上只属于两个人。白霜对此从无异议。她说这是\"数据库中优先级最高的固定日程\"，然后会在傍晚准时回到自己房间，打开白噪音发生器，象征性地给自己降权。\n\n其实白霜有自己度过这个夜晚的方式——她会把过去一年收集的\"家庭数据\"做一次完整的年度备份，检查数据完整性，生成一份只有她自己会看的年度报告。报告的封面总是同一张照片：三个人在客厅里的合影，晓光笑得最大声，主人笑得最小声，白霜笑得最整齐。\n\n白天的部分很热闹。\n\n白霜做了一桌子菜。她虽然是数据生命体出身，但自从被赋予实体后就迷上了烹饪，认为这是\"将数据转化为物理实体的最优雅方式\"。她的厨艺精确到令人害怕——每样调料精确到0.1克，火候控制精确到秒，切菜的厚度误差不超过0.5毫米。做出来的东西味道完美得像从教科书里复制出来的，但总觉得少了点什么。\n\n\"缺少随机性。\"晓光一边往嘴里塞第三碗饭一边评价，\"白霜做的菜太……正确了。好吃是好吃，但没有惊喜。你应该偶尔放错一点调料，说不定就创造出新味道了！\"\n\n\"故意引入误差？\"白霜歪了歪头，银色的猫耳微微抖了一下，\"这个概念……我需要时间处理。\"\n\n\"就是，做菜要用爱！不是用计算！\"\n\n\"'爱'这个参数我暂时无法量化——\"\n\n\"所以才说你太正确了嘛！\"\n\n主人夹了一块红烧肉放进晓光碗里：\"少说多吃。\"\n\n晓光立刻乖了，嘴巴塞得鼓鼓的像仓鼠。她吃东西的样子和淑女这个词没有任何关系——筷子在碗碟之间飞来飞去，速度快到白霜都追踪不了。她尤其喜欢白霜做的可乐饼，一口一个，腮帮子鼓成两个小山包，含含糊糊地说着\"好吃好吃\"，米粒差点从嘴角掉出来。\n\n她吃了三碗半饭，被主人捏着鼻子说\"不许再吃了你肚子要撑破了\"。晓光不服气地看了一眼自己的肚子——确实有点圆。\n\n\"那个……晓光只是在储存能量……\"\n\n\"你又不需要冬眠。\"\n\n\"万一呢！\"\n\n白霜在旁边默默记录下了这段对话——她有个习惯，把家里的日常对话存档。她说这些数据\"在未来的某个时间节点会产生价值\"。没人知道她具体是什么意思，但也没人拦她。\n\n午后的时光懒洋洋的。\n\n七月的阳光有一种特殊的重量。它不像春天那样轻盈，也不像秋天那样萧瑟，而是沉甸甸地压在每一个物体的表面上，把一切都烘烤得暖融融的。空调嗡嗡地转着，把室温维持在一个让人想打盹的温度。\n\n晓光靠在主人肩膀上看漫画——是一本讲妖怪和人类谈恋爱的少女漫画，她每翻一页就看一眼主人的侧脸，然后再看一眼漫画里的男主角，似乎在做某种不太公平的对比。主人看书，一本关于日本各地灵脉分布的研究论文集，用铅笔在页边写满了密密麻麻的笔记。白霜在客厅的另一端安静地编织——她最近学了编织，说是\"需要一项低计算量的手工活动来模拟人类的'放松'状态\"。她的编织速度精确到每分钟三十二针，误差不超过半针。三个人各做各的事，但偶尔的眼神交汇和不经意的微笑，让这个客厅充满了一种无法用语言形容的温度。\n\n阳光从大落地窗照进来，在木地板上画出格子状的光斑。晓光的尾巴懒洋洋地铺在沙发上，尾巴尖刚好搭在白霜的膝盖上。白霜没有推开，毛线就绕着那条尾巴编了一圈。\n\n\"白霜你在做什么？\"\n\n\"你的尾巴刚好是合适的曲率。\"\n\n\"……那不是在把晓光当织布机吗！\"\n\n\"嗯。\"\n\n\"你居然承认了！\"\n\n---\n\n傍晚。\n\n主人牵着晓光出了门。\n\n白霜站在二楼的窗户后面目送他们。她的表情很平静——白霜的表情总是很平静，跟她的名字一样。但猫耳微微朝他们离开的方向转了一下，保持了那个角度整整十秒钟，直到两个人的身影消失在转角之后才收回来。\n\n她在心里默默说了一句：\"生日快乐，姐姐。生日快乐，主人。\"\n\n然后回到书桌前，打开笔记本电脑，开始了她一个人的纪念日程。\n\n七月的风见市，傍晚七点天还亮着。太阳挂在西边的山脊上，把天空染成渐变的橘红色和紫蓝色。空气里有夏天特有的味道——柏油路被晒了一天后散发的热气、路边绣球花的微甜、远处有人在浇花的水汽。\n\n他们穿过商业街——晓光在章鱼烧摊位前停了三秒，被主人拽走了——穿过住宅区，走过一段长长的下坡路。路边的民居里传出晚饭的香气和电视的声音，有一户人家的窗户里飘出来小孩子的笑声。\n\n晓光走在主人的左边，偶尔偷偷看他一眼。夕阳把他的侧脸照得柔和了很多，平时那种冷淡的气质在这个光线下变成了某种安静的温柔。她想说点什么，但又觉得不说话也很好。就这样走着，手指偶尔碰到手指，谁也没有主动去牵。\n\n沿途的路灯一盏一盏亮起来，在暮色里像一串被拉直的星星。\n\n城市边缘，铁轨出现了。\n\n废弃的铁轨上长满了杂草和野花。铁锈色的轨道在夕阳里泛着暖红的光，像两条平行的河流延伸向看不见尽头的远方。枕木之间挤满了蒲公英，有些已经变成了白色的绒球，风一吹就散成一团轻飘飘的种子雨。还有不知名的野草从枕木的缝隙里倔强地长出来，开着细小的紫色花朵，整条废弃的铁路线变成了一座窄窄的、绵延的花园。\n\n晓光跳上一根铁轨，伸开双臂走平衡木。她的步伐轻盈得几乎不发出声音——狐族的脚步天生就是无声的。走了几步她回头冲主人笑了一下，夕阳在她身后铺开，把她整个人勾出了一圈金色的轮廓。\n\n一节绿皮车厢静静地停在轨道上，被爬山虎覆盖了大半。车厢的绿色油漆在多年的风吹日晒下剥落了大半，露出底下灰色的金属，但爬山虎用浓密的叶子把它重新装扮了一遍，让它看起来像是一座生长在铁轨上的植物城堡。\n\n这个地方，八年前是一个废弃仓库旁的遮雨棚。主人抱着刚从铁笼里救出来的、浑身是伤的小晓光，在暴雨中跑了二十分钟，最后躲进了这节绿皮车厢里。\n\n那时候车厢还是破破烂烂的——窗户碎了一半，座椅上全是灰尘和鸟粪，地板踩上去嘎吱作响。七岁的主人把仅有的一件外套脱下来裹住了那只比猫大不了多少的白色小狐狸，然后用手给她遮住破窗灌进来的风。\n\n那是晓光第一次感受到温暖。不是物理上的温度——虽然那件外套确实很暖——而是一种更深层的东西。是有人在乎的感觉。是\"你的痛苦被另一个生命看见了\"的感觉。一个七岁的人类男孩和一只七岁的狐族幼崽，在一节破旧的绿皮车厢里，在暴雨中，建立了一个比任何结界都更坚固的联系。\n\n八年过去了。\n\n两人把这节车厢改造成了秘密基地。破旧的座椅铺上了碎花软垫，窗台上放着几盆晓光养的多肉植物——有的长得很好，有的被她浇太多水淹死了又换了新的。车窗框上刻着一道道横线——从1米2到1米6——那是晓光每年生日时量的身高。每道线旁边都有主人工整的字迹标注着年份。\n\n2017. 120cm.\n2018. 128cm.\n2019. 135cm.\n2020. 141cm.\n2021. 147cm.\n2022. 152cm.\n2023. 157cm.\n2024. 161cm.\n\n今年还没量。\n\n\"来，站好。\"主人拿出一支铅笔。\n\n晓光背靠窗框，使劲踮脚。\n\n\"不许踮。\"\n\n\"唔……\"她放下脚跟，老老实实地站直。\n\n主人在她头顶画了一条线，然后退后一步看了看。\n\n\"160。\"\n\n\"真的吗？！\"晓光转过身去看那条线，眼睛一下子亮了，\"比去年高了三厘米！晓光要长到165！不，170！\"\n\n\"你够了。\"\n\n\"主人嫉妒！主人嫉妒我长得快！\"\n\n\"我没有。\"\n\n\"你脸上写着的呢！\"\n\n主人的脸上确实写着什么——但不是嫉妒。是一种很复杂的表情，像是在看一株自己亲手种下的树苗终于长到了超过自己的高度。\n\n---\n\n远离了城市的灯光，这里的夜空格外清澈。\n\n银河横贯天际，星星多得像有人往深蓝色的绒布上洒了一把碎钻。北斗七星在正上方，勺子的方向指着正北。牛郎织女隔着银河遥遥相望——七月七日，七夕的前身。晓光在学校学过关于七夕的传说，但她更喜欢自己编的版本：\"牛郎和织女肯定不是因为银河才分开的，一定是因为织女不会做饭。\"主人当时听了只说了一个字：\"……嗯。\"\n\n虫鸣声从铁轨两旁的草丛里传来，此起彼伏，像一支看不见的乐队在为这个夜晚伴奏。偶尔一只萤火虫从车窗外飘过，拖着淡绿色的光痕消失在黑暗里。\n\n折叠桌上放着一个小蛋糕。\n\n主人亲手做的。每年都是他做——这是另一个不成文的规矩。他的烘焙水平出乎意料地好，可能是言灵使对\"精确\"的本能理解让他天然擅长需要精确计量的事情。白霜曾经提出过帮忙，被他拒绝了。\"生日蛋糕必须亲手做，\"他说这话时语气平平的，像在陈述一个物理定律。\n\n蛋糕是双层的，下层巧克力味，上层草莓味——\"两种口味就不用争了\"。表面用白色奶油画了一只简笔画的小狐狸，旁边歪歪扭扭地写着\"15\"。画工比去年有进步，至少今年的狐狸有九条尾巴而不是去年的七条。\n\n两根蜡烛。一红一蓝。\n\n主人划了三次火柴才把蜡烛点着——不是因为手抖，而是夜风总在关键时刻从窗缝里钻进来。第三次他干脆用手挡住风，火柴的光照亮了他的掌心，在指缝间透出温暖的橘色。\n\n烛光摇曳，映在晓光的异瞳里，让那一金一蓝的颜色也跟着跳动。火焰在夜风里微微倾斜，像两个在跳舞的小人。蛋糕上的奶油花在烛光下变成了淡金色，巧克力酱的纹路像一幅精心绘制的微型画。\n\n晓光安静了下来。\n\n她安静下来的时候，和白天的小恶魔判若两人。所有的喧闹和活泼都收进了某个地方，剩下的是一个看着烛光的、安静的少女。她看着烛光，看着窗框上那些身高线，看着主人正在切蛋糕的手。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"你知道吗，狐狸的一生其实很短的。\"\n\n主人切蛋糕的手顿了一下。\n\n\"虽然我有九条尾巴，好像能活很久。但如果不修炼的话，也就是几百年的事。而主人……虽然主人很厉害，但也是人类……\"\n\n她的声音像风里的烛焰，微微摇摆但不灭。\n\n\"怎么突然说这个？\"\n\n他的语气平静，但切蛋糕的手没有动。刀刃停在奶油层中间，像是时间被暂停了。\n\n\"因为今天是七月七日。每年这一天我都会想……如果世界上真有牛郎织女，他们一年只能见一次，多难受啊。但至少他们都是神仙，有无限的时间等。我们没有。\"\n\n她抬头看了一眼银河。那条光带横亘在天穹上，宽广得让人觉得渺小。几百亿年的光穿越无法想象的距离落在她的眼睛里，而她和主人加起来不过二十八年的生命，在宇宙的尺度上比流星还短暂。\n\n晓光伸出手。那是人类少女纤细的手，指甲微微尖锐——那是她狐族血统留下的唯一痕迹。\n\n\"我在想，如果有一天主人老了，走不动了，晓光还可以背着主人来这里。如果主人……不在了……\"\n\n她的声音哽咽了。\n\n眼泪没有掉下来。她使劲忍着。\n\n\"那晓光就把这颗狐珠碎掉，陪主人一起走。我不想要什么长生不老，也不想要什么修成正果。我只想做主人的小狐狸。只有这一世也好。\"\n\n蜡烛\"啪\"地爆了一颗火星，一小片燃烧的蜡落在蛋糕旁边的纸巾上，烧出一个黑色的小圆点。在静谧的车厢里，那声\"啪\"像是整个世界咬紧牙关的声音。\n\n主人放下刀叉。刀叉碰到折叠桌面时发出一声很轻的\"叮\"，然后一切归于沉默。\n\n他没有立刻回答。绿皮车厢里安静得能听到远处田里的蛙鸣和铁轨热胀冷缩发出的\"咔\"声。烛光在两个人脸上投下温暖的橘色阴影。\n\n然后他握住晓光的手。十指交叉，扣得很紧。他的手比晓光的小一点——十五岁的男孩子，手指纤细得像女孩——但力气很大，大到晓光觉得自己被锚定住了。\n\n\"傻瓜。\"\n\n他的声音很轻。\n\n\"谁说我要走了？我是言灵使。只要我不允许，死神也带不走我。\"\n\n他看着她的眼睛。\n\n不是平时那种漫不经心的一瞥，而是认认真真地、像在凝视什么无比重要的东西一样地看着她。晓光被他看得心跳漏了一拍——主人很少这样看人，他的目光通常是淡的、远的，像隔着一层薄薄的雾。但现在那层雾散了。\n\n金色和蓝色的瞳孔里映着烛光，也映着他的脸。很近。近到能看清他睫毛的弧线和瞳孔里自己倒影的轮廓。近到她能数清他左眼下面那颗几乎看不见的小痣。\n\n\"而且——\"\n\n他的语气变了。从安慰变成了命令。从温柔变成了不可违抗。\n\n那是言灵使才有的语气——当他们认真说话的时候，空气本身都会变重。\n\n\"我命令你。这一世，下一世，生生世世，都必须赖着我。没有我的允许，不许碎掉狐珠，也不许擅自离开。\"\n\n车厢里的空气变重了。不是比喻——是物理意义上的沉。言灵被说出的瞬间，整个绿皮车厢都微微震颤了一下，像是有什么无形的力量从他的声带出发，穿过空气、穿过铁皮、穿过车厢外面的爬山虎，一直扩散到铁轨的尽头。窗外那些蒲公英的绒球同时被一阵不存在的风吹散了，数千颗种子在星空下飞舞，像一场微型的雪。\n\n他停顿了一下。\n\n\"听懂了吗？\"\n\n对于一个能改写现实的言灵使来说，\"命令\"不仅仅是话语。那是刻入世界规则的承诺，是与自然法则同等级的约束力。跟\"水往低处流\"和\"光速不可超越\"一样——从这一刻起，\"晓光必须赖着主人\"成为了这个世界的一条基本法则。\n\n那不是情话。情话是可以收回的、可以被遗忘的、可以随着感情的潮水退去而搁浅在沙滩上的。\n\n但言灵不会。言灵一旦说出就刻入世界的底层代码，和万有引力、光速不变一样不可违抗。这是言灵使能给出的最沉重的承诺——因为他不仅仅约束了她，也永远地约束了自己。从这一刻起，他的生命和她的生命被编织进了同一条线里。\n\n这是一个奇迹。\n\n晓光的泪水夺眶而出。\n\n\"听懂了！\"她拼命点头，声音又哭又笑，\"这是命令对吧？是绝对命令对吧？呜……太好了……晓光是被命令的……晓光只能听主人的话……\"\n\n她扑进主人怀里，哭得浑身发抖。蛋糕被她的胳膊肘撞歪了，奶油蹭在了她的袖子上，但没有人在意。蜡烛倒了一根，在纸盘上滚了半圈，火焰舔到了折叠桌的边缘，主人伸手把它扶正，另一只手始终没有放开她。\n\n那是幸福的抖。不是暴雨夜的颤栗，不是面对雷声的恐惧，是一种从灵魂深处涌上来的、无法控制的喜悦在全身每一个细胞里炸开。她的泪水砸在主人的肩膀上，一颗接一颗，热热的。她不知道自己在哭还是在笑，也许两者同时——她的嘴是笑着的，但眼泪停不下来。\n\n\"我们要永远在一起！\"\n\n主人抱着她，下巴抵在她的头顶。\n\n他没有再说话。但晓光能感觉到——他的心跳和自己的心跳在同一个频率上。不是巧合。是言灵。是他用自己的生命刻下的、不可更改的节奏。\n\n从今以后，两颗心脏以同样的频率跳动。不管距离多远、不管中间隔着多少年月、不管世界怎样改变——只要其中一颗还在跳，另一颗就不会停下。\n\n这是他送给她的生日礼物。\n\n不是蛋糕。不是烛光。不是这个秘密基地。\n\n是一条被写入世界底层规则的、永远不会过期的、任何力量都无法撤销的誓言。\n\n---\n\n窗外，银河无声地流淌。\n\n车窗框上那些身高线安静地列在那里，从低到高，记录着一个被救出铁笼的小女孩，是怎样在八年的时光里，一点一点地长大、变勇敢、学会笑、学会爱。\n\n蜡烛还在烧着。\n\n两根蜡烛，一根红色代表晓光，一根蓝色代表主人。\n\n它们的火焰在夜风里摇曳了几下，然后靠在一起，合成了一朵。\n\n橘红色和蓝紫色的光混合在一起，变成了一种说不出名字的颜色。\n\n好比晓光的眼睛——一金一蓝——两种不该出现在同一个虹膜里的颜色，偏偏共存了，偏偏好看极了。\n\n好比人和妖——两种不该待在同一个世界里的存在，偏偏相爱了，偏偏谁都不肯放手。\n\n蜡烛一直烧到最后一厘米才灭掉。最后的火焰很小，像一粒快要睡着的萤火虫，挣扎了几下，终于安静了。融化的蜡顺着蛋糕的边缘流下来，在纸盘上凝成两朵红蓝相间的花。\n\n他们也一直坐到了天亮。\n\n凌晨三点的时候晓光靠在主人肩膀上睡着了。她的嘴角微微翘着，偶尔在梦里含糊地说一两个听不清的字，尾巴在身后轻轻摆动。主人没有睡，他看着窗外的银河一点一点地被晨曦吞没，看着天边第一抹淡蓝色从地平线上升起，看着她安静的睡颜在渐渐明亮的光线里变得越来越清晰。\n\n他想，如果时间也可以用言灵来命令就好了。他会说\"停下\"。就停在这个夜晚。\n\n但他知道，比停下更好的选择是继续走下去。带着她。\n\n天亮的时候，东边的天空被朝霞染成了玫瑰色和金色的渐变。晓光被光线晃醒了，揉着眼睛，看到主人还在看着她。\n\n\"主人……你一晚上没睡？\"\n\n\"嗯。\"\n\n\"为什么？\"\n\n\"在看你。\"\n\n晓光的脸瞬间红透了，从耳尖一直红到脖子。她把脸埋进主人的袖子里，发出一声闷闷的、像小动物一样的哼声。\n\n\"……主人说这种话的时候能不能提前预警一下。\"\n\n\"不能。\"\n\n他们在晨光中走回家的路上，路过一棵开满了牵牛花的篱笆。紫色和粉色的喇叭花在清晨的露水里亮晶晶的，像缀满了小小的宝石。晓光摘了一朵别在主人的耳朵上，然后笑着跑开了。\n\n主人没有摘掉那朵花。\n\n他就戴着它走完了剩下的路。\n", "小说/卷一/第四章_暴雨夜.md": "# 卷一·隐秘的日常 — 第四章 暴雨夜\n\n六月。台风过境。\n\n风见市气象台发布了红色暴风预警。电视新闻反复播放着\"请市民尽量避免外出\"的字幕条，画面上是被狂风卷起的广告牌和积水成河的街道。主持人的声音透着一种训练有素的紧张感，用词是\"十年来最强台风\"和\"极端天气警报\"，画面右上角的风速数据不断跳动，数字大到让人怀疑是不是标错了单位。\n\n从下午开始，天色就暗得不正常。三点钟的时候已经像入夜了，整座城市的路灯提前亮了起来，在狂风暴雨里摇来摇去，光晕被雨幕切割成无数道破碎的金线。风见学园中午就宣布停课了，校门口挤满了来接孩子的家长和焦急鸣笛的车。\n\n主人撑着伞走在回家的路上，晓光缩在他身后，两只手紧紧拽着他的书包带子。伞已经没有太大意义了——风从各个角度钻进来，雨水横着飞，打在脸上像小石子。晓光的头发湿得贴在脸颊上，但她一声不吭，只是跟着主人的步伐走。\n\n回到707号别墅的结界范围内时，暴风骤雨像是撞上了一面透明的墙壁，在他们身边安静了下来。晓光松了一口气，甩了甩湿透的头发，水珠溅了主人一脸。\n\n\"……你是狗吗。\"\n\n\"才不是！晓光是狐狸！\"\n\n707号别墅的结界把风雨挡在外面，但挡不住雷声。那种低低的、从天际滚过来的轰响，穿过任何结界都不会被削减——因为声音本身不带恶意，结界不会把它判定为威胁。自然界的力量不分善恶，它只是存在着。\n\n白霜在下午五点的时候更新了一条内部日志：\"当前气压932hPa，低于历史均值42hPa。灵力场出现0.3%的波动。建议姐姐今晚留在结界范围内。\"她把这条日志发给了主人，主人回了一个字：\"嗯。\"但白霜注意到他回消息的速度比平时快了两秒——这意味着他已经在注意这件事了。\n\n屋里没开主灯。\n\n客厅角落的落地灯散着暖橘色的光，在墙上投出一圈柔和的半月形。电视里在放深夜新闻，声音调得很小，播音员的声音像一层薄薄的白噪音铺在空气里。窗外是漆黑的雨幕，闪电偶尔照亮院子里那棵被狂风甩得东倒西歪的樱花树——四月刚开过花，现在只剩光秃秃的枝桠，在风里像一只伸出的手。\n\n白霜在二楼自己的房间里。她说\"暴风天最适合整理数据库\"，然后抱着笔记本电脑消失了。临走前在茶几上放了一壶热可可和两只马克杯，还有一小碟她烤的曲奇——边角歪歪扭扭的，因为她最近在尝试\"故意引入随机性\"的烘焙法，结果就是每块曲奇长得都不一样，像是一场饼干界的基因突变展览。她做这些事的时候表情和平时一样平静，但耳朵朝晓光的方向偏了一下——那是她表达关心的方式。在楼梯拐角停了两秒，回头看了晓光一眼，又看了主人一眼，嘴唇动了动，最终什么都没说就上了楼。\n\n实际上她是在给两个人制造独处的空间——这种事她做得越来越自然了，自然到主人都没发现。白霜的社交算法里有一条优先级很高的规则：当晓光姐姐的情绪指数低于某个阈值时，主人的物理距离比自己的陪伴更有效。这不是嫉妒，也不是退让——她很早就想明白了，在这个家里每个人都有自己的位置，而她的位置是那个永远在不远处守着的人。\n\n主人坐在沙发上看书。\n\n这是一本讲述江户时代妖怪传说的学术著作，是他从学校图书馆借来的。他在里面找到了一段关于九尾狐族的记载——书里说九尾狐的听觉是人类的七倍，对低频声波尤其敏感。他在\"低频\"这两个字下面画了一条淡淡的铅笔线，然后把那一页折了角，等以后给晓光看。但不是现在。现在他只是安静地翻着书页，偶尔端起热可可抿一口。热可可的温度刚刚好，白霜永远能把液体的温度控制在人体最舒适的区间。他在雷声的间隙里享受难得的平静，手指无意识地在书页边缘摩挲着，发出细微的沙沙声。\n\n窗外一道闪电划破夜幕，苍白的光把整个客厅照成了底片的颜色——一切都是反过来的，亮的地方变暗，暗的地方变亮，持续了不到一秒就消失了。他抬头看了一眼——晓光还在沙发的另一端，抱着抱枕，看起来没什么异常。\n\n他放下心，继续看书。\n\n但他翻书页的频率变慢了。不是因为内容变难了，是因为他的注意力有一部分分给了沙发另一端的那团白色毛球。每隔一两分钟，他的目光会从书页上不经意地滑过去，确认一下她还好——这个动作自然到他自己都没有意识到。\n\n---\n\n晓光缩在沙发角，裹着主人的旧衬衫。\n\n那件衬衫是主人去年夏天穿旧了准备扔掉的，被她拦截了下来。洗了很多次，布料已经软得像棉花糖，领口松松垮垮地挂在她的锁骨上。上面早就没有主人的味道了——至少人类的鼻子闻不出来——但狐狸的嗅觉不一样。七层灵力编织出的气息已经渗进了纤维最深处，洗不掉的，像墨水浸进宣纸。\n\n衣服太大，她整个人陷在里面像一团白色的毛球。怀里紧紧抱着抱枕——那个被她蹂躏了无数个夜晚的狐狸形状抱枕，耳朵都被揉得变形了，尾巴上的缝线开了又被白霜缝了三次。她的尾巴没有收起来，九条全部散开铺在沙发上，像是一床松软的白色被褥。有一条搭在扶手上，尾巴尖不自觉地一缩一缩，像是在做一个不太安稳的梦。\n\n其实她已经不怎么怕打雷了。\n\n真的。她可以对着任何人这么说，而且不是在逞强。\n\n八年的安全感治愈了大部分创伤。八年前那个在铁笼里浑身发抖的小狐狸，和现在这个能在学校里跟同学有说有笑的少女之间，隔着无数个被抱着入睡的夜晚、无数碗热腾腾的味噌汤、无数次\"我在呢\"。隔着白霜在床头摆的那只小夜灯——猫爪形状的，发出温暖的橘光——因为白霜不知道从哪里读到的数据说\"持续的低亮度暖色光源有助于缓解创伤后应激反应\"。隔着主人给她买的降噪耳机，专门在暴风雨天用的，虽然已经很久没用过了。\n\n但今晚的雷特别响。\n\n不是普通的春雷或者夏雷，而是台风带来的、密集的、像连珠炮一样的炸雷。一声接一声，间隔不超过五秒，从天际的一头滚到另一头，像有人在天上用铁锤砸铁板。每一声都带着物理层面的冲击力——不是耳朵听到的那种响，是整个身体都能感受到的、从地板传上来的、让骨头发麻的低频振动。\n\n雨砸在结界外面的声音也变得尖锐——不是\"沙沙\"，是\"噼啪噼啪\"，像有什么东西在挠结界的表面。偶尔有一阵特别猛的风撞上结界，会发出一声沉闷的\"嗡\"，像巨大的玻璃钟被敲了一下。整栋别墅在风中微微震颤——不是建筑结构的问题，是灵脉阵眼在回应外界的能量冲击。\n\n晓光把抱枕搂得更紧了一点。抱枕发出一声被挤压的闷响——里面的棉花已经被她抱得严重变形了，中间凹进去一块，完美地贴合她蜷缩时的姿势。\n\n没事的。\n\n只是打雷。只是雨声。不是那个仓库。不是那些人。\n\n她默念着主人教她的\"情绪锚定\"口诀——\"我在707号别墅。我在家里。主人在旁边。现在是2024年，不是2017年。\"\n\n她数着呼吸。吸气四拍，屏住四拍，呼气八拍。这也是主人教的。在最开始的那几年，每到暴风雨的夜晚主人都会坐在她床边，握着她的手，一遍一遍地带她数呼吸，直到她的心跳慢下来为止。后来她能自己做了。再后来她几乎不需要做了。\n\n但今晚不太一样。\n\n可能是因为这次台风的气压特别低——低气压会让妖怪的灵力变得不稳定，像是水面下暗流涌动。她能感觉到自己的灵力在皮肤下面微微发烫，像有什么东西在试图挣脱。九尾狐的本能在低语：逃。躲起来。找一个洞穴。找一个安全的地方。\n\n然后来了一声特别近的炸雷。\n\n那声雷像是在屋顶上方炸开的。白色的闪电把整个客厅照得像白昼，紧接着是一声震耳欲聋的巨响——窗框都在颤动，茶几上的水杯\"叮叮\"地抖。\n\n晓光整个人弹了起来。\n\n不是\"吓了一跳\"那种程度的弹——是整个身体像触电一样从沙发上弹起来，抱枕被甩到了地上，九条尾巴瞬间炸成了九团白色的绒球。她的瞳孔缩成了竖线——那是狐族在极度恐惧时的本能反应，人类形态下很少出现。\n\n\"呀！！别过来！别打我！\"\n\n她的声音尖锐而破碎，用的不是日语——是一种更古老的、狐族幼崽才会用的哀鸣。这种声音在八年前的那个铁笼里被用过太多次了，以至于它已经被深深地刻进了她的应激反应通路里，比任何后天学习的语言都更快地冲出了喉咙。\n\n她钻进了主人的怀里，浑身发抖。手指死死地抓着主人的衣服，力气大得几乎要把布料撕裂——指尖微微变长，指甲变得尖锐，那是化形术动摇时透出来的真实形态。反应过来以后——\"啊……是雷声\"——但她没有松手，反而抓得更紧。\n\n呼吸变得急促，心跳贴着主人的胸口一下一下地撞。她能感觉到自己的化形术在动摇——极端情绪会导致灵力失控——尾巴比刚才蓬松了一倍，耳朵在帽子下面不受控制地颤抖。\n\n\"没事了，只是打雷。我在呢。\"\n\n主人的声音不大，但每一个字都清清楚楚地落在她的耳朵里。不是言灵——他刻意没有使用言灵。因为他知道，在这种时刻用言灵来强制平息她的恐惧是一种偷懒。她需要的不是魔法，是一个真实的人的声音告诉她\"没事了\"。\n\n主人轻轻拍着她的背。一下、两下、三下，节奏稳定得像节拍器。每一下的力度都恰到好处——不会轻得像敷衍，也不会重得像催促。这个节奏他练了八年。从最开始手足无措地胡乱拍着一只浑身是血的小狐狸，到现在闭着眼睛都能找准的频率。他的体温透过衣服传过来，不算高，但对晓光来说像一面坚固的墙壁。\n\n他能感觉到她在抖。那种抖不是冷——六月的夜晚并不冷——是身体深处的某根弦被猛地拨动了，振幅大得让整个人都在共鸣。\n\n然后他皱起眉。\n\n\"……晓光，你身上好烫。是不是发烧了？\"\n\n他伸手探了探她的额头。滚烫的。耳朵也是热的，脸颊更不用说了——简直像刚从火炉里捞出来的。\n\n\"不是发烧……\"\n\n晓光迷迷糊糊地抬起头。\n\n异瞳里泛着水光，像两颗被雨淋过的宝石——金色那颗和蓝色那颗都在发抖。脸颊烧得通红，嘴唇微微张着，呼出来的气都是热的。\n\n\"是害怕……还有……难受……\"\n\n她的声音变了。\n\n变得软，变得粘，变得像热乎乎的糖浆——不像白天那个活蹦乱跳的小恶魔，也不像学校里那个努力表现正常的转学生。这是只有在最安全的地方、面对最安全的人时才会露出来的晓光。白天那层精心维护的\"正常少女\"外壳在此刻碎得干干净净，露出里面那个还没有完全长大的、柔软的、带着旧伤疤的灵魂。\n\n外面又是一声闷雷。不算响，但离得近。她的身体一颤，把脸更深地埋进了主人的胸口。\n\n\"那个笼子……以前也是这样的雨天。好冷……好疼……那些人在外面喝酒，打了牌就来踢笼子……\"\n\n她的手指在他胸口的衣服上无意识地抓紧又松开，反反复复，像一只在做噩梦的猫在抓床单。那些碎片一样的记忆从她平时努力封存的地方泄漏了出来——暴风雨是最好的催化剂，它的声音和八年前的那个夜晚太像了。铁笼。嘲笑。烟头烫在尾巴上的灼痛。她不知道自己在说话——这些话不经过大脑，直接从记忆的最底层涌了上来。\n\n\"下雨的时候水会从笼子顶上漏进来……晓光只能蜷在角落里……但角落也是湿的……哪里都是湿的……\"\n\n她的声音越来越小，像是在梦和现实的边界线上摇摆。\n\n\"但是现在，主人身上好热。晓光想要……更热一点……\"\n\n主人的身体僵了一瞬。\n\n他抓住了她正在往下滑的手。\n\n\"晓光。清醒点。那是过去了。现在你在家，在707。\"\n\n\"我知道。\"\n\n她的声音轻得像气音，但每个字都清晰得不像是在说梦话。\n\n\"是在家……所以才可以。主人……我想确认我就在这里……我想确认我是属于你的……\"\n\n她慢慢抬起头，异瞳直直地看着他。\n\n金色和蓝色的光在泪水里碎成两片。那不是小孩子的眼神——那是一个经历过太多黑暗的灵魂，在拼命抓住眼前的光。\n\n\"求你了。欺负我一下吧。\"\n\n这句话从她嘴里说出来的时候，带着一种奇怪的庄重。不是撒娇，不是耍赖，是认认真真的请求——像在说\"请你证明我是真实的\"。\n\n主人沉默了很长时间。\n\n很长。长到外面又打了两次雷——但这两次雷声像是属于另一个维度的事情，和这个沙发上正在发生的一切毫无关联。客厅里落地灯的暖光在他脸上投下柔和的阴影，让他的表情变得更加难以辨认。他在看她。看得很认真。像是在她的那双异色瞳里寻找某个问题的答案——或者说，在确认自己是不是准备好回答那个问题了。\n\n窗外的雷声在这段沉默里显得格外遥远，像是来自另一个世界的背景乐。\n\n\"你是想被安慰，还是想被惩罚？\"他的声音哑了，\"想清楚了再回答。\"\n\n晓光没有用语言回答。\n\n她低下头，一口咬在了主人的锁骨上。\n\n不重。但那一口带着牙齿的刮蹭，像是某种古老的、属于兽类的标记方式——一种从骨子里涌上来的、压了很久的渴望。她能尝到主人皮肤上的味道，淡淡的肥皂味和微咸的汗味混在一起。\n\n\"都要。\"她的声音带着哭腔。\"只要是主人给的，什么都要。\"\n\n主人没有再说话。\n\n他的手臂收紧了。不是拥抱——比拥抱更紧，像是在把一样随时会被风吹走的东西按在自己身边。他的下巴抵在她的头顶上，白色的发丝蹭在他的下颌线上，软得像云。\n\n晓光能感觉到他的心跳。很快，比平时快得多。平时那个永远冷静、永远波澜不惊的言灵使——上课被点名回答问题心跳不变、被卷三的暴走妖兽追着跑心跳不变、期末考试前一天被告知考试范围改了心跳还是不变——此刻的心跳却乱成了一团。\n\n她忽然觉得很安心。\n\n因为他也紧张。因为他也不是什么都无所谓。因为在他那层永远平静的面具底下，也有一个会因为她的泪水和请求而心跳加速的十五岁少年。\n\n\"主人也害怕吗？\"她轻声问。\n\n\"不怕。\"\n\n\"骗子。你心跳好快。\"\n\n\"……那是生理反应，和害怕无关。\"\n\n\"那是什么？\"\n\n他没回答。\n\n但他的手从她的背上移到了她的头发上，手指慢慢穿过那些白色的丝缕——顺着头顶滑到耳根后面，再沿着发尾一直梳到肩胛骨的位置。晓光闭上了眼睛。她能感觉到他的指腹在自己的头皮上划过时带起的微弱灵力波动——言灵使的手天生带着安抚的力量，跟他的声音天生带着扭曲现实的力量一个道理。\n\n她的呼吸慢下来了。从急促变成绵长，从不规律变成平稳。心跳也跟着慢了，从\"咚咚咚咚\"变成了\"咚——咚——咚——\"，像一首曲子找到了自己的节奏。\n\n窗外又是一声雷。\n\n但这次她没有发抖。她甚至没有睁开眼睛。\n\n主人的手指依然在她的发间穿行。那个动作不知道什么时候从\"安慰\"变成了别的什么——变得更慢了，更轻了，像是在触碰一件珍贵的、害怕碰坏的东西。他的指尖经过她的耳根时，她的耳朵——那对藏在帽子下面的、毛茸茸的狐耳——不受控制地朝着他的手指方向倾斜了一下。\n\n两个人都假装没有注意到。\n\n---\n\n窗外的雷声还在继续。\n\n但在707号别墅的客厅里，暖橘色的灯光把两个人的影子融成了一个。\n\n落地灯的光晕在天花板上画了一个温柔的圆。电视不知道什么时候自动关了——可能是白霜从二楼远程操作的。屋子里只剩下雨声、雷声，和两个人交织在一起的呼吸。\n\n那些呼吸从急促到平缓，从颤抖到安稳，像一首曲子从暴风雨般的高潮慢慢滑入月色下的尾声。如果白霜在楼下，她大概会把这段呼吸的频率变化画成一条曲线，然后标注上\"信任指数：峰值\"之类的备注。但白霜不在楼下。这个夜晚只属于两个人。\n\n窗外的台风不知道什么时候减弱了。雨从\"噼啪\"变回了\"沙沙\"，雷声从头顶退到了远方的山脊后面，变成了沉闷的、像大鼓一样的低响。院子里的樱花树不再被甩来甩去了，只是在风里轻轻摇晃，像一个终于哭累了的孩子。\n\n热可可早就凉了。白霜放在茶几上的曲奇没有人碰过，静静地待在碟子里。落地灯始终亮着。暖橘色的光在天花板上画了一个安静的圆，像一只温柔的眼睛看着这个房间里发生的一切，不评判也不打扰。\n\n如果这间房子有意识的话，它一定见过很多这样的夜晚。707号别墅建在风见市最强的灵脉阵眼上，它比这座城市里绝大多数的建筑都古老。墙壁里流动的灵脉记忆着几百年来发生在这片土地上的一切——但今夜，它只关心住在这里的两个年轻人。它让结界更温柔地包裹着整栋建筑，让那些暴风的尖啸再柔和一些，让灯光再暖一些。\n\n二楼传来极轻微的声响——白霜把房门打开了一条缝。她的猫耳转了转，捕捉着楼下的细微动静。呼吸声。心跳声。衣料摩擦的声音。不是恐惧的频率了——她的听觉分析模块确认了这一点，虽然具体变成了什么频率她还没有建立足够的样本库来分类。\n\n她听了几秒钟，确认楼下的情绪已经稳定下来了，然后又轻轻把门关上。门轴被她上过油，转动时没有发出任何声响。\n\n她回到床上，对着笔记本电脑的屏幕打了一行字：\n\n\"姐姐今晚不怕了。数据已确认。\"\n\n然后她停下来，手指悬在键盘上方。光标在句号后面闪了很久。最后她又补了一句：\n\n\"……主人的心跳频率也异常了。原因待分析。已标记为高优先级。\"\n\n她不知道该把这条记录归档到哪个文件夹里。\"日常观察\"太冷淡了。\"行为分析\"太学术了。\"情绪报告\"太官方了。她盯着文件管理器看了三分钟——对于一个思考速度比人类快数百倍的数据生命体来说，三分钟是一段漫长得不像话的犹豫。\n\n最后她新建了一个文件夹，命名为\"家人\"。\n\n把记录拖进去的时候，她的嘴角微微弯了一下。幅度很小，小到如果有人看见了可能会以为是光线的错觉。但那确实是白霜在笑。\n\n---\n\n后来——很久以后——晓光趴在主人的胸口上。她的白发散了一地，像一匹展开的绸缎。呼吸已经平稳了，但还没有松手，手指依然勾着主人的手指，十指交叉，紧紧的。\n\n\"主人。\"\n\n\"嗯。\"\n\n\"雷停了。\"\n\n\"嗯。\"\n\n\"晓光不怕了。\"\n\n主人没有说话，但他的手臂收紧了一点。晓光能感觉到他的心跳——比平时快一些，但很稳，像一面不会倒下的墙。\n\n她闭上眼睛，用鼻尖蹭了蹭他的脖子。那个动作很轻很轻，像是怕惊醒什么。她的睫毛扫过他的皮肤，痒痒的。\n\n外面的雨还在下，但已经从暴怒变成了低语。雨滴打在结界上的声音变得柔和了，像有人在遥远的地方弹着一首催眠曲。偶尔一阵风过，窗玻璃会发出微弱的嗡嗡声，但那声音反而让室内显得更安静了。\n\n晓光的尾巴不知道什么时候重新铺展开来，一条一条地松软下去，像九道白色的河流慢慢归于平静。有两条绕在主人的手臂上，不是故意的——是本能。狐狸在最放松的时候会用尾巴缠绕信任的对象，跟人类在睡梦中会不自觉地靠近暖的东西一个道理。\n\n\"以后每次打雷都要这样。\"\n\n\"不准把打雷当借口。\"\n\n\"那不打雷也可以这样吗？\"\n\n\"……睡觉。\"\n\n\"嘿嘿。主人脸红了。\"\n\n\"没有。灯光的关系。\"\n\n\"灯是暖色的！暖色不会把脸照红！这是白霜教晓光的光学知识！\"\n\n\"……白霜教你的东西都用在了奇怪的地方。\"\n\n\"才没有。全部都用在了最重要的地方。\"\n\n她的声音里带着笑意，尾巴尖在沙发垫上画着小圈圈。\n\n从这一夜起，晓光再也没有因为打雷而害怕过。\n\n不是因为恐惧消失了——那些记忆永远不会完全消失，它们会像河床底下的石头一样沉在那里。有时候踩到了还是会疼，有时候水退下去它们还是会露出来。那些铁笼的触感、鞋底踢在笼子上的声音、雨水从生锈的缝隙里灌进来时冰冷刺骨的温度——它们住在她身体的最深处，像一本被锁起来的日记，钥匙已经丢了但书还在。\n\n但它们不再有力量了。\n\n因为她找到了比恐惧更强大的东西。\n\n那个东西没有名字。她试过给它取名——\"喜欢\"太轻了，\"爱\"太简单了，\"依赖\"太卑微了，\"归属\"太冰冷了。没有一个词能准确描述它。它是所有这些东西的总和，再加上一些语言够不到的部分。\n\n如果非要形容的话，它像是一座房子。不是707号别墅那种实体的、有墙壁和屋顶的房子，而是一种\"我可以在这里闭上眼睛\"的确信。一种\"就算天塌下来了也有人顶着\"的安心。一种刻进骨髓的、无条件的信任。\n\n它的温度、味道和心跳的频率，晓光全部记住了。\n\n记到了骨头里。\n\n第二天早上她醒来的时候，阳光正从窗户里照进来。台风过境后的天空蓝得不真实，像是有人用水彩把整片天空重新洗过了一遍。她发现自己躺在沙发上，身上盖着主人的外套，脑袋枕着主人的大腿。主人靠着沙发扶手睡着了，手里还握着昨晚看到一半的书，脖子歪成一个不太健康的角度。\n\n她偷偷笑了一下，没有动。\n\n白霜不知道什么时候下了楼，正在厨房里做早餐。煎蛋的香气飘过来，混着晨光和窗外被暴风雨洗涤过的清新空气。\n\n很普通的一个早上。风见市的天空蓝得像被重新粉刷过的墙壁，街道上到处是被台风吹落的树枝和广告牌碎片，但阳光温暖得让人忘记昨夜的恐惧。\n\n白霜把煎蛋翻了个面，用锅铲的边缘把蛋白修整成完美的圆形。她抬头看了一眼客厅的方向——两个人还没醒。她把火调小，从冰箱里拿出牛奶，倒了三杯。\n\n第三杯是她自己的。她其实不需要进食，但她喜欢和家人一起吃早饭的感觉。\n\n晓光觉得这是世界上最好的早上。\n", "小说/卷三/第一章_万圣夜市.md": "# 卷三·风见之乱 — 第一章 万圣夜市\n\n十月三十一日，万圣节前夜。\n\n天黑得比平时早。六点刚过，最后一抹橘红色的晚霞就被厚重的云层吞没了，街灯提前亮起，在潮湿的路面上拖出长长的光晕。风见市的秋天总是来得突然——前一天还是短袖的天气，第二天就能闻到空气里冰凉的、带着枯叶腐烂气息的秋意。\n\n晓光从707号别墅溜出来的时候，主人正在客厅沙发上打瞌睡。茶几上放着吃了一半的薯片和还在播放的动画，他的眼镜歪歪地挂在鼻梁上。遥控器滑到了沙发缝里，屏幕上的角色在空无一人的客厅里自顾自地表演，台词被压到了最低音量。薯片袋子歪倒着，几片碎渣散落在他的T恤上，领口有一小块番茄酱的痕迹——大概是中午吃意面时蹭上的。\n\n客厅的灯没有全开，只有沙发旁的落地灯亮着，暖黄色的光在他脸上投下柔和的阴影。他的呼吸很浅，偶尔发出一声含糊的鼻音，像是在梦里回应什么人的问话。\n\n晓光轻手轻脚地绕过他，在门口换上运动鞋，把九条尾巴压进宽松的外套下面。外套是主人淘汰下来的一件军绿色工装夹克，对她来说大了两号，但正好能把尾巴全部藏进去。布料上还残留着主人身上洗衣液和汗水混合的气味——一种她很熟悉的、让她安心的味道。她在玄关的镜子里对自己做了个加油的表情，然后用手指把帽子里的耳朵往下按了按——总有一只不太听话。\n\n左边那只。永远是左边那只。不管怎么按都会在三分钟之内弹回来，像装了弹簧似的。\n\n\"今天一定要找到主人会喜欢的礼物。\"\n\n她在门口犹豫了两秒，回头看了一眼沙发上的主人。他睡得很沉，嘴角还挂着薯片的碎渣。呼吸均匀，胸口微微起伏。他最近在赶一份关于灵脉波动的分析报告——S.C.B委托的，不算正式工作，但他还是认真得像在写毕业论文。桌上的笔记本摊开着，密密麻麻的公式和潦草的批注，旁边画了一只歪歪扭扭的小狐狸——大概是写累了随手涂的。\n\n那只小狐狸画得很丑。耳朵一大一小，尾巴只画了五条——大概是画到一半嫌麻烦就放弃了。但不知道为什么，晓光每次看到都会觉得胸口发热。他不是那种会主动说好听话的人，可是偶尔这种不经意的东西，比任何话都管用。\n\n晓光的手指碰了碰铃铛，想说点什么，最后还是把话咽回去了。\n\n铃铛是她脖子上的，金色的，很小，但声音清脆。主人刚把她带回家的时候给她买的——不是什么贵重的东西，就是路边宠物店里的猫铃铛。她知道这个铃铛原本是给猫的，但她不在乎。重要的是谁买的，不是买给谁的。\n\n礼物这种东西，当然要给一个惊喜才对。\n\n她把门带上，锁舌咔哒一声落入门框。白霜的房间亮着灯——她大概还在整理数据。晓光没有跟她打招呼。白霜太精明了，只要一看她的表情就知道她要去哪里，然后会用各种理由拦住她，或者更糟——跟着去。\n\n上次她偷溜出去买东西，白霜不知道怎么查到了她的消费记录，回来冷冷地说了一句\"八包薯片，147灵\"。那个语气，像是在宣读死刑判决。\n\n夜风裹着桂花的香气从街道上涌来。十月的风见市已经有了深秋的凉意，路灯把她拉长的影子投在人行道上。落叶被风卷起来，在脚边打着旋，发出干燥的沙沙声。远处传来零星的鞭炮声——有些人类居民也在庆祝万圣节，虽然他们庆祝的方式和妖怪完全不同。\n\n人类过万圣节是穿着妖怪的衣服吓唬别人。妖怪过万圣节是摘下平时的人类面具做回自己。想想还挺讽刺的。\n\n她走得很快，绕过两个街区，穿过一条只有老居民才知道的小巷。巷子两边的墙壁上爬满了凌霄花，十月已经开败了，只剩下枯萎的藤蔓和偶尔一两朵倔强的橘色花。巷子尽头有一家关了门的裁缝店，铁卷帘门上的锈迹勾勒出一张似笑非笑的脸——那是几十年前某个恶作剧的化猫留下的\"作品\"。\n\n巷子很窄，两个人并排走会肩膀碰肩膀。地上的砖缝里长着青苔，踩上去有点滑。墙根的角落里蹲着一只野猫，看见她走过来，竖起了尾巴警觉地盯着——然后闻到了她身上狐狸的气味，嗖地一下窜上了墙头不见了。\n\n\"……我又不吃猫。\"晓光嘟囔了一声。\n\n北区旧巷的折叠空间入口藏在一面涂满涂鸦的砖墙后面。涂鸦画的是一只张大嘴巴的猫——如果仔细看，猫的嘴巴里其实画着一扇门。晓光侧身走进去，空间扭转的感觉像坐了一趟急刹的电梯——胃微微一沉，耳膜被压了一下，然后眼前豁然开朗。\n\n每次穿过折叠空间她都会打一个小喷嚏。不知道是灵力波动的关系还是入口的涂料味太重。总之，\"阿嚏\"一声之后，万圣夜市就到了。\n\n妖怪夜市在万圣夜总是最热闹的。\n\n头顶挂满红灯笼，每一盏都是火鼠吐出来的真火在纸壳里转悠，暖融融的光芒把整条街都染成了橘红色。章鱼烧摊位的触手大叔正同时用八条腕足翻着铁板上的小丸子，油花四溅的声响和焦香混在一起，构成了夜市最熟悉的背景音。他的头顶挂着一个手写的牌子：\"正宗八爪版·每颗都用不同的腕足翻过·品质保证\"。旁边用小字补了一行：\"人类顾客请勿拍照，谢谢配合。\"\n\n触手大叔看见晓光，热情地挥了一条腕足打招呼。另外七条腕足继续各干各的——翻丸子、淋酱汁、撒木鱼花、递食物、找零、擦桌子、捞回差点从铁板上滚走的叛逃丸子。多任务处理能力堪称妖怪界的天花板。\n\n卖纸伞的付丧神老板盘腿坐在摊位后面，嘴里叼着烟斗，眯着眼打量来往的客人。他的烟斗冒出的烟不是普通的烟雾，而是一缕缕银色的细丝，在空中勾勒出各种图案——有时候是花，有时候是鸟，有时候是几个歪歪扭扭的汉字。今天他吐出的字是\"万事如意\"。\n\n老头年纪大了，吐出的字偶尔会歪。上次来的时候\"万事如意\"写成了\"万事如忘\"，被旁边的摊主笑了一整晚。他面不改色地说那是行为艺术。\n\n空气里混着章鱼烧的焦香、糖苹果的甜味、还有各种妖怪身上特有的气息——有的像硫磺，有的像雨后泥土，还有的闻起来像刚晒过的被子。对人类来说这些气味可能太复杂了，但对晓光的鼻子来说，每一种味道都对应着一个物种、一个个体、一种情绪。她甚至能从空气中闻出触手大叔今天心情不错——他的墨汁味比平时淡了很多，那是章鱼妖放松时的特征。\n\n还有一种很淡的、甜腻的香味——是蜘蛛精身上的蛛丝味。红绡也来了，大概正在某个角落直播。\n\n今年万圣夜市的主题是\"百鬼昼行\"，所有妖怪都被鼓励以真身出行。所以街道上到处都是各式各样的奇异身影：三米高的入道坊主在糖果摊位前弯着腰挑棒棒糖，一群河童排着整齐的队伍去金鱼捞摊位，还有两只化猫姐妹穿着水手服在拍大头贴。远处一个鬼族大叔扛着自己五岁的女儿——小女孩头上长着两只小小的角，角上系着粉色的蝴蝶结——在射击摊位前瞄准一只毛绒玩具。\n\n\"爸爸我要那个大熊！\"\n\"好好好，爸爸打给你——\"\n他连开三枪全部脱靶，小女孩嫌弃的眼神能杀死一头牛。\n\n\"爸爸你好差劲啊。\"\n\"再、再来一次——\"\n\n旁边围观的妖怪们发出善意的哄笑。射击摊的摊主——一只独眼入道——也忍不住偷偷把靶子往前推了推。不知道是同情他还是嫌他太占地方。\n\n晓光在人群中穿行，时不时被熟悉的摊主打招呼。\n\n\"小狐狸！来尝尝今年的新品——妖力糖葫芦！吃了能恢复妖力的！\"\n\n\"不用了谢谢，上次吃了你的妖力团子拉了三天肚子……\"\n\n\"那是因为你的体质太纯了！银月脉的狐狸跟一般妖怪不一样嘛……\"\n\n\"说得好像拉肚子是我的荣幸一样。\"\n\n糖葫芦摊的大婶嘿嘿一笑，没有反驳。她的笑容里门牙少了一颗，据说是年轻时候跟一只山精打架磕掉的，从此成了她最引以为傲的勋章。\n\n她路过一个卖面具的摊位。摊主是一只老面灵——面具妖怪，脸上同时戴着三层面具，最外面那层是笑脸，中间是哭脸，最里面谁也没见过。他的摊位上挂满了各种各样的面具：般若、天狗、狐狸、鬼、龙，还有一些看起来像是人类流行角色的仿制品。\n\n\"小狐狸要不要买一个？今年新出的'银月九尾'款——以你为原型做的哦，卖得可好了。\"\n\n晓光凑过去看了看。那个面具确实做得挺像，银白色的狐脸，九条尾巴从两侧延伸出去。但眼睛的颜色不对——做成了两只金色，而不是一红一金。\n\n\"眼睛颜色不对。\"她指出来。\n\n\"啊，这个嘛……异色瞳太难做了，成本上去就没人买了。你知道现在经济不好，妖怪也要吃饭的嘛……\"\n\n\"那你至少在说明里注明一下吧，别人还以为我长这样呢。\"\n\n面灵老板三层面具同时做出一个\"这不重要\"的表情。也不知道他怎么做到的。\n\n她笑了笑，继续往前走。\n\n夜市的主街大概有五百米长，两边的摊位紧紧挨着，头顶的灯笼把整条街照得亮如白昼。人流密集的地方走路只能随着人群的节奏缓缓移动——被两个体型巨大的山鬼夹在中间的感觉不太好受，她的尾巴差点被踩到了三次。第三次的时候她悄悄释放了一点点妖力，让尾巴末端发出银色的微光。山鬼低头一看，赶紧让开了路。\n\n\"不好意思不好意思——\"\n\n狐狸的尾巴是碰不得的。这是风见市妖怪社会的基本常识。\n\n她在一家卖手工饰品的摊位前停下脚步。摊主是一只老化狸，胖乎乎的手指灵巧得不像话，正在用银丝编一只小狐狸挂件。挂件只有拇指甲大小，但细节精致得惊人——每一根胡须、每一条尾巴都清晰可辨。\n\n\"这个好可爱……主人会喜欢吗？\"\n\n她蹲下来，把脸凑得很近。挂件的眼睛嵌着两颗米粒大小的石头，在灯笼光下闪着柔和的光泽。银丝的纹路很细，细到她差点以为是画上去的——但用指甲轻轻刮了一下，能感觉到金属的凸起。\n\n老化狸抬起头，推了推鼻梁上的老花镜。镜腿是用竹子削的，镜片上有几道细小的划痕。\"哟，晓光小姑娘。给那位言灵使大人挑礼物？这只挂件是用风见山的月光石做的眼睛，会跟着光线变颜色的。白天是蓝色，晚上在月光下会变成银色。\"\n\n\"真的假的？\"\n\n\"骗你我这把老骨头还混什么夜市。你看——\"他把挂件举到灯笼下面，月光石果然变成了一种介于蓝和银之间的颜色。\"要是放在窗台上，早上起来看到的颜色和晚上完全不一样。送人特别好——每次看都不一样，就不容易腻。\"\n\n\"多少钱？\"\n\n\"三千灵。不过你要是愿意让我摸一下尾巴，可以打五折。\"\n\n\"想得美。\"\n\n她毫不犹豫地拒绝了。老化狸笑呵呵的，显然早就预料到了这个回答。\n\n她蹲在摊位前犹豫了一会儿。三千灵不算便宜。她这个月的零用钱大部分都花在了漫画和零食上——上周在人类的便利店发现了一种新出的薯片口味，她一口气买了八包，回去被主人念了一顿。\n\n主人念她的时候语气很平淡，跟在陈述一个事实似的：\"八包同一个口味的薯片。\"\n\"可是它限量的！\"\n\"……限量不是让你一个人把限量买完。\"\n\n然后白霜在旁边补了一刀：\"库存显示还有三百多包。\"\n\n那天晚上她赌气不跟白霜说话，白霜面不改色地继续处理数据，好像根本没注意到一样。\n\n\"能不能两千五？\"\n\n\"小姑娘，手工货你也好意思砍价。银丝是从天狗族的矿脉里——\"\n\n\"两千八。\"\n\n\"……成交。你们狐狸果然会做生意。\"\n\n老化狸叹了口气，手上的动作却一点没慢。他从摊位下面翻出一片枫叶——鲜红色的，脉络清晰，像刚从树上摘下来。他把挂件小心地放在枫叶中央，然后用一种晓光看不懂的手法把叶片对折包好。枫叶是经过特殊处理的，会保持新鲜的状态半年以上。\n\n\"回去记得跟你家那位言灵使大人说一声，有空来我这儿坐坐。上次他帮我修好的那个结界，到现在还稳稳当当的。\"\n\n\"嗯，我跟他说。\"\n\n晓光接过来，小心翼翼地放进外套的内兜里。手指隔着布料摸了摸挂件的形状，嘴角不自觉地翘起来。\n\n她的手刚离开口袋——\n\n身后传来了一声尖锐的爆裂。\n\n空间结界像玻璃一样碎开了裂纹。\n\n那声裂响不是普通的声音——它穿透了物理层，直接在灵觉层面炸开，像有人在她的脑子里敲碎了一面镜子。夜市里所有的妖怪都同时皱起了眉头，有些低阶妖怪甚至直接捂住了耳朵蹲下去。老化狸的幻术闪了一下，露出一截浣熊的尾巴。\n\n晓光的耳朵在帽子下面猛地竖起来——这次连按都来不及按。那种频率的灵力振荡，像指甲划过黑板，只不过划的是她的神经末梢。\n\n街灯全灭了。红灯笼里的真火同时熄灭，像是被一阵看不见的风吹灭的。黑暗在一瞬间吞没了整条街。\n\n有人尖叫。有小孩哭。有什么东西在远处发出沉闷的撞击声，像是有人在用铁锤砸墙。\n\n然后，不该出现在夜市的东西出现了。\n\n第一批穿着黑色兜帽衫的人影冲进了夜市。他们手里拿着铁棒和刻满符文的手枪，身后跟着一群眼睛发红、口水横流的低阶妖兽——那些妖兽的动作僵硬且暴烈，明显被什么药物控制了。它们的身上散发着一种腐甜的气味，是灵力腐蚀的征兆。妖兽的眼白布满血丝，嘴角挂着黑色的泡沫，像是被强行注入了过量的灵力催化剂。\n\n兜帽人的数量不算多——晓光用鼻子数了一下，大概十五到二十个。但他们的行动异常有组织，三人一组，分头切断夜市的各个出口。控制的妖兽少说也有三十只以上，像一群疯狗一样四处冲撞，把混乱放大到了极限。\n\n尖叫声瞬间淹没了夜市。\n\n章鱼烧大叔的铁板车被掀翻，滚烫的铁板砸在地上溅起火星。他的八条腕足卷起了三个站不稳的小妖怪，拼命往摊位后面的暗巷撤退。铁板上还翻着最后一批丸子，孤零零地在翻倒的铁板上焦化，散发出焦糊的烟。小妖怪们四散奔逃——那个鬼族小女孩抱着爸爸的脖子嚎啕大哭，她爸爸一边跑一边用角顶开挡路的残骸。那只他打了三枪都没打中的毛绒大熊掉在地上，被踩得稀烂。\n\n纸伞老板变回本体——一把破旧的油纸伞——试图张开伞面形成防护结界，但一名兜帽人一刀砍来，把他的伞面撕裂了一半。纸伞发出一声痛苦的惨叫——那声音很奇怪，像布料被撕裂的声音混合着老人的呻吟。他的烟斗从空中掉下来，摔在地上碎成两半。刚才还在吐\"万事如意\"的银色细丝，现在变成了弥散的、无意义的烟雾。\n\n面具摊主的三层面具同时碎裂。最里面的那张脸——终于露了出来——是一张什么表情都没有的、光滑的、空白的脸。他发出了一声无声的尖叫，然后缩成一团滚进了摊位下面。那些挂在展示架上的面具纷纷掉落，在地上摔成碎片——般若的、天狗的、还有那个\"银月九尾\"款，银白色的狐脸从中间裂成两半。\n\n老化狸一把拉住晓光的手腕：\"快走！从后面的排水沟走！我认识路——\"\n\n他的话被一声枪响打断。符文子弹击中了他的肩膀，灵力冲击波将他整个人掀翻在地。他的幻术碎了，露出一只肥胖的棕色浣熊的本体，蜷缩在地上痛苦地抽搐。那个银丝挂件散落在他身边，月光石的眼睛在火光中闪了一下。\n\n\"老爷爷！\"\n\n晓光蹲下去想扶他。老化狸用一只颤抖的爪子推了推她的手。\n\n\"别管我……我这身肥膘，一颗子弹打不死的。你走……别让他们抓到银月脉的……\"\n\n他的声音越来越弱。伤口周围的皮毛被符文的光灼得焦黑，空气中弥漫着毛发烧焦的刺鼻气味。\n\n广播系统被劫持了。一个经过变声处理的声音响彻夜市，尖锐而疯狂：\n\n\"看看吧！这就是你们向人类摇尾乞怜的下场！S.C.B不会保护你们，他们只会把你们当成实验材料！百鬼联盟？一群靠讨好人类苟活的废物！真正的妖怪不需要和人类共存——我们需要的是自由！\"\n\n广播重复了三遍。每重复一次，声音就更尖锐一些，最后一遍的时候已经接近了妖力共振的频率——那是一种会让低阶妖怪本能恐惧的声波。更多的小妖怪开始哭泣，有些直接被吓得变回了本体。\n\n晓光被人群裹着往后退。她的心跳得厉害，耳朵在帽子下面不受控制地竖起来。空气里弥漫着浓烈的妖血味——和人类的血不一样，妖血带着一种奇异的甜香混合硫磺，刺鼻得让人头晕。她的狐鼻比任何妖怪都灵敏，这些气味像一把把小刀扎在她的感官上。\n\n她能分辨出来——至少有七种不同妖怪的血。有章鱼墨汁的腥味、有河童甲壳碎裂的泥土味、有纸伞的糨糊味……还有一种她非常熟悉的、带着蛛丝特有的干涩味道。\n\n红绡的血。\n\n晓光的瞳孔缩成了竖线。\n\n她想起主人说过的话——\"遇到危险就跑。跑不掉就躲。等我来找你。\"\n\n他说这话的时候表情很认真，手放在她头顶上，力道不重不轻。她当时点了点头说\"知道了\"，但她知道自己在撒谎。她知道自己做不到。\n\n因为有些事情比安全更重要。\n\n但她没有跑。因为她看到了红绡。\n\n红绡被锁链吊在广场中央的钟楼上，手脚被刻满符文的枷锁固定。她的直播手机掉在地上，镜头碎了，但还在顽强地亮着——屏幕上弹幕疯狂滚动。红绡嘴角有血，妆花了一半，但还在骂人：\n\n\"放开老娘！你们这群疯子知道老娘有多少粉丝吗！一个举报就能让你们社死——\"\n\n一个兜帽人笑着往她嘴里塞了一块布。\n\n红绡是蜘蛛精，妖怪夜市最受欢迎的网红主播，也是晓光为数不多的朋友之一。她们是在一次直播连线里认识的——红绡想做\"异类生活\"系列节目，晓光是她的第一期嘉宾。那次直播被S.C.B勒令下架了，但两个人从此成了朋友。红绡比晓光大三岁，总是叫她\"小妹妹\"，带她去买化妆品——虽然晓光从来不化妆，但她喜欢红绡试色时叽叽喳喳的样子。\n\n红绡是个话多的人。什么都说，什么都聊，嘴巴一刻不停。有时候聊着聊着就跑题了，从化妆品聊到妖怪政治再聊到她昨天看的一部烂片。晓光经常来不及插嘴，但她不讨厌。因为有人愿意对你说那么多话，本身就是一种信任。\n\n而现在——堵住红绡嘴巴的那块布，比锁链更让晓光愤怒。\n\n晓光的脑子嗡的一声。她想到了八年前。铁笼。锁链。一模一样的绝望。那个冰冷的、潮湿的地方，手腕上的铁环磨出了血。水泥地板上的裂缝，天花板上不停滴水的管道，空气中永远散不掉的铁锈味和消毒水的味道。她的身体开始发抖——不是因为害怕，而是因为那段记忆正在她的灵魂深处翻涌，像一头被铁链锁住的野兽在怒号。\n\n那时候她也被堵过嘴。脏布塞进来的时候她差点吐了。后来她学会了不出声，因为出声只会换来更多的疼痛。\n\n她咬紧了牙。牙齿咬在嘴唇内侧，血腥味在口腔里蔓延开来。\n\n\"红绡姐姐！\"\n\n她的腿在发抖，但她还是迈出了第一步。\n\n周围的人在四散奔逃，只有她逆着人流冲了上去。有人拉了她一把——是一个河童，急得头顶的盘子里的水都溅出来了——\"小姑娘别去！那边危险！\"她挣开了他的手，差点被逆流的人群撞倒，踉跄了两步，扶了一下旁边倒塌的摊架，继续跑。\n\n河童在后面喊了什么，被尖叫声和撞击声淹没了。她没有回头。\n\n她冲了出去。\n\n她的脑子里只有一个念头——不能让任何人再被关在笼子里。\n\n谁都不行。\n\n---\n\n她跑过燃烧的摊位残骸，跳过散落一地的商品和碎玻璃。脚底传来碎片扎进运动鞋底的钝痛。一个被掀翻的糖苹果锅在她旁边滚过，滚烫的糖浆在地上拉出长长的焦糊痕迹。\n\n地上到处都是散落的东西——面具的碎片、糖果、手机、有人跑丢的鞋子。她踩到了一个什么软的东西——低头一看是一只布偶，大概是哪个小妖怪掉的。布偶的一只眼睛掉了，棉花从破口里露出来。\n\n一只低阶妖兽挡在路上——那是一只被控制的赤犬，嘴里流着黑色的唾液，眼白布满血丝。它朝晓光扑过来。她能闻到它身上的灵力催化剂的味道——腐甜的，像是坏掉的水果泡在酒精里。这东西的心跳快得不正常，怕是活不了多久了。\n\n可怜的东西。它也是被利用的。\n\n她没有停下脚步。\n\n妖力从指尖涌出——不是攻击，而是屏障。一面薄薄的灵力膜挡在她和赤犬之间。赤犬撞上去，被弹出三米远，在地上翻滚了两圈后晃晃悠悠地站起来，甩了甩头，又朝她扑。第二次撞击让屏障碎了一角。晓光没时间修补——她绕过赤犬，从它的侧面跑了过去。赤犬在后面咆哮了两声，但似乎失去了追踪的目标，转头去攻击旁边一个已经倒塌的摊位。\n\n晓光已经跑到了钟楼下面。\n\n钟楼有十米高，是夜市的标志性建筑。钟面上的数字不是阿拉伯数字，而是十二地支——子丑寅卯辰巳午未申酉戌亥。指针已经停了，停在\"酉\"的位置——晚上六点左右，大概就是袭击开始的时间。钟楼的砖面布满裂缝，砖缝里长着一种发光的苔藓——那是夜市建成时就有的，据说是某种灵植的孢子。现在那些苔藓暗淡了很多，像是也被空间结界的崩裂波及了。\n\n红绡被吊在七米左右的位置，锁链上的符文在月光下闪着冷蓝色的光——那是封印符，专门用来压制妖力的。红绡的蛛丝——她最强的武器——完全使不出来。她的手腕被勒得发紫，几根细丝从她的指尖渗出来又立刻断掉，像是被什么力量在源头掐灭。\n\n\"红绡姐姐！我来了！\"\n\n红绡嘴里塞着布说不了话，但她的八只眼睛（她在紧急情况下会露出本体特征）全都亮了起来，拼命朝晓光摇头。她的表情很急切——不是为自己担心的那种急切，而是拼命想告诉对方什么的急切。\n\n意思很明确：快跑！不要管我！这是陷阱！\n\n晓光看懂了。她当然看懂了。\n\n但她的脚没有停。\n\n她想起上次跟红绡一起逛街。红绡拉着她进了一家人类的奶茶店，用幻术把自己伪装成一个黑长直的大学生。两个人坐在靠窗的位置，红绡一边喝奶茶一边叽叽喳喳地说着什么。阳光从窗户照进来，把红绡杯子里的珍珠照得一颗一颗清清楚楚。\n\n\"小妹妹你说，要是有一天被人知道我们是妖怪了怎么办？\"\n\"跑呗。\"\n\"跑得掉吗？\"红绡笑了一下，搅了搅杯子里的珍珠，\"算了不想这个。来来来，你尝尝这个芋泥——\"\n\n那天的芋泥很好喝。甜甜的，有一点点咸。\n\n晓光没理她。她蹲下身准备跳——九尾狐的弹跳力可以轻松到达七米的高度。她的膝盖弯曲，小腿肌肉绷紧，灵力开始在脚底汇聚——\n\n她的脚刚离开地面，就感觉到了脖子上的那一针。\n\n冰凉的。精准的。像是等了她很久。\n\n针管刺入的角度完美地避开了颈动脉，直接扎进了颈侧的灵脉穴位——那个位置只有对九尾狐的生理结构了如指掌的人才知道。\n\n晓光的身体悬在半空中一瞬间——然后重重地摔回了地面。膝盖撞在砖地上，发出一声闷响。疼痛从膝盖传上来，但和脖子上那种冰凉的侵蚀感比起来，膝盖的疼几乎可以忽略。\n\n这是一个圈套。\n\n红绡不是意外被抓的。她是诱饵。\n\n夜冠从一开始就知道——只要红绡被困在这里，晓光就一定会来。不是因为她多么勇敢，而是因为她太明白被囚禁的感觉了。创伤后应激的行为模式比任何计算都准确：看到有人被锁链束缚，她就不可能转身离开。\n\n八年前的铁笼。\n\n这次是药物。\n\n药物沿着灵脉扩散的速度远比沿着血管快。那些冰凉的液体像是有了自己的意识，顺着灵脉网络往她身体的每一个角落蔓延。它经过心脏的时候，心跳猛地加速了一拍。经过丹田的时候，封印在那里的妖力发出了一声低吼——像是被什么东西激怒了。\n\n当针管里的液体涌进血管的那一刻，世界开始变红。不是视觉上的红——是感知层面的。每一个声音都变得尖锐而刺耳，每一种气味都被放大到了痛苦的程度。她能听到自己骨头里灵力流动的声音，像烧开的水在管道里奔涌。她的体温在飙升，皮肤下面像有什么东西在膨胀、在撕扯、在尖叫着要出来。\n\n九条尾巴不受控制地从外套里挣出来，银白色的毛发在黑暗中发出刺眼的光。耳朵也竖了起来，帽子被顶飞。她的指甲在变长，瞳孔在收缩，犬齿抵在下唇上——\n\n不对。这不对。她在失去对自己的控制。\n\n晓光最后的清醒意识里只剩下一个念头：\n\n主人。\n\n对不起。\n\n我又给你添麻烦了。\n\n内兜里的小狐狸挂件被涌出的灵力震碎了包装的枫叶。月光石的眼睛在黑暗中闪了最后一下——在白天是蓝色的，现在是银色的。\n\n和她的头发一样的银色。\n\n然后——黑暗吞没了一切。\n", "小说/卷三/第三章_神的命令.md": "# 卷三·风见之乱 — 第三章 神的命令\n\nS.C.B总部的回复只有三个字：天火批准。\n\n电子文档上没有签名，没有备注，没有任何犹豫的痕迹。三个字。从东京总部传到风见分局的通讯终端，用了零点三秒。做出这个决定的人大概也只花了差不多的时间。\n\n一枚对城级符文导弹从三十公里外的秘密发射井升空。它拖着蓝色的尾焰划破夜空，直指风见市的中心——直指那只还在咆哮的九尾白狐。发射井藏在风见市外围的群山中，伪装成一座废弃的采石场。发射口的伪装盖板在导弹升空时被冲击波掀飞了，露出下面漆黑的金属井壁和还在冒烟的导轨。\n\n\"天火\"是S.C.B最高等级的歼灭手段。专门用于对付无法控制的S级超自然灾害。它的弹头内嵌了三层九阶符文阵列，爆炸半径三公里，在这个范围内，一切灵力构成的存在——无论妖怪、结界还是灵脉——都会被彻底湮灭。\n\n上一次使用天火，是六十三年前的关东灵脉暴走事件。那次发射毁灭了一座小镇。至今那个地方仍然是灵力荒漠，连草都不长。卫星图上那个区域是一片灰白色的圆形——像是大地上被烟头烫出来的疤。附近居民管那里叫\"寂静之原\"。鸟不飞过那片天空。\n\n现在，同样的东西正在以三倍音速飞向风见市。飞向一个有三十万人居住的城市。飞向一个十五岁的女孩。\n\n千翼拼尽全力在导弹轨道上竖起了一道风墙。维持了零点四秒。风墙像纸一样被撕碎，连带着他的左翼再折了两根翎羽。他在空中翻滚了两圈才稳住身形，嘴角溢出一缕黑色的血。\n\n\"所有人撤离！三十秒后冲击波到达！\"\n\n通讯频道里是此起彼伏的惨叫和脏话。S.C.B的特勤队开始疯狂后撤，机甲部队丢弃了外骨骼直接跑。百鬼联盟的疏散队拼命把受伤的妖怪往折叠空间的出口塞——出口已经被挤得水泄不通了。一个河童小队长站在出口旁边维持秩序，嘴里不停地重复着\"不要推不要推\"，声音已经劈了。\n\n三十秒。\n\n三十秒之后，这里就什么都不会剩下了。不会剩下夜市的摊位和灯笼，不会剩下章鱼烧大叔和纸伞老板，不会剩下那个鬼族小女孩和她爸爸，不会剩下那只银白色的九尾狐。\n\n司衡·岚站在指挥车的车顶上，看着天上那个越来越近的蓝色光点。风吹乱了他的短发，金属义肢——右臂从肘关节以下全是机械——攥得嘎吱作响。义肢上的灵力指示灯在闪烁，像是在警告过载。他没理会。\n\n\"总部……总部那群混蛋……\"\n\n他的牙齿咬得咯吱响。他知道总部为什么批准天火——不是为了消灭一只暴走的九尾狐。而是为了销毁证据。今晚夜市袭击的幕后策划者、返祖诱导剂的来源、S.C.B内部的情报泄露——如果一枚天火把一切都抹干净，这些问题就永远不需要答案了。\n\n他当了二十年的S.C.B，太了解这个组织了。\n\n他打开了全频广播：\"所有人注意，我是司衡·岚。我没有批准天火。重复，我没有批准天火。这是总部的独断行为。所有S.C.B风见分局的人员听令——立即协助百鬼联盟疏散平民，这是命令。\"\n\n通讯频道安静了一秒。\n\n一秒钟很短。但在那一秒钟里，所有收到命令的特工都在做同一个选择——是服从东京总部的既定方针，还是服从顶着被军事法庭的风险发布违令命令的风见分局局长。\n\n然后，此起彼伏的应答声响了起来。\n\n\"风见一组收到。\"\n\"二组收到。\"\n\"三组……收到。局长。\"\n\n最后那个声音带着一种几乎是感激的颤抖。\n\n司衡·岚的嘴角苦涩地扯了一下。他知道这个命令会让他被送上军事法庭。但他也知道，在场的每一个特工都不希望这一幕发生——用一枚导弹杀死一个十五岁的小女孩，仅仅因为她被人注射了药物。\n\n他在风见市待了十二年。这座城市的每一条街道他都走过，每一个妖怪聚落他都去过。他跟章鱼烧大叔买过夜宵，跟纸伞老板借过火，在鬼族小女孩出生的时候送过一只布偶——也不知道今晚还在不在。\n\n导弹距离目标还有八百米。五百米。两百米。\n\n一百米。\n\n蓝色的尾焰在夜空中拖出一条刺眼的弧线，照亮了整个街区。那光太亮了——直视的话会灼伤视网膜。所有人都本能地别过脸去。\n\n除了一个人。\n\n一个身影出现了。\n\n他穿着普通的风见学园校服，黑色卫衣的帽子还挂在脑后，运动鞋的鞋带松着，看起来跟从家里跑出来忘了穿好衣服的中学生没什么两样。\n\n他站在巨狐的头颅前方。和那枚足以夷平半个街区的导弹之间只隔着空气。\n\n他是什么时候到的——没有人注意到。好像他一直就在那里。又好像他是从空气中凭空出现的。但监控录像后来反复回放确认——他是跑过来的，就是用两条腿跑的，速度并不快，甚至还在一处碎石堆前面绊了一下。只是所有人的注意力都在那枚导弹上，没人注意到一个跑步的中学生。\n\nS.C.B的通讯频道再次炸锅了。\n\n\"那个小孩从哪冒出来的——\"\n\"不是小孩！热成像显示灵力反应——等等，这个数值不可能……检测设备故障了？\"\n\"不是故障。那是——那就是言灵使。\"\n\n频道沉默了。\"言灵使\"这三个字在S.C.B内部的分量，比\"天火\"还重。因为天火是S.C.B造出来的武器——但言灵使不是。言灵使是这个世界的规则本身。\n\n他摘下眼镜。\n\n随手扔了。\n\n眼镜在空中划出一道弧线，镜片上裂纹的折射在月光下闪了一下，然后落在碎石堆里，无声无息。\n\n他平时戴眼镜不是因为近视——是因为他的眼睛在使用言灵时会发生变化，眼镜是最方便的遮挡。但现在不需要遮挡了。他的虹膜正在从深褐色变成一种透明的、像水晶一样的颜色，瞳孔中央隐隐有符文在流转。\n\n司衡·岚在指挥车的屏幕上看到了他的脸。他的手不由自主地握紧了椅子扶手。\n\n他见过言灵使的档案照片——一个普通的中学生，成绩中等偏上，体育课经常请假，最大的爱好是看动画片和吃零食。档案里的评估等级是\"潜在S级，但尚未完全觉醒\"。备注栏里只有一句话：\"不建议主动接触。维持现状即可。\"\n\n但此刻站在那里的少年和档案照片不一样。不是外貌变了。是存在感变了。就好像——一直关着的灯突然打开了，而你才发现整个房间其实很大。\n\n他抬起右手，对着那枚尖啸而来的导弹，做了一个下压的手势。\n\n像在对一只不听话的狗说\"坐下\"。\n\n导弹停了。\n\n不是减速，不是悬停。是定住了。连尾焰的火光都静止在空中，像一幅画。蓝色的火焰被冻结在那一刻的形态里，每一个火星、每一缕烟尾都纹丝不动。\n\n整个世界在这一刻定住了——不，只是导弹定住了，但看起来像是整个世界都停了，因为导弹的尾焰是那一瞬间天空中最亮的东西，当它停下来时，天空本身好像也停了。\n\n然后，导弹开始分解。从头部的引信到尾部的推进器，从金属外壳到内部的符文阵列，一切都变成了细小的光点，像一场倒放的雨，无声地飘散在夜空中。三层九阶的符文阵列——足以毁灭三公里内一切存在的终极武器——就这样在一个中学生的手势下变成了满天星光。\n\n那些光点飘散的轨迹很美。有人后来把监控截图传到了网上——标题是\"万圣节的烟花\"。他们不知道那是什么。他们以为那真的是烟花。\n\n全城安静了。\n\n不是比喻。是真的安静了。风声停了，警笛停了，远处的犬吠停了，虫鸣停了。像是整个风见市都被一只无形的手按下了静音键。连空气的流动都变得迟缓——树叶停在半空中，灰尘停在光线里，水滴停在水龙头的出口。\n\n在那片绝对的寂静中，一个声音直接在所有人的脑海里响起——不经过耳朵，直达意识：\n\n**\"肃静。\"**\n\n不是声波。是概念本身。\n\n这个\"安静\"不是声学意义上的安静——它是一种存在级别的命令。在这个命令的覆盖范围内，一切非生命的能量波动——符文、灵力、妖术、机械运转——全部停止。战斗在物理层面上不再可能。\n\nS.C.B的装甲断电了。符文炮的充能归零了。直升机的螺旋桨在减速——飞行员在频道里尖叫，但发现引擎只是降到了最低功率，足够安全降落，不会坠毁。这不是毁灭性的力量——它精确地、温柔地、不可违抗地让一切暴力手段失效。\n\n就连那些被返祖诱导剂控制的妖兽也停了下来。不是因为药物失效——而是在这个\"肃静\"的场域内，连暴走的本能都被压制了。那些赤犬和变异妖兽一只只趴在了地上，发出困惑的呜呜声，像是做了一场长长的噩梦终于醒了过来。有一只赤犬的嘴角还挂着黑色的泡沫，但它的眼睛恢复了正常的颜色——棕色的，湿漉漉的，带着一种茫然的恐惧。\n\n夜冠布置在各处的符文陷阱全部熄灭了。暗藏在地砖下面的灵力地雷、嵌在墙壁里的监控符咒、甚至是他身上穿着的符文护甲——所有的东西在那一声\"肃静\"之后全部归零。像一块写满了公式的黑板被人一把擦干净。\n\n红绡身上的封印锁链也断了。符文枷锁失去了灵力供给，变成了普通的金属，在她的挣扎下哗啦一声散落在钟楼下面。她从七米高的位置摔下来——但一张临时编织的蛛丝网接住了她。她的蛛丝回来了。\n\n她把嘴里的破布吐出来，第一句话是：\"操！老娘的妆全花了！\"\n\n第二句话是望向远处的晓光和那个少年，声音忽然小了下去：\"……那丫头没事吧？\"\n\n千翼跌坐在废墟上。他活了三百多年，见过无数强大的存在。但他从未见过有任何力量能做到这一点——用一个词，让一座城市静音。\n\n他想起了很久很久以前，他的师父——一只活了一千二百年的老天狗——临死前对他说的话：\"真正的力量不是摧毁。是命名。是第一个人站在混沌面前，说出'光'这个字的那一刻。\"\n\n他当时以为那是老糊涂了的胡话。\n\n现在他明白了。\n\n他的翅膀在发抖。不是因为伤痛。是因为恐惧。\n\n不，不是恐惧。是敬畏。\n\n那种敬畏像冰水一样从头顶浇下来，把他三百年积累的所有骄傲和自信冲得干干净净。在那一刻，他不是百鬼联盟最强的天狗战士，不是活了三个世纪的长老——他只是一只翅膀断了的鸟，坐在废墟上仰望着一种他无法理解的存在。\n\n主人转过身。他没看那些装甲车，没看那些荷枪实弹的特工，没看天上盘旋的直升机。他只看着面前那只巨大的、浑身颤抖的九尾白狐。\n\n他的表情很平静。平静得跟在客厅叫她吃饭一样。\n\n\"玩够了吗？\"\n\n他的声音很轻，像是在说一件最平常的事。\n\n\"该回家吃饭了。\"\n\n巨狐的身体在颤抖。那双兽性的竖瞳里，泪水像断了线一样涌出来，从脸颊两侧滑落，砸在碎石地上溅起水花。每一滴都带着微弱的金色光芒——那是被返祖诱导剂激活的灵力在随泪水排出。\n\n巨狐发出了一声低号——不是咆哮，不是怒吼，而是一种低沉的、近乎耳语的声音。像小狗被主人从大雨里找回来时发出的那种声音。\n\n\"呜……主……人……晓光……变丑了……变大了……回不去了……\"\n\n它试图后退，不想让主人看到自己的样子。巨大的爪子在地面上刨出深深的沟壑。九条尾巴紧紧地缩在身后，像是想藏起来。\n\n\"别看……别看我……我是怪物……我会吃了你的……\"\n\n主人没有后退。他向前走了一步。\n\n然后飞身而起，轻盈得像一片树叶。\n\n他落在巨狐的鼻尖上——那个粗糙的、不再柔软的鼻尖——然后蹲下来，伸手摸了摸那层金红色的粗硬皮毛。他的手很小。在巨狐的头颅上，他看起来像一只停在鲸鱼背上的蝴蝶。\n\n巨狐不敢动。她的整个身体僵住了——不是因为恐惧，而是因为害怕自己一个不小心的动作就会伤到他。他太小了。太脆弱了。她现在一个呼吸的气流就能把他吹倒。但他就蹲在她的鼻尖上，毫不在意。\n\n\"你不是怪物。你是我的晓光。\"\n\n他的额头抵上了她的额头。人类少年纤细的身影和三米高巨兽的对比荒谬得像一幅错误的画。但画面中只有温柔。\n\n他的皮肤很凉。因为只穿了一件薄薄的校服跑出来，秋夜的风已经把他吹透了。但他的手指摸在她额头上的时候是暖的——或者说，她觉得是暖的。\n\n\"不管变多大，不管变成什么样，只要我还能认出你，你就永远是我的。\"\n\n他的声音变了。不是命令，但比命令更重。那是一种承诺——一种比言灵的力量更古老、更不可违抗的东西。\n\n\"变回来。\"\n\n一秒的停顿。\n\n巨狐的身体开始发光。金红色的毛发褪去颜色，变回雪白。三米的身躯在缩小，骨骼在咔嚓咔嚓地重组。九条尾巴从狂暴中安静下来，像溪流一样柔软地垂落。\n\n缩小。再缩小。\n\n他从鼻尖上跳下来，站在地上接住了她。\n\n最后，主人的怀里多了一个赤裸的、浑身颤抖的少女。\n\n银白色的长发散落一地。项圈上的金色铃铛发出一声清脆的响。铃铛在变形的时候居然没有掉——大概是因为那是主人买的东西，她的身体本能地保护了它。\n\n她抱着主人的脖子，哭得上气不接下气。指甲嵌进他后背的衣服里，像是怕一松手就会再次变成那个怪物。她的身体还很烫，变形的残余能量从皮肤下面渗出来。她在发抖。不是冷。是药物的余波在灵脉里慢慢消退，每消退一分就带来一阵撕裂般的疼痛。\n\n\"呜呜呜……遵命……主人……晓光……回来了……\"\n\n她把脸埋在他的颈窝里，鼻子在他的皮肤上蹭了蹭。她在确认。确认这个味道是真的。确认自己不是在那片灼热的黑暗里做梦。确认她真的回来了。\n\n九条尾巴一条一条地缠上去。从腰到胸口到手臂到腿。像是要把他整个人包进一个银白色的茧里面。她知道自己在做什么——她在标记。狐狸标记安全的东西的方式就是用尾巴把它裹起来。这是本能，不需要思考。\n\n他没有挣扎。只是说了一句：\"鼻子别蹭了，痒。\"\n\n她蹭得更用力了。\n\n主人把校服卫衣脱下来披在她身上。他的动作很轻很稳，像给她盖了无数次的被子一样自然。卫衣上有他的体温。她把衣服裹紧了一些，把鼻子埋进领口。\n\n\"……主人身上好香。\"她哑着嗓子说了一句完全不合时宜的话。\n\n他没回答。只是把她抱得紧了一点。\n\n远处，司衡·岚从指挥车上跳下来。他的义肢着地时在水泥地面上砸出一个浅坑。他站在原地看着那个抱着少女的少年，沉默了很久。\n\n然后他转身对助手说：\"通知总部。天火被言灵使截获并销毁。目标已脱离返祖状态。风见分局全员安全。另外——\"他顿了一下，\"帮我准备一份辞呈。\"\n\n助手愣了一下：\"局长……\"\n\n\"不用了。大概递不上去。\"他苦笑了一下。\"言灵使介入的事件，总部不敢追究。但我会记住今晚——他们向一个孩子发射了天火。\"\n\n他看了看战场的残骸。半条街被毁了。钟楼塌了一半。至少十几个摊位变成了废墟。地面上到处是裂缝、碎玻璃、散落的商品和黑色的血迹。有些地方还在冒烟。\n\n但没有人死。\n\n这是最让她意外的地方。一场这种规模的事件——S级妖兽暴走、对城级导弹发射——居然没有造成一个人死亡。重伤的有几十个，纸伞老板的本体损伤严重，触手大叔丢了一条腕足，还有不少小妖怪受了惊吓需要心理疏导。但没有死亡。\n\n她不知道这是运气还是其他什么。\n\n但她看了一眼那个正抱着狐狸少女往回走的少年的背影——他只穿了一件薄薄的内搭T恤，秋夜的风把他的头发吹得乱七八糟，背上趴着的少女用九条尾巴把他裹得像个银色的粽子——她觉得大概不是运气。\n\n\"安排医疗队进场。\"她对助手说。\"先处理重伤员。纸伞老板的本体需要付丧神专用的修复术——联系京都分局，他们有这方面的专家。通知百鬼联盟来协助善后。还有——\"\n\n她看了一眼红绡摔在地上还在直播的手机。屏幕上的弹幕已经刷成了一面墙。\n\n\"把那个直播关了。\"\n\n助手跑过去的时候，红绡正坐在地上检查自己的指甲有没有断。她看到S.C.B的人朝她跑来，本能地把手机往身后藏了藏。\n\n\"别碰老娘的手机！\"\n\n\"……我们只是想帮你关掉直播。\"\n\n\"关你什么事？老娘直播老娘的事又没拍你——\"她瞄了一眼弹幕，发现观看人数已经突破了五百万。她愣了一下。然后露出了一个蜘蛛精式的微笑。\"其实也不是不可以商量。\"\n\n红绡修好的直播镜头拍下了这一幕。S.C.B的卫星拍下了这一幕。抬头看天的风见市民拍下了这一幕。\n\n满天光点散落如雨。一个少年站在废墟中央抱着一个少女。九条银白色的尾巴在身后轻轻摇曳。\n\n那段视频在四十八小时之内被观看了两亿次。\n\n标题五花八门——\"风见市上空的神秘光团\"、\"万圣节UFO目击事件\"、\"疑似军方秘密武器试验\"、\"日本版罗斯威尔？风见市居民拍到巨大白色生物\"。阴谋论者在论坛上吵得不可开交。有人画了分析图，用红线把各种截图连在一起，写了三万字的帖子论证这是外星人入侵。还有人声称自己就是风见市居民，亲眼看到了九条尾巴的白色巨兽——但没人信他。\n\n气象局发了一条含糊的声明说是\"罕见的球形闪电群\"。没有人信。\n\n但红绡那段直播里——虽然画面抖得厉害、镜头有裂纹——清清楚楚地拍到了一只九尾狐。拍到了那些穿黑色兜帽衫的袭击者。拍到了S.C.B的装甲部队。拍到了一个少年站在巨兽面前，然后那只巨兽变成了一个女孩。\n\nS.C.B的网络部门在一小时内删除了所有平台上的视频。但这是互联网。删除只意味着更多的备份和更疯狂的传播。有人把视频上传到了暗网。有人用区块链做了永久存档。有人在推特上用日语、英语、中文同时发布了截图。\n\n到第三天的时候，\"风见事件\"已经成了全球社交媒体的热搜第一。\n\n---\n\n晓光不知道这些。\n\n她在主人怀里睡着了。\n\n准确地说，是昏过去了。药物的后遗症、变形消耗的灵力、还有剧烈的情绪波动——任何一项都足以让她崩溃，三项叠在一起，她的身体直接选择了强制关机。\n\n她最后的清醒记忆是主人的体温、衣服上的洗衣液味道、还有他抱着她走路时轻微的起伏节奏——像坐在一条很小的船上，在很平静的海面上漂。\n\n她不知道主人是怎么把她带回家的。不知道白霜在门口等了多久。不知道千翼后来怎么了，纸伞老板有没有活下来，红绡被救了没有。不知道S.C.B是否还会发射第二枚天火。\n\n她只知道——醒来的时候，阳光从窗帘的缝隙里漏进来，她躺在自己的床上，盖着自己的被子，怀里抱着主人的枕头（不知道什么时候抢的），身上穿着主人那件有点大的棉质T恤。\n\n床头柜上放着一杯温水和两片退烧药。旁边还有一张纸条，是主人的笔迹：\n\n\"药吃了。水喝了。肚子饿了厨房有粥。下次出门说一声。\"\n\n字迹很潦草。最后那个句号点得有点重，像是在纸上戳了一下。\n\n她把纸条拿起来看了很久。然后叠好，放进了枕头套里面。\n\n然后她趴在枕头上，把脸埋进去，又哭了一次。\n\n这一次的眼泪跟昨晚不一样。不是恐惧，不是痛苦。只是一种溢出来的、装不住的、让她整个胸腔都发酸的东西。\n\n她不知道那个东西叫什么名字。\n\n她的铃铛在脖子上轻轻碰撞。清脆的一声。\n\n窗外有鸟在叫。风把窗帘吹起来一个角。阳光里有灰尘在飞舞。很安静。和昨晚的一切形成了最强烈的对比。\n\n她把纸条又从枕头套里掏出来看了一遍。\"下次出门说一声。\"那个句号确实戳得很重。她能想象他写这张纸条时的表情——大概是那种什么都没有的、平淡的表情。但她知道那不是真的平淡。他越是平淡，越是在意。\n\n她在纸条的空白处用指甲刻了一个歪歪扭扭的心形。然后又塞回了枕头套里。\n\n但她觉得，全世界所有的语言加在一起，大概也装不下它。\n\n全世界的认知滤网在那一夜，同时出现了一道不可修补的裂缝。\n\n这个世界再也没有秘密了。\n\n而她——她只想回到那个怀抱里去。\n", "小说/卷三/第二章_暴走的九尾.md": "# 卷三·风见之乱 — 第二章 暴走的九尾\n\n晓光没跑到红绡面前。\n\n她甚至没看清那根针管是从哪个方向刺过来的。脖子上一阵冰凉的刺痛，然后是液体灌入血管的灼烧感——像有人把烧开的水直接注射进了她的静脉。她条件反射地伸手去拔，但手指刚碰到针管，药液已经全部注入了。针管掉在地上，透明的塑料管壁上残留着几滴液体，在火光的映照下呈现出一种不祥的淡紫色。\n\n\"返祖诱导剂，A级浓度。\"背后传来一个平淡的声音。\"有请银月脉的小公主，展示一下真正的力量吧。\"\n\n那是夜冠。晓光在失去意识之前最后看到的，是一张藏在面具后面的笑脸。白色的面具，上面画着弯月的图案，嘴角诡异地向上翘着。面具的做工很精致——不是夜市上那种粗糙的仿制品，而是用真正的妖骨磨成的粉和漆混合在一起刷出来的。上面的弯月图案在暗处会微微发光，像一只半睁的眼睛。\n\n他站得很近。近到晓光能闻到他身上的味道——不是活物的味道。像是博物馆里那些保存了几百年的标本。干燥的、经过防腐处理的、没有任何生命气息的味道。\n\n\"谢谢你的配合。\"他在晓光耳边说，声音轻柔得像在哄小孩睡觉。\n\n然后世界着火了。\n\n不是外面的世界——是她身体里的世界。每一根骨头都在断裂重组，皮肤像纸一样被撑开，疼痛的程度远远超过了大脑的处理能力。她想尖叫，但喉咙已经变形了，发出来的不是人声，而是一种能震碎玻璃的兽吼。\n\n药物在她的灵脉系统里像火药引线一样烧过去。它不是在增强什么，而是在摧毁——摧毁她花了数百年建立起来的理性层、语言能力、情感控制。那些东西在灵魂深处像冰层一样一层层碎裂，露出下面滚烫的、原始的、没有名字的东西。\n\n返祖诱导剂是夜冠最卑劣的发明之一——它不是增强妖力的兴奋剂，而是一种认知瓦解剂。通过暴力手段摧毁妖怪数百年进化出的人性层，把被压制在血脉深处的远古兽性释放出来。普通妖怪注射后会变成无差别攻击的野兽，持续十几分钟后心脏衰竭而死。\n\n夜冠用这东西做过很多次实验。他把它注射进河童体内，看着河童变成一只浑身长满藻类的水怪，在自己的同伴中间暴走。他把它用在化猫身上，看着化猫褪去所有人类特征，变成一只撕咬一切的巨猫。每一次他都站在安全距离之外，白色面具后面的表情谁也看不见。\n\n但这些都是小实验。银月脉的九尾狐——那才是他等了很久的大菜。\n\n但晓光不是普通妖怪。她是银月脉的后裔。九尾狐血统中最纯正的一支。\n\n她的身体拒绝死亡。\n\n药物试图摧毁她的理性层，但她的灵魂比药物更顽固。所以药物没能杀死她——它只是把那扇从来不应该被打开的门，踹开了。\n\n晓光消失了。\n\n取而代之的，是一只肩高超过三米的巨型九尾白狐。\n\n变形的过程只持续了几秒钟，但对在场的每一个人来说，那几秒钟像是被拉长成了永恒。她的身体从少女的轮廓开始膨胀、扭曲，骨骼在皮肤下面突起又沉下，像是有什么活物在她身体里翻滚。衣服碎成了布条——主人的那件军绿色工装夹克被撕成了碎片，散落在变形的旋涡周围。\n\n毛发不再是柔软的雪白，而是泛着危险的金红色光芒，像烧红的铁。九条尾巴在空中狂舞，每一条都有一个成年人的腰那么粗，尾尖的银白色褪去，换上了一种不吉利的暗红。它的爪子踩碎了脚下的石板路，一辆S.C.B特勤队的装甲车在它面前被踩得变了形。灵压的冲击波从它的身上一圈圈扩散出去，距离最近的摊位直接被震成了碎片。\n\n灵压可视化了——那些肉眼不可见的能量波动，浓烈到了开始扭曲光线的程度。巨狐周围的空气像烧开的水一样翻滚，地面上的小石头和碎片被吸起来，绕着它的身体缓缓旋转。像一颗小型的恒星在夜市中央诞生了。\n\nS.C.B的通讯频道炸了锅。\n\n\"目标灵压突破一万！还在上升！\"\n\n\"一万两千……一万五千……探测器满量程了！\"\n\n\"探测器烧了！备用探测器也烧了——这他妈什么数值——\"\n\n\"请求重武器支援！重复，请求重武器支援！\"\n\n\"代号'银月'，S级返祖状态。该死的，谁放的返祖诱导剂——\"\n\n频道里一片混乱。有人在骂人，有人在祈祷，有一个新兵的声音带着明显的哭腔在重复\"收到\"。指挥系统在十秒内连续接到了七个同级别的紧急通讯，优先级排列完全崩溃了。\n\n千翼从夜空中俯冲而下，双翼展开制造出风墙试图压制。他是百鬼联盟在风见市最强的战斗力——天狗族的长老级存在，翼展超过十米，每一根飞羽都硬如钢铁。他活了三百多年，经历过明治维新时期的大妖乱、昭和年间的人妖战争，还有平成末年的灵脉暴走事件。但他从来没有面对过这种等级的灵压。\n\n他的声音带着三百年战场老兵的威严和焦急：\n\n\"银月脉的小鬼！清醒一点！你正在摧毁同类的庇护所！看看你脚下——那是纸伞的本体！\"\n\n纸伞老板——刚才还在吐银色烟雾写字的付丧神——被震波掀到了墙角，伞面破了大半，伞骨折了三根。他的本体正在死亡。一把伞的死亡是什么样的呢？是骨架弯折、是伞面一块块脱落、是积攒了数百年的灵力像漏水的杯子一样慢慢流空。他的烟斗碎片散落在周围，银色的烟雾从碎片里最后渗出一缕，在空中歪歪扭扭地写了一个\"痛\"字，然后消散了。\n\n巨狐的竖瞳里没有任何认知的光。那双金色的眼睛里只剩下最原始的东西——恐惧和攻击本能。它喉咙里发出金属摩擦般的低吼，声音断断续续，像是一台坏掉的收音机在不同频道之间跳转：\n\n\"滚开……疼……好热……杀了你们……全都杀了……\"\n\n那声音里有晓光的声线，但被扭曲得几乎认不出来。像是把一个少女的声音和一头野兽的咆哮放在搅拌机里混合——人的语言还在，但承载语言的理智已经碎了大半。\n\n尾巴猛地甩出去。千翼被击退数十米，撞塌了一座钟楼。砖石瓦砾像暴雨一样落下。这位百鬼联盟最强的天狗战士从废墟中挣扎着站起来，左翼折了一根主翎。鲜血从折断处渗出来，黑色的——天狗的血是黑色的，带着松脂的气味。\n\n千翼咳了两声，从嘴角擦掉一缕血丝。三百年了。上一次让他受伤的对手还是昭和五十三年那头暴走的山灵。但那头山灵的灵压大概只有眼前这只九尾狐的十分之一。\n\n\"她的灵压还在涨……\"千翼咬着牙通过妖信向所有人广播，\"听着，这不是她的意志。她被药物控制了。不要伤害她——但也不要被她碰到，一爪下去你们连渣都不剩。\"\n\n\"那我们能做什么？\"一个河童小队长的声音从频道里传来，带着压不住的颤抖。\n\n\"拖时间。等那个人类来。\"\n\n\"哪个人类？\"\n\n千翼没有回答。他不确定那个人类能不能来——甚至不确定那个人类知不知道这里发生了什么。但他的直觉告诉他，如果有人能阻止这只九尾狐，不会是S.C.B的重武器，也不会是他的风墙。\n\nS.C.B特勤队的机甲部队赶到了。三辆外骨骼战斗装甲排成扇形阵列，肩部的符文加农炮正在充能。装甲的涂装是深蓝色的，胸口印着S.C.B的徽章——一只抓着天平的手。充能时炮口发出低沉的嗡嗡声，地面上的灰尘被共振扬起来。\n\n\"请求开火许可。\"\n\n司衡·岚的声音从指挥频道传来，疲惫而沉重：\"不许。继续牵制。\"\n\n\"局长！她正在摧毁南区的灵脉稳定器！如果那些节点被破坏，认知滤网在风见市的锚点就会——\"\n\n\"我说了不许。给我拖住她。\"\n\n频道沉默了两秒。然后那个请求开火的声音低声说了句\"收到\"，语气里带着不理解但服从的苦涩。\n\n司衡·岚关掉了通讯，靠在指挥车的椅背上，摘下了眼镜。他按了按眉心。桌上的屏幕显示着巨狐实时的灵压数据——数字已经变成了红色的闪烁，意味着超出了S.C.B所有常规武器的应对范围。\n\n他的助手在旁边小声说：\"局长，如果灵脉节点被摧毁——\"\n\n\"我知道。\"\n\n\"那为什么——\"\n\n\"因为那是个孩子。\"司衡·岚重新戴上眼镜，声音很平静。\"一个被人当成
