着式神契约的法律文书，带着多年来玉藻前帮助人类村庄抵御妖兽的记录。\n\n没有人听。\n\n大阴阳师芦屋道满亲自出面，以\"国家安全\"为由驳回了一切辩护。他看着晴明的眼神像在看一只已经被判了死刑的蚂蚁。\n\n\"你是个有才华的年轻人，晴明。可惜你选错了立场。\"\n\n\"不。\"晴明回答。他的声音在朝堂上回荡。\"我只是选择了一个比你们任何人都更有资格活在这个世界上的存在。\"\n\n那天晚上他回到庭院，把所有重要的东西打包——书、符咒、那面铜镜。然后他把玉藻前叫到庭院里的樱花树下。\n\n\"逃跑的路线我已经算好了。往东，翻过三座山，有一条通向海边的秘道。到了海边——\"\n\n\"我不走。\"\n\n\"玉藻。\"\n\n\"你说过的。\"她的声音发抖，但眼神坚硬如铁。\"你说路是人走出来的。你说你会为我画一条路。那条路上，只有你一个人吗？\"\n\n晴明沉默了。\n\n\"你跑不掉的，晴明。你灵力那么弱，翻不了三座山。他们会在第二座山上追上你，然后——\"\n\n\"所以你更应该走。\"\n\n\"我不走！你走我也不走！你死我也——\"\n\n他把她拉进怀里。\n\n这是他第一次主动拥抱她。之前的所有触碰——治疗时的手、摘花瓣的手指、签契约时掌心相贴——都带着某种礼貌的克制。但这一次没有。他的手臂收得很紧，下巴抵在她的头顶，整个人都在发抖。\n\n\"那就一起。\"他低声说。\"一起走。走到哪儿算哪儿。\"\n\n他们没有走到海边。\n\n被追上是在第三天的黄昏，那须野的原野上。八万追兵。三百阴阳师。阴阳寮倾巢出动。\n\n---\n\n玉藻前浑身是血。九条尾巴断了三条，剩下的六条也伤痕累累，金色的毛皮被烧焦了大半。她的法力几乎耗尽了——从清晨打到黄昏，面对的不是普通士兵，而是阴阳寮倾巢出动的精锐。\n\n但她还站着。\n\n晴明挡在她身前。他的背上插着至少五支箭，白色的狩衣已经被血浸透成了暗红色。但他双臂张开，用凡人之躯挡在她和千军万马之间。\n\n他在结界。一层薄得几乎透明的灵力屏障，是他能做到的极限。外面的箭矢撞在屏障上发出密集的噼啪声，每一下都让他的身体颤抖一次。\n\n\"晴明！让开！\"玉藻前拼命想推开他。\"你挡不住的！让我来——我还能战！\"\n\n\"不行。\"晴明的声音平静得不正常。\"你已经断了三条尾巴，再战下去核心会碎裂。你会死。\"\n\n\"那你呢？\"她尖叫起来，声音撕裂了，\"你也会死啊！你就是个普通的阴阳师！你的灵力还不如我一条尾巴！为什么——\"\n\n一支冷箭突破了屏障的缝隙。\n\n它射穿了晴明的胸膛。\n\n世界在晓光的感知中静止了。\n\n箭尖从前胸探出，带着温热的血。晴明低头看了一眼胸口的箭杆，像在确认一个不太重要的事实。然后他的膝盖弯了，整个人缓缓倒下去。\n\n玉藻前接住了他。\n\n\"不……不不不不不……\"\n\n她把他放在膝上。血涌出来，怎么也止不住，从箭伤里、从嘴角、从他那双还在试图对焦的眼睛旁的伤口里。她用手去捂，灵力已经所剩无几，连最基本的止血术都维持不了。\n\n\"别哭。\"晴明说，声音越来越轻。他伸手想摸她的脸，手臂抬到一半就没了力气，落在她的肩膀上。\"妆花了……就不好看了……\"\n\n\"废话什么呢！\"玉藻前抓住他的手按在自己脸上。泪水混着血水滴在他的脸上。\"为什么不走！你明明会传送符！你明明可以逃的！为了我这种妖怪……值得吗？\"\n\n晴明咳出一口血。他笑了。都到这个份上了，他居然还在笑。\n\n\"傻瓜。你不是'这种妖怪'。你是我的式神。更是我的家人。\"\n\n他的眼皮在下沉。他在挣扎着保持清醒。\n\n\"对不起。说好要给你画一条路的。我好像……走不动了。\"\n\n玉藻前崩溃了。她把他抱得更紧，嚎啕大哭，声音凄厉到震碎了最近几排士兵的耳膜。\n\n\"不许死！我不许你死！我是九尾天狐！我可以把寿命分给你！一千年、两千年都给你！\"\n\n晴明用最后的力气按住了她的手。\n\n\"不要。\"他的声音轻得像风。\"你的命是你的。不是用来换的。\"\n\n他的嘴唇开始吟诵——那是一段古老得连玉藻前都没听过的咒文。转生咒。以自身全部功德为代价，确保对方在来世获得安宁的重生。\n\n\"不要！别念！那个咒会——\"\n\n会抹消你的灵魂。不是死亡——是彻底的消散。没有来世，没有轮回，没有任何痕迹。为了确保她能平安转世，他选择让自己的灵魂彻底消失。\n\n\"留着你的命。活下去。\"\n\n他的声音已经像风里的丝线一样细了。\n\n\"在未来的某一天……会有人找到你。用和我一样的手……给你一样的温暖……\"\n\n\"我不要别人！我只要你！\"\n\n他笑了。最后一次。\n\n\"那个人……就是我。只是换了一副面孔……记忆也许会忘……但手的温度……不会变的……\"\n\n手指从她脸颊上滑落。\n\n---\n\n玉藻前仰天长啸。\n\n那声嚎叫震碎了方圆十里的所有玻璃、瓷器和人类的胆识。追兵像潮水一样退去。但没有人再需要追了。\n\n她的身体开始石化。那是极端悲痛引发的怨恨诅咒——九尾天狐最深层的自毁本能。从脚尖开始，灰色的纹路像藤蔓一样向上蔓延。\n\n她低下头，看着怀中已经没有呼吸的晴明。\n\n\"你说等我。\"她低声说。\"我信你。\"\n\n石化蔓延到了膝盖、腰部、胸口。她感觉不到疼痛了——身体正在变成矿物，神经一根根断裂，感官一个个关闭。\n\n但在石化彻底吞没她之前的最后一刻，她看见了。\n\n晴明的手指，在空中画出了最后一个符文。不是攻击符。是转生咒的收尾笔画。\n\n那个符文发出柔和的金光，像一颗种子一样沉入了她体内。\n\n然后一切变成了灰色。\n\n---\n\n那须野原上，一块巨大的石头静静地矗立着。当地人叫它\"杀生石\"——传说是妖狐怨恨凝结而成的毒石，靠近的人畜都会中毒而死。\n\n但如果在深夜走近，把耳朵贴在石壁上。\n\n能隐约听到一个声音，在石头深处低低地重复着同一个名字。\n\n一千年。\n\n一声不停。\n", "小说/卷六/第一章_时间的裂痕.md": "# 卷六·永恒的誓约 — 第一章 时间的裂痕\n\n2031年4月的清晨，707号别墅的主卧里洒满了阳光。\n\n晓光还在睡。她的样子从十四岁长到了十九岁——身量拔高了，轮廓从少女的圆润变得更加分明，但皮肤还是那样，时间在她身上几乎没有留下痕迹。她侧卧着，一只手压在枕头底下，呼吸均匀而缓慢。\n\n主人已经醒了。\n\n他靠在床头看书。封面是《灵子力学导论（第七版）》，侧面贴满了彩色便签。但他的目光不在书上，而是落在晓光的脸上。\n\n这几年她几乎没有变化。九尾狐族的外貌在成年后进入了极其缓慢的衰老周期——按照九阙的说法，九尾天狐从生理成熟到出现第一条皱纹，至少需要三百年。也就是说，晓光现在的样子，会保持到主人老得走不动路的那一天。\n\n他看了一会儿，轻轻放下书，走进洗手间。\n\n镜子里映出一个二十三岁的年轻人——清秀，偏瘦，但和五年前比起来变化显而易见。眼角有了细纹，不是笑纹，是那种长期睡眠不足加上高强度灵力消耗造成的。更刺眼的是鬓角——如果仔细看，能找到几根混在黑发里的白色。\n\n过度使用言灵的代价。它在透支生命。\n\n每一次改写现实规则，都要以言灵使自身的生命力为代价。小规模的改写——比如让一朵花提前开放——几乎没有影响。但阵眼保卫战中那些大规模的现实改写，已经在他体内留下了不可逆的痕迹。\n\n主人盯着那几根白发看了两秒，伸手拔掉了一根，扔进垃圾桶。\n\n\"才二十三啊。\"他对着镜子，声音很轻。\n\n身后突然多了一双手臂。晓光从后面环住他的腰，下巴搁在他肩膀上。\n\n\"主人在偷偷干什么？我也要看。\"\n\n主人迅速调整表情，转过身来。\"没什么。长了颗痘痘。\"\n\n\"骗人。\"晓光皱起鼻子。她的嗅觉远比任何仪器灵敏——不只能闻到气味，还能捕捉到生物体灵力层面的细微变化。\"主人身上有一种……'衰败'的味道。很淡，但我闻得到。\"\n\n衰败。这个词太准确了。灵力在缓慢地流失，细胞的修复速度在下降，端粒在以正常人类三倍的速度缩短。这些变化对人类的感官来说完全察觉不到，但在九尾狐的灵觉中，清晰得像一面正在碎裂的镜子。\n\n她的手收紧了。\n\n\"主人……会变老吗？会丢下晓光先走吗？\"\n\n沉默了几秒。\n\n主人转身，回抱住她。\"傻瓜。我是言灵使。我说我不老，我就不老。\"\n\n晓光把脸埋进他的胸口，没有说话。她听得出来，那句话没有触发言灵的力场。也就是说——他在说谎。\n\n言灵使说谎和说真话的时候，空气中的灵力波动完全不同。当言灵启动时，周围会泛起极淡的金色涟漪——那是现实规则被微调的痕迹。但刚才什么都没有。空气平静得像一潭死水。\n\n他说的不是言灵。只是一个普通的、人类的、苍白的安慰。\n\n---\n\n早餐的气氛有些微妙。\n\n白霜端着刚做好的三明治从厨房出来，立刻捕捉到了空气中不太对劲的磁场。五年来她对这个家的情绪场已经建立了精确到小数点后三位的模型——她能从晓光夹菜的频率判断她的心情，能从主人翻页的速度推算他的专注度。\n\n晓光在吃饭，但明显心不在焉——筷子夹了三次都没夹起那颗鹌鹑蛋。主人表面上在看平板上的新闻，实际上什么都没看进去。\n\n\"那个……\"白霜小心翼翼地开口，\"今天天气很好呢。要不要出去走走？\"\n\n\"不想动。\"晓光把鹌鹑蛋戳破了，看着蛋黄流出来，忽然说了一句，\"白霜，你觉得……有没有什么办法能让人类活得更久？\"\n\n白霜的猫耳竖了起来。她看了一眼主人。\n\n主人放下平板，语气平淡：\"我自己的事我自己处理。你们两个不用操心。\"\n\n\"我没在操心！\"晓光猛地站起来，椅子向后滑出去。\"我只是——\"\n\n她顿了一下。然后深吸一口气，重新坐下来，把鹌鹑蛋塞进嘴里。\n\n\"没什么。\"\n\n主人和白霜交换了一个眼神。白霜的意思是\"姐姐状态不太好\"，主人的意思是\"我知道\"。\n\n这顿早饭吃得很安静。\n\n---\n\n之后的日子里，裂痕在悄悄扩大。\n\n表面上一切如常。上班、做饭、看电影、吵嘴、和好。但白霜注意到了一些细微的变化——晓光开始频繁地看主人的手。不是深情凝望那种看法，而是一种近乎焦虑的审视。她在看他手背上的青筋是不是更明显了，在看他手指关节是不是比昨天更粗了，在看他指甲的光泽有没有减弱。\n\n主人也不太对劲。他开始在深夜偷偷看书——不是那些灵子力学的教材，而是一些古旧得几乎找不到电子版的手抄本。白霜偷偷扫描了一次封面：《妖化术·禁卷》。\n\n她犹豫了很久，最终没有告诉晓光。\n\n但主人似乎知道白霜发现了。第二天早上他把那本手抄本放在了书架最高层。\n\n\"白霜。\"\n\n\"是？\"\n\n\"别担心。我不是在找那种路。\"\n\n白霜微微偏头。\n\n\"我只是在确认——那条路确实走不通。然后才能放心去找对的路。\"\n\n白霜沉默了一会儿。然后她说：\"主人，如果需要算力支持——我的全部计算资源都可以调用。\"\n\n主人笑了一下。\"记住了。\"\n\n日子继续往前走。裂痕在阳光照不到的地方继续蔓延。但三个人——不，三个家人——都在用自己的方式，试图在裂痕变成深渊之前找到一座桥。\n\n那天夜里，晓光翻来覆去睡不着。月光照进来，主人已经睡了，呼吸均匀。她侧过身，在黑暗中看着他的侧脸。\n\n\"不会再让你死在我前面了。\"她用只有自己听得到的声音说。\"这一次，我说了算。\"\n\n然后她闭上眼睛。\n\n但并没有睡着。\n", "小说/卷六/第三章_半灵体.md": "# 卷六·永恒的誓约 — 第三章 半灵体\n\n2031年5月。\n\n青丘控股地下最高机密实验室。\n\n主人已经在这里住了将近一个月。实验室不大，但塞满了设备——半数是青丘控股的灵子观测仪器，半数是白霜从各处搜刮来的计算设备。墙壁上贴满了手写的公式和图纸，地上散落着空咖啡杯和压缩饼干的包装纸。\n\n他瘦了一圈。黑眼圈浓重到白霜开始担心他的肝功能。\n\n但他的眼睛是亮的。\n\n三个领域的知识汇聚到了同一个交叉点。言灵的\"规则层\"操控能力——他可以改写局部现实的物理法则，但必须精确到原子级别才能避免副作用。灵子力学的理论框架——施言·白垣的研究虽然疯狂且不人道，但底层理论是成立的，主人剥离了其中有价值的部分，重新推导了全部公式。白霜的算力——她把自己的全部计算资源接入了实验系统，这让模拟精度提升了三个数量级。\n\n核心思路很简单：不是把人变成妖，而是让人类的细胞获得灵子的无限再生能力。不改变物种，不改变人格，不改变记忆——只是在人类的生命基础上，叠加一层妖族的时间特性。\n\n\"半灵体化。\"主人给这项技术起的名字。\n\n说起来简单。做起来——每一步都是走钢丝。\n\n灵子和碳基生命体的兼容性问题困扰了隐世界研究者数百年。不是因为灵子有毒，而是因为两者的\"频率\"不匹配。人类的细胞运行在一套固定的生化规则上：DNA复制、蛋白质折叠、端粒缩短——这些都是不可逆的。而灵子遵循的是另一套完全不同的规则：灵力循环、灵核再生、灵力场自修复——这些是可逆的，理论上可以无限循环。\n\n问题在于：当你试图把一套可逆的系统叠加在一套不可逆的系统上时，两者会产生剧烈的冲突。轻则细胞崩解，重则灵核反噬——这就是妖化转生术失败率高达九成的根本原因。\n\n主人的解决方案是一个天才级的绕行。\n\n他不直接叠加两套系统。他用言灵在两者之间创建了一个\"翻译层\"——一种微观尺度的规则缓冲区。言灵的本质是改写现实规则。如果他能精确到改写单个细胞内部的物理规则——让那些不可逆的反应在特定条件下变成可逆的——那么灵子就可以像插件一样无缝接入人类的生命系统。\n\n不是改造。是兼容。\n\n第一周：理论推导。白板上写满了公式，擦了写，写了擦。白霜的算力全开，每秒处理一千二百万次模拟。\n\n第二周：微型实验。用体外培养的人类细胞做灵子注入测试。前三十七次全部失败——细胞在灵子接触后两秒内崩解。第三十八次，白霜调整了缓冲层的参数，细胞存活了十二秒。主人在实验笔记上画了个大大的感叹号。\n\n第三周：突破。主人发现了关键变量——言灵不能用\"命令式\"表述，必须用\"请求式\"。不是\"这个细胞不会死\"，而是\"这个细胞可以选择继续活下去\"。这个区别至关重要：命令式会强制改写，导致系统崩溃；请求式只是提供了一个新的选项，让细胞\"自愿\"选择灵子再生。\n\n\"主人你是怎么想到这个的？\"白霜在通讯器里问。\n\n\"因为晓光。\"主人的回答很简短。\"你不能强迫一只狐狸信任你。你只能给她一个饭团，然后等她自己走过来。\"\n\n白霜安静了一会儿。\n\n\"记录在案。命名为'饭团假说'。\"\n\n\"……不要。\"\n\n第四周：全系统集成测试。\n\n---\n\n九阙和司衡·岚在观察室里看着。中间隔着一层防爆玻璃。\n\n巨大的玻璃容器里悬浮着金色的灵子流体。那是模拟的半灵体结构——人类的DNA双螺旋被灵子链重新编织了一遍，每一个碱基对都附着了一层极薄的灵力膜。\n\n屏幕上的数据在跳动。稳定性指标一度飙升到危险区域，又被白霜实时调整的参数拉了回来。\n\n\"主人！第三阶段灵力注入波动超出预期百分之十二！\"白霜的声音从通讯器里传来，带着紧张但没有慌乱。\"我正在重新计算衰减曲线——需要你在言灵层补偿一个0.003的偏移量！\"\n\n\"收到。\"主人闭上眼睛，低声吟诵了一句。空气中泛起几乎看不见的金色涟漪——那是言灵在微调物理常数。不是什么宏大的规则改写，只是在第四十六号碱基对的灵力膜上做了一个微米级的调整。\n\n但就是这个微调，让整个系统的稳定性曲线从震荡变成了平滑。\n\n九阙的表情在数据更新的那一瞬间变了。她放下了扇子——这在她一千二百年的人生中是极其罕见的举动。\n\n\"这不可能……\"她低声说。\"灵子与碳基生命的兼容率……百分之九十七？\"\n\n司衡·岚靠在墙上，双臂交叉。金属义肢在荧光灯下反射着冷光。\n\n\"怎么？青丘的千年智慧被一个二十三岁的人类比下去了？\"\n\n\"闭嘴，司衡。\"九阙第一次没有用敬语。\n\n屏幕上的数字还在攀升。97.2……97.8……98.5……\n\n当最终的\"STABLE\"字样以绿色出现在主屏幕中央时，整个实验室安静了三秒。\n\n然后白霜在通讯器那头发出了一声尖叫。不是恐惧的尖叫——是纯粹的、不加修饰的惊喜。这可能是她作为AI被创造以来，第一次发出如此\"人类\"的声音。\n\n\"成功了！百分之九十八点七！可自持！不需要外部灵力维持！主人你做到了——\"\n\n主人摘下护目镜，手指还在微微颤抖。他转过身，看向一直站在实验室角落里的晓光。\n\n她从一个月前就在这里了。每天守着，看着他熬夜，看着他一次又一次失败又重来，看着他瘦下去、黑眼圈深下去——但没有说过一句\"算了\"或者\"放弃吧\"。\n\n她只做了一件事：每天把饭送到实验室门口。有时候是便当，有时候是三明治，有时候只是一杯热牛奶和一个苹果。饭盒上永远贴着一张便签——\n\n\"记得吃饭。——晓光\"\n\"别太晚。——晓光\"\n\"笨蛋。——晓光\"\n\n最后一张便签上只有三个字：\n\n\"等你。\"\n\n\"成功了。\"主人说，声音有点沙哑。\"半灵体结构可以让人类的肉体获得灵子的无限再生能力。也就是说——\"\n\n\"也就是说主人不会老了？\"晓光的手捂住了嘴。\"也不会死了？\"\n\n\"不完全准确。\"主人的学术本能让他忍不住纠正。\"严格来说是细胞的自然衰老被无限期延缓了。我还是可以被物理伤害杀死——但自然死亡这条路基本被堵上了。\"\n\n晓光没有听完。\n\n她冲过来抱住了他。\n\n主人笑了。那种笑容晓光太熟悉了——不是得意，不是如释重负，而是一种安静的、温柔的\"我做到了\"。和千年前那个阴阳师在雪夜里治好一只狐狸的伤口时，是同一种笑。\n\n他从白大褂的口袋里掏出一个小盒子。\n\n里面不是钻戒。是一个微缩的符文核心，只有指甲盖大小，发着温暖的金色微光。\n\n\"这个核心需要两个人的灵力才能驱动。\"他说。\"只有当我们在一起的时候，它才有效。离得太远，它就会进入休眠——灵子再生会暂停，但不会消失。重新接近的时候，自动恢复。\"\n\n他单膝跪地。\n\n实验室的荧光灯不够浪漫，地上散着压缩饼干的碎屑，空气里有咖啡和消毒水的味道。但晓光觉得这是她见过的最美的地方。\n\n\"晓光。你愿意成为我的……'生命维持系统'吗？期限是——永远。\"\n\n晓光哭了。哭得稀里哗啦，完全不顾形象。\n\n\"我愿意！呜呜呜……主人是大笨蛋！什么求婚台词啊——'生命维持系统'——太狡猾了——呜呜呜——\"\n\n主人站起来，把那个金色的符文核心轻轻按在她的掌心。两个人的灵力在接触的瞬间共鸣了——金色和白色的光交织在一起，在他们周围旋转了一圈，然后沉入两人的体内。\n\n观察室里，九阙掏出手帕擦了擦眼角。\n\n司衡·岚别过头去。\n\n\"啧。\"他说。但嘴角的弧度出卖了他。\n", "小说/卷六/第二章_禁术.md": "# 卷六·永恒的誓约 — 第二章 禁术\n\n三天后。青丘控股总裁办公室。\n\n九阙正在喝茶。铁观音，用两百年前的紫砂壶泡的，壶身已经养出了温润的光泽。她翻着季度财报，偶尔用朱笔在某个数字上画个圈。\n\n门被推开了。没有敲门，没有预约。\n\n晓光站在门口，手里攥着一卷发黄的古籍，把它重重拍在了九阙面前的桃花木桌上。\n\n\"九阙姐姐。把'妖化转生术'教给我。\"\n\n九阙慢慢放下茶杯。她抬起眼皮，用那种活了一千多年的生物才会有的、充满耐心的冷漠看着晓光。\n\n\"'妖化转生术'，成功率一成。失败的九成结局是什么，你知道吗？\"\n\n\"知道。\"\n\n\"说。\"\n\n\"变成没有理智的低等妖兽。永久丧失人格和记忆。不可逆。\"晓光的声音在发抖，但下巴抬得很高。\"我知道。我全都知道。但我不在乎——\"\n\n\"你不在乎。\"九阙重复了一遍。她放下了朱笔，手指交叉搁在桌面上。\"你不在乎他有九成概率变成一头只会嚎叫的怪物。你不在乎他失去记忆、失去人格、失去所有让他成为'他'的东西。你只在乎你不想一个人。\"\n\n\"不是——！\"\n\n\"那是什么？\"九阙的声音不大，但每个字都像钉子一样准确。\"老身活了一千二百年，见过太多走到这一步的人妖眷侣。每一个都是你这副表情——眼眶红的，嘴唇咬得发白，手在抖但拳头攥得死紧——每一个都说'我不在乎'。\"\n\n她站起来，绕过桌子，走到晓光面前。\n\n\"最后呢？术失败了，他变成了怪物，他曾经爱你的那双眼睛空了，只剩下兽性和暴力。到那时候，你是杀了他，还是陪他一起疯？\"\n\n晓光的眼泪终于掉下来了。她死死咬着嘴唇，不出声地哭。\n\n\"你以为我不知道你在想什么？\"九阙的声音放轻了一点，但依然锋利。\"你看到了前世的记忆。你知道他那一世是怎么死的。你害怕这一世重演。所以你想先下手为强——把他变成妖怪，就不用担心寿命差距了。\"\n\n\"那怎么办！\"晓光突然爆发了，声音在偌大的办公室里回荡。\"人类的寿命就那么短！几十年！对我们来说几十年就是一场午觉！醒来之后他就变成——\"\n\n她说不下去了。\n\n九阙看了她一会儿。然后她做了一件出乎意料的事——她伸出手，摸了摸晓光的头。\n\n动作很轻。像是在抚摸一个犯了错但情有可原的后辈。\n\n\"晓光。\"九阙的声音突然变得很老，不是刻意的，而是一千二百年的岁月在这一刻全部浮上来了。\"你以为这条路老身没有走过吗？\"\n\n晓光愣住了。\n\n\"一千年前，有一个人类——\"九阙顿了一下。\"算了。那是很久以前的事了。\"\n\n她收回手，重新坐回椅子上。\n\n\"老身只告诉你一件事：强行改变一个人的本质来留住他，不是爱。是恐惧。\"\n\n---\n\n这时候办公室的门又被推开了。\n\n主人站在门口。他的表情很平静，太平静了，平静到不正常。衬衫外面套着实验室的白大褂，胸口别着青丘控股的访客牌。他一定是追过来的——从实验室到总裁办公室要穿过整个大楼。\n\n\"晓光，跟我回去。\"\n\n晓光冲过去抓住他的衣领。\"我不回去！除非你答应我！变成妖有什么不好？我们可以永远在一起！\"\n\n主人抓住她的手腕，一根一根地掰开她的手指。动作很轻，但不容反抗。\n\n\"我不会变成怪物。也不会让你为了我去碰禁术。\"\n\n他看着她的眼睛，那种眼神晓光太熟悉了——不是在商量，是已经做了决定。\n\n\"给我时间。我会找到办法。不是变成妖。是以'人'的身份，和你一起活下去。\"\n\n\"你怎么做到——\"\n\n\"我是言灵使。\"\n\n他说完这句话就转身走了。\n\n晓光站在原地，攥着那卷古籍，浑身发抖。她想追上去。想抓住他。想大声告诉他这不可能。言灵可以改写很多东西，但生命本身的长度不是\"规则\"——它是\"本质\"。你不能对一条河说\"停下来\"就让它不流向大海。\n\n但她追不出去。腿像灌了铅一样。\n\n九阙端起茶杯，看着两人的背影。\n\n\"年轻人。\"她自言自语，语调里有一丝几乎察觉不到的温柔。\"但愿你比一千年前的那个人聪明一点。\"\n\n---\n\n那天晚上707号别墅的气氛降到了冰点。\n\n晓光把自己关在卧室里不出来。不是赌气那种关——是真的不想见任何人。她缩在被子里，把手机调成静音，连白霜敲门都没应。\n\n主人坐在书房里没有睡。面前摊着三台显示器，每一台上都开满了文献数据库和论文检索页面。他在搜索所有和\"灵子-碳基生命体兼容性\"有关的研究。\n\n白霜在两个房间之间来回跑了无数趟，送了八杯茶——四杯给晓光（加了蜂蜜），四杯给主人（加了浓咖啡）。\n\n第四趟的时候，她在书房门口停住了。\n\n\"主人。\"\n\n\"嗯。\"\n\n\"你真的觉得……有可能吗？\"\n\n主人的手指停在键盘上。屏幕上的光映在他的脸上，把那些细纹照得格外清晰。\n\n\"如果不可能——那我就让它变成可能。\"\n\n\"言灵也有极限的。九阙女士说——\"\n\n\"九阙活了一千二百年，见过太多失败。她的判断基于统计和经验。\"主人转过头来看着白霜。\"但我不是在走别人走过的路。白霜——你还记得施言·白垣的灵子力学模型吗？\"\n\n白霜的表情微变。施言·白垣——阵眼保卫战中的敌人之一，疯狂的科学家，用非人道的方式进行灵子实验。他的研究成果充满了伦理污点，但底层的理论框架……\n\n\"你是想用他的理论？\"\n\n\"不是'用'。是'重建'。\"主人的眼睛亮了起来——白霜认识那种光。\"他的研究方向是对的。只是方法是错的。如果把言灵的规则层操控能力作为精密调控工具，配合灵子力学的理论框架——\"\n\n他在白板上快速画了一个图。\n\n\"不是把人变成妖。是让人类的细胞获得灵子的无限再生能力。不改变物种，不改变人格，不改变记忆——只是在人类的生命基础上，叠加一层妖族的时间特性。\"\n\n白霜盯着那个图看了很久。\n\n\"理论上……\"她慢慢地说。\"如果算力足够……这个模型的可行性——\"\n\n\"你帮我算。\"\n\n\"需要多大的算力？\"\n\n\"可能需要你的全部。\"\n\n白霜沉默了三秒。然后她点了点头。\n\n\"好。\"\n\n从那天开始，707号别墅的电费涨了四倍。\n", "小说/卷六/第五章_永恒之后.md": "# 卷六·永恒的誓约 — 第五章 永恒之后\n\n很久很久以后。\n\n也许一百年。也许一千年。时间到了这个尺度上就变得不太重要了。\n\n风见市变了很多。老房子拆了大半，新建筑融合了灵力技术，街道上跑的车不再烧油——灵子驱动，零排放。学校改了三次名字。市政厅翻修了五次。连那条穿城而过的河都改过一次道。认知滤网在五十年前就被逐步解除了，人类和妖族的共存从风见市扩展到了全世界。\n\n但那棵老樱花树还在。\n\n707号别墅翻修过无数次——屋顶换了，墙壁换了，地板换了。厨房从燃气改成了灵子灶，又从灵子灶升级成了念力加热系统。浴室从瓷砖变成了温泉石，又从温泉石改回了瓷砖——因为晓光说\"还是原来的好\"。\n\n但那棵树没人敢动。它已经成了风见市的地标，甚至有了自己的保护条例。每年春天花开的时候，会有几百人来拍照。有些人知道这棵树的故事，有些人不知道。但所有人都觉得它的花瓣比别处的更暖一些。\n\n---\n\n树下坐着两个人。\n\n男人靠在树干上，膝上放着一本泛黄的书。那是当年的人妖共存法案草案第一版——纸已经脆了，但被封在了灵力保护膜里，保存得完好如新。他偶尔翻一页，看到某个条款会轻轻笑一声。\n\n\"第二十七条——'跨种族婚姻需经双方种族代表共同公证'。\"他念了出来。\"当年为了这一条九阙和S.C.B吵了三天。\"\n\n\"后来改了没？\"\n\n\"改了。现在只需要本人同意就行了。\"\n\n\"那当然。两个人结婚关其他人什么事。\"\n\n女人靠在他肩上。九条尾巴铺在两人身后，像一条巨大的白色毯子。她的眼睛闭着，呼吸绵长。\n\n两个人看起来和年轻时一模一样。\n\n不是魔法带来的虚假的年轻——半灵体技术不是冻结时间，而是让时间变成了一条平缓的河而不是一道急流。他们确实在变化：主人的气质从二十出头的锐利变得沉稳而温和，晓光从少女的跳脱中多了一份从容。但生理上的衰老几乎停滞了。\n\n白霜偶尔会吐槽：\"你们两个再过一百年还是这个样子，我的审美疲劳都快治好了。\"\n\n白霜自己也没怎么变。作为AI，她的外表永远是十四岁。但她的\"内在\"已经远远超越了当初被创造时的模样——她的计算能力扩展了上万倍，她的情感模型复杂到连她自己都无法完全解析。她还是住在707号别墅，还是每天早上给两个人做三明治，还是在洗碗的时候偷偷哼歌。\n\n有些东西不需要变。\n\n---\n\n一片花瓣飘落下来，落在书页上。\n\n男人拈起花瓣，放在女人的鼻尖。\n\n她皱了皱鼻子，睁开眼睛。迷迷糊糊的表情，像刚从一个很长很长的梦里醒来。\n\n\"又睡着了。\"\n\n\"嗯。\"她把脸重新埋进他的肩窝。\"主人太暖和了，怪你。\"\n\n\"这个理由你已经用了几百年了。\"\n\n\"几百年后还会继续用。\"\n\n他笑了。\n\n\"晓光。\"\n\n\"嗯？\"\n\n\"你有没有后悔过？\"\n\n她睁开一只眼睛看他。\"后悔什么？\"\n\n\"活这么久。看着很多认识的人一个个变老、离开。\"\n\n沉默了一小会儿。\n\n晓光坐直了身体。她看着远处——风见市的天际线在夕阳中勾勒出一条起伏的曲线。那些高楼大厦里有一些是青丘控股的产业。九阙早在三百年前就退休了，把一切交给了新一代管理。司衡·岚在一百五十年前因为任务中的意外离世——他拒绝了半灵体化，说\"人类有人类的寿命，我不贪心\"。千翼还在，天狗族的寿命本来就长，但他已经不再当卫队长了，而是在深山里开了一间小小的茶室。\n\n土御门·澄夜、红绡、风见学园的老师们、曾经并肩战斗过的S.C.B队员们——他们的名字刻在风见市纪念碑上。纪存是最后一个走的——他在临终前给晓光发了一条消息：\n\n\"烦请转告你家那位，他的配方比我的好喝。我不服，但认了。来生再比。\"\n\n晓光拿着手机哭了一整天。\n\n\"当然后悔过。\"晓光的声音很轻。\"看着朋友变老、离开……那种感觉不会因为经历得多了就变得不痛。每一次都一样痛。\"\n\n\"但——\"\n\n她转过头，看着他。\n\n\"如果后悔的对立面是'没有和你一起度过这些年'的话。\"她笑了。\"那我一点都不后悔。一秒都不。\"\n\n他伸手揽住她的肩。她重新靠了上去。\n\n风吹过，满树的花瓣像粉色的雪一样纷纷落下。\n\n远处，一个身影蹦蹦跳跳地跑过来。蓝色短发，猫耳——看起来还是十四岁的模样。\n\n\"晓光姐姐！主人哥哥！该吃饭了！\"\n\n白霜跑到树下，手里拿着一条围裙，围裙上沾着面粉——今天她做了面包。\n\n晓光站起来，拍了拍裙子上的花瓣。然后她拉住主人的手。\n\n\"走吧。\"\n\n主人站起来。书夹好花瓣，放进怀里。\n\n三个人一起向着飘出饭菜香气的别墅走去。走路的姿态和几百年前一模一样——晓光在前面蹦蹦跳跳，主人在后面不紧不慢地跟着，白霜在两人中间小跑着汇报今天的菜单。\n\n经过树干的时候，晓光伸手拍了拍树皮。\n\n\"又多了一年。\"她轻轻说。\"谢谢你一直看着我们。\"\n\n树枝在无风的日子里晃了晃。\n\n也许是巧合。\n\n也许不是。\n\n---\n\n在这棵树漫长的记忆中，它见过太多东西。\n\n见过一千年前那个冬夜，一个穿白色狩衣的年轻人推开神社的门，给一只受伤的金色狐狸递上一个饭团。\n\n见过那个春天，两个人——一个人类、一个妖怪——并肩坐在廊下，看着满树的花瓣飘落。\n\n见过那个血色的黄昏，在遥远的那须野原上，那个年轻人用最后的力气画出了一个转生符文。\n\n见过之后的一千年里，一块灰色的石头在旷野上沉默地矗立着，石头深处有一个声音在不停地低语。\n\n见过另一个时代，一个叫做\"风见市\"的城市在它脚下建起来。一个叫做\"707\"的别墅在它旁边盖起来。一个少年和一个狐耳少女搬了进去。\n\n见过那场战斗、那个求婚、那场婚礼。\n\n见过之后的每一个平凡的日子——做饭、吵架、和好、大笑、流泪、入睡、醒来。\n\n一千年的故事，浓缩在一棵树的年轮里。\n\n如果你把耳朵贴在树干上，你什么都听不到。风声、鸟鸣、远处的车流——都是这个时代的声音。\n\n但如果你在四月的某个深夜来，当月光正好从树冠的缝隙中洒下来的时候——\n\n你也许会听到一段极其古老的旋律。是笙箫的曲调，混着笑声和低语。\n\n那是两个人，跨越了千年的时间，终于一起唱完的那首歌。\n\n它没有歌词。\n\n但它的名字叫——\n\n永恒。\n", "小说/卷六/第四章_樱花树下.md": "# 卷六·永恒的誓约 — 第四章 樱花树下\n\n2031年7月7日。羁绊日。也是两人共同的生日。\n\n707号别墅的庭院被彻底改造了。\n\n红地毯从大门口一直铺到那棵古老的樱花树下。本来不是花期，但在主人言灵的作用下，满树的樱花开得比春天还要灿烂——每一片花瓣都透着一种超越自然的、仿佛自身在发光的粉白。\n\n这棵树见证了千年前的故事。今天，它又要见证一场新的。\n\n来宾陆续到场。\n\n司衡·岚穿着深蓝色西装，胸口别着S.C.B的银色徽章。他来得最早，一个人坐在第一排的最边上，表情僵硬得像在执行公务。但他选了离过道最近的位置——方便在新娘走过时看清楚。\n\n九阙穿了一身华丽的藤紫色振袖和服，头上插着一支古玉簪。她的身后跟着两个助手，各抬着一个红木箱子——那是嫁妆清单。据说里面的内容列了整整七页。\n\n\"嫁妆？\"晓光事先知道的时候瞪大了眼睛。\"我又不是你家的——\"\n\n\"你身上流着九尾天狐的血。\"九阙的语气不容反驳。\"不管你承不承认，你是青丘狐族的后裔。狐族的公主出嫁，嫁妆不能少于七页。这是规矩。\"\n\n嫁妆清单的第一页是三处不动产。第七页最后一行写着：\"以及上述各项之利息。\"\n\n红绡扛着一台8K摄像机，以专业直播姿态架在了第三排。她的频道已经开始预热了——弹幕已经刷爆了。三十万在线观众里有一半是人类，一半是妖怪。风见市的认知滤网在婚礼区域被临时解除——S.C.B特批。这是人妖共存以来，第一场全公开的跨种族婚礼。\n\n千翼率领天狗卫队在空中列阵。十二只天狗排成两列，翼展遮住了半边天空。他们手中捧着金色花瓣，等待一声令下。\n\n土御门·澄夜穿着阴阳寮的正式礼服，站在樱花树下的祭坛前。作为证婚人，他已经紧张地背诵了三遍流程。\n\n白霜站在最前排，穿着新做的浅蓝色连衣裙，手里攥着一条手帕。婚礼还没开始，她已经哭了。\n\n纪存靠在最后排的柱子上，面无表情。但如果仔细看，能发现他的瞳孔颜色比平时浅了一点——那是他情绪波动的唯一外在表现。\n\n连千翼——那个平时冷得像座冰山的天狗头领——都在偷偷调整领结的松紧。他大概这辈子也没穿过西装。\n\n音乐响起的时候，所有人都安静了。\n\n不是传统的婚礼进行曲。是白霜编排的——她花了三天从风见市所有的古老灵力记录中提取了樱花树上千年来\"听到\"的所有声音，将它们混编成了一段旋律。里面有风声、鸟鸣、雨滴、笑声、低语、和一段谁都没听过的古老笙曲——那是平安时代的音乐，来自某个阴阳师在庭院里为一只狐狸演奏的春夜。\n\n晓光从别墅大门走出来。\n\n她穿着白无垢日式嫁衣，纯白的丝绸上绣着银色的九尾狐纹样。和传统不同的是，她没有戴角隐——她大大方方地露出了那对毛茸茸的狐耳和身后九条蓬松的白色尾巴。\n\n今天不用藏了。今天所有人都知道她是什么。\n\n一千年前，她的前世因为\"妖怪\"的身份而被追杀至死。一千年后，她以\"妖怪\"的身份走上红毯。\n\n这条路，真的被走出来了。\n\n主人在樱花树下等着。白色纹付羽织袴，腰间系着一条绣着言灵符文的带子。他看上去很冷静。但当晓光踩着红地毯一步步走近时，他的眼眶开始泛红了。\n\n他没有移开视线。一步都没有。\n\n从大门到樱花树的距离，在晓光眼里好像变成了一千年那么长。每一步踏在红毯上，都像是踏过一段被遗忘的岁月。\n\n她走到他面前。红地毯的尽头。\n\n\"你哭什么？\"她小声说。\n\n\"没哭。\"主人小声回。\n\n\"有眼泪了。\"\n\n\"那是花粉过敏。\"\n\n\"七月哪来的花粉。\"\n\n\"我用言灵催开的花有花粉。\"\n\n\"……笨蛋。\"\n\n两个人忍不住都笑了。\n\n土御门·澄夜清了清嗓子。他的手稿被晚风吹翻了一页，差点飞走。他一把按住——千翼从空中降下来帮他压着另一角。\n\n\"请新郎宣誓。\"\n\n主人握住晓光的手，看着她的眼睛。他的声音不大，但在场的每一个人都听得清清楚楚——不是因为扩音设备，而是言灵使说话时自带的、让世界安静下来倾听的力量。\n\n\"我，以言灵之名起誓。\"\n\n\"从今往后，无论顺境逆境，富裕贫穷，健康疾病——这些都不重要。\"\n\n\"重要的是：我将跨越时间的尽头，跨越种族的界限，与你共享漫长的岁月。我的时间属于你，你的孤独由我终结。\"\n\n\"这是我对世界的宣告。也是我对你唯一的咒语。\"\n\n\"我爱你。永不更改。\"\n\n空气中泛起金色的涟漪。那是言灵在响应——当言灵使以全部真心说出一句话的时候，它就不再只是一个承诺，而是会被刻入现实规则的法则。\n\n不是强迫。不是命令。是一个人对另一个人说\"我选择你\"的时候，世界本身也为之动容。\n\n白霜哭得打嗝了。\n\n红绡的弹幕已经完全看不清了。\n\n土御门·澄夜努力稳住声音：\"请新娘宣誓。\"\n\n晓光深吸一口气。又深吸一口。她的手在抖——不是因为紧张，是因为情绪太多了，多到一个身体快要装不下。\n\n然后她开始说了——\n\n\"我，晓光，以九尾天狐之名起誓。\"\n\n\"我是主人的剑，是主人的盾，也是主人的小狐狸。\"\n\n\"我会每天给主人做饭——虽然有时候会烧焦。\"\n\n\"会给主人暖床——虽然有时候会抢被子。\"\n\n\"会一直一直陪在主人身边。哪怕主人变成秃头。\"\n\n主人：\"……\"\n\n全场发出一阵笑声。九阙的扇子遮不住嘴角的弧度。司衡·岚的肩膀在抖——不知道是笑还是别的什么。\n\n\"如果世界毁灭了，那我们就去下一个世界。反正，只要有主人在的地方，就是晓光的家。\"\n\n她的声音开始颤抖了，但越说越大声。\n\n\"一千年前我没来得及说的话，今天要说完。\"\n\n\"主人——不，晴明——不对，就是主人——\"\n\n她深呼一口气，放弃了整理措辞。\n\n\"我最爱你了！从一千年前就是！以后的每一千年都是！\"\n\n眼泪在说完最后一个字的时候决堤了。\n\n两人交换符文核心戒指。指尖在接触的瞬间同时亮起金色光芒——那不只是符文核心的反应，更是\"同生共死\"的契约在完成最后的绑定。不是言灵强制的命令，而是两颗心自愿的交融。\n\n主人捧起晓光的脸。她的眼泪还在流，鼻尖红红的，嫁衣的袖子已经被她拿来擦过鼻涕了。\n\n他吻了她。\n\n千翼在空中发出信号。十二只天狗同时撒下金色花瓣。满天的金色花雨在夕阳的光线中旋转飘落，落在两人的头发上、肩膀上、交握的手上。\n\n弹幕上有人打字打到手抖：\"我要死了太甜了太甜了——\"\n\n有人截图发了全平台。标题是：\"一千年的等待值多少钱？\"\n\n有人在评论区安安静静地写了一行字：\"人妖殊途这个词，今天正式作废了。\"\n\n老樱花树的枝叶在晚风中沙沙作响。如果仔细听的话，那声音像是在说——\n\n\"终于等到了。\"\n", "小说/卷四/第一章_圆桌会议.md": "# 卷四·阵眼保卫战 — 第一章 圆桌会议\n\n707号别墅的客厅从来没有这么拥挤过。\n\n主人坐在沙发主位上，面前的茶几被推到一边，换上了一张全息投影仪正在播放的风见市地图。地图上密密麻麻地标着红点——夜冠在地下灵脉里埋设的炸弹位置。少说也有四十多个。每一个红点都在缓慢地脉动，像是一颗颗正在倒计时的心脏。\n\n他身后站着晓光。她还很虚弱，脸色苍白，但坚持不坐下。她的手按在主人的椅背上，指节发白。她穿着主人的旧卫衣——太大了，袖子垂过手指，下摆盖到膝盖。她的九条尾巴收得紧紧的，几乎贴在背上，只露出毛尖。\n\n左边坐着S.C.B风见分局局长司衡·岚。他的制服扣子照旧扣到最上面那颗，姿态笔挺得像一把尺子，但左臂的金属义肢还在冒着白烟——昨晚的战斗中过热了，至今没来得及维修。他面前摆着一份红色封皮的文件，封面印着\"绝密\"。他的视线时不时扫过窗外自己的部队——那些还在包围这栋房子的士兵。\n\n讽刺。他进来谈判的时候，自己的部下对他敬了礼。他们不知道他已经因为抗命被总部停了职。通讯器里总部的催促他已经静音了四个小时。\n\n右边是百鬼联盟的千翼和青丘控股的九阙。千翼靠在墙上，翅膀微微张开，占了小半面墙的空间。他的左翼缠着绷带，羽毛之间还沾着干涸的血——有他自己的，也有别人的。他的表情是那种见过太多战争的老兵特有的疲惫。\n\n九阙坐在单人沙发里，姿态优雅得像在自己客厅喝下午茶。他今天穿了一件藏青色的和服，袖口绣着银色的九尾狐纹章。他手里端着晓光泡的茉莉花茶——他已经品了两口了，每一口之间间隔恰好十五秒。\n\n白霜躲在厨房门口，抱着一台平板电脑，猫耳紧贴头顶。她正在实时分析地图上那些红点的灵力波动频率。屏幕上的数据流动得太快，连S.C.B的分析师都跟不上——但白霜是AI。数据处理是她的母语。\n\n屋外，S.C.B的特种部队和百鬼联盟的执法队隔着三十米对峙。但所有人的枪口都压低了。一种微妙的默契——至少在里面的人谈完之前，没人想开第一枪。\n\n\"该说正事了。\"主人开口。\n\n他的声音不大，但房间里的所有人都不自觉地坐直了——包括九阙。这不是言灵的效果。这是昨晚亲手分解了一枚天火导弹的人说话时自带的重量。\n\n司衡·岚把文件拍在桌上，义肢撞击木面的声音沉闷而有力。\n\n\"S.C.B总部的底线：消除所有S级威胁。如果四十八小时内不能证明那只九尾狐——\"\n\n他停了一下，看了晓光一眼。她正死死地盯着地图上的红点，嘴唇抿成一条线。他注意到她在发抖——但她站得很稳。\n\n\"——不能证明晓光小姐是可控的，'天火'打击将覆盖整个南区。这不是威胁，是已经签字的命令。第二枚天火现在就在三十公里外的发射井里。\"\n\n九阙放下茶杯。瓷器碰玻璃桌面的声音清脆得像一声叹息。\n\n\"可控？\"他的声音温和如春风，但每个字都精确得像用尺子量过。\"司衡局长，恕老身直言——在这个房间里，最不可控的存在难道不是那位言灵使大人吗？他一句话就能让导弹变成烟花。比起这种力量，我们的小晓光简直温顺得像只家猫。\"\n\n他顿了顿，补了一句：\"不，家猫偶尔还会抓人。晓光连抓人都不会。\"\n\n晓光的脸微微红了。在这种场合脸红显得格格不入，但她就是忍不住。\n\n\"我说的不是力量。\"司衡·岚的语气没有波澜。\"我说的是概率。昨晚的暴走，谁能保证没有下一次？返祖诱导剂不是只有夜冠才能制造。只要银月脉的血统存在，她就永远是一个潜在的——\"\n\n\"你在说我孙女。\"九阙打断了他。\n\n声音依然温和。但空气的温度降了。\n\n\"你在一个祖父面前讨论他孙女的'威胁概率'。我建议你换一种措辞，司衡局长。否则——\"\n\n他没说否则怎样。但客厅里的灯光闪了一下。不是电力波动。是九阙身上的妖力在泄漏。\n\n千翼终于从墙上站直了。他的声音像砂纸擦过钢板：\n\n\"别吵了。你们有完没完。现在的重点是夜冠。他在灵脉节点埋了足以炸毁半个日本的灵力炸弹。这些东西一旦同时引爆，不只风见市——整个关东地区的灵脉网络都会崩溃。认知滤网全面失效，人类和妖怪的隔离彻底消失。我们要是在这儿内讧，全都得死。\"\n\n沉默了五秒。\n\n主人一直在看窗外。或者说，在看窗外的天空。云层很厚，看不到星星。\n\n这时候他转过头，视线像探照灯一样扫过在场的每一个人。他的眼睛没有戴眼镜，比平时看起来更清澈——也更冷。\n\n\"我不在乎你们的底线。也不在乎什么大义。\"\n\n他指了指身后的晓光。\n\n\"我只有一个要求。让她活下去。有尊严地活下去。不是实验品，也不是通缉犯。不是被监视的对象，不是被分析的概率。做到这一点，你们要什么条件都可以谈。做不到——\"\n\n他没把话说完。但房间里的温度似乎降了两度。所有人都明白那个没说完的后半句意味着什么——一个能用语言改写现实的人，如果决定跟整个世界为敌，后果是不可想象的。\n\n\"这不可能。\"司衡·岚说。\"法律不允许——\"\n\n\"法律是人定的。\"主人打断了他。\"如果现在的法律不允许，那就改掉它。\"\n\n停了一拍。\n\n\"或者，我来帮你们改。\"\n\n这句话让在场所有人都沉默了。\"帮你们改\"——从一个言灵使嘴里说出来，这不是比喻。他真的可以把法律本身\"说\"成另一个版本。\n\n九阙笑出了声。那是一种真正被逗乐了的笑，和他平时那种计算过的微笑完全不同。\n\n\"有趣。老身活了一千多年，还是第一次见到敢跟整个世界叫板的人类。\"他抚了抚和服的衣袖，目光中带着一种长辈看后辈的欣赏。\"好——青丘跟了。情报网和物资支持，管够。但我有一个条件。\"\n\n\"说。\"\n\n\"战后，让晓光认祖归宗。银月脉不能断了传承。\"\n\n晓光的嘴张了张。九阙看了她一眼，微微眨了眨眼——那是一种比任何语言都温暖的安抚。\n\n千翼深深地叹了口气。他揉了揉受伤的翅膀。\n\n\"既然天狐大人都这么说了……百鬼联盟也不会落后。疏散平民和空中支援，我负责。不过说好了——这次我不收费。算是还你昨晚帮我挡那一爪子的人情。\"\n\n他看了晓光一眼。\"你那一爪子可真疼。\"\n\n晓光缩了缩脖子：\"对……对不起……\"\n\n\"下次记得瞄准一点。\"千翼的嘴角扯出一个似笑非笑的弧度。\n\n所有人都看向司衡·岚。\n\n他的视线落在晓光身上。那个苍白的、站都站不稳但死活不肯坐下的少女。她穿着大两号的卫衣，像被淹没在里面。但她的眼睛是亮的——不是恐惧，是一种拼命压制着的、想要做点什么的渴望。\n\n她让他想起了某个人。很多年前。那个为了救他而死在符文枪下的妖族女孩。\n\n\"啧。\"\n\n他伸出手。金属义肢在空中举着，马达发出低沉的嗡鸣。\n\n\"四十八小时。通讯静默期。这段时间风见市发生的一切，总部看不见。但如果四十八小时后危机还没解除——我会亲手按下那个按钮。这一点不会打折扣。\"\n\n主人握住了他的手。人类的血肉之手和冰冷的机械之手。\n\n\"成交。\"\n\n握手松开。\n\n白霜从厨房门口走出来。她举起平板电脑，屏幕上显示着一张复杂到令人头皮发麻的路线图——四十七个灵脉节点的拆弹优先序列、最优行进路线、以及每个节点的风险评估。\n\n\"……打扰一下。我算出了拆弹方案。按照这个顺序执行，可以在三十二小时内拆除全部炸弹。但需要至少三支独立行动队同时推进。\"\n\n司衡·岚看了一眼那张图。他当了二十年的作战指挥，从没见过这么精密的战术推演。\n\n\"……这是谁做的？\"\n\n\"我。\"白霜的声音很小，但没有退缩。\"我是AI。这种事情是我的专长。\"\n\n短暂的静默。\n\n千翼第一个开口：\"那就按这个来。我负责北线，九阙的人走东线，S.C.B走南线。中央节点——\"\n\n\"中央节点我和晓光去。\"主人说。\n\n晓光猛地抬头看他。\n\n\"那是夜冠的主据点。\"她的声音发紧。\"他会在那里等着你——\"\n\n\"所以才要我们去。\"\n\n他回头看了她一眼。\n\n\"一起。\"\n\n晓光看着他的眼睛。然后，她松开了紧抓椅背的手，走到他身边，把手放进了他的掌心里。\n\n\"……嗯。一起。\"\n\n厨房门口，白霜在平板电脑上飞快地打字。她的手指在敲，但她的视线穿过屏幕，落在那两只交握的手上。\n\n她轻轻地呼了一口气。\n\n然后继续打字。\n\n倒计时：四十七小时五十三分。\n", "小说/卷四/第三章_虚空对话.md": "# 卷四·阵眼保卫战 — 第三章 虚空对话\n\n世界消失了。\n\n没有颜色，没有声音，没有温度。只有黑白线条构成的草稿——像一个画到一半就被放弃的速写本。地面不存在，但他站在上面。天空不存在，但他能看到上方。一切都是矛盾的，一切都是半成品。\n\n这不是任何已知的空间。不是灵脉内部，不是认知滤网的夹层，也不是传说中的\"隐世\"。\n\n这是世界的\"后台\"。\n\n主人站在虚无中。浑身是血，衣服破烂得不成样子。右手握着一颗金色的铃铛——铃铛不再发声。左手攥成拳头，指甲嵌进掌心，血从指缝里渗出来。\n\n但他的眼睛亮得吓人。\n\n那种亮不是愤怒，不是悲伤，也不是疯狂。是一种纯粹的意志——像一把被磨到极致的刀，除了锋芒以外什么都没有。\n\n他伸手探入虚空，抓住了一条看不见的线。\n\n不是物理意义上的抓。是概念意义上的——他抓住了构成这个世界的规则本身。就像程序员抓住了源代码，就像画家抓住了画笔。\n\n一个没有情感的声音在空间里回荡。不是声波——是信息本身在振动：\n\n【检测到因果律干涉。个体\"晓光\"已确认死亡。灵魂已回归灵脉。狐珠燃尽，核心不可逆损毁。复活请求驳回。】\n\n\"驳回？\"主人笑了。那不是高兴的笑，是一种让人脊背发凉的笑。是一个失去了一切的人在最深的绝望中找到了最后一根线的笑。\n\n\"谁允许你驳回的？\"\n\n【此为世界法则之核心规则。死亡不可逆转。这是——】\n\n\"我说她没死。\"\n\n他的声音切断了那个无机质的陈述。不是打断——是从概念层面上\"剪断\"了那句话的后半段。\n\n\"她就没死。把她还给我。\"\n\n虚空震动了。黑白线条像受惊的蛇一样扭曲。这个\"后台\"不习惯被访客触碰——更不习惯访客下达命令。\n\n【警告。言灵使的权限不包含——】\n\n\"我的权限包含一切。\"\n\n又一次切断。\n\n\"你是规则。我是写规则的人。我让你做什么，你就做什么。\"\n\n长久的沉默。虚空中那些黑白线条停止了蠕动，仿佛在计算，在评估，在衡量一个不可能的请求是否存在任何执行路径。\n\n然后，声音再次响起。这次它的语调变了——如果一个没有情感的系统可以\"好奇\"的话，此刻它大概就是好奇的：\n\n【强行逆转生死将导致法则崩坏。代价：你的\"人性\"。你将失去所有情感——爱、恨、恐惧、快乐、悲伤——成为世界的纯粹观测者。你将拥有无限的力量，但永远不会再感到任何东西。是否执行？】\n\n他没有犹豫。\n\n\"执行。\"\n\n一秒都没有犹豫。\n\n\"只要她能回来。这种无聊的东西，你要多少拿多少。\"\n\n他的语气轻描淡写，像是在谈论一件不值一提的交易。但他的手——握着铃铛的那只手——在微微发抖。不是犹豫。是迫不及待。\n\n【交易成立。开始灵魂重塑——人性剥离启动——】\n\n虚空开始变化。主人的身周出现了无数条金色的丝线——那是\"情感\"的具象化。每一条丝线都连接着一段记忆：第一次看到晓光笑的记忆、第一次给她起名字的记忆、第一次被她抱住的记忆、第一次因为她哭的记忆。这些丝线正在被一根根拉出来，像是从织物上抽丝。\n\n第一根丝线断了。那是\"快乐\"——他记得每一次晓光在他面前笑的场景，但那些场景突然变成了灰色的、没有温度的画面。\n\n第二根丝线在拉。那是\"心疼\"——\n\n一只手抓住了他的手腕。\n\n温暖的。柔软的。还带着一点颤抖。指尖的力度很大，像是怕一松手就再也抓不住。\n\n\"不要！\"\n\n他低头看。晓光——或者说晓光的灵魂——出现在他身后。她是半透明的，边缘在不断溶解又重组，像一团随时会散掉的雾。她的轮廓很模糊，但那双异色的眼睛是清晰的——一只红色，一只金色，此刻全都蓄满了泪水。\n\n但她抓他的力气很大。大到他的手腕上能感觉到她指甲的形状。\n\n\"主人是大笨蛋！\"她哭着喊。声音也是模糊的，像隔着一层水，但情绪穿透了一切障碍，清晰而尖锐。\"如果没有了情感，就算晓光活过来了，主人也不再是主人了！\"\n\n\"那种事情——晓光绝对不要！\"\n\n\"晓光……？你还在这里？\"\n\n\"当然在！狐珠碎了但灵魂还没散完！我就知道你会做蠢事所以我拼命撑着——\"她的声音在哭泣中破碎又重组，\"你没有情感了，谁来摸我的头？谁来骂我得寸进尺？谁来给我煎蛋放辣酱？\"\n\n\"谁来在我做噩梦的时候坐在床边等我醒？\"\n\n\"谁来说——'你不是怪物，你是我的晓光'？\"\n\n她抱住他。她的身体正在变得越来越透明。灵魂的边缘在一片片脱落，像被风吹散的花瓣。她的时间不多了——没有了狐珠的灵魂无法在虚空中维持太久。\n\n但她抱得很紧。\n\n\"如果是为了我而牺牲主人……那我宁愿永远消失。\"\n\n她的声音变小了。不是因为虚弱——是因为她在努力让自己不哭出来，这样才能把最重要的话说清楚。\n\n\"我们要一起回去——带着所有的记忆和情感回去。这才是我想要的未来。不是一个没有感情的神和一只被施舍了生命的狐狸。是主人和晓光。是吵架也好、生气也好、笑也好、哭也好——是能感受到一切的我们。\"\n\n主人沉默了三秒。\n\n他垂下眼睛，看着她——看着她正在消散的、努力维持形态的灵魂。她的头发已经透明了一半，左手几乎看不见了，但那双眼睛还是那么亮。\n\n然后他笑了。这次是真的笑——无奈的、心疼的、和平时一模一样的笑。是那种\"你这家伙又让我没办法了\"的笑。\n\n\"好。\"\n\n他反手抱紧了她。把已经半透明的她拉进怀里。他的手穿过了她的一部分身体——那些已经开始溶解的地方——但他还是抱着。\n\n\"那就一起回去。管他什么法则，管他什么代价。\"\n\n他抬起头，对着虚空发出了声音。不是命令，不是交易，不是言灵。只是一个男孩最真实的愿望。是从心底生长出来的、不需要任何力量加持的声音。\n\n\"这个世界不需要没有感情的神。\"\n\n\"让我们——回家。\"\n\n他的声音在虚空中回荡。\n\n然后——\n\n虚空碎了。\n\n不是崩塌，不是爆炸。是像冰面融化一样，黑白的线条开始有了颜色。灰色变成蓝色——是天空。白色变成粉色——是花瓣。黑色变成温暖的橙色——是晨光。\n\n世界在他的话语中重建。\n\n但不是言灵重建的。是世界自己选择了重建。\n\n那个没有情感的声音最后响了一次：\n\n【……请求格式错误。无法解析。但——检测到异常的因果共振。两个灵魂的共振频率超过了法则的阈值。在这种情况下……执行一个法则之外的例外。不收取代价。】\n\n【原因：无法计算。】\n\n【注释：也许这就是人类称之为\"奇迹\"的东西。】\n\n现实世界。707号别墅的院子。\n\n那棵老樱花树在十一月的深夜爆发出了光芒。枯萎的树枝瞬间抽芽、开花。粉白色的花瓣像暴雪一样飘落，不只是院子——整个风见市都在下着樱花雪。\n\n街道上、屋顶上、河面上、废墟上——到处都是不属于这个季节的花瓣。\n\n在花雨中，两个身影从光里坠落下来。\n\n主人跪在地上，怀里抱着一个少女。\n\n银白色的长发。异色的瞳孔。脖子上的红色项圈，金色铃铛。铃铛在落地的瞬间响了一声——清脆的、新生的声音。\n\n她的心在跳。\n\n\"咚——咚——咚——\"\n\n强有力的、新生的心跳声，通过灵脉传导到了城市的每一个角落。\n\n在场所有人——S.C.B的特工，百鬼联盟的妖怪，军队的士兵——都放下了武器。不是因为命令，而是因为一种来自灵魂深处的战栗。那个心跳声穿透了一切防御——不是物理的穿透，是存在级别的共鸣。每个人都在那一刻感受到了同一件事：有什么东西回来了。\n\n白霜站在客厅窗口，平板电脑从手中滑落。她的猫耳竖得直直的，金色的瞳孔被泪水模糊。\n\n她轻声说了一句话，声音小到只有她自己能听见：\n\n\"……欢迎回家。\"\n\n院子里。\n\n晓光在主人怀里睁开了眼睛。\n\n\"……主人？\"\n\n\"嗯。\"\n\n\"我们……回来了？\"\n\n\"回来了。\"\n\n她抬起手——实体的手，有温度的手——摸了摸他的脸。然后摸了摸自己的胸口。\n\n\"狐珠……还在？\"\n\n\"还在。\"\n\n\"怎么……\"\n\n\"因为你不让我做蠢事。\"\n\n她愣了两秒。然后笑了，笑着笑着就哭了。\n\n\"主人果然是大笨蛋……\"\n\n\"嗯。是你的大笨蛋。\"\n\n樱花还在下。金色的铃铛在花雨中轻轻摇晃，发出细碎的声响。\n\n像是在说：我在这里。我一直在这里。\n", "小说/卷四/第二章_灵脉决战.md": "# 卷四·阵眼保卫战 — 第二章 灵脉决战\n\n十一月三日。深夜。风见神社后山。\n\n地面在颤抖。\n\n白霜的拆弹方案执行了三十一个小时。北线千翼的团队拆除了十五个节点。东线九阙的情报员处理了十四个。南线S.C.B特勤队清理了十二个。\n\n四十一个红点从地图上消失了。\n\n但还剩六个。全部集中在灵脉的中央核心节点——风见神社地下两百米处的主阵眼。那里是整个风见市灵脉网络的心脏。也是认知滤网在关东地区的最大锚点。\n\n也是夜冠的最后阵地。\n\n他在等着他们。\n\n主人和晓光站在神社的石阶上。夜风从山上灌下来，带着泥土、松脂和灵力紊乱的焦糊味。神社的鸟居在月光下投下长长的影子，朱红色的油漆剥落了大半。\n\n\"害怕吗？\"主人问。\n\n晓光想了想。\n\n\"害怕。\"她说。\"但是主人在旁边，就不那么怕了。\"\n\n\"那就走吧。\"\n\n他们沿着神社后面的秘径往下走。通道是天然的灵脉裂隙，岩壁上泛着幽蓝色的微光——那是灵力沿着脉络流动时发出的荧光。空气越来越浓稠，每次呼吸都像在吸果冻。灵压在急剧攀升。\n\n白霜的声音从通讯耳机里传来，稳定、精确，像一台运行在最优状态的机器：\n\n\"姐姐，主人，你们的位置距离核心节点还有四百米。通道分叉在前方一百二十米处，走左边。右边的通道在十七分钟前因灵脉波动发生了塌方。\"\n\n\"收到。\"主人回答。\n\n\"另外……\"白霜的声音出现了极短暂的停顿——对AI来说，这种停顿是异常的。\"注意安全。\"\n\n\"白霜好像比平时话多了。\"晓光轻声说。\n\n\"她在担心。\"主人说。\"AI也会担心。\"\n\n越往下走，温度越低。到最后，呼出的气变成了白雾。晓光的身体开始微微发光——这是九尾狐在高灵压环境下的本能反应，体表的灵力膜在自动加厚以保护内脏。光芒从她的皮肤下透出来，让她看起来像一盏行走的灯笼。\n\n通道越来越窄，有些地方需要侧身才能通过。岩壁上的灵脉纹路越来越密集，越来越亮，脉动的频率也越来越快——像是某种巨大生物的心跳在加速。\n\n主人握着她的手。他的手心是温的。在这个寒冷到几乎能冻裂岩石的地方，他的掌心温度恒定，像一块永远不会冷却的暖石。\n\n\"主人。\"\n\n\"嗯？\"\n\n\"如果——\"\n\n\"没有如果。\"\n\n她闭上嘴。他握紧了她的手。\n\n地下两百米。\n\n通道豁然开阔。\n\n他们面前是一个巨大的地下空间——像是被挖空了一座山。穹顶高得看不到尽头，四壁布满了发光的灵脉纹路，像是一颗巨大心脏内部的血管网络。空间的中央是一个直径约五十米的圆形平台，平台上刻满了古老的符文阵列。\n\n灵脉的核心——阵眼。\n\n夜冠已经不再是人形了。\n\n他融合了深埋地下数千年的古神残骸，变成了一团——很难用语言形容——由黑色触手和无数只眼睛组成的巨大肉块。每一只眼睛都在转动，瞳孔的颜色各不相同：有红的、紫的、金的，也有浑浊的灰白色。每一条触手都在缓慢地蠕动，末端分叉成更细小的触须，像树根一样扎进灵脉的脉络中，汲取着能量。\n\n他原本的白色面具碎了一半，嵌在那团肉块的\"脸部\"位置，弯月图案被裂纹一分为二。\n\n空气密度大得不正常，每次呼吸都像在吸砂纸。灵力浓度已经超过了安全阈值的数十倍——普通人在这个环境里站三分钟就会灵力中毒，血管爆裂而死。\n\nS.C.B的机甲部队先到了一步。三辆重装外骨骼战车排成品字阵形，肩部的符文加农炮已经预热完毕，在战车的装甲表面投射出蓝色的回路光芒。\n\n\"开火！\"\n\n三道符文光束同时击中了肉块。爆炸产生的冲击波让整个地下空间都在震颤，碎石从穹顶落下。\n\n烟尘散尽。肉块上连一道伤口都没有。\n\n触手扫过来的时候，第一辆战车像纸糊的一样被拍飞。飞行员从弹射座椅中射出来，撞在岩壁上。第二辆被触手缠住，金属外壳被挤压得发出刺耳的尖叫，像拧一个空易拉罐。第三辆的驾驶员拉了自毁装置——爆炸在触手上炸开一个小口，但三秒后就愈合了。\n\n千翼的风刃砍在肉块上，激起一串火花，连一道伤口都没留下。老天狗的面色铁青：\n\n\"物理攻击完全无效……这东西跟灵脉融合了，杀了它等于要炸掉整条灵脉——\"\n\n主人在最前面。言灵屏障竖在他面前——但那层无形的墙上已经布满了裂纹，像一块快要碎掉的冰。每一次触手的冲击都让裂纹扩大一点。他的鼻子在流血。太阳穴上的青筋跳得肉眼可见。\n\n言灵过度使用让他的大脑像被砂轮打磨。神经突触在高速燃烧，每一句话都在消耗他的生命力。他已经连续使用言灵超过三十个小时了——从分解导弹开始，到维持别墅结界，到现在的战斗。他快到极限了。\n\n夜冠的声音从无数张嘴里同时传出来，男声女声老人的声音重叠在一起，像一台失调的合唱团：\n\n\"看到了吗？这就是你们所谓的希望！一个快要烧光脑子的孩子和一只被药物控制过的小狐狸！来吧，成为我的一部分！在死亡面前——众生平等！\"\n\n主人的嘴角溢出血来。不是被打的——是脑内微血管破裂了。言灵的代价。\n\n晓光站在他身后。\n\n她看着主人的背影。那件黑色卫衣的后背被汗水浸透了。他快到极限了。她比谁都清楚。她能感觉到——通过他们之间那条看不见的灵力纽带——他的生命力在流逝。像沙漏里的沙子，一粒一粒地往下掉。\n\n\"主人。\"\n\n她的声音很平静。平静得不像她。不是平时那种活泼的、撒娇的、偶尔使坏的声音。是一种做好了决定之后才有的平静。\n\n\"以前都是你保护我。从铁笼里把我救出来的时候。从噩梦里把我叫醒的时候。从暴走的身体里把我拉回来的时候。\"\n\n\"这次，换晓光来保护你。\"\n\n她身上燃起了光。不是狐火——是她的生命力本身在燃烧。金色的火焰从胸口蔓延到全身，连她的头发都变成了流动的金色。这是九尾狐的禁术——燃烧狐珠。\n\n狐珠是九尾狐的灵魂核心。比心脏重要。比灵力重要。是一只九尾狐之所以存在的根本。\n\n燃烧狐珠意味着什么，在场的妖怪都很清楚。\n\n千翼的脸色瞬间变了。九阙手里的茶杯——他带到了战场上——从手中滑落。\n\n主人转头。他看到了那种光。他认识那种光。\n\n\"晓光！停下！这是命令！\"\n\n他的声音终于动摇了。第一次。自始至终，面对导弹、面对包围、面对天崩地裂，他都没有动摇过。但现在他慌了。\n\n她回过头。\n\n她笑了。那个笑容很安静，很干净，像七月七日废弃车厢里的烛光。像他第一次叫她名字时她绽放的笑容。\n\n\"主人，谢谢你给了我名字。谢谢你给了我家。谢谢你教会我什么是喜欢。\"\n\n\"晓光——最喜欢主人了。\"\n\n\"这是命令——\"\n\n\"对不起，主人。\"\n\n她眼角滑下一滴泪。金色的火焰映得那滴泪像流星。\n\n\"这是晓光第一次，也是最后一次，违抗命令。\"\n\n她化作一道金色的光，冲向夜冠的核心。\n\n金光穿透了触手，穿透了眼睛，穿透了古神残骸构成的铠甲，直抵最核心的灵力节点。她的身体在解体——毛发变成光丝，皮肤变成星尘，骨骼变成火焰——但她在笑。\n\n爆炸的白光吞没了一切。\n\n夜冠在白光中发出了最后一声惨叫——不是恐惧，是困惑。他无法理解。一只妖怪为什么会自愿燃烧自己的灵魂核心去保护一个人类？这不合逻辑。这不合他构建的所有理论模型。\n\n\"为什么……\"他的无数张嘴同时发问，\"为什么一只妖怪会为了人类——\"\n\n金光吞没了他的声音。\n\n白光消退之后，地下空间安静了。\n\n夜冠消失了。不是死了——是被净化了。狐珠燃烧时释放的灵力将古神残骸中的秽气全部蒸发，剩下的只是一堆无害的矿化物，和一副跪在地上的、失去了所有力量的人类躯壳。他的白色面具彻底碎了。露出底下的脸——出人意料地年轻，看起来只有二十出头。\n\n但没有人在看他。\n\n所有人都在看主人。\n\n他跪在爆炸的中心。衣服烧焦了一半，脸上是灼伤和血迹。但他没有看自己的伤。\n\n他在找。\n\n他在碎石和灰烬中翻找。\n\n\"晓光？\"\n\n翻。\n\n\"晓光！\"\n\n翻。\n\n什么都没有。没有身体。没有银白色的头发。没有红色的项圈。什么都没有。\n\n他的手停了。\n\n在灰烬中，有一个小小的、金色的东西在闪光。\n\n铃铛。\n\n那颗金色的铃铛。项圈上的铃铛。\n\n他把它捡起来。铃铛在他的掌心里躺着，表面微微发烫——残余的体温。\n\n他握紧了它。\n\n在白光中，主人伸出了手。\n\n他什么都抓不到。\n\n只有铃铛——那颗金色的铃铛——在他的手心里发出最后一声轻响。\n\n叮。\n\n然后——\n\n他的周围开始变化。地面不再是碎石和灰烬，而是变成了白色的虚无。墙壁消失了。天花板消失了。所有人——千翼、S.C.B的特工、受伤的士兵——都在远去，像被潮水推走的贝壳。\n\n他一个人站在虚无中。\n\n手里握着一颗不再响的铃铛。\n", "小说/卷四/第四章_新的日常.md": "# 卷四·阵眼保卫战 — 第四章 新的日常\n\n次年四月。\n\n风见市中心广场挂满了樱花灯笼。\n\n第一届公开的樱花祭。\n\n这在半年前是不可想象的。半年前，人类和妖怪之间隔着一道看不见的墙——认知滤网让普通人永远不会意识到邻居是天狗，同事是化猫，便利店老板是河童。\n\n现在墙没了。\n\n准确地说，不是完全没了。认知滤网还在运转——但它从一面遮蔽一切的镜子变成了一块半透明的毛玻璃。愿意看到的人可以看到。选择不看的人依然可以继续平静的日常。\n\n这个改变不是一夜之间发生的。\n\n风见之乱之后的六个月是混乱的。恐慌、抗议、歧视、暴力事件——人类和妖怪之间积累了几百年的不信任在一夜之间被释放出来。S.C.B的日本总部要求对风见市实施\"灵力封锁\"——本质上就是把整个城市变成一个巨大的隔离区。\n\n是九阙出面谈判了三天三夜。是千翼亲自带着百鬼联盟的巡逻队在街头维持秩序。是司衡·岚——已经被停职的他——用私人关系说服了总部的三位高层同意了\"风见模式\"试点方案。\n\n是主人在联合国的秘密听证会上说了一句话：\"如果你们选择恐惧，我不会阻止。但我也不会配合。你们自己决定，是要一个愿意合作的言灵使，还是一个敌人。\"\n\n据说听证会的录音带在五国安全理事会成员之间传阅了十七次。\n\n然后——人妖共存法案通过了。\n\n风见市成为日本乃至全球第一个公开的人妖共存试验城市。\n\n---\n\n街上的景象放在半年前是不可想象的。穿西装的狸猫在给游客发传单——上面印着\"风见市观光指南·异类文化特别版\"。小孩骑在鬼族大叔的肩膀上吃棉花糖，鬼族大叔的角上还挂着一个气球。S.C.B的巡逻车被涂成了粉色——上面印着樱花图案和\"人妖共存·风见模式\"的标语。巡逻车旁边停着一辆百鬼联盟的妖兽战车，两个组织的巡逻员正在一起吃便当。\n\n神社的参道两旁摆满了摊位。和半年前被摧毁的妖怪夜市不同，这次的摊位是人类和妖怪混合经营的——人类大叔卖章鱼烧，旁边触手大叔卖\"正宗八爪版\"章鱼烧，两个人为了谁的更正宗吵了三天，最后决定合开一个摊位。\n\n纸伞老板——那个在夜市被砍伤的付丧神——重新开张了。他的伞面上多了一道疤痕，但他说这是\"战斗勋章\"，还特意用金丝在裂口处绣了花纹。\n\n晓光穿着巫女服走在人群里。\n\n她没有藏尾巴。\n\n九条雪白蓬松的大尾巴在身后轻轻摇晃，路过的小孩子们会停下来盯着看，然后被父母拉走——但父母的表情不是恐惧，而是那种\"别盯着人家看，不礼貌\"的日常提醒。\n\n偶尔有大胆的小孩挣脱父母的手跑过来：\"姐姐！你的尾巴好漂亮！可以摸一下吗？\"\n\n晓光蹲下来，把一条尾巴递到小孩面前：\"轻一点哦。\"\n\n\"好软！比我家的猫还软！\"\n\n\"当然了，本小姐的尾巴可是每天用特制洗发水洗的。\"\n\n红绡举着自拍杆在旁边直播，补光灯开到最大：\n\n\"家人们！这就是传说中的'言灵大人'和他的小狐狸哦！是不是超般配！快刷火箭！弹幕里说想看言灵大人笑一个——言灵大人？言灵大人你转个头嘛——\"\n\n晓光被闪得眯起眼：\"红绡姐姐你能不能把灯关一下……我眼睛要瞎了……\"\n\n\"不行！光线是流量的灵魂！现在在线人数八十万，破了我的历史纪录！来来来，笑一个——对着镜头——\"\n\n主人伸手挡在镜头前面：\"够了。\"\n\n红绡立刻换上了乖巧的笑脸：\"好的好的，言灵大人说了算~\"\n\n她小声对着镜头补了一句：\"看到没家人们，言灵大人吃醋了——\"\n\n\"我听得到。\"\n\n\"哎呀没有没有我什么都没说——\"\n\n两人牵着手继续往前走。路过章鱼烧摊位的时候，触手大叔热情地招呼：\n\n\"这不是小狐狸嘛！来来来，尝尝新品——辣味章鱼烧！加了风见山的灵辣椒，保证你吃了从头辣到尾巴尖！\"\n\n晓光的眼睛亮了。\n\n\"辣的？！\"\n\n主人捏了捏她的手：\"少吃点，上次吃太辣了喝了一升水，然后半夜肚子疼让我给你揉了两个小时。\"\n\n\"这次不会了嘛！我现在辣的承受能力比以前强多了！\"\n\n\"你每次都这么说。\"\n\n\"这次是真的！\"\n\n她接过一盒，塞了一颗进嘴里。\n\n\"斯哈——！！好辣好辣好辣——！\"\n\n她眼泪都辣出来了，但还是拼命点头：\"好吃好吃！主人你也试试！啊——\"\n\n她把沾着酱汁的章鱼烧举到主人嘴边。主人看了看周围。红绡的镜头对准了他们。路人在微笑。千翼站在神社的鸟居旁边，装作没在看——但他的翅膀暴露了他的心情，羽毛微微蓬松，那是天狗开心时的无意识反应。\n\n他低头咬了一口。\n\n\"……确实挺辣的。\"\n\n\"对吧对吧！\"\n\n晓光满意地笑了。\n\n---\n\n晚上回到别墅。\n\n白霜在厨房里做晚饭。菜谱是她根据三人的营养需求精确计算的——蛋白质、碳水化合物、脂肪、维生素的比例严格按照理想值配比。味道嘛……比起\"好吃\"，更适合用\"科学\"来形容。\n\n\"白霜，今天的味增汤味道怪怪的……\"\n\n\"我调整了钠含量。姐姐最近的血压数据偏高0.3%——\"\n\n\"那是因为吃了辣的章鱼烧！不是因为盐多！\"\n\n\"数据不会说谎。\"\n\n\"你——\"\n\n主人在客厅看报纸。头条写着《人妖共存法案正式通过·风见市成为首个试点城市》。副标题：\"年轻的'言灵大人'将担任试验区特别顾问——最年少的国际安全事务参与者\"。\n\n他翻了一页。另一条新闻：《S.C.B风见分局长司衡·岚复职，晋升为日本地区总监》。配图是司衡穿着新制服的照片，表情一如既往地严肃——但义肢上多了一个小小的樱花贴纸，据说是晓光偷偷贴上去的。\n\n晓光从厨房跑出来，在镜子前转圈，展示红绡送的新发饰——一只银色的小狐狸发卡，耳朵上镶着月光石。\n\n\"主人主人！好看吗？\"\n\n\"好看。不过出门记得别乱跑。九条尾巴还是太招摇了。\"\n\n晓光扑到他身上，脸蹭着他的脖子。她身上带着章鱼烧的辣味和樱花祭的焦糖甜味，混在一起意外地好闻。\n\n\"怕什么嘛！现在司衡局长是我粉丝团团长，千翼神官是我保镖，九阙爷爷给我开了黑卡，那个讨厌的白垣主任在监狱里给我写悔过书呢。谁敢欺负我呀？\"\n\n\"吉祥物也要做家务。碗洗了吗？\"\n\n\"呃……\"\n\n她的眼神开始飘。\n\n\"今天天气这么好，我们要不要——\"\n\n\"先洗碗。\"\n\n\"唔……主人帮我洗嘛……昨晚……昨晚太累了嘛……\"\n\n她的声音越来越小，脸红得像熟透的苹果。\n\n\"都怪主人不知节制……\"\n\n主人的耳尖也红了。他咳了一声，把报纸往上提了提挡住脸。\n\n\"……下不为例。走吧。\"\n\n\"耶！\"\n\n她牵着他的手往厨房走。铃铛发出清脆的叮当声。\n\n白霜站在厨房门口，看着他们走过来，面无表情地说：\n\n\"隔音结界我已经加强过了。但建议下次还是控制一下音量。我的声纹分析模块是自动运行的。\"\n\n\"白——白霜——！！\"\n\n\"陈述事实而已。\"\n\n厨房里传出哗哗的水声和晓光哀嚎的声音。主人在洗碗——他果然还是心软了。晓光坐在料理台上晃着腿，一边吃白霜做的布丁一边叽叽喳喳地聊今天在樱花祭上看到的一切。\n\n窗外，樱花正在盛开。707号院子里那棵\"奇迹之树\"——去年深秋绽放后就再也没有凋谢过的樱花——在月光下散发着淡淡的银色光辉。\n\n报纸被风翻了一页，露出一则小小的消息：\n\n《风见市南区707号樱花树被列为市级保护植物。市民称其为\"奇迹之树\"——去年深秋盛开的樱花至今不曾凋谢。专家认为这与该地区的灵脉特殊性有关。S.C.B表示将对该现象进行长期观察。》\n\n旁边有一则更小的消息，藏在广告栏的角落里：\n\n《百鬼联盟宣布：妖怪夜市将于下月重新开张。新址位于风见市中央公园地下层。欢迎人类朋友光临——但请自备灵力适应护身符。》\n\n洗碗声。笑声。铃铛声。\n\n这就是新的日常。\n\n没有秘密的。光明正大的。理所当然的。\n\n属于他们的日常。\n", "索引/时间线.md": "# 故事时间线\n\n## 前史\n\n| 时间 | 事件 |\n|------|------|\n| 14年前 | 晓光出生于北方山村，异色瞳+尾巴，被父母当\"怪胎\" |\n| 8年前 (晓光6岁) | 雪灾断粮，父亲以两袋米+一桶油+500元将晓光卖给人贩子 |\n| 8年前~7年前 | 晓光被关在地下室铁笼一年。脖子上被戴上刻着\"晓光\"的旧项圈 |\n| 7年前 7月7日 | **命运之日**：7岁的主人发现废弃仓库中的铁笼，砸锁救出晓光。两人同天生日。\"今天也是我的生日。\" |\n| 7年前~现在 | 707号别墅的七年羁绊。晓光从创伤中逐渐恢复 |\n\n## 第一年（疗愈）\n- 不敢上桌吃饭，噩梦尖叫\n- 主人每晚抱着哄入睡\n\n## 第三年（依恋）\n- 开始学做饭，菜炒焦了主人也笑着吃完\n\n## 第五年（才艺）\n- 画了第一张主人画像，被装裱挂墙上\n\n## 第七年/现在（自信）\n- 走出阴影，活泼有些小色气\n- 白霜被创造，加入家庭\n\n---\n\n## 故事正篇时间线\n\n### 卷一：隐秘的日常（4月-6月）\n| 时间 | 事件 |\n|------|------|\n| 4月上旬 | 晓光转入风见学园。体测失控，主人用言灵17次修复 |\n| 4月中旬 | 甜心猫烘焙坊偶遇红绡，差点暴露身份，后成为朋友 |\n| 5月上旬 | 漫展约会。尾巴蓬松到塞不回去。小妖怪暴走被主人一句\"趴下\"镇压 |\n| 6月中旬 | 暴雨夜。雷暴触发铁笼创伤记忆，两人关系跨越到亲密层次 |\n\n### 卷二：小小的波澜（7月-9月）\n| 时间 | 事件 |\n|------|------|\n| 6月下旬 | 主人带晓光回废弃仓库直面创伤 |\n| 7月7日 | 共同生日/羁绊日。废弃车厢里的永恒誓约。新项圈+铃铛 |\n| 7月-8月 | S.C.B研究部施言·白垣试图以\"体检\"带走晓光，主人去分局喝茶顺便让安保系统瘫痪 |\n| 8月-9月 | 白霜被创造并加入家庭。校园中土御门·澄夜发现晓光身份 |\n\n### 卷三：风见之乱（10月-11月初）\n| 时间 | 事件 |\n|------|------|\n| 10月31日 21:00 | 万圣夜，暗月爪牙袭击妖怪夜市。红绡被抓。晓光去救人 |\n| 10月31日 21:45 | 晓光被注射返祖诱导剂，兽化暴走。肩高超3米的巨型白狐 |\n| 10月31日 22:00 | S.C.B发射\"天火\"导弹。主人出现，一句\"停\"解体导弹。身份暴露 |\n| 11月1日 凌晨 | 707号结界启动，军队包围。晓光醒来差点自杀，被主人阻止 |\n| 11月1日 夜 | 夜冠威胁引爆灵脉。晓光违抗命令，冲向夜冠自爆 |\n\n### 卷四：阵眼保卫战（11月-次年4月）\n| 时间 | 事件 |\n|------|------|\n| 11月2日 | 707号圆桌会议。三方势力谈判，达成48小时休战 |\n| 11月3日 深夜 | 夜冠启动全部灵脉炸弹，融合古神残骸异化。晓光狐珠碎裂自爆 |\n| 11月4日 0:05 | 主人探入虚空扯回因果线，拒绝用人性换晓光复活。两人一起回来。樱花暴雪覆盖风见市 |\n| 次年4月 | 人妖共存法案通过。第一届公开樱花祭。和平的新日常 |\n\n### 卷五：千年的回响（次年某月）\n| 时间 | 事件 |\n|------|------|\n| 新秩序后约一年 | 灵脉维护中，晓光被古老记忆光带卷入前世记忆 |\n| 平安时代·冬 | 前世回溯：受伤的金色狐狸（玉藻前）遇到阴阳师晴明，雪夜初遇 |\n| 平安时代·数年后 | 玉藻前化人形留在晴明身边，樱花树下的\"人妖殊途\"对话 |\n| 平安时代末期 | 那须野之战。朝廷围剿，晴明以转生咒牺牲自己保护玉藻前。玉藻前化为杀生石 |\n| 现代·37小时后 | 晓光在707号别墅醒来，认出主人与晴明的关联。\"这次不会再放手了\" |\n\n### 卷六：永恒的誓约（2031年4月-7月）\n| 时间 | 事件 |\n|------|------|\n| 2031年4月 | 主人23岁。鬓角出现白发，言灵透支生命的代价显现。晓光察觉 |\n| 2031年4月中旬 | 晓光找九阙要求学习\"妖化转生术\"，被拒。主人赶到，两人爆发最激烈的争吵 |\n| 2031年5月 | 主人在青丘地下实验室研发\"半灵体化\"技术，结合言灵+灵子力学+白霜算力 |\n| 2031年5月底 | 实验成功。主人以符文核心求婚。\"你愿意成为我的生命维持系统吗？期限是永远。\" |\n| 2031年7月7日 | 羁绊日。707号别墅庭院樱花树下举行婚礼。同生共死契约完成 |\n| 很久以后 | 尾声。风见市已变，两人容颜不改，在同一棵樱花树下 |\n", "索引/角色关系图.md": "# 角色关系图\n\n## 核心三人组\n\n```\n        主人 (言灵使/BaiMeow)\n       /                    \\\n    救命恩人/恋人          创造者/父亲\n     /                        \\\n  晓光 (九尾狐娘)  ——姐妹——  白霜 (猫娘)\n```\n\n## 主人的关系网\n\n- **晓光** → 恋人。7岁时从人贩子手中救出，养育7年。双向依恋。\n- **白霜** → 造物/女儿。用言灵从数据海洋中创造。\n- **非皇 (431686772)** → 挚友。晓光视其为尊贵客人。\n\n## 晓光的关系网\n\n- **主人** → 生命中唯一的光。绝对忠诚+恋爱感情。\n- **白霜** → 妹妹。喜欢\"欺负\"她但关键时刻绝对保护。\n- **红绡** → 同类朋友。甜品店偶遇，口味不同但成了好友。\n- **S.C.B** → 潜在威胁。研究部曾想带走她做实验。\n- **非皇** → 主人的朋友，很有礼貌地对待。\n\n## 白霜的关系网\n\n- **主人** → 创造者/信仰。渴望被认可。\n- **晓光** → 姐姐。被捉弄但依赖，羡慕她的鲜活生命力。\n\n## 势力关系\n\n```\nS.C.B 特别对策局 (人类政府)\n├── 司衡·岚 (分局长) — 务实派，暗中保护主人\n├── 纪存 (Cleaner) — 信息战，有道德挣扎\n└── 施言·白垣 (研究部) — 反派，想抓晓光做实验 → 卷四后入狱\n\n百鬼联盟 (妖族自治)\n├── 千翼 (天狗军师) — 骄傲但正义\n└── 纸伞 (联络官) — 夜市管理者\n\n青丘控股 (狐族财阀)\n└── 九阙 (千年天狐CEO) — 优雅腹黑，利益驱动\n\n暗月爪牙 (激进派)\n└── 夜冠 (首领) — 卷三卷四反派，融合古神残骸\n```\n", "索引/项目总览.md": "# AIbot 项目总览\n\n## 这是什么？\n\n一个以 AI 角色扮演为核心的创意项目，包含：\n- 两个 AI 角色的完整设定（晓光、白霜）\n- 一个虚构世界的完整世界观（风见市）\n- 多卷剧情和小说作为知识库补充\n- 用于 AstrBot/QQ 平台的系统提示词\n\n## 目录结构\n\n```\n提示词/              — AI 系统提示词（直接用于部署）\n  ├── 晓光_系统提示词.md    (v7.0)\n  ├── 白霜_系统提示词.md    (v3.0)\n  └── 预设/                 — 破甲/预设文件\n\n角色/                — 角色设定卡（进知识库）\n  ├── 晓光.md              — 九尾狐娘，主角\n  ├── 白霜.md              — 猫娘，搜索助手\n  ├── 主人.md              — 言灵使，14岁男孩\n  └── NPC设定集.md         — 所有NPC和势力\n\n世界观/              — 世界观设定（进知识库）\n  ├── 世界观架构.md        — 表里双生、认知滤网、隐世\n  ├── 种族与生态设定集.md  — 九尾狐、天狗、猫又等\n  ├── 地理环境与地标指南.md — 风见市详细地理\n  ├── 文化习俗与神话传说.md — 异类文化百科\n  └── 扩展档案/            — 27个深度扩展档案\n      ├── 百鬼联盟内幕.md\n      ├── 变身与幻术原理.md\n      ├── 别墅结界系 // ===== Markdown 渲染器 =====
function renderMarkdown(md) {
  let html = md;

  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>';
  });

  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // 表格
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const heads = header.split('|').slice(1, -1).map(h => '<th>' + h.trim() + '</th>').join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').slice(1, -1).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    }).join('');
    return '<table><thead><tr>' + heads + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });

  // 标题
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 引用块
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // 水平线
  html = html.replace(/^---+$/gm, '<hr>');

  // 粗体和斜体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // 无序列表
  html = html.replace(/^(\s*)[-*] (.+)$/gm, (_, indent, text) => {
    return indent + '<li>' + text + '</li>';
  });
  // 包裹连续 li
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, (match) => {
    return '<ol>' + match.replace(/<\/?oli>/g, (t) => t.replace('oli', 'li')) + '</ol>';
  });

  // 段落（非标签行）
  const lines = html.split('\n');
  const result = [];
  let inPre = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.includes('<pre>')) inPre = true;
    if (line.includes('</pre>')) { inPre = false; result.push(line); continue; }
    if (inPre) { result.push(line); continue; }
    if (line.trim() === '') { result.push(''); continue; }
    if (/^<[a-z]/.test(line.trim())) { result.push(line); continue; }
    // 非标签的纯文本行 → 段落
    if (!/^</.test(line.trim())) {
      result.push('<p>' + line + '</p>');
    } else {
      result.push(line);
    }
  }

  return result.join('\n');
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== 目录树 =====
function renderTree(tree, container, prefix) {
  const dirs = [];
  const files = [];

  for (const [name, value] of Object.entries(tree)) {
    if (value === null) files.push(name);
    else dirs.push(name);
  }

  // 目录在前
  for (const dir of dirs.sort()) {
    const dirEl = document.createElement('div');
    dirEl.className = 'tree-dir';

    const label = document.createElement('div');
    label.className = 'tree-dir-label';
    label.innerHTML = '<span class="arrow open">▶</span><span class="folder-icon">📁</span>' + dir;

    const children = document.createElement('div');
    children.className = 'tree-children';

    label.onclick = () => {
      children.classList.toggle('collapsed');
      label.querySelector('.arrow').classList.toggle('open');
    };

    dirEl.appendChild(label);
    dirEl.appendChild(children);
    container.appendChild(dirEl);

    renderTree(tree[dir], children, prefix ? prefix + '/' + dir : dir);
  }

  // 文件
  for (const file of files.sort()) {
    const fileEl = document.createElement('div');
    fileEl.className = 'tree-file';
    fileEl.textContent = file;
    const fullPath = prefix ? prefix + '/' + file : file;
    fileEl.onclick = () => showFile(fullPath);
    fileEl.dataset.path = fullPath;
    container.appendChild(fileEl);
  }
}

// ===== 显示文件 =====
function showFile(path) {
  const content = FILE_DATA[path];
  if (!content) return;

  // 更新树高亮
  document.querySelectorAll('.tree-file.active').forEach(el => el.classList.remove('active'));
  const target = document.querySelector(`.tree-file[data-path="${CSS.escape(path)}"]`);
  if (target) target.classList.add('active');

  // 面包屑
  const parts = path.split('/');
  let breadcrumbHtml = parts.map((p, i) => {
    if (i < parts.length - 1) {
      return '<span>' + p + '</span>';
    }
    return p;
  }).join(' / ');

  // 渲染
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div class="breadcrumb">' + breadcrumbHtml + '</div>' +
    '<div class="md-content">' + renderMarkdown(content) + '</div>';

  document.getElementById('main').scrollTop = 0;
}

// ===== 搜索 =====
const searchBox = document.getElementById('search-box');
const searchResults = document.getElementById('search-results');
const treeContainer = document.getElementById('tree-container');
let searchTimeout;

searchBox.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

function doSearch() {
  const query = searchBox.value.trim().toLowerCase();
  if (!query) {
    searchResults.style.display = 'none';
    treeContainer.style.display = 'block';
    return;
  }

  searchResults.style.display = 'block';
  treeContainer.style.display = 'none';
  searchResults.innerHTML = '';

  const results = [];
  for (const [path, content] of Object.entries(FILE_DATA)) {
    const pathMatch = path.toLowerCase().includes(query);
    const contentLower = content.toLowerCase();
    const idx = contentLower.indexOf(query);

    if (pathMatch || idx !== -1) {
      let context = '';
      if (idx !== -1) {
        const start = Math.max(0, idx - 20);
        const end = Math.min(content.length, idx + query.length + 40);
        context = (start > 0 ? '...' : '') +
          content.slice(start, idx) +
          '<mark>' + content.slice(idx, idx + query.length) + '</mark>' +
          content.slice(idx + query.length, end) +
          (end < content.length ? '...' : '');
      }
      results.push({ path, context, pathMatch });
    }
  }

  // 路径匹配优先
  results.sort((a, b) => (b.pathMatch ? 1 : 0) - (a.pathMatch ? 1 : 0));

  if (results.length === 0) {
    searchResults.innerHTML = '<div style="padding:16px;color:var(--text-secondary);text-align:center">未找到结果</div>';
    return;
  }

  results.slice(0, 30).forEach(r => {
    const item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = '<div>' + r.path + '</div>' +
      (r.context ? '<div class="match-context">' + r.context + '</div>' : '');
    item.onclick = () => {
      showFile(r.path);
      searchBox.value = '';
      searchResults.style.display = 'none';
      treeContainer.style.display = 'block';
    };
    searchResults.appendChild(item);
  });
}
