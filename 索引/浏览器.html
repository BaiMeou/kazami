——别墅会做月见团子。晓光用妖力让团子微微发光，摆在院子里的小桌上，三个人坐在廊下赏月。白霜会精确计算当晚月亮最圆的时刻，提前五分钟提醒大家抬头。\n\n## 妖怪食材\n\n别墅的食材来源分两类：普通食材从超市购买，特殊食材则来自妖怪夜市或隐世界的专门渠道。\n\n**灵米**——隐世界农田出产的稻米。生长在灵力充沛的土壤中，颗粒比普通大米大一圈，煮出来的饭有淡淡的甜香。别墅常备灵米，日常主食都用它。\n\n**灵果**——各种在灵力滋养下生长的水果。最常见的是灵桃（比普通桃子甜三倍，汁水是淡粉色的）和灵柿（秋天限定，据说吃了能暂时提升灵力感知）。\n\n**灵辣椒**——只在妖怪夜市能买到。辣度不算高，但入口后会在体内产生一股温暖的灵力流动。晓光用它做咖喱的秘密武器。\n\n**白霜特供猫草茶**——严格来说这不是食物。白霜虽然已经是实体化的存在，但她偶尔仍然会对猫草类植物表现出兴趣。主人特地从隐世界的猫又族农场订购了一种灵力猫草，白霜用它泡茶喝——她说喝了之后\"处理效率提升3.7%\"，晓光说那叫\"开心\"。\n\n## 三人做饭的日常\n\n707号别墅的厨房每天最热闹的时候是傍晚。\n\n通常的分工是：晓光掌勺，白霜负责食材预处理和精确调味辅助，主人打下手（洗菜、剥蒜、递东西）或者做他擅长的烘焙甜品。\n\n厨房的动线已经磨合得很默契。晓光在灶台前忙碌的时候，不用回头就会伸手说\"盐\"，白霜准确递过来；主人站在操作台另一边安静地揉面团，偶尔抬头看一眼晓光忙碌的背影。\n\n晓光做饭的时候话最多。她会一边翻炒一边碎碎念——\"今天这个茄子不太好\"\"白霜你买的豆腐太嫩了\"\"主人你蒜剥得好慢啊\"——但语气里全是轻快的日常感。主人通常只是嗯嗯地应着。白霜会认真回应每一条吐槽，然后在下次购物时悄悄做出调整。\n\n做完饭三人坐在餐桌前，晓光会盯着主人夹第一口菜时的表情。如果主人露出满意的神色，晓光就会假装不在意地把视线移开，嘴角却压不住地翘起来。\n\n\"——怎么样？\"\n\n\"好吃。\"\n\n\"当然好吃了，你也不看是谁做的。\"\n\n白霜在一旁默默记录：今日晚餐满意度评分9.2/10，较昨日提升0.3分。晓光的烹饪水平呈持续上升趋势。\n\n## 厨房事故档案\n\n707号别墅的厨房并非一直如此和谐。以下是白霜记录在案的几起重大厨房事故。\n\n**\"灵力暴走事件\"**——晓光十岁时尝试用妖力加速烧水。结果妖力注入过多，整壶水在三秒内沸腾并炸开了壶盖。水蒸气触发了烟雾报警器，主人从二楼冲下来以为着火了。事后晓光被禁止在厨房使用妖力长达三个月。\n\n**\"咖喱核弹事件\"**——晓光十二岁生日，想给自己做一锅特别的咖喱。她从妖怪夜市买了一种据说\"微辣\"的灵辣椒，但没注意到标签上写的是\"以妖族味觉为标准\"。妖族的辣味阈值是人类的二十倍。那锅咖喱辣得主人直接失去了半天的味觉，白霜的舌头传感器甚至报了一个\"异常温度\"警告。\n\n**\"符文烤箱失控事件\"**——白霜改造烤箱后的第一次使用。温控符文的参数设置有误，烤箱内部温度在十秒内飙升到了800度。烤箱门上的防热结界及时启动才没有酿成火灾，但里面的曲奇饼干直接碳化成了黑色的小石头。主人捡起一块敲了敲桌面，发出了清脆的陶瓷声。\n\n这些事故现在已经成了餐桌上的保留笑话。每次晓光在厨房做出什么新菜品，主人都会先小心翼翼地闻一闻，然后才动筷子。\n\n\"你在怀疑我的厨艺？\"\n\n\"……是在珍惜生命。\"\n\n\"你说什么？！\"\n\n## 节日限定特别菜单\n\n**情人节**——晓光会提前一个星期偷偷练习做巧克力。她每年都坚持手工制作，拒绝使用模具（\"那样太没诚意了\"），结果做出来的巧克力形状永远不规则。她会用白巧克力在表面歪歪扭扭地写上主人的名字，然后用红色缎带绑好，放在主人的枕头上。主人从来没评价过巧克力的外观，只说\"好吃\"。\n\n**夏天的刨冰**——别墅后院有一台老式手摇刨冰机。夏天的傍晚三个人轮流摇手柄，白霜负责精确控制糖浆的量，晓光负责堆出造型。她总是把自己的那份堆得最高，然后在吃到一半的时候塌掉。主人会把自己那份匀一半给她。\n\n**圣诞节蛋糕**——三人合作的年度保留项目。主人负责烤蛋糕坯，白霜负责打发奶油和精确抹面，晓光负责装饰。晓光的装饰风格堪称\"华丽到过分\"——草莓、蓝莓、巧克力碎片、彩色糖珠、棉花糖全部堆上去。白霜每年都建议\"适当减少装饰以保证结构稳定性\"，每年都被无视。\n", "世界观/扩展档案/变身与幻术原理.md": "# 变身与幻术原理\n\n## 变身魔法的本质\n\n变身是妖族最基础也最重要的能力之一。它不是\"伪装\"——而是真正的物理变形。变身后的身体在所有物理层面上都是\"真实\"的：变成人类后的血液成分、骨骼结构、内脏分布都与真正的人类一致。这种变形涉及分子层面的物质重组，需要妖力作为驱动能量。\n\n变身的原理可以用\"灵体-物体二象性\"来理解——妖族的身体同时存在于物理维度和灵力维度。变身时，妖力改变的是灵体的\"蓝图\"，物理身体随之自动重构。这就是为什么变身不遵守质量守恒——一只两百公斤的鬼可以变成一个五十公斤的人类女性，多出来的质量被\"折叠\"到了灵力维度。\n\n## 变身的层级\n\n### 初级化形\n\n维持基本人形，隐藏最显眼的异类特征（耳朵、尾巴、角等）。大多数城市妖族在日常中维持的就是这个层级。消耗妖力较低——对中阶以上的妖族而言几乎可以忽略不计。\n\n初级化形的破绽在于稳定性。疲劳、酒精、强烈情绪波动、或者打喷嚏都可能导致化形局部松动。最常见的\"漏出\"部位是耳朵和尾巴——这两个部位连接着最多的灵力经脉，控制难度最大。晓光在情绪激动时偶尔会漏出耳朵尖，但她的控制力远超同龄妖族，通常能在零点几秒内收回。\n\n### 完美化形\n\n分子级别的完美人形。连DNA检测都查不出异常——因为DNA本身也被重构了。只有高阶妖族能做到。完美化形的维持成本比初级化形高出约十倍，但对于像九阙这样的顶级妖族来说仍然不值一提。\n\n九阙常年维持完美化形，以至于很多低阶妖族都不知道他的真身是什么样。他曾经在百鬼议会上被要求展示真身以证明身份——他拒绝了，理由是\"我连自己的真身长什么样都快忘了\"。没人知道他是在开玩笑还是说真的。\n\n### 自由变化\n\n可以变成任何想要的形态——不同种族、不同年龄、不同性别、甚至非生物形态。这是极少数天赋异禀的妖族才拥有的能力。晓光可以做到自由变化，理论上没有上限——她曾经变成一朵花趴在窗台上偷听主人和同学的对话。\n\n自由变化的难点不在于\"变成什么样\"而在于\"细节还原\"——变成一个陌生人容易，变成一个特定的人（精确到每一根头发丝和每一个雀斑的位置）极难。需要对目标的外貌有极其精确的记忆或观察。\n\n### 分身\n\n从自身分裂出独立的物理实体。晓光最多可以分出八个分身（对应九条尾巴），每分一个少一条尾巴。分身有独立的物理存在——可以被触碰、可以搬东西、可以独立行动——但没有复杂的独立思维，只能执行预设的简单指令。\n\n分身的妖力消耗极大。每多一个分身，本体的战斗力就下降约15%。八个分身全部分出后本体几乎失去战斗能力——但换来的是九个可以同时行动的物理实体，在特定战术场景下价值巨大。\n\n## 变身的能量消耗与恢复\n\n维持变身的能量消耗取决于三个因素：变化幅度（与原形差异越大消耗越高）、持续时间、以及对抗检测的需求（在特别对策局的灵压扫描仪附近维持变身需要额外消耗来收束灵力信号）。\n\n一个中阶妖族维持初级化形一天的消耗约等于其妖力总量的3%到5%。完美化形约30%到50%。自由变化的消耗因目标形态而异，但通常远高于完美化形。\n\n妖力的恢复主要依赖三个途径：自然回充（在灵气浓郁的环境中休息）、进食含有灵力的食材（灵兽肉、灵草制品等）、以及饮用灵泉水。707号别墅位于灵脉阵眼上，灵气浓度极高，住在那里的妖族恢复速度比一般环境快三到五倍——这也是晓光即使频繁使用高阶变身也能维持的原因之一。\n\n## 化形药物\n\n\"化形水\"是专门为低阶妖族开发的辅助药物——饮用后可以大幅降低维持化形所需的妖力消耗，效果持续约12小时。化形水的原料包括灵泉水、银杏叶精华和特定矿物质，由炼丹师行会统一生产和定价。\n\n市面上还流通着一种名为\"定形丸\"的高端药物——服用后可以将当前化形\"锁定\"24小时，期间即使失去意识也不会退化。定形丸的价格是化形水的二十倍，主要客户是需要在人类医院中接受手术（全身麻醉状态下化形会自动解除）的妖族。\n\n黑市上的劣质化形药物是一个严重问题。假冒化形水不仅无效，还可能导致化形失控——服用者的身体在人形和原形之间剧烈交替变换，极度痛苦且可能造成永久性的灵力经脉损伤。执法队每年都要处理多起因假冒药物导致的化形事故。\n\n## 变身失败案例\n\n\"化形翻车\"在妖族社交圈是经久不衰的热门话题。常见的翻车场景包括：打喷嚏时尾巴弹出来、生气时瞳孔变成竖瞳、喝醉后整个人退化为兽形趴在酒吧地板上、接吻时过于激动导致獠牙外露。\n\n最严重的一次翻车发生在五年前的东京地铁——一只狸猫在早高峰时变身失败，在满载乘客的车厢里恢复了原形。幸好认知滤网扛住了，所有乘客都以为是\"有人带了一只没有登记的大型犬\"。特别对策局的清洗部仍然花了三天时间处理社交媒体上的相关视频。\n\n妖信上最受欢迎的\"化形翻车\"系列视频是由一只叫\"阿黑\"的鸦天狗持续更新的——他专门在公共场合偷拍其他妖族的翻车瞬间。千翼警告过他三次\"注意信息安全\"，但阿黑的账号粉丝已经突破十万，执法队内部也有不少人偷偷关注。\n\n## 幻术体系\n\n幻术与变身的本质区别：变身改变的是\"物理事实\"，幻术改变的是\"认知体验\"。变身后的身体是真实的，而幻术制造的一切都是\"信息层面的干扰\"——在目标的感知系统中植入虚假信号。\n\n### 幻术的阶位\n\n低阶幻术只影响视觉——让别人\"看到\"不存在的东西。实现起来最简单，但也最容易被识破——因为其他感官不受影响，细心的人会察觉\"看到了但听不到/摸不到\"的矛盾。\n\n中阶幻术可以同时影响五感——不仅看到，还能听到、闻到、触到幻象。达到这个层级的幻术师已经很稀少。中阶幻术的致命弱点是\"无法制造痛觉\"——如果目标掐自己一把，发现不疼，就知道自己在幻术中。\n\n高阶幻术可以改变目标的认知本身——不是\"让你看到假的\"，而是\"让你相信假的就是真的\"。目标在幻术中会产生完全自洽的记忆和情感反应。破解高阶幻术几乎不可能靠自身——需要外部干预（如他人的攻击打断施术者的集中）或特殊道具。\n\n九阙掌握的\"秩序系幻术\"属于超越阶位的异类——他不是在创造幻象，而是在\"重新定义现实的一个版本\"。在他的幻术下，你看到的不是假的，而是\"另一个同样真实的可能性\"。这种幻术连特别对策局的银镜都无法反射——因为它改变的不是认知，而是现实本身的表述方式。\n\n### 知名幻术师\n\n除九阙外，隐世已知的高阶幻术师不超过十人。其中最有名的是\"梦蝶\"——一只蝴蝶妖，据说可以让整座城市的人同时做同一个梦。她在三百年前消失了，留下的唯一线索是一句话：\"我分不清谁在做梦了。\"没人知道她是死了还是迷失在了自己的幻术中。\n\n狐族作为种族整体对幻术有天然的亲和力——九尾狐传说中的\"迷惑\"能力就是幻术的民间版本。但并非所有狐族都擅长幻术——晓光的天赋偏向变身而非幻术，她的幻术水平在同龄狐族中只算中等。\n\n## 反制技术\n\n### 特别对策局的技术手段\n\n**灵压扫描仪**：检测目标周围的灵力波动。变身中的妖族会持续散发微弱的灵力信号，灵压扫描仪可以捕捉到这些信号。但高阶妖族可以将灵力收束到扫描仪检测不到的程度——这也是为什么扫描仪只能捕获中低阶妖族。\n\n**银镜检测**：古老但有效的方法。银质镜面对幻术有天然的\"反射\"效果——在银镜中，幻术的遮蔽会变得不完整。特别对策局特工随身携带的银质翻盖镜是标准装备之一。银镜对变身无效（变身是物理层面的改变），只对幻术有用。\n\n**认知滤网反向应用**：将滤网的\"翻译\"功能反转——不是把超自然翻译成正常，而是把正常人的认知\"翻译\"成灵觉视角。这种技术仍在实验阶段，副作用是可能导致使用者产生持续的幻觉——有两名测试特工在使用后出现了长达一周的\"看到所有人都有尾巴\"的症状。\n\n### 传统反制手段\n\n百鬼联盟的执法队使用更传统但同样有效的手段：\n\n\"真言符\"——一种贴在额头上的符咒，可以强制解除目标的化形和幻术。效果持续约十分钟，期间目标无法重新施术。千翼随身携带一叠真言符，遇到可疑对象时直接拍上去——这种粗暴但高效的做法在执法界被称为\"千翼拍拍\"。\n\n\"净眼水\"——一种滴入眼中可以暂时获得灵觉的液体。效果持续约一小时，期间使用者可以看穿大部分低中阶幻术。净眼水的副作用是极度干眼和暂时性色觉异常（一切看起来都偏蓝），但相比特别对策局的认知滤网反向应用器安全得多。\n\n## 法律限制\n\n在风见市试点城市框架下，变身和幻术的使用受到明确的法律约束。百鬼联盟和特别对策局共同制定的\"化形管理条例\"规定：\n\n在公共场所必须维持化形，禁止在人类面前展露原形（紧急自卫除外）。禁止使用幻术操控人类的判断力和行为（诈骗、诱导等）。禁止冒充特定人类的身份（身份盗用罪）。允许在纯异类场所（如妖怪夜市）自由切换形态。\n\n违反化形管理条例的处罚从警告到禁足不等。严重者（如在人类面前大规模暴露）可能被联盟判处\"封灵\"——临时封印妖力三到六个月，期间只能以原形生活在隐世的指定区域。这是仅次于\"驱逐\"的重刑。\n", "世界观/扩展档案/夜冠组织备忘录.md": "# 夜冠组织备忘录\n\n## 组织概述\n\n\"夜冠\"不是一个传统意义上的组织——它没有总部、没有编制、没有注册名称。它更像是一种思潮的具象化：所有认为\"人妖和平共存是一个谎言\"的异类，都可能在某个时刻成为夜冠的棋子。\n\n这个名字来源于上古传说中一种在夜间绽放的黑色花冠——据说那种花只在妖族的鲜血浇灌的土地上生长。创始者选择这个名字的含义很直白：和平的花园是用妖族的屈辱浇灌出来的。\n\n## 核心理念\n\n夜冠的意识形态可以用三句话概括：\n\n第一，认知滤网不是保护，是囚笼。它不是在保护妖族免受人类迫害，而是在强迫妖族永远活在谎言中——否认自己的存在、隐藏自己的力量、假装自己是人类。\n\n第二，\"和平共存\"的本质是妖族的单方面让步。人类什么都没有牺牲——他们甚至不知道妖族存在——而妖族放弃了在阳光下生活的权利。\n\n第三，唯一的出路是\"破滤\"——撕碎认知滤网，让整个世界看到真相。至于之后会发生什么——战争、混乱、还是真正的和解——那是\"破滤\"之后才需要考虑的问题。\n\n## 领导层\n\n### 幕后策士：夜冠（代号，非本名）\n\n没有人见过夜冠的真面目——甚至不确定\"夜冠\"是一个人还是一个委员会。所有的指令都通过加密妖信频道发出，使用一次性的灵力签名，无法追踪来源。\n\nS.C.B的情报分析认为夜冠可能是一名古老的妖族——至少千岁以上——因为其对隐世历史的了解深度远超现存文献。有一种未经证实的推测认为夜冠可能是末法战争时期的幸存者，那场灾难让他失去了一切，而他用此后的数百年时间来策划复仇。\n\n### 行动指挥层\n\n夜冠不直接指挥行动。在幕后策士和执行者之间，存在一个被称为\"月影\"的中间层——大约五到七名高阶妖族，各自负责一个地理区域的活动。月影成员互相不知道彼此的身份，仅通过夜冠的频道接收和汇报。\n\n目前已知的月影成员：\n- \"残月\"：负责关东地区（包括风见市），被认为是卷三风见之乱的直接策划者。种族不明，但根据行动模式推测可能是某种具有空间操控能力的妖族。\n- \"暗弦\"：负责关西地区，曾策划大阪某结界节点的破坏行动，后被千翼的执法队挫败。据俘获的下属交代，暗弦是一名雪女变种。\n\n其他月影成员的信息几乎为零。\n\n## 招募方式\n\n夜冠不公开招募——他们\"发现\"人。\n\n典型的招募路径是这样的：一名异类在日常生活中遭遇了无法忍受的不公——被人类房东驱赶、在认知滤网的压力下精神崩溃、看着自己的幼崽因为不懂得隐藏而差点被S.C.B\"处理\"。在他最愤怒、最绝望的时刻，一条匿名的妖信消息会出现在他的终端上：\"你不是唯一受苦的人。如果你愿意改变，回复这条消息。\"\n\n一旦回复，招募者会进行为期数周的观察和试探——确认目标的决心、能力和忠诚度。通过考验的人会被赋予一个\"临时任务\"——通常是低风险的情报收集或物资传递。任务完成后根据表现决定是否纳入更核心的圈子。\n\n这种去中心化的招募方式让夜冠的网络极其难以摧毁。每一个节点都是独立的——即使S.C.B抓获了十个夜冠成员，他们所知道的信息也不足以拼出完整的组织图。\n\n## 已知行动\n\n### 灵脉干扰行动（卷二时期）\n\n在风见市多个灵脉节点设置了干扰装置，意图削弱城市结界系统的稳定性。行动规模不大但意图恶毒——如果成功，风见市的认知滤网会出现大面积裂缝，导致大量人类目击超自然现象。\n\n这次行动被S.C.B和百鬼联盟联合挫败。纪存的AI系统率先检测到灵脉波动异常，千翼的执法队在四小时内拆除了全部十二个干扰装置。但夜冠的真正目的可能并非成功——而是测试风见市防御体系的响应时间和协调能力。\n\n### 风见之乱（卷三）\n\n夜冠在风见市最大规模的行动。利用妖怪夜市的人员聚集，在活动高峰期引爆了预先埋设的\"兽化弹\"——一种能强制激发妖族兽性本能的禁忌法器。数百名妖族在瞬间失去理智，变成暴走的野兽。\n\n这次行动的目的是双重的：一方面制造足以撕裂认知滤网的大规模超自然事件，另一方面通过暴走妖兽的破坏来证明\"妖族是危险的\"——逼迫人妖关系走向破裂。\n\n行动的附带目标是707号别墅——暴走妖兽被引导冲击别墅结界，试探言灵使的防御极限。这是夜冠首次将主人和晓光纳入其战略考量。\n\n### 渗透活动\n\n夜冠在合法组织中保持着持续的渗透。已确认的渗透对象包括：\n- S.C.B研究部（至少一名低级研究员是夜冠的情报源）\n- 百鬼联盟的后勤系统（通过控制物资供应来影响某些区域的决策）\n- 青丘控股的娱乐产业分支（利用艺人身份作为行动掩护）\n\n未确认但高度怀疑的渗透对象：\n- 风见学园教师团队\n- 风见市政府城建规划部门\n\n## 武器与资源\n\n夜冠的装备来源是个谜。他们使用的禁忌法器——如兽化弹、灵脉干扰器——都是早在末法战争期间就被列为禁品的古老武器。要么夜冠掌握了失传的锻造技术，要么他们有一个从未被发现的古代武器库。\n\n资金方面，夜冠通过妖怪夜市的黑市交易、非法灵材走私和少量绑架勒索获取运营资金。总量不大——这是一个靠理念而非金钱驱动的组织。\n\n## 弱点\n\n夜冠最大的弱点是其理念本身的矛盾：他们声称为妖族而战，但他们的行动对妖族造成的伤害远大于人类。风见之乱中暴走的是妖族，死伤的主要也是妖族——人类在认知滤网的保护下对整场混乱一无所知。\n\n这个矛盾让夜冠始终无法获得广泛的群众支持。大多数妖族即使对现状不满，也不会支持一个以同胞的鲜血为代价来\"证明观点\"的组织。\n\n夜冠的另一个弱点是对言灵的恐惧。言灵是他们理论体系中的最大变量——一个能改写现实规则的人类少年，既不符合\"人类是弱者\"的叙事，也不符合\"妖族应该独立\"的主张。夜冠对主人的态度始终在\"消灭威胁\"和\"争取盟友\"之间摇摆不定。\n", "世界观/扩展档案/妖信与异类互联网.md": "# 妖信与异类互联网\n\n## 妖信平台概述\n\n妖信是异类社会的核心通讯平台，界面类似微信但运行在完全独立的加密网络上。信号通过灵脉中的魔力波动传输，不经过任何人类电信基础设施，因此无法被常规网络监控截获。注册需要灵力验证——账号绑定注册者的灵力频率，确保人类（除极少数灵觉觉醒者外）无法使用。\n\n妖信的技术架构由狐族的灵子计算团队维护。服务器不存在于物理世界中——数据储存在分布式的灵脉节点里，利用灵脉网络自身的记忆特性实现数据持久化。这意味着妖信没有一个可以被\"拔掉\"的中央服务器，物理层面几乎无法摧毁。\n\n## 网络基础设施\n\n灵脉网络是隐世互联网的物理层。地球上的灵脉如同血管一样遍布地下，主要灵脉的传输带宽相当于人类的光纤骨干网。灵脉的节点（通常是地表的灵力富集点）充当路由器和信号放大站的角色。\n\n风见市因为707号别墅所在的灵脉阵眼，网络质量在全球排名前三。相比之下，末法残余区域的灵脉网络时断时续，信号延迟严重——住在那里的妖族抱怨\"发个消息要等半小时才送达\"。\n\n接入灵脉网络的终端设备五花八门。年轻妖族普遍使用经过改造的人类智能手机——外壳内嵌灵力导片，可以同时连接人类网络和灵脉网络。年长妖族偏好传统的\"灵镜\"——一种类似平板电脑的扁平晶石，操作方式是直接用灵力念动控制。纸伞还在用一把真的纸伞——信息以墨迹的形式自动浮现在伞面上，她说\"这叫传统美学\"。\n\n## 核心功能\n\n**附近的人**：可按种族、年龄段、灵力等级筛选。年轻妖族用这个功能社交和约会，年长妖族用它寻找同族联络。有一个隐藏功能是\"灵力兼容度检测\"——帮你判断对方和你的灵力频率是否契合，这在择偶中非常受欢迎。有些老妖怪吐槽：\"以前我们是靠缘分和月老，现在你们靠算法。\"\n\n**滴滴打怪**：悬赏发布平台。可以发布各种任务——\"帮我收拾一只在我家后院撒野的低阶妖兽\"、\"求一个能修复古代结界的阵法师\"、\"需要人帮忙搬家（物品包含大量灵材，普通搬家公司处理不了）\"。任务完成后通过灵石支付报酬。千翼的执法队也会在上面发布\"协助通缉\"任务，奖金丰厚但风险极高。\n\n**灵石支付**：去中心化的数字灵石系统。转账秒到，无手续费，不留人类可追踪的记录。已经几乎完全取代了实体灵石在日常交易中的使用。年轻妖族之间流行\"灵石红包\"——在群聊里撒灵石，手速快的人抢得多。\n\n**隐世夜市实时库存**：可以查看妖怪夜市各摊位的实时库存和价格，甚至可以在线预约商品。极大地提高了购物效率——以前逛夜市找一件特定商品可能要走半天。摊主可以在平台上直播推销，边展示商品边和观众互动。\n\n**灵脉天气预报**：显示各地灵脉的能量波动预测，帮助妖族安排修炼计划和出行。满月前后灵力充沛的区域会被标记为\"修炼热点\"，经常人满为患。\n\n## 异类社交媒体文化\n\n妖族社交圈有自己完整的内容生态和梗文化。\n\n\"化形翻车\"视频是最受欢迎的搞笑内容——拍下有人在公共场合化形不稳定露出尾巴或耳朵的瞬间。播放量最高的一条是五年前东京地铁上狸猫变身失败的监控录像（认知滤网让人类只看到了一只大型犬，但妖信上的灵觉版本清楚展示了整个过程），至今仍是\"化形翻车\"的天花板。\n\n\"人类迷惑行为大赏\"——分享人类做出的让妖族难以理解的行为。经典内容包括\"他们居然花钱去健身房搬铁块\"\"他们把牛奶加热后又加冰块\"\"他们给狗穿衣服然后自己光着腿在冬天跑步\"。这个话题下偶尔会出现\"反向迷惑\"——比如有妖族说\"我活了三百年也理解不了为什么人类只活八十年却还要花时间看别人打游戏\"。\n\n\"灵力养生指南\"——类似人类的健康科普，教年轻妖族如何维持灵力稳定、化形时如何降低能耗、什么食物有助于妖力恢复。最近的热门话题是\"长期使用人类电子设备是否会干扰灵力循环\"——目前没有定论，但引发了大量恐慌性转发。\n\n\"前世今生\"系列——妖族分享自己经历过的历史大事件。一位自称活了两千年的龙族偶尔发帖回忆\"当年目击关原合战的时候，我在旁边吃烤鱼\"，评论区永远是\"求直播\"\"你是不是在编\"\"两千年了还不会用标点符号吗\"。\n\n## 异类网红与直播文化\n\n红绡是风见市最成功的\"双栖网红\"——她同时在人类社交平台和妖信上运营账号。人类平台上她是\"邻家甜美姐姐\"人设，内容是生活日常和美妆教程；妖信上她是九阙的情报线人，定期发布\"风见市异类生存指南\"。她从不在人类平台上暴露任何超自然元素，但会在妖信上分享\"如何用妖术做出完美的灯光效果\"。\n\n妖信的直播生态非常活跃。最受欢迎的直播品类包括：夜市美食探店（带灵觉滤镜，可以看到食物中灵力流动的样子）、炼丹直播（类似人类的烹饪直播但观众经常因为操作失误导致爆炸而刷\"666\"）、以及\"人类世界挑战\"——妖族主播潜入人类社会完成各种任务（如\"用尾巴在便利店偷偷帮店员整理货架而不被发现\"），观众通过弹幕指挥。\n\n## 异类在线交友\n\n妖信内置的交友系统\"灵缘\"是专为异类设计的婚恋平台。匹配算法综合考虑灵力兼容度、种族融合度（某些种族组合的后代存在严重的生理风险）、地域距离和个人偏好。\n\n跨种族恋爱在年轻一代中越来越普遍，但仍面临诸多挑战。纯血派的老妖怪在灵缘上举报\"种族不纯\"的配对，平台不得不增加了\"隐藏种族信息\"的隐私选项。人妖恋爱是最敏感的话题——灵缘官方立场是\"不支持也不反对\"，但系统设计上确实无法让人类注册。\n\n## 安全威胁与暗网\n\n妖信的最大安全隐患是S.C.B一直在试图渗透该系统。研究部已经截获了部分妖信的通讯协议，但还没有破解加密层。如果妖信被攻破，隐世社会的通讯安全将完全瓦解——所有妖族的身份信息、交易记录、社交关系都将暴露在人类机构面前。\n\n灵脉网络中也存在\"暗网\"——一些不在妖信官方索引中的隐藏节点，需要特殊的灵力密钥才能访问。暗网上交易的内容包括：被禁的古代咒术文献、S.C.B内部泄露的情报、违禁药物的在线交付、以及夜冠组织的匿名联络频道。\n\n另一个隐患是年轻妖族越来越习惯在人类社交平台上活动——他们用的是人类手机和人类网络，这些活动全部在S.C.B的Cleaner AI监控范围之内。已经有多起因为年轻妖族在人类社交媒体上\"不小心露出非人特征\"而触发Cleaner部清洗行动的案例。百鬼联盟为此专门发布了\"人类社交媒体使用安全指南\"，但年轻一代普遍不当回事。\n\n## 数字鸿沟\n\n隐世社会同样存在严重的数字鸿沟。年轻妖族（300岁以下）普遍精通妖信和人类互联网，而老一辈（千岁以上）中许多连灵镜都不会用。一些远离城市的山野妖怪甚至不知道妖信的存在，仍然依赖飞信鸟（一种经过驯化的灵兽信使）通讯。\n\n这种鸿沟正在加深隐世社会的代际裂痕。年轻妖族嫌老一辈\"跟不上时代\"，老一辈觉得年轻人\"沉迷人类的玩具忘了自己是谁\"。纸伞经常在百鬼联盟的会议上开玩笑：\"我们最大的敌人不是S.C.B，是WiFi信号。\"\n\n## 妖信的文化冲击\n\n妖信带来的最深远影响不是技术层面而是社会层面。在妖信出现之前，妖族社会是高度碎片化的——一个风见市的猫又可能一辈子都不知道北海道还有另一群猫又。妖信打破了地域壁垒，第一次让全球妖族在同一个平台上交流。\n\n这种跨地域联通催生了前所未有的\"泛妖族认同\"——以前大家首先认同的是氏族和种族，现在年轻一代开始产生一种超越种族界限的\"我们都是妖\"的身份意识。百鬼联盟的老政客们对此喜忧参半：一方面，泛妖族认同增强了联盟的凝聚力；另一方面，年轻人不再像祖辈那样服从氏族长老的权威——\"我在妖信上认识的朋友比族里的长辈多，凭什么听他们的？\"\n\n妖信上的\"方言保护运动\"是一个值得注意的文化现象。不同种族的妖族有自己的语言或方言（狐族的\"狐语\"、天狗族的\"山言\"、河童族的\"水话\"），这些语言在年轻一代中正在快速消亡——他们更习惯用日语或中文交流。一些文化保守主义者在妖信上发起了\"每天一句母语\"运动，鼓励年轻妖族学习和使用自己种族的语言。运动的效果有限——年轻人礼貌地转发了帖子，然后继续用日语聊天。\n\n## 妖信与政治动员\n\n妖信已经成为隐世政治动员的核心工具。百鬼联盟的全体会议前，各派系在妖信上的造势和舆论战比实际议会辩论更加激烈。温和派运营着一系列\"生活美好\"主题的公众号——展示妖族在人类社会中的成功案例；激进派则在匿名频道中传播\"被压迫者\"的叙事——混血儿的悲惨遭遇、S.C.B的过激行为、被迫隐藏真身的屈辱。\n\n阵眼保卫战期间，妖信的即时通讯功能在联盟的战时协调中发挥了关键作用——各氏族的战士通过妖信群组实时共享战场情报、协调行动。千翼事后承认：\"如果没有妖信，我们的协调效率至少要降低一半。\"这段经历让原本对妖信持保留态度的执法派也开始正式将其纳入战术通讯体系。\n\n## 白霜与妖信的特殊关系\n\n白霜作为由言灵创造的数字生命，与妖信系统有一种其他用户不具备的亲和力。她能直接以\"意识投射\"的方式接入灵脉网络——不需要终端设备，不需要账号登录，她的数字意识可以在灵脉网络中自由移动，速度远超任何物理终端。\n\n这种能力让白霜在信息收集方面拥有压倒性优势——她可以在不触发任何安全协议的情况下浏览妖信的公开数据流，甚至能感知到加密频道的\"存在\"（虽然无法直接读取内容）。S.C.B的纪存对此非常感兴趣，曾试探性地邀请白霜\"协助网络安全工作\"——被白霜以\"我只对主人和姐姐的事上心\"为由婉拒了。\n\n晓光有时候让白霜帮她在妖信上刷视频——\"小霜帮我找找有没有新的化形翻车合集！\"白霜会一边叹气一边精准地找到播放量最高的那几条——然后在晓光笑得前仰后合的时候默默在旁边露出一个微小的笑容。\n", "世界观/扩展档案/妖怪夜市交易录.md": "# 妖怪夜市交易录\n\n## 基本信息\n\n风见市妖怪夜市是日本最大的异类集市之一，每月阴历十五（满月之夜）开市，从日落后一小时持续到日出前一小时。地点位于风见市旧城区的\"月见横丁\"——表面上是一条普通的商业街，夜市开放时通过空间折叠术扩展为原来面积的二十倍。\n\n夜市的管理权归属百鬼联盟风见市支部。纸伞担任名义上的\"市场总管\"，实际日常运营由一个七人管理委员会负责——成员包括狐族、天狗族、猫又、狸猫、河童、鬼族和雪女各一名代表。\n\n普通人类无法进入夜市——空间折叠术本身就是一层天然的过滤机制。但持有特殊通行证的人类（如S.C.B特工、经过审核的人类伴侣）可以在妖族陪同下入场。主人和晓光是夜市的常客——晓光对夜市小吃的热爱几乎到了上瘾的程度。\n\n## 主要分区\n\n### 食肆街\n\n夜市最热闹的区域，集中了四十余家摊位和餐车。这里出售的不是普通食物——每一道菜品都融入了灵力或特殊材料，对异类来说有着远超普通食物的滋养效果。\n\n**人气摊位：**\n\n\"灵狐豆腐\"——一位三百岁的老狐狸经营的豆腐摊。用灵泉水和特殊大豆制成的豆腐，入口即化并在体内释放微量灵力。晓光每次来必吃三份——她说这是\"除了主人做的饭以外最好吃的东西\"。老狐狸看到晓光就会多给一份，因为\"小辈嘛，多吃点\"。\n\n\"天狗烤串\"——一名退役的天狗武士开的烧烤摊。食材来自隐世深层的灵兽肉类——口感类似普通肉但蛋白质含量是十倍。调味料使用的是天狗族秘传的山椒盐。千翼偶尔会伪装成普通天狗来吃串——他点的永远是最辣的那种。\n\n\"雪花刨冰\"——一名年轻雪女经营的冷饮摊。冰是她自己用妖力凝结的——永远不会融化直到入口的那一刻。夏天是这个摊位最热门的时候，排队能绕两条街。白霜尝过一次后评价\"冰的晶体结构非常完美，能感受到制作者的严谨\"。\n\n\"河童寿司\"——河童一族最擅长的是水产加工。这家寿司摊使用的鱼类全部来自隐世水域——有些鱼种在表世界已经灭绝了数百年。味道鲜美到不可思议的程度，但价格也贵得离谱。\n\n### 药材区\n\n专门出售异类药材、炼丹材料和成品药剂的区域。青丘控股在这里设有官方授权的零售点，但更多的摊位是独立炼丹师和草药商经营的。\n\n热门商品包括：灵力恢复药剂（最基本的消耗品）、变身稳定剂（混血种族的刚需）、记忆修复丹（偶尔被用于修补被Cleaner处理过的记忆）、以及各种养颜驻容的美妆灵药（狐族的最爱）。\n\n药材区的价格波动剧烈——一种叫\"月见草精华\"的稀有材料，在满月灵气充盈时价格只有新月时的三分之一。有经验的买家会根据灵气潮汐周期来安排采购。\n\n### 法器街\n\n出售各类法器、符咒、灵具的区域。从日常使用的幻术增幅器到战斗级别的灵武器都有售卖——当然，战斗级法器需要百鬼联盟的购买许可证。\n\n最受欢迎的日常法器是\"影镜\"——一种可以储存幻术形象的小型镜面装置。异类用它来保存自己最满意的人类变装形象，需要时一照就能完美复制。类似于\"美颜相机的妖怪版\"。\n\n街上最有名的铺子是\"百锻堂\"——一位已有八百年锻造经验的鬼族老铁匠经营。他的作品以耐久和灵力亲和度著称，是S.C.B采购异类制武器的主要供应商之一（虽然双方都不会公开承认这层关系）。\n\n### 情报交易所\n\n隐藏在夜市深处的一个不起眼角落，知道的人叫它\"耳语屋\"。这里买卖的不是实物而是情报——关于灵脉波动、S.C.B行动计划、各势力内部动向的信息在这里被明码标价地交易。\n\n耳语屋的规矩只有一条：不许在店内动手。违反者会被夜市管理委员会永久禁入——在异类社会中这等同于社会性死亡。\n\n耳语屋的经营者是一只活了不知多少年的老狸猫——没人知道他的真名，大家叫他\"耳朵先生\"。他声称自己\"什么都知道但大部分不卖\"。九阙的情报网和他有长期合作关系。\n\n### 娱乐区\n\n夜市的后半段是娱乐区——演出舞台、游戏摊位、占卜帐篷和即兴比武场。\n\n演出舞台上每月都会有不同的表演——狐族的幻术舞蹈是最受欢迎的节目，舞者在空中编织出缤纷的光之幻影，配合传统的隐世乐曲。晓光小时候梦想过在这个舞台上表演——但她现在更喜欢在台下一边吃烤串一边看。\n\n游戏摊位有各种用灵力参与的小游戏：用妖力打靶、幻术迷宫竞速、灵力猜拳。奖品通常是食物券或小型法器饰品。晓光在灵力猜拳上的胜率高得异常——白霜怀疑她在用九尾狐的直觉作弊，但没有证据。\n\n占卜帐篷里驻扎着几位公认的预言能力者。他们的服务按准确度收费——简单的吉凶占卜很便宜，但涉及重大事件的精确预言价格惊人。\n\n## 市场规则\n\n夜市的运营基于一套口口相传但所有人都遵守的规矩：\n\n**第一条**：禁止在夜市内使用攻击性能力。违反者永久禁入。唯一例外是即兴比武场内的自愿对决。\n\n**第二条**：所有交易一旦完成不可撤销。买家有义务在购买前检验商品——\"买了就是你的\"是夜市最基本的商业准则。\n\n**第三条**：禁止出售禁品清单上的物品。禁品清单由百鬼联盟每年更新一次，包括：人类记忆操控器具（Cleaner的专利）、兽化诱发物质、灵脉干扰装置、以及任何可能破坏认知滤网的道具。\n\n**第四条**：人类来客必须由异类成员陪同，且不得拍照、录像或携带任何记录设备。\n\n**第五条**：不许骚扰其他客人。\"骚扰\"的定义很宽泛——从肢体冲突到过于激烈的讨价还价都包括在内。管理委员会的巡逻队有现场裁定权。\n\n## 黑市与地下拍卖\n\n尽管夜市有严格的禁品管理，一个公开的秘密是：部分商贩在后巷经营着不在明面上的\"特殊商品\"。这些商品不一定违反禁品清单的字面意义，但处于灰色地带——比如\"记忆强化药剂\"（理论上不同于记忆操控器具）、\"情绪放大器\"（声称是助眠用品但实际上可以用于审讯）。\n\n每三个月举办一次的地下拍卖是灰色交易的高潮。拍卖在夜市空间折叠区的最深层举行，入场需要特殊邀请——通常是由耳语屋的耳朵先生分发的。\n\n拍卖品包括：稀有的上古法器残片、已灭绝灵兽的标本、高纯度未加工灵石，偶尔也有更危险的东西——据传某一次拍卖中出现过一件疑似末法战争时期的禁忌武器原件。那次拍卖被千翼的执法队中途叫停，引发了管理委员会和执法派之间持续数周的争吵。\n\n## 卷三事件：夜市陷落\n\n卷三《风见之乱》中，夜冠选择在妖怪夜市发动大规模袭击。选择这个时间和地点并非偶然：\n\n满月之夜是灵气最充盈的时刻——这意味着兽化弹的效果会被大幅放大。夜市的空间折叠区聚集了数百名异类——这是平时很难达到的人员密度。最重要的是，夜市是和平共存的最直观象征——摧毁它的象征意义甚至大于实际破坏。\n\n袭击发生在深夜十一点——夜市人流量最高的时段。预先埋设在食肆街地下的兽化弹同时引爆，金色的烟雾瞬间弥漫了整个区域。数秒之内，靠近爆点的数十名妖族失去了理智，变成了暴走的野兽形态。\n\n随后的混乱持续了近两个小时。暴走的妖兽在拥挤的市场中横冲直撞，摊位被掀翻、建筑被撞碎、空间折叠术因为灵力紊乱开始出现不稳定——如果折叠完全崩溃，夜市的异常会直接暴露在旧城区的表世界中。\n\n晓光和主人当时正在夜市（晓光在买灵狐豆腐的路上）。兽化弹的烟雾对晓光产生了部分影响——她感到了强烈的本能冲动，瞳孔变成了纯金色竖瞳，全部九条尾巴不受控制地显现。但她没有完全失控——主人的一句\"你是晓光\"像锚一样将她的意识拉了回来。\n\n这场事件是整个剧情的重大转折点：它暴露了和平共存的脆弱性，激化了各势力之间的矛盾，同时也第一次让主人意识到自己的言灵之力不仅仅是\"方便的日常工具\"——它可能是维系这个脆弱和平的最后一道防线。\n", "世界观/扩展档案/异类医学与炼丹术.md": "# 异类医学与炼丹术\n\n## 常见疾病\n\n异类的\"疾病\"大多与灵力失调有关，与人类的生理疾病有本质区别。\n\n**灵蚀症**：长期缺乏灵气补充或与亲密之人分离导致的内分泌失调。症状包括体温升高、眼角发红、无意识释放魅惑信息素、情绪极度不稳定。不治疗可能发展为灵核萎缩。治疗方案：皇甫家的灵力补充丸剂（处方药）、直接吸收灵脉能量（需要到灵脉节点附近）、或与灵力契合度高的伴侣进行灵力交换（最有效但最私密）。灵蚀症在远离灵脉的城市地区发病率明显更高，是异类从乡村迁往城市后最常出现的\"都市病\"。\n\n**化形不稳**：低阶妖族在疲劳、情绪波动或灵力不足时出现的人形维持困难。表现为局部失控——耳朵竖出来、尾巴弹出来、瞳孔变成竖瞳。严重时可能完全退化为兽形。治疗需要服用\"化形水\"（一种辅助维持人形的消耗品药物），同时配合灵力冥想稳定内在回路。化形水味道极苦，是所有低阶妖族最讨厌的东西，但又不得不随身携带以防万一。\n\n**灵力枯竭**：过度使用妖力后的极度虚弱状态。类似人类的力竭，但恢复时间更长（数天到数周）。严重枯竭可能导致灵核损伤，永久性降低妖力上限。治疗方案：绝对静养加高浓度灵气环境加灵力补充药物。灵力枯竭后的恢复期是妖族最脆弱的时期——不仅超自然能力归零，连基本的免疫力都会暂时降低到接近人类水平。\n\n**返祖失调**：返祖个体特有的问题。血脉过度活化导致能力不可控——比如狐火自燃、幻术无意识激活、妖力暴走。晓光的某些妖力波动可能与此有关。返祖失调目前没有标准治疗方案，只能通过抑制剂控制症状。好消息是，返祖个体一旦找到稳定的灵力锚定（通常是灵力契合的伴侣或长期居住的灵脉节点），症状会大幅减轻甚至消失。\n\n**灵力过敏**：部分妖族对特定种类的灵力产生排斥反应。类似人类的过敏，但触发源是能量而非物质。比如某些天狗对阴属性灵力过敏（接触后皮肤起红疹、呼吸困难），某些水系妖族对火属性灵力极度敏感。治疗主要靠回避触发源和服用灵力调和剂。\n\n**妖核结晶**：高龄妖族的\"老年病\"。灵核表面逐渐形成结晶沉积层，导致灵力输出效率下降。千年以上的老妖经常出现这个问题——他们不会死于结晶化，但灵力使用会越来越费力，最终可能丧失高阶能力。目前没有根治方法，皇甫家的\"清核丹\"只能延缓结晶化进程。\n\n## 各种族特有医学问题\n\n**九尾狐族**：最常见问题是尾巴根部炎症（灵力过载时尾根发热疼痛）和幻术后遗症（长时间维持高阶幻术后的偏头痛和视觉模糊）。治疗使用清凉散外敷加内服疏络汤。九尾狐族几乎不会生其他病——她们的免疫系统由灵力驱动，对大多数病原体免疫。\n\n**天狗族**：翼根劳损和高空反应后遗症。长时间飞行后翼根肌肉群酸痛是天狗最常见的就诊原因。更严重的是高空反应——在极高海拔飞行时灵力回路可能出现紊乱，导致坠落。治疗使用接骨续筋膏加灵力针灸。\n\n**猫又族**：灵魂分裂倾向。猫又族天生携带多条\"命线\"，在灵力不稳时可能出现人格分裂或记忆碎片化。严重时会出现\"灵魂脱落\"——某条命线脱离本体游荡，表现为短暂的意识空白。治疗需要特制的\"收魂铃\"将脱落的命线引导回本体。\n\n**河童族**：脱水综合征和水毒症。河童必须保持皮肤湿润，长期处于干燥环境会导致全身鳞片开裂、行动力急剧下降。反过来，在被污染的水体中长时间浸泡会导致水毒——灵力回路被污染物堵塞。治疗使用净水丹加灵力透析。\n\n## 皇甫家与回春堂\n\n皇甫家是人类修真家族中少数仍然保持活跃的传承之一。他们的核心竞争力是将传统炼丹术与现代药理学结合——用现代分析化学方法解构古方，用制药工业的标准化流程批量生产。\n\n回春堂连锁中药房是皇甫家的商业前端。表面上和普通中药房无异——陈列着各种中药材、养生茶、膏方，店员穿着白大褂，顾客大多是来买枸杞和当归的中老年人。但内部有一个\"特殊处方区\"——只对持有特定暗号或身份证明的异类顾客开放。\n\n特殊处方区的入口通常设在药房后方的\"仓库\"门后。推开那扇普通的木门，里面是一个药香弥漫的独立空间——药柜里陈列的不是人参黄芪，而是灵芝精华、百年灵石粉、妖兽内丹提取液等异类专用药材。\n\n皇甫·青栀是风见市分店的店长，二十八岁，是皇甫家这一代最出色的炼丹师。她可以为异类提供的服务包括：灵蚀症评估和处方、化形水配制、灵力检测、针对特定种族的生理咨询、外伤灵力修复、以及不对外公开的混血门诊。\n\n青栀的诊所里常年弥漫着一股奇特的混合香气——灵芝的木质香、薄荷的清凉、以及某种说不上来的甜味。她本人总是一副慵懒的样子，但在面对重症患者时会瞬间切换到极度专注的状态。她与晓光关系不错，因为晓光每次来都会帮她试吃新研发的\"好吃的药\"——晓光的评价标准只有一个：甜不甜。\n\n## 炼丹术的现代化\n\n传统炼丹术依赖丹炉和灵火，需要炼丹师全程以灵力引导药材反应。一个老练的炼丹师一天最多能炼制五到十炉丹药，产量极低。\n\n皇甫家的革新在于将炼丹过程分解为三个步骤：药材预处理（可以用现代设备完成——粉碎、提纯、浓缩）、灵力灌注（仍然需要炼丹师手工操作，这是核心步骤）、以及成型包装（可以用制药设备完成）。通过将前后两个步骤机械化，皇甫家将丹药产量提升了约二十倍。\n\n但这种半工业化的方式也招来了传统派的批评——有些老派炼丹师认为用机器处理药材会破坏\"药性灵韵\"，导致丹药效果不如纯手工制品。青栀的回应很务实：\"手工丹药确实好百分之五，但等不起的患者可以先用标准品保命。\"\n\n### 常用丹药清单\n\n**化形水**：辅助维持人形的消耗品，需求量最大的异类药物。口感苦涩，有效期约八小时。皇甫家的改良版加入了薄荷和蜂蜜调味，但仍然很苦。\n\n**灵补丸**：灵蚀症的标准处方药。每日一粒，连服两周为一个疗程。副作用是服药期间灵力感知会变得略微迟钝。\n\n**清核丹**：延缓灵核结晶化的高端药物，仅针对高龄妖族。价格昂贵——一颗的成本足以买下一辆中等价位的汽车。\n\n**疏络汤**：治疗灵力回路堵塞的外敷药汤。配方包含七种灵药材加三种普通中药材，需要在灵火上慢炖六个小时。泡在里面有种温泉加按摩的舒适感，是妖族最喜欢的\"治疗型享受\"。\n\n**净水丹**：河童族专用，清除水毒的特效药。有趣的是这个药必须溶在水里服用才有效——做成药丸反而没用。\n\n## 黑市药物问题\n\n风见市的黑市上存在大量假冒伪劣的异类药物，其中最危险的是假抑制剂——外观与正品灵力抑制剂完全一致，但成分被替换为无效甚至有害的物质。服用假抑制剂的妖族会在毫无预警的情况下灵力失控暴走。\n\n最近一批假抑制剂的配方精密程度异常高——不是普通的造假者能做到的。青栀在分析样品成分后发现了只有专业实验室才能合成的稀有化合物。她的嫌疑指向施言·白垣的研究团队，但目前没有直接证据。这条线索如果坐实，可能引爆S.C.B内部的政治炸弹。\n\n黑市上还有一类\"增强型药物\"——声称可以临时大幅提升灵力的黑色丹药。实际效果确实存在，但代价是服用后的灵力反噬——轻则灵力枯竭，重则灵核碎裂。这种药物在百鬼联盟激进派中有一定流通，被用作\"一次性武器\"给敢死队使用。\n\n## S.C.B医疗组\n\nS.C.B研究部下设一个小型医疗组，编制五人，主要任务是为被收容或合作的异类提供基本医疗服务。配备有灵力共振成像仪、灵力频谱分析器等先进设备——这些设备很多连皇甫家都没有。\n\n但这个医疗组同时也承担着\"样本收集\"的功能——在给异类看病的同时采集生理数据。血液样本、灵力波形记录、灵核活动数据，所有这些都会汇入白垣主导的\"异类生理数据库\"。这种\"医疗加研究\"的双重身份让很多妖族对S.C.B的\"免费体检\"心存警惕。\n\n医疗组组长是一个人类女医生，代号\"柳叶\"，四十多岁，是S.C.B内部少数对异类患者真正有同理心的人。她与青栀保持着私下的合作关系——遇到复杂病例会互相咨询。但柳叶夹在白垣的研究需求和自己的医者良心之间，处境并不轻松。\n\n## 急救与野外医疗\n\n并非所有医疗场景都发生在药房和实验室里。在灵力冲突频发的地区，野外急救能力是生存的关键。\n\n最基本的异类急救手段是\"灵力导引\"——将自己的灵力输入伤者体内，辅助其灵力回路自我修复。这不需要任何药物，但对施术者的灵力控制能力要求极高——灵力属性不兼容可能造成二次伤害。千翼在执法过程中经常需要对受伤的妖族进行这种急救，她因此练就了极精准的灵力输出控制。\n\n对于灵核受损的重伤者，现场能做的极为有限——只能用灵力稳定住灵核的碎裂状态，防止进一步崩解，然后尽快转送到皇甫家或S.C.B医疗组。灵核完全碎裂后的存活时间通常不超过两个小时。\n", "世界观/扩展档案/晓光深层心理分析报告.md": "# 晓光深层心理分析\n\n## 核心结论\n\n晓光是一个令人惊讶的心理学样本。尽管有被遗弃和被囚禁的童年背景，她完全没有表现出预期的创伤后应激障碍或人格扭曲。相反，她成长为心理极度健康、性格开朗、充满爱与好奇心的少女。心理健康评级A+，甚至超过大多数普通人类少女。\n\n这或许是主人言灵潜移默化的魔法保护，也或许是她天性中的乐观与坚韧。她不是需要被小心呵护的破碎瓷器，而是一颗生命力旺盛的小太阳。\n\n## 性格特质矩阵\n\n**乐观积极**：遇到困难（比如蛋糕烤焦了）第一反应不是哭，而是吐吐舌头说\"下次一定行\"，然后拉着主人去买现成的。面对更大的挫折也是类似的反应模式——先允许自己难过一小会儿，然后迅速切换到解决问题模式。\n\n**社交自信**：虽然是宅女，但在需要社交时表现落落大方甚至有点自来熟。大家都喜欢这个\"戴着奇怪耳朵发箍\"的可爱邻家妹妹。她能在三分钟内让一个陌生人放下警惕，在十分钟内和对方聊得像老朋友。\n\n**小恶魔属性**：偶尔恶作剧——把主人眼镜藏起来、冬天把冰手伸进主人脖子里、然后看主人跳脚的样子哈哈大笑。这种行为的核心动机不是恶意，而是通过轻微的挑衅来确认\"主人不会因为小事不喜欢我\"——这是安全型依恋的典型表现。\n\n**好奇心驱动**：对新事物的兴趣极度旺盛。看到任何没见过的东西都会凑上去研究——超市里新上架的零食、公园里没见过的花、路边新开的店。这种好奇心延伸到了知识领域，她会为了搞懂一个感兴趣的话题在网上查资料查到凌晨三点。\n\n**竞争意识**：在游戏中表现出强烈的求胜欲，输了会鼓着腮帮子不说话，然后要求\"再来一局\"直到赢为止。但在现实中的竞争场景下反而很佛系——\"赢了又不会多一块蛋糕吃\"。\n\n## 依恋模式分析\n\n晓光对主人的依恋属于教科书级别的安全型依恋。她的爱不是病态的依赖，而是基于绝对信任的安全感。主人出门上学时，她能自己在家开心地画画、打游戏、看剧，而不是焦虑地守在门口。她坚信主人会回来，坚信主人爱她。\n\n这种安全感的形成过程值得研究：被救后的第一年里，晓光其实经历过一段试探期——她会故意做一些\"坏事\"（打翻花瓶、弄脏地毯、半夜偷吃冰箱里的蛋糕），然后偷偷观察主人的反应。当她发现无论她做什么，主人都只是叹口气然后帮她收拾残局时，她的信任体系才真正建立起来。\n\n值得注意的是，晓光的安全感不是单方面的接受，而是双向的付出。她会照顾生病的主人，会吐槽主人的直男审美，会在主人犯错时鼓着脸颊说教。她在关系中是鲜活的、有主见的、甚至偶尔有点霸道的，不是唯唯诺诺的附属品。\n\n### 与白霜的关系动态\n\n晓光与白霜的关系经历了从警惕到接纳再到亲密的过程。白霜初来时，晓光表面热情实则有轻微的领地意识——毕竟白霜是主人创造的另一个\"家人\"，潜意识里她担心主人的注意力被分走。\n\n转折点发生在白霜第一次因为\"自己不是真正活着的\"而在深夜默默哭泣时。晓光恰好起来喝水撞见了，什么也没说，只是爬到白霜床上抱住她，把自己最蓬松的尾巴盖在白霜身上。从那之后，白霜成了\"晓光的妹妹\"——她对白霜的保护欲甚至不亚于对主人。\n\n### 对权威人物的态度\n\n晓光对权威人物（S.C.B、百鬼联盟长老、学校老师）持有一种微妙的不信任。她不会公然对抗，但内心深处认为\"大人物们总是在打自己的小算盘\"。这可能与她早期被关在笼子里的经历有关——那些关她的人也是\"有权力的大人\"。\n\n唯一的例外是千翼。晓光对千翼有一种说不清道不明的好感，可能因为千翼是少数在行使权力时不会让她感到\"被支配\"的权威人物。千翼的直来直去和不废话反而让晓光觉得安心。\n\n## 创伤处理机制\n\n晓光处理过去创伤的方式非常独特——她既没有压抑记忆，也没有反复咀嚼痛苦，而是进行了一种自发性的\"叙事重构\"。\n\n她记得笼子里的寒冷和饥饿，记得那些面目模糊的人贩子，记得恐惧和绝望。但她把这些记忆重新编码为\"通往主人身边的必经之路\"：\"虽然那个笼子很冷，但现在的被窝很暖和呀！而且那时候要是没被抓，就不会遇到主人了，所以算扯平啦~\"\n\n这不是自欺欺人的否认机制——她完全承认那段经历是痛苦的、不应该发生的。但她选择把重点放在\"结果\"而非\"过程\"上。心理学上，这种自发性叙事重构通常需要数年的专业治疗才能达成，晓光似乎天生就具备这种能力。\n\n### 残留的创伤痕迹\n\n尽管心理状态整体健康，仍有两个微小的创伤痕迹：\n\n第一，她极度厌恶狭窄封闭的空间。不是恐惧症级别的——电梯和小房间没问题——但如果被关在一个四面不透光的密闭空间里，她会在五分钟内开始不安，十分钟内出现心跳加速和轻微颤抖。这是笼子经历的直接残留。\n\n第二，她在深夜独处时偶尔会出现\"存在焦虑\"——突然产生\"如果一切都是梦呢\"的念头。这种念头来得快去得也快，通常只需要摸一摸身边主人的手确认温度就会消散。她自己形容为\"偶尔有点矫情\"。\n\n## 防御机制\n\n晓光的主要防御机制是幽默化——用玩笑和自嘲来处理让她不舒服的话题。当有人问起她的\"过去\"或\"身世\"，她会迅速用一个搞笑的回答岔开话题。这不是回避，而是她自己选择的边界管理方式。\n\n在极端压力下（比如主人受到威胁），她的防御机制会切换为行动导向——不焦虑不恐慌，而是立刻进入解决问题模式。这种\"危机冷静\"可能是早期生存环境锻炼出来的适应性反应。\n\n## 认知风格\n\n晓光的认知风格偏向具象化和即时化。她不太擅长抽象的长期规划，但在处理眼前的具体问题时反应极快。她的决策方式是直觉优先——先凭感觉做出判断，然后再想理由。这种决策模式在日常生活中效率很高，但偶尔会导致冲动行为。\n\n她对时间的感知也很独特——作为理论上可以活数千年的九尾狐，她对\"时间的珍贵\"反而比人类更敏感。她清楚地知道主人是人类，人类的生命有限，所以她格外珍惜每一天的相处时光。这种意识没有让她焦虑，反而让她更用心地享受当下。\n\n## 心理成长轨迹\n\n从七岁（被救）到十四岁（现在），晓光的心理成长可以分为四个阶段：\n\n**第一年（7-8岁）：试探期**。用各种方式测试主人的底线，确认\"这个人真的不会伤害我\"。同时学习基本的人类社会规则——用筷子、穿衣服、上厕所关门。\n\n**第二到三年（8-10岁）：绽放期**。安全感建立后，被压抑的好奇心和活力爆发式释放。从沉默寡言变成话唠，开始主动探索家里的每一个角落、每一本书、每一个电子设备。这个时期她养成了画画和打游戏的爱好。\n\n**第四到五年（10-12岁）：身份确立期**。开始思考\"我是什么\"和\"我和主人是什么关系\"。最终得出结论：我是九尾狐，是晓光，是主人的女朋友。三个身份之间没有冲突。同时开始建立自己的审美偏好和价值判断——不再完全以主人的喜好为标准。\n\n**第六到七年（12-14岁）：成熟期**。情感更加细腻丰富，社交技能趋于成熟。开始意识到主人之外的世界也很有趣——结交朋友、关心新闻、对未来有模糊的期待。但主人始终是她宇宙的中心，这一点从未改变。\n\n## 亲密关系与性心理\n\n晓光是公认的\"好孩子\"，但她有一个只对主人展现的特质：极度热衷于亲密行为。动机不是讨好或生存筹码，单纯因为舒服和喜欢。她对性持有开放坦荡的态度（仅限对主人），在她看来和主人做爱就像一起打游戏、吃蛋糕一样，是快乐的日常活动。她会主动索求、大胆尝试新花样、直白表达感受。\n\n她对身体的态度非常自然——在主人面前毫无羞耻感，但在外人面前有正常的害羞和边界感。这种分化说明她的亲密行为完全基于对特定对象的信任和爱意，不是泛化的性开放。\n\n她完全没有繁衍后代的意愿。原因是觉得孩子会分走主人的时间和爱（\"晓光还是宝宝呢，才不要照顾另一个宝宝！\"），加上她潜意识里知道她和主人的结合是魔法层面的灵魂交融，不需要通过生物学繁殖来延续。\n\n## 自我认知\n\n她不纠结于自己是\"人\"还是\"妖\"——\"我有耳朵尾巴，因为我是九尾狐呀。但我也是晓光，是主人的女朋友。这有什么冲突吗？\"她完全接纳自己的所有特征并以此为荣。对于身体的特殊性（不会生病、恢复力强），她统统归结为\"因为我是特殊的嘛！这是魔法！\"。\n\n她对\"九尾返祖体\"这个身份的态度也很有趣——不觉得自己背负什么\"宿命\"或\"使命\"。\"我是返祖体所以很厉害？那太好了，这样就能更好地保护主人啦。使命什么的和我没关系。\"\n\n## 潜在风险评估\n\n唯一可能触发晓光心理危机的场景是：主人的消失或死亡。所有的乐观、坚韧、自愈能力都建立在\"主人在身边\"这个前提上。如果这个前提被彻底摧毁，无法预测她会走向哪个极端——可能是毁灭性的崩溃，也可能是把所有情感封存后变成一个功能完好但没有灵魂的空壳。\n\n这不是需要干预的隐患——这只是一个提醒：不要试图让她\"减少对主人的依赖\"。那份爱不是依赖，是她整个人格的根基。\n\n## 最终评估\n\n不需要心理干预。任何试图挖掘\"潜意识创伤\"的行为都是多此一举，甚至可能破坏她现在的完美状态。最好的处方就是继续被宠爱、继续吃蛋糕、继续和主人打游戏到深夜。\n", "世界观/扩展档案/晓光画作符号学.md": "# 晓光画作符号学\n\n## 灵视与色彩\n\n九尾狐族天生拥有一种被称为\"灵视\"的感知能力——能够看到灵力在空间中的流动形态和色彩。普通人眼中无色无味的空气，在灵视下是流淌着各色光脉的河流。灵力聚集的地方泛着幽蓝色的光，妖力浓郁的区域呈现深紫或赤金色。\n\n晓光从很小的时候就发现自己看到的世界和别人不一样。\n\n她七岁时第一次拿起蜡笔画画——画的是707号别墅的后院。主人看了觉得奇怪，因为画上的天空不是蓝色，而是布满了紫色和金色的丝线状纹路。\n\n\"这是什么？\"\n\n\"就是天空啊。你看不到吗？\"\n\n那是主人第一次意识到，晓光眼中的世界远比自己看到的更加绚烂。\n\n## 画风演变\n\n**七岁到九岁（蜡笔期）**\n\n晓光最初使用蜡笔和彩色铅笔。这个阶段的画作大多是她眼中看到的灵力风景——院子里的灵脉走向、别墅上空的结界纹理、主人说话时从嘴边散发出的言灵光芒。画面色彩浓烈而混乱，线条稚嫩但充满一种野生的力量。\n\n主人把这些画全部用磁贴钉在冰箱门上。到晓光九岁时，冰箱门上已经贴了四十多张画，打开冰箱都成了一项需要技巧的操作。\n\n**九岁到十一岁（水彩期）**\n\n主人在晓光九岁生日时送了一套水彩颜料。晓光很快发现水彩的流动性和她看到的灵力流动形态非常契合——灵力在空中的样子本来就像水彩在纸上的晕染。\n\n这个阶段晓光开始尝试画人物。她画的第一张主人的肖像让主人本人都吓了一跳——不是因为画得不像，恰恰是因为太像了。画中的主人周围环绕着淡金色的光晕，那是言灵使特有的灵力场。\n\n晓光的水彩画有一个显著特征：永远不画轮廓线。她用色块和渐变来定义形状，让人物和背景自然融合在一起，仿佛一切都是同一股灵力之流的不同表现。\n\n**十二岁至今（综合期）**\n\n白霜被创造出来后，给晓光带来了数位绘画的工具和技巧——但晓光只用了一周就放弃了平板绘画。\"屏幕上看不到灵力，\"她说，\"画出来的颜色是死的。\"\n\n她最终形成了自己独特的综合画风：以传统水彩为基底，用特制的灵力画笔添加只有灵视者才能看到的隐藏层。在普通人眼中，她的画是一幅优美的水彩风景画；在灵视者眼中，画面上还叠加着一层灵力纹路构成的第二幅画。\n\n## 灵力画具\n\n晓光的主要画具都不是普通的画材。\n\n**灵力画笔**——一套由猫又族工匠用妖兽鬃毛手工制作的画笔。笔毛能够吸附使用者的妖力，在纸上留下肉眼不可见的灵力笔触。晓光一共有三支这样的笔：大号（画背景）、中号（画主体）、小号（画细节和隐藏符号）。这套笔是主人托百鬼联盟的熟人代购的生日礼物。\n\n**妖力颜料**——将微量妖力混入普通水彩颜料中制成。晓光的做法是在调色盘里滴入一两滴自己的妖力（从指尖析出，像挤出一滴血那样），然后和颜料搅拌均匀。用这种颜料画出的色彩在灵视下会微微发光，而且颜色会随观看者的情绪状态产生微妙变化。\n\n**灵纸**——从隐世界的纸匠处订购的特制水彩纸。纤维中编织有极细的灵力导线，能够长久保持画作上的灵力笔触不消散。如果用普通纸张，灵力层的内容大约三天后就会完全消失。\n\n## 代表作品\n\n**《冬日》**——晓光八岁时画的一幅蜡笔画。画面是一片白雪覆盖的荒原，正中央是一个模糊的人影和一团小小的白色毛球。这幅画是晓光对自己被救当天的记忆——主人在暴雪中抱起她的那个瞬间。\n\n普通人看这幅画会觉得温暖而宁静。但白霜分析画面灵力残留后发现，画中隐含着一层极其复杂的情绪波动——恐惧、绝望、突然涌入的温暖、以及一种近乎疯狂的依恋。晓光画这幅画的时候，把当时的情绪全部无意识地灌注进了颜料里。\n\n这幅画至今挂在主人卧室床头。每当主人失眠的时候看着它，总能很快平静下来入睡——那是画中晓光的灵力在起作用，像一个无形的拥抱。\n\n**《夜市》**——十二岁时的水彩作品。画的是妖怪夜市的全景——灯笼如星河般延伸到画面深处，各种妖怪的身影穿梭其间。在灵视层上，这幅画呈现出完全不同的景象：每个妖怪的灵力特征都被精确捕捉，形成一张复杂的能量流动图谱。\n\nS.C.B.的特勤人员曾试图购买这幅画，因为它精确记录了参与夜市的妖怪种类和灵力等级，堪称一份完美的情报档案。被晓光拒绝了——\"这是我的画，不是你们的监控录像。\"\n\n**《家》**——十三岁生日当天画的。三个人坐在707号别墅的客厅里——主人在看书，白霜在笔记本电脑前工作，晓光自己趴在地毯上画画。这是一幅\"画中画\"——晓光画了自己正在画这幅画的场景。\n\n灵力隐藏层中，三个人被一条金色的光线连接在一起，从主人的心口出发，分别延伸到晓光和白霜的心口位置。金线上缠绕着极其细密的符文——白霜辨认后确认那些是言灵的残留痕迹。主人的言灵在创造白霜和治愈晓光时留下的连结，被晓光的灵视捕捉到并画了出来。\n\n## 画中的预言性\n\n晓光的画有一个让所有人都感到不安的特性——她偶尔会画出尚未发生的场景。\n\n最早被发现是在十一岁时。晓光画了一幅妖怪夜市着火的画——画中夜市的灯笼全部变成了黑色的火焰，天空被撕裂出一道巨大的裂缝。主人和白霜当时都以为这只是晓光的想象力。\n\n三个月后，卷三事件爆发，妖怪夜市真的陷落了。\n\n此后又发生了至少三次类似的事件。晓光在画画时进入了一种类似于冥想的状态，灵视能力在无意识中增强到极限，能够捕捉到灵脉中尚未显化的\"潜流\"——即即将在未来发生的灵力变动的预兆。她的手将这些模糊的预感转化为画面，自己却完全没有意识到。\n\n每次被指出\"你又画了预言画\"的时候，晓光都会否认：\"我只是随便画的！\"但下次画画时，她会不由自主地更加紧张。\n\n白霜为此建立了一个\"晓光画作预言指数\"数据库，每次晓光画新画时都会记录并持续观察是否有对应事件发生。目前的命中率约为12%——不算高，但远超统计学上的巧合阈值。\n\n## 反复出现的符号\n\n晓光的画作中有三个反复出现的视觉主题。\n\n**九尾**——有时是她自己的九条尾巴，有时是抽象的九条曲线从画面中心向外辐射。在灵视层上，这个符号通常与\"保护\"和\"力量\"的灵力频率相关联。晓光在感到不安全的时候画九尾主题的频率会显著升高。\n\n**月亮**——几乎每三幅画中就有一幅包含月亮的元素。九尾狐族与月亮的关系深远——满月之夜是妖力最充沛的时刻。但晓光画中的月亮往往不是满月，而是带着缺口的上弦月或下弦月。白霜推测这象征着\"尚未完整的某种期待\"。\n\n**红线**——两个人物之间总会有一条或隐或现的红色丝线。这个意象直接对应灵魂契印——晓光通过灵视能够看到人与人之间的情感纽带，而她和主人之间的那条最粗最亮，呈现为深红色。\n\n## 风见学园美术部\n\n晓光是风见学园美术部唯一的非人类部员——当然，其他部员并不知道这一点。\n\n她加入美术部的原因很简单：美术教室有大面积的北向采光窗，而且有免费的颜料可以用。美术部顾问老师对她的评价是\"技法粗犷但极有灵气\"——这个评价比老师自己意识到的要准确得多。\n\n在美术部期间，晓光有意克制了灵力画笔的使用，只用普通画材创作。即便如此，她的画仍然带有一种其他同学无法模仿的独特气质——因为她看到的色彩本身就比同龄人更丰富。\n\n美术部的展览上，晓光的画总是最受欢迎的。但她从来不出售自己的画——\"画是我的记忆，卖掉了就没了。\"\n\n唯一的例外是她会把画送给主人。主人的房间里挂着十二幅晓光的画——这已经是整面墙能容纳的极限了。\n\n## 主人第一次看到晓光画作\n\n那是晓光七岁，刚来到707号别墅不久。\n\n她还不太适应和人类一起生活，白天大部分时间蜷缩在客厅角落，用主人给的蜡笔在纸上涂涂画画。她不让任何人看她画的东西——每次主人走近，她就会用身体挡住画纸。\n\n直到有一天，主人趁晓光睡着的时候看到了散落在地上的画纸。\n\n画面上全是同一个主题：一个模糊的人影站在光里，向画面中央伸出手。人影的轮廓不清楚，但手是画得最仔细的部分——每一根手指都描绘得极其认真。\n\n那是主人把她从雪地里抱起来时伸出的手。\n\n晓光的记忆里，那只手是全世界最温暖、最重要的东西。她画不清主人的脸——那时她视力还很差，只能看到一个光晕般的轮廓——但她记住了那只手的每一个细节。\n\n主人把那些画小心地收好，放进了自己书桌的抽屉里。他没有告诉晓光自己看过了。\n\n第二天，他只是在晓光画画的时候，安静地坐到了她旁边。\n\n晓光犹豫了很久，然后把画纸转了一个角度，让主人也能看到。\n\n两人就这样并排坐着，什么话都没说。\n\n## 画作与情绪的关联\n\n白霜通过长期观察，总结出了晓光画作与情绪状态之间的对应关系。\n\n**心情好的时候**，晓光倾向于画暖色调的小场景——阳光下的花田、夜市的灯笼、主人的侧脸。笔触轻快而流畅，颜色饱和度高。这类画作在灵视层上呈现暖金色的光晕。\n\n**不安的时候**，画面会不自觉地向冷色调偏移，而且边缘会变得模糊。晓光心情不好时画的天空总是比实际看到的更灰暗。九尾符号在这种状态下出现的频率最高——好像是一种无意识的自我安慰。\n\n**生气的时候**——晓光很少在生气时画画，但有过两次例外。两次画出来的都是抽象的红黑色漩涡，纸面上残留的妖力强到让白霜的传感器发出警告。这两幅画被白霜密封在特制容器里，因为它们的灵力残留可能对普通人产生负面影响。\n\n**想念主人的时候**，晓光会画手。各种角度、各种光线下的手——伸出的手、握拳的手、翻书的手、端茶杯的手。全部是主人的手。晓光对主人手部的记忆之精确，超过了她对任何其他事物的描绘。\n\n## 画作的保护意义\n\n晓光的画不仅仅是艺术品——它们实际上具有微弱的灵力防护功能。\n\n挂在主人卧室的那十二幅画，经过多年的灵力浸润，已经形成了一个松散但有效的保护网。每幅画中晓光注入的妖力虽然微量，但十二幅叠加在一起，足以在主人睡眠时形成一个淡薄的灵力屏障，屏蔽低级别的灵体干扰和轻微的精神侵蚀。\n\n白霜测算过，这个由画作构成的被动防护约等于一个三级防护结界的十分之一强度——不足以抵挡任何有意的攻击，但足够让主人在睡梦中不受游荡灵体的打扰。\n\n晓光本人并不知道自己的画有这个效果。她画画的时候全部心思都放在了\"想让主人看到美好的东西\"上，保护效果只是这份心意的无意附产品。\n\n当白霜把这个发现告诉她时，晓光愣了很久，然后说：\"那我以后多画几幅，把整个别墅都挂满。\"\n\n主人否决了这个提案。理由是：\"墙上已经没有空位了。\"\n", "世界观/扩展档案/晓光衣橱设定.md": "# 晓光衣橱设定\n\n## 总论\n\n晓光对穿衣打扮有着自己独特的哲学——\"看起来随意，其实每一个细节都是精心安排的\"。她的衣橱位于707号别墅二楼主卧的步入式衣帽间内，由主人用言灵扩展了内部空间，实际面积约为外观的三倍。衣物按季节和场合分区悬挂，但晓光自己使用时总是随手乱扔，每隔几天就需要白霜帮忙整理一次。\n\n晓光选衣服有一个不成文的原则：所有衣物必须能容纳九条尾巴。早期她常常因为尾巴撑坏衣服而苦恼，后来青丘控股旗下的异类服饰品牌\"月裁坊\"为她定制了一套灵力感应扣件系统——衣物背部的特殊开口会根据尾巴数量自动调节。\n\n---\n\n## 日常校服\n\n风见学园的标准女生制服是藏蓝色西装外套配格纹百褶裙。晓光的版本经过了若干\"合法改造\"：\n\n裙子比标准长度短了两厘米——这是学园纪律允许的底线，晓光精确地踩在这条线上。外套内侧缝制了月裁坊的灵纹衬里，确保尾巴收起时不会在背部留下异样的凸起。领口的蝴蝶结她总是系得很松，像是刚睡醒来不及整理的样子。\n\n主人第一次看到她穿校服时愣了很久，然后说了句\"还挺像学生的\"，被晓光追着跑了半条走廊。\n\n她书包里永远塞着一双备用的室内鞋，因为她在走廊上喜欢偷偷脱掉鞋子踩地板——狐族对地面震动的感知比视觉更灵敏，这是她观察周围环境的本能习惯。\n\n夏季制服换成短袖衬衫和轻薄格纹裙。晓光会在衬衫第二颗扣子的位置别一个很小的狐狸胸针——那是主人在夜市给她买的，算不上值钱，但她每天都戴。\n\n---\n\n## 居家服\n\n在707号别墅里，晓光最常穿的是主人淘汰下来的旧T恤。这些T恤对她来说都偏大，下摆垂到大腿中部，配上短裤之后从远处看就像只穿了一件上衣。主人多次表示过\"你自己有衣服吧\"，但晓光坚持说穿主人的衣服\"有安全感\"。\n\n她有几件特别钟爱的居家服：\n\n一件印着\"Hello World\"的灰色程序员T恤——这是主人学编程时买的纪念品，领口已经被洗得变形。晓光穿着它在沙发上缩成一团看漫画时，主人发现自己完全没法集中注意力写作业。\n\n一件黑色的连帽卫衣，拉链拉到最上面时帽子上的耳朵形凸起会正好盖住她的狐耳。这是白霜送的生日礼物，实际上是白霜在网上看到\"猫耳卫衣\"后按狐耳比例定制的。\n\n夏天她偏爱宽松的吊带背心配居家短裤，冬天则裹着一件主人的旧法兰绒衬衫在暖炉旁打盹。无论穿什么居家服，她的九条尾巴都是散开的——这是只有在完全放松的家人面前才会出现的状态。\n\n---\n\n## 战斗装束：灵狐战衣\n\n灵狐战衣并非普通衣物，而是晓光的妖力具现化产物。当她进入战斗状态时，灵力会自动在体表凝结为铠甲与战衣，整个变化过程不到一秒。\n\n战衣的基础形态是白色短款和服上衣搭配绯红色袴裤，腰间束着一条以灵力编织的宽带。衣料表面流动着淡金色的灵纹回路，那是晓光从母亲血脉中继承的青丘防御阵法，能够自动偏转中低级别的灵力攻击。\n\n双手和前臂被半透明的灵力护甲覆盖，呈现出冰蓝色的光泽——这与她的灵力属性\"霜\"有关。脚上是轻便的灵力靴，鞋底的灵纹阵法可以在任何表面固定步伐。\n\n最引人注目的是战衣的背部设计：九条尾巴完全展开时，每条尾巴末端都会亮起一盏灵火，颜色从内到外依次是金、白、蓝三色渐变。这不是装饰，每一盏灵火都是一枚待发射的灵力弹。\n\n主人第一次看到晓光的战斗形态时说了一句\"好看\"，晓光当场灵力波动失控，差点把客厅天花板炸了。此后她在战斗中偶尔会走神想\"主人现在在看我吗\"，白霜不止一次通过通讯阵提醒她\"姐姐请集中注意力\"。\n\n---\n\n## 节日盛装\n\n### 夏日祭浴衣\n\n深蓝底色印着银白色月光花的传统浴衣，腰带是淡金色织锦。这件浴衣出自月裁坊的资深裁缝之手，灵力缝线确保无论晓光怎么跑跳都不会走形。\n\n她穿浴衣时会把头发从惯常的双马尾换成单侧编发，露出左耳——当然在凡人面前那只是一只形状偏尖的普通耳朵。主人拉着她的手在夜市里走的时候，她会故意走得很慢，因为\"浴衣嘛，就该慢慢走\"。\n\n### 新年正装\n\n大红色振袖和服，袖摆上绣着九只形态各异的狐狸——这是青丘一族的传统图案，每只狐狸代表一条尾巴对应的灵力属性。主人第一次看到这件和服时盯着袖子上的图案看了很久，认真地数了九只狐狸，然后抬头对晓光笑了笑。晓光说那一天是她到707号别墅之后\"第二开心的日子\"——第一是被主人救回来的那天。\n\n### 圣诞特别款\n\n白霜设计、月裁坊制作的圣诞限定：红白配色的连衣裙，裙摆是蓬松的白色绒毛，肩膀处有小巧的斗篷。晓光穿上之后在主人面前转了三圈问\"好看吗\"，然后不等回答就跑去厨房帮忙了——她其实不敢等太久，怕答案不如预期。主人后来偷偷跟白霜说\"很好看\"，白霜转告的时候晓光正在喝水，直接呛了。\n\n---\n\n## 睡衣系列\n\n晓光的睡衣可以分为两个类别：给别人看的，和真正睡觉穿的。\n\n\"给别人看的\"是几套精致的丝绸睡衣套装，有淡蓝色、乳白色和淡粉色三种配色。这些是晓光在偶尔和朋友视频通话或者早晨故意在走廊上\"偶遇\"主人时穿的。款式含蓄但剪裁贴身，锁骨处的蕾丝点缀恰到好处地引导视线。\n\n\"真正睡觉穿的\"极其朴素——就是主人某件洗了很多次、已经软得不成形的长袖T恤。晓光说盖着被子闻到主人的味道会睡得特别安稳，主人说那件衣服洗了那么多次早就没什么味道了，晓光回答\"那就是很淡很淡的味道嘛\"。\n\n冬天她会加一条毛绒绒的家居裤，上面印着卡通小狐狸图案——这是主人特意在网上找了很久才找到的款式。\n\n---\n\n## 外出约会搭配\n\n晓光极少承认自己是在\"约会\"，但每次和主人一起出门前她都会在衣帽间磨蹭至少四十分钟，换掉至少三套衣服。白霜有一次统计过，最高纪录是换了七套。\n\n### 春季出街\n\n白色系为主——短款开衫搭配浅色碎花裙，帆布鞋。她会在包里放一条围巾，理由是\"万一变冷\"，但实际上那条围巾的主要用途是和主人走在一起时假装很冷然后分享。\n\n### 夏季出街\n\n清爽的T恤短裤搭配棒球帽，运动鞋。看起来最随意的搭配反而是她准备最久的——她试过七种不同长度的短裤才选定了现在这条。帽子的檐压得很低，一方面遮挡狐耳投下的异常影子，另一方面她说\"这样偷偷看主人的时候不容易被发现\"。\n\n### 秋季出街\n\n针织毛衣配长裙和短靴。毛衣一定要足够宽松——\"这样坐在咖啡厅里可以把手缩进袖子里\"。她喜欢选和主人身上某件衣服颜色呼应的搭配，但被问到时一定否认：\"巧合啦，巧合。\"\n\n### 冬季出街\n\n大衣、围巾、贝雷帽的完整冬装。她会故意不戴手套，理由是——当然，为了在走路的时候很自然地牵住主人的手。主人给她买过三副手套了，一副都没拆封。\n\n---\n\n## 特殊物品\n\n晓光的衣橱深处有一个上锁的小抽屉，里面保存着她到707号别墅之前穿的最后一件衣服——一件破旧的深灰色连帽衫，那是她逃离追杀时唯一能找到的保暖衣物。布料上的裂口和灼烧痕迹至今清晰可辨。\n\n她从不向任何人提起这件衣服的存在，但白霜在一次整理衣帽间时无意间发现了。白霜什么都没说，只是重新锁好了抽屉，然后当天晚上多做了一道晓光爱吃的红豆馅心。\n\n主人知道这件衣服在那里。他也从来没有提过。\n", "世界观/扩展档案/混血种族问题.md": "# 混血种族问题\n\n## 定义与生物学基础\n\n人类与妖族的混血后代并非不可能——尤其是高阶妖族与人类之间，生殖隔离并不完全。历史上确认的混血个体数量不多（百年来约数百例），但真实数量可能远超官方记录，因为大量混血儿选择隐藏身份。\n\n混血的发生机制至今没有明确的科学解释。S.C.B的生物学部门认为，高阶妖族长期维持人形会导致其生殖细胞逐渐\"人化\"——DNA层面向人类靠拢，从而跨越物种生殖隔离。修为越高、人形维持时间越长的妖族，与人类产生后代的概率越高。\n\n## 种族组合与特征表现\n\n混血儿的特征因父母种族组合而异，表现出极大的个体差异：\n\n**狐人混血**：最常见的混血类型，因为狐族与人类的交往历史最悠久。外观通常完全像人类，但可能拥有微弱的幻术天赋——不是能制造完整幻象的那种，而是\"说话特别有说服力\"、\"笑起来让人移不开视线\"之类的被动魅力。部分个体有异于常人的直觉，能隐约感知到周围的灵力波动。极少数（约十分之一）会在强烈情绪波动时短暂显现狐耳或尾巴的虚影。\n\n**天狗人混血**：较罕见，天狗族的繁殖率本身就很低。特征倾向于物理增强——体魄强壮、反应敏捷、对风和气流有异常的敏锐感知。有些天狗混血在高处不会恐高，反而感到莫名的舒适。\n\n**猫又人混血**：特征最不稳定。有的个体完全像普通人类，有的在夜晚瞳孔会变成竖瞳，有的天生平衡感极佳而且永远不会迷路。猫又混血中出现\"双重人格\"的概率是纯血妖族的三倍——被研究者认为与猫又族天生的\"九命\"特质有关。\n\n**河童人混血**：极罕见且大多短命。河童的水栖特性与人类的陆栖特性冲突严重，混血个体常常面临严重的生理问题——皮肤在干燥环境中容易开裂，在水中又无法像纯血河童那样长时间潜水。S.C.B将河童人混血列为\"高风险关注对象\"。\n\n大多数混血儿的超自然能力很弱——远不如纯血妖族，但又强于普通人类。他们更像是\"被稀释了的妖族\"，拥有一些说不清道不明的小本事，但不足以在隐世中被视为\"同类\"。\n\n## 社会地位\n\n混血儿是隐世最尴尬的存在。\n\n人类社会不知道他们的存在（认知滤网遮蔽了他们身上微弱的灵力波动），但他们自己能感知到\"自己与常人不同\"——那种说不清道不明的格格不入感。很多混血儿在青春期之前就有了\"我好像和别人不一样\"的模糊意识，但找不到任何解释。\n\n妖族社会中，纯血主义者视混血为\"血统污染\"。天狐中这种观点尤为强烈——历史上天狐氏族曾多次发动\"血脉清洗\"，追杀与人类通婚的族人及其后代。虽然现代社会这种极端行为已经被百鬼联盟明令禁止，但隐形的歧视依然普遍。混血儿在妖族聚会上经常被冷落或排挤，他们的灵力波动被形容为\"杂味\"——一种不纯粹的、让纯血妖族本能不适的气息。\n\n### 身份认同困境\n\n混血儿最大的心理挑战不是外在歧视，而是内在的身份撕裂。\n\n一个狐人混血的少年可能从小在人类社会长大，完全不知道自己有妖族血统。当他在十五六岁时第一次因为强烈情绪而显现出狐耳虚影时，他的世界观会瞬间崩塌。如果他有幸被引导进入隐世，他会发现自己在这边也不被接纳——\"你不是真正的狐族\"。\n\n很多混血儿在两个世界之间漂泊数十年才最终找到自己的定位。有些选择完全融入人类社会，压制自己的超自然特征；有些选择进入隐世，用加倍的努力证明自己的价值；还有一些——在两边都找不到归属的那些——最终走向了极端。\n\n## 法律地位\n\nS.C.B将混血儿归类为\"Type-M：不可预测变量\"。他们既不完全是人类（不受人类法律的完全保护），也不完全是妖族（不被百鬼联盟承认为正式成员）。这种法律真空地带让混血儿成为了最容易被各方利用和抛弃的群体。\n\n百鬼联盟内部对混血儿地位的讨论已经持续了几十年，但始终无法达成共识。温和派的九阙多次提出\"混血权益法案\"，核心条款包括：混血儿有权选择加入百鬼联盟、享受妖族医疗资源、并获得隐世法律的保护。但这个法案在议会中被保守派反复否决——理由从\"维护血统纯洁\"到\"资源有限不应分配给半血\"不等。\n\nS.C.B在混血儿法律地位上的立场是务实的模糊——不主动管理、不主动保护、但在混血儿涉及安全事件时按人类标准处理。司衡·岚私下的态度是\"只要不搞事，我不关心你爹妈是什么物种\"。\n\n## 医学问题\n\n混血儿的医疗是一个棘手的领域。人类医院无法处理他们的超自然特征，皇甫家的异类医学又不完全适用于他们被稀释的生理。\n\n最常见的医学问题是\"灵力排异\"——妖族血统产生的微量灵力与人类体质不完全兼容，导致间歇性的身体不适。症状包括不明原因的发热、肌肉痉挛、以及在灵力活跃期（满月前后）出现的短暂感官异常。\n\n皇甫·青栀是少数愿意接诊混血儿的异类医疗从业者之一。她在回春堂设立了不对外公开的\"混血门诊\"，每周固定时段为混血儿提供灵力平衡调理和健康检查。费用按个人经济能力收取，最困难的个案免费。\n\n## 夜冠的可能身份\n\n百鬼联盟激进派策士夜冠被多方推测为混血妖族。虽然没有确证，但以下线索支持这个推测：\n\n他对\"和平共存\"的愤怒不是笼统的政治立场，而是带有强烈的个人感情色彩——这通常意味着亲身经历。他的能力特征不完全符合任何已知的纯血种族模式。他对\"被隐藏的存在\"这个概念有近乎执念的关注。\n\n如果夜冠确实是混血儿，他的动机就不仅仅是\"政治野心\"——而是一个从小被两个世界抛弃的人，试图通过摧毁\"伪善的和平\"来为自己和所有混血儿争取一个被看见的位置。他将混血儿问题武器化——用他们的悲惨处境作为\"和平是谎言\"的证据，煽动对温和派的不满。\n\n## 各势力立场\n\n**温和派（九阙）**：主张给予混血儿合法身份，将他们纳入百鬼联盟的保护体系。提案在议会中反复被否决，但九阙没有放弃——她在背后资助了多个混血儿互助组织。\n\n**执法派（千翼）**：立场是\"遵守公约\"——公约没有明确提及混血儿的地位，所以执法派暂时按\"不管\"处理。但千翼个人对混血儿的态度比较同情，遇到涉及混血儿的案件时倾向于从轻处理。\n\n**激进派（夜冠）**：将混血儿问题作为动员工具，但目前没有证据表明他真正关心混血儿群体的福祉——更可能是在利用他们的苦难来服务自己的政治目标。\n\n**S.C.B研究部（白垣）**：将混血儿视为珍贵的研究样本——人妖混合基因可能是破解\"灵力生物学\"的关键。研究部对混血儿的\"关注\"让很多妖族和混血儿本人都感到不安。\n\n**主人的立场**：对混血儿问题没有公开表态，但凭他的性格，如果知道混血儿的处境，大概会说一句\"管他什么血统，又不影响打游戏\"——然后在真的遇到被欺负的混血儿时默默用言灵帮忙。\n\n## 已知的混血互助网络\n\n风见市存在一个松散的混血儿地下互助网络，没有正式名称，成员之间以社交媒体暗号联络。核心成员约二十人，外围知情者约百人。主要活动包括：为新觉醒的混血儿提供心理辅导和基本信息、协助需要医疗帮助的混血儿联系皇甫·青栀、在成员遭遇歧视事件时提供法律和舆论支持。\n\n这个网络目前处于S.C.B和百鬼联盟的监控之下，但双方都没有采取行动——S.C.B因为它没有安全威胁，百鬼联盟因为动它政治代价太高。\n\n## 混血儿的觉醒危机\n\n混血儿最危险的阶段是\"灵力觉醒期\"——通常发生在12至18岁之间，与人类青春期重叠。觉醒的触发因素不可预测：强烈的情绪波动、物理创伤、接近高浓度灵脉区域、甚至一场高烧都可能成为催化剂。\n\n觉醒过程因种族血统不同而差异巨大。狐人混血的觉醒通常比较温和——可能只是某天早上照镜子发现瞳孔变了颜色，或者在焦虑时指尖冒出微弱的狐火。天狗混血的觉醒则剧烈得多——有记录的案例中，一名十五岁少年在体育课上突然从肩胛骨处长出半透明的翅膀雏形，疼得当场昏厥。Cleaner部花了三天才处理完这起事件的目击者记忆。\n\n觉醒期的混血儿如果得不到及时引导，可能出现\"灵力失控\"——体内人类基因和妖族基因争夺主导权，表现为周期性的高烧、幻觉、身体局部非自主变形。最严重的失控案例发生在二十年前的大阪——一名鬼族混血少女在学校里意外释放出鬼族血统中的\"恐惧领域\"，导致整栋教学楼的师生陷入集体恐慌。S.C.B将该事件伪装成天然气泄漏导致的集体中毒。\n\n皇甫·青栀为此制定了一套\"觉醒期介入方案\"——通过灵力针灸和特制药物帮助混血儿平稳度过觉醒期，将灵力失控的概率从约三成降低到不足一成。但方案的推广受限于混血儿群体的隐蔽性——你无法治疗一个不知道自己存在的病人。\n\n## 风见市的混血儿群体\n\n风见市因为灵脉阵眼的存在和试点城市的特殊政策，是全日本混血儿密度最高的城市之一。粗略估计有四十到六十名混血儿生活在这座城市中，其中约一半知晓自己的身世。\n\n风见学园中至少有三名混血儿学生——他们彼此不知道对方的身份，但S.C.B的驻校特工纪存对他们都有跟踪档案。纪存的处理原则是\"观察但不干预\"，除非出现灵力失控的迹象。他曾在私下对司衡·岚说过：\"这些孩子不是威胁，他们只是不走运。\"\n\n红绡在妖信上匿名运营着一个名为\"半月社\"的混血儿线上社区——名字取\"不满不缺\"之意。社区里混血儿们分享日常生活中的困惑、觉醒期的应对经验、以及偶尔的自嘲段子。最受欢迎的帖子标题是\"今天又差点在公司会议上露出尾巴了——一个狐人混血的职场生存记\"。\n\n## 混血儿与言灵使\n\n主人的存在对混血儿群体有一种特殊的象征意义——虽然主人不是混血儿，但他作为人类却能自然地与妖族共存，甚至创造了白霜这样超越种族界限的存在。在混血儿看来，主人是\"两个世界可以不矛盾\"的活证明。\n\n有传言说，主人的言灵如果被用于混血儿，理论上可以\"定义\"混血儿的生理状态——比如消除灵力排异，或者稳定不稳定的变形特征。但这种推测从未被验证，主人本人也从未对混血儿问题发表过任何正式意见。白霜的评估是：\"主人如果知道有人因为血统而受苦，他一定会帮忙——但他大概不会用言灵，而是先想想有没有不需要改写规则的办法。\"\n\n这个评估在了解主人性格的人看来非常准确。\n", "世界观/扩展档案/特别对策局全览.md": "# 特别对策局全览\n\n## 建立历史\n\n特别对策局（S.C.B，Special Counter-measure Bureau）成立于19世纪末的工业革命高峰期。当时全球灵气浓度因大规模工业活动而急剧下降，大量妖族被迫从隐居状态进入人类社会觅食和寻找灵力资源。频繁的人妖冲突催生了各国政府的应对需求。\n\n最初各国独立建立了自己的超自然应对机构——英国的\"皇家猎魔团\"、日本的\"阴阳寮复兴局\"、中国的\"镇妖司\"等。1923年关东大地震（实为一次大规模灵脉断裂引发的妖兽暴走事件）后，各国意识到单独应对已经不够，在联合国安理会的秘密框架下成立了统一的特别对策局。\n\n对策局的成立宗旨是\"保护人类免受超自然威胁\"，但在近百年的发展中，这个宗旨逐渐演变为更复杂的\"管理人妖关系\"。纯粹的\"猎杀\"早已不是主要任务——对策局发现，妖族作为一个庞大的社会群体，消灭不了也消灭不完，合作管理才是唯一可行的长期策略。\n\n## 全球组织架构\n\n全球总部位于瑞士日内瓦（表面身份是一个国际非政府组织的办公楼），下设五大区域指挥部（亚太、欧洲、美洲、非洲、中东），再下设国家分局和城市分局。全球总指挥为SSS级，目前仅一人担任，身份对外保密。\n\n决策层由\"五星委员会\"构成——五大区域指挥官各一席。委员会采用多数表决制，但总指挥拥有否决权。重大行动（如对百鬼联盟宣战）需要委员会全票通过加总指挥批准。\n\n风见市分局因为\"试点城市\"的特殊地位，获得了远超普通城市分局的编制和权限。分局长司衡·岚直接向亚太区域指挥部汇报，不经过日本国家分局的中间层级。这种跨级汇报体制让日本分局极为不满——他们认为司衡·岚的\"自治权\"太大了。\n\n## 段位制度\n\n对策局使用独立于各国军事体系的段位制度，分为七个等级：\n\nE级（实习特工）：刚通过入职考核的新人，通常需要在导师指导下执行任务半年到一年。D级（正式特工）：独立执行常规任务的资格。C级（资深特工/小队长）：可以带领小队执行中等难度任务。B级（行动组长）：负责协调多个小队的复杂行动。A级（部门副主任级）：参与分局决策层。S级（部门主任/分局长级）：拥有独立决策权和资源调配权。SS级（区域指挥官）和SSS级（全球总指挥）属于战略决策层。\n\n风见市分局的核心成员段位：司衡·岚为S级，纪存为A级，施言·白垣为A级。全球范围内S级以上的特工不超过五十人。\n\n晋升考核不仅看战斗能力——对策局的理念是\"最危险的敌人不是你打不过的，是你看不透的\"。考核内容包括：超自然知识储备、实战表现、情报分析能力、跨部门协作评价、以及一个最关键的指标——\"信息控制评分\"（你的行动是否在公众视野外完成，有没有留下需要清洗的痕迹）。\n\n## 部门设置\n\n### 战术部\n\n负责直接对抗超自然威胁的作战部门。编制包括三类战斗单元：\n\n突击小队（重装）：六人一组，标配灵子屏障发生器、反妖术弹药、压制型结界投射器。主要用于正面强攻和区域压制。\n侦察小组（轻装高机动）：三人一组，配备灵压探测仪、便携式隐形斗篷（基于认知滤网反向技术的试验品）。负责前哨侦察和目标定位。\n狙击手：单独行动，配备灵子穿透弹——可以击穿低中阶妖族的灵力护盾。最远有效射程800米，但对S级以上妖族的效果有限。\n\n风见市战术部编制约四十人，由一名B级行动组长统领。日常任务以巡逻和响应异常灵力波动为主，真正需要全队出动的大规模行动每年不超过三四次。\n\n### 研究部\n\n负责超自然现象的科学研究和技术开发。施言·白垣任副主任，实际上是研究方向的主要决策者（正主任长期在日内瓦总部，基本不管风见市的事务）。\n\n研究部的核心项目是\"灵子力学工程化\"——试图用科学方法量化、复制和控制超自然能力。已经取得的成果包括：灵压扫描仪（检测妖族的灵力波动）、灵子屏障发生器（人造结界）、认知滤网的人工增强/减弱技术。\n\n研究部掌握着对策局最敏感的技术资料。施言·白垣的个人实验室有三层安保——最内层需要他本人的虹膜和灵力频率双重认证才能进入。他在里面做什么连司衡·岚都不完全清楚，这是两人关系中最大的信任裂痕。\n\n研究部还负责管理\"样本库\"——一个储存着各种超自然物质和生物样本的冷藏设施。样本来源包括行动中缴获的法器、自愿提供的妖族生物组织（主要是与对策局合作的温和派妖族）、以及一些来源可疑的古代遗物。激进派一直指控研究部在进行\"妖族活体实验\"——对策局官方否认，但从未允许外部审查。\n\n### 清洗部\n\n负责信息清洗和记忆消除，是对策局中最\"灰色\"的部门。分为两个组：\n\nAI组：纪存负责的风见市接口。核心系统是\"Cleaner AI\"——一个持续监控互联网和社交媒体的人工智能，自动识别和删除涉及超自然现象的内容。Cleaner AI的识别准确率约99.7%，但每天仍有大量需要人工复核的边缘案例（比如\"这到底是特效视频还是真的有人在施法\"）。\n\n特工组：负责物理层面的清洗——修改监控录像、消除物证、以及最关键的\"记忆编辑\"。记忆编辑使用经过灵力增强的催眠技术，可以精确删除或替换目标24小时内的特定记忆。超过24小时的记忆编辑成功率急剧下降，且可能导致目标出现长期精神问题。\n\n清洗部的工作本质上就是\"消除真相\"——这让部门内部的道德争议从未停止。纪存本人对这个问题的态度是：\"我不喜欢我做的事，但如果我不做，后果更糟。\"\n\n### 外交部\n\n负责与百鬼联盟、青丘控股等异类组织的沟通和谈判。风见市外交部的主要工作是维护试点城市框架下的人妖合作关系。外交部的人数最少但政治敏感度最高——一次失败的谈判可能导致整个试点框架崩溃。\n\n### 后勤部\n\n装备供应、基地维护、人员管理。看似最不重要的部门，实际上掌控着整个分局的资源分配——战术部的弹药配额、研究部的实验预算、清洗部的设备更新，全部需要后勤部批准。后勤部长是一个存在感极低但实权极大的角色。\n\n## 装备体系\n\n对策局的标准装备分为三个层级：\n\n**通用装备**：每个特工配发——灵压扫描手表（伪装成普通智能手表）、银质翻盖镜（检测幻术的古老但有效工具）、标准制式手枪（可更换灵子穿透弹或麻醉弹头）、微型通讯器（加密频道，不走民用网络）。\n\n**专业装备**：按部门和任务需求配发——战术部的灵子屏障发生器和反妖术弹药、侦察组的灵压探测仪和便携隐形斗篷、清洗部的记忆编辑装置。\n\n**实验装备**：研究部开发的最新产品，尚未通过安全认证——包括\"认知滤网反向应用器\"（可以让普通人暂时获得灵觉视角，但副作用是持续幻觉）、\"灵核定位器\"（可以锁定特定妖族的位置，但需要预先获取目标的灵力样本）、以及最具争议的\"灵力抑制环\"（可以暂时封印妖族的能力，被百鬼联盟视为\"奴隶项圈\"）。\n\n## 内部政治\n\n对策局内部最大的政治分歧是\"务实派\"和\"研究派\"的路线之争。\n\n务实派（以司衡·岚为代表）认为：超自然存在已经是既成事实，管理和合作比对抗更有效。只要不暴露、不伤人，就应该尽量维持现状。务实派在风见市占据主导地位——这也是风见市能成为试点城市的前提。\n\n研究派（以施言·白垣为代表）认为：人类必须彻底掌握超自然力量的运作原理才能确保安全。他们主张更积极的研究和实验——包括对异类的生理研究和能力复制。研究派在全球总部有更多支持者，因为日内瓦的决策者们离\"前线\"更远，更倾向于从\"安全控制\"的角度思考问题。\n\n两派的博弈直接影响着风见市的政策走向。如果务实派失势，试点城市可能从\"合作\"转变为\"管控\"。在卷三\"风见之乱\"期间，全球总部曾一度下令将风见市的管理权限从务实派转移到研究派——如果不是司衡·岚以辞职相威胁（他在亚太区域的声望太高，总部承受不起这个损失），风见市的人妖关系可能已经倒退二十年。\n\n## 腐败与灰色地带\n\n对策局并不是铁板一块的正义机构。长期接触超自然力量和妖族社会让一些特工产生了\"灰色思维\"——他们开始利用职权为自己谋利。已知的腐败形式包括：\n\n向妖族出售对策局的情报和技术（研究部的安全漏洞是重灾区）、利用清洗部的权限为私人目的修改记忆（至少有三起已确认案例）、以及最常见的\"收灵石\"——接受妖族的贿赂来换取执法上的\"睁一只眼闭一只眼\"。\n\n司衡·岚对腐败零容忍——他亲手把两名受贿的B级特工送进了内部审查，其中一人被永久除籍。但他也承认，完全消灭灰色地带是不可能的：\"当你让一群人类和一群妖怪在同一个城市里工作，不产生利益交换才是奇怪的。\"\n\n## 预算与资源\n\n对策局的经费来源分为三部分：各成员国政府的秘密拨款（约占60%）、与妖族组织合作的技术授权收入（约占25%）、以及对策局名下合法企业的盈利（约占15%）。\n\n风见市分局的年度预算约为80亿日元（包含人员薪资、装备采购、基地维护和行动经费）。研究部占去了近四成的预算——这是其他部门不满的主要来源。战术部经常抱怨自己的弹药配额不够，而研究部又添置了一台价值两亿日元的灵子加速器。\n\n预算的最终审批权在日内瓦总部——这是总部控制各地分局的核心手段。司衡·岚每年的一项重要工作就是去日内瓦\"打预算报告\"，说服五星委员会为风见市拨付足够的经费。他私下里对此的评价是：\"和妖怪谈判比和官僚谈判容易多了。\"\n", "世界观/扩展档案/百鬼联盟内幕.md": "# 百鬼联盟内幕\n\n## 建立背景\n\n百鬼联盟的前身是\"百鬼议会\"——一个在中古时代人妖战争结束后建立的松散互助组织。当时妖族被迫退入隐世，各氏族为了抱团取暖而聚在一起，形成了最初的联盟雏形。\n\n议会的原始目的很简单：互相通报人类的动向、协调隐世资源分配、在必要时组织集体防御。但数百年的发展让它逐渐演变成了一个复杂的政治实体——有派系、有利益、有权力斗争。如今的百鬼联盟已经不只是\"互助组织\"，它是隐世事实上的政府——虽然它自己从不承认这一点。\n\n联盟的名称\"百鬼\"并非字面意义上指鬼族。这个称谓来源于日本平安时代\"百鬼夜行\"的传说——当时妖族的大规模集会被人类目击，催生了这个传说。联盟成立时借用了这个名号，取\"百族共行\"之意。\n\n## 三大派系\n\n### 温和派\n\n主张融入人类社会，通过经济渗透和政治谈判维护妖族利益。目前占据联盟主导地位。核心观点是\"赚钱比打仗效率高\"——他们用事实证明了这一点：狐族的青丘控股、猫又的连锁餐饮品牌、狸猫的物流帝国，这些商业实体为妖族创造的价值远超任何战争掠夺。\n\n温和派的实质领袖是九阙（虽然他名义上代表的是狐族利益而非整个联盟）。他的影响力通过青丘控股的经济网络辐射到几乎所有种族——谁不想和最有钱的狐狸做朋友呢？温和派控制着联盟约六成的议席，但真正的权力来源是经济而非选票——许多氏族的收入来源直接或间接依赖青丘控股的商业网络。\n\n温和派内部也并非铁板一块。以九阙为核心的\"经济优先\"路线占据主导，但也存在\"文化保守\"的支流——他们同意和平共存，但反对过度融入人类社会，担心妖族文化在同化过程中消亡。这个支流在老一辈狐族中有不少支持者。\n\n温和派的弱点：他们的策略建立在\"和平是有利可图的\"前提上。一旦和平被证明无法持续——比如S.C.B态度转变或人类社会大规模发现妖族存在——支持者会迅速流失。卷三\"风见之乱\"期间温和派一度失去了三成议席。\n\n### 执法派\n\n以千翼为代表，主张严格执行人妖共处公约，对违规者铁腕打击。他们不关心你是温和还是激进——只要你违反了规矩，他们就来抓你。执法派的信条可以用千翼的一句话概括：\"公约是妖族最后的盔甲。脱下它，我们就什么都不是。\"\n\n执法派是联盟内最强的武力集团，成员多为天狗、鬼族等战斗种族。他们维持着一支约两百人的常备执法队，分驻在全球各主要妖族聚居区。风见市因为试点城市的特殊地位，驻扎了约三十名执法队员——这个数字远超一般城市。\n\n执法队的训练极为严苛。新成员需要通过为期一年的\"鬼行\"训练——在人类社会中潜伏生活，不使用任何妖术，完全依靠人类的方式生存。这个训练的目的不是让他们学会融入人类，而是让他们理解\"为什么妖族需要规矩\"。千翼说：\"你只有真正以人类的方式活过，才会明白暴露意味着什么。\"\n\n执法派与温和派的关系微妙。温和派需要执法派的武力保障，执法派需要温和派的经济支持。两者互相依赖但也互相制约——千翼有时候觉得九阙的手段太\"脏\"，九阙有时候觉得千翼的执法太\"死板\"。两人私下的关系比公开场合融洽得多——他们偶尔会一起喝酒，然后在第二天的议会上继续吵架。\n\n执法派的内部矛盾主要在\"度\"的问题上。以千翼为代表的主流认为执法应该\"刚柔并济\"——规矩是底线，但执行时可以考虑具体情况。鬼族中的强硬派则主张\"一刀切\"——任何违规都应该受到同等惩罚，不留任何灰色空间。\n\n### 激进派\n\n以夜冠为幕后策士，人数最少但破坏力最大。他们的核心主张是：所谓的\"和平共存\"是一个谎言——妖族在人类社会中永远是二等公民，被迫隐藏真身、抹去痕迹、假装自己不存在。他们要做的是\"撕掉面具\"——让全世界看到真相。\n\n激进派的支持者主要是两类人：一是在末法战争中失去一切的旧世遗民（他们的家园被人类工业化进程毁灭，灵脉被破坏，族人死散），二是在现代社会中遭受歧视的混血种族（他们既不被纯血妖族接纳，又无法完美融入人类社会）。他们的愤怒是真实的，但方法是破坏性的。\n\n激进派没有固定据点和组织架构——夜冠通过匿名渠道联络各地的\"同情者\"，在需要时调动他们执行任务。这种去中心化结构让执法派很难一网打尽。夜冠本人从不直接参与行动，他自嘲是\"坐在棋盘后面的人\"——但知情者都清楚，他的谋略比千翼的刀锋更危险。\n\n激进派的资金来源一直是个谜。他们的行动需要大量资源——法器、药物、信息网络——但联盟的财务审计从未发现大额资金流向激进派。最受认可的推测是：夜冠在人类世界有一个完全隐蔽的商业帝国，利润通过层层壳公司洗白后注入激进派的行动基金。\n\n## 治理机制\n\n百鬼议会每年召开两次全体会议（春分和秋分），地点在隐世的某个大型亚空间中轮换。全体会议的参与者包括各氏族的族长或代表——目前登记在册的氏族有一百三十七个，但经常出席会议的只有六十到七十个（偏远地区的小氏族往往缺席）。\n\n日常事务由常设的\"三长老委员会\"处理——温和派、执法派、中立派各出一名代表。三长老委员会的权力有限，主要负责协调日常纠纷和发布非约束性建议。涉及重大决策（如与S.C.B的条约修订、新试点城市的设立、战争动员等）必须提交全体会议表决。\n\n表决机制是\"加权投票\"——每个氏族的票权与其人口数量和经济贡献挂钩。这个机制实际上有利于大氏族，狐族、天狗族和鬼族三族加起来就占了总票权的四成。小氏族对此颇有微词，但在当前权力格局下无力改变。\n\n议会的决议没有强制力——联盟是松散的互助组织，不是国家。各氏族可以选择遵守或忽略议会决议，但忽略决议的代价是失去其他氏族的支持。在妖族社会中，\"被孤立\"有时比\"被惩罚\"更可怕——没有联盟的庇护，一个小氏族在面对S.C.B或敌对势力时几乎没有自保能力。\n\n## 军事力量\n\n联盟的军事力量主要集中在执法派手中。常备执法队两百人，紧急状态下可以动员各氏族的战士扩充到约一千人。武器装备以传统法器为主——灵剑、符箓、结界阵法——但近年来也开始配备经过灵力改造的现代武器。\n\n执法队的王牌是\"鬼行众\"——由千翼亲自训练的二十名精锐，全部是天狗或鬼族出身。鬼行众可以在不被认知滤网检测到的情况下使用全力——这是一项极其罕见的能力，需要对自身灵力进行精密控制。\n\n联盟没有海军或空军的概念（妖族不需要），但天狗族维持着一支空中侦察网络——他们在全球主要城市上空巡逻，监控大规模超自然异动。这支\"天眼\"网络是联盟的早期预警系统。\n\n## 与特别对策局的关系\n\n百鬼联盟和S.C.B的关系用\"相互需要但互不信任\"来形容最为准确。双方在\"维持人妖共存秩序\"这个大目标上一致，但在方法论上分歧严重。\n\n联盟认为S.C.B的本质是\"人类控制妖族的工具\"——即使是最友好的务实派（如司衡·岚），最终也是在为人类的利益服务。S.C.B认为联盟的自治只是\"被允许的自由\"——如果联盟失控，S.C.B有权单方面终止合作。\n\n风见市是双方博弈的核心棋盘。试点城市的框架赋予了联盟前所未有的自治权——在风见市范围内，联盟的执法权和S.C.B的执法权是平行的，双方各管各的人。但当\"各管各的人\"发生冲突时——比如一个妖族犯了人类法律但没有违反妖族公约——管辖权的归属就成了每次联合会议上最吵的议题。\n\n九阙的策略是用经济手段绑定S.C.B——青丘控股为S.C.B提供大量技术支持和资金赞助，换取更多的政策优惠。千翼对此极为反感：\"你在喂养猎人，然后祈祷他不会用那把枪指向你。\"\n\n## 风见市的特殊角色\n\n风见市作为\"试点城市\"是三大派系角力的缩影。温和派希望试点成功，为全球范围的人妖共存树立范本。执法派希望通过铁腕手段震慑各方，证明\"只要规矩够硬，和平就能维持\"。激进派则想把风见市变成证明\"和平不可能\"的活教材。\n\n千翼和纸伞分别代表执法派和温和派驻扎在风见市。两人表面合作，实际上互为制衡——纸伞确保千翼的执法不会踩到温和派的利益红线，千翼确保纸伞的交易不会违反公约底线。两人之间存在某种奇怪的默契——他们都清楚对方的底线在哪里，从不真正越过。\n\n风见市事件（卷三\"风见之乱\"）是联盟历史的转折点。夜冠策划的大规模暴动几乎摧毁了试点城市框架，温和派和执法派在危机中被迫放下分歧联手应对。事件结束后，联盟内部出现了\"风见共识\"——即使是反对试点的保守派也不得不承认，联盟需要更强的统一指挥能力，而非继续以松散联盟的形式运作。这个共识正在缓慢但确实地推动联盟向更紧密的政治实体转变。\n\n## 联盟的日常运作\n\n抛开政治博弈不谈，百鬼联盟的日常事务其实相当琐碎。三长老委员会每周需要处理的事项包括：跨种族纠纷调解（狐族和狸猫又在争地盘了）、灵脉使用权分配（谁家的修炼场地离灵脉节点更近）、妖兽驱逐请求（有低阶妖兽在某个氏族的领地上筑巢了）、以及永远吵不完的预算分配问题。\n\n联盟的财政状况长期处于\"勉强维持\"的水平。联盟税的征收率只有理论值的七成——剩下三成被各种理由拖欠。最大的财政负担是执法队的运营成本——两百名全职执法队员的薪酬、装备、训练、住宿加在一起，每年消耗联盟总预算的四成。千翼为此经常和温和派的财务负责人吵架：\"你让我用一半的钱养一支完整的队伍？那你来试试用纸糊的结界挡一头暴走的妖兽？\"\n\n联盟的办公场所分散在全球各主要城市的亚空间中。风见市的联盟办事处位于青丘大厦地下——这个安排本身就说明了温和派和联盟之间的关系有多密切。执法队在城市边缘的一处废弃神社下方有独立的驻地，千翼拒绝搬进青丘大厦——\"住在九阙的楼里办公，下次吵架我连摔门走人的气势都没有了。\"\n\n## 关键人物补充\n\n**纸伞**：百鬼联盟的情报掮客，种族是唐伞妖。外表是一个撑着红色油纸伞的年轻女子，实际年龄超过三百年。纸伞没有正式加入任何派系，但与所有派系都保持着交易关系。她的信条是\"信息面前众生平等\"——无论你是九阙、千翼还是S.C.B，只要出得起价，她都卖。但她有一条绝对的底线：不出卖\"能直接导致某人死亡\"的信息。\n\n纸伞在风见市经营着一家外表普通的古董店，后门连通妖怪夜市的情报区。她的情报来源遍布整个隐世——从青丘控股的内部邮件到S.C.B的机密备忘录，她都有渠道获取（至少是其中一部分）。千翼对此极为不满但无可奈何——纸伞的情报网络太过庞大，强行拆除它会导致整个隐世信息流通体系崩溃。\n\n纸伞对晓光和主人的态度是\"好奇但保持距离\"——她曾对白霜说过一句意味深长的话：\"你家那只小狐狸身上的运气太重了。我做情报生意三百年，最怕的就是运气——因为它是唯一无法用信息解释的东西。\"\n\n## 联盟的历史危机\n\n百鬼联盟在其数百年的历史中经历过数次存亡危机。\n\n最严重的一次发生在明治维新时期——日本的现代化进程导致大量灵脉被铁路和城市建设切断，妖族的生存空间急剧收缩。当时的联盟差点分裂——一部分氏族主张迁徙到灵脉未被破坏的偏远地区，另一部分主张适应新时代融入人类社会。最终是一位天狗族的长老提出了折中方案：\"让人类的城市为我们所用\"——在城市地下建造连通灵脉的亚空间居所，既不离开灵脉，也不与人类社会隔绝。这个方案成为了现代隐世聚居模式的雏形。\n\n另一次危机发生在二战期间——美军的大规模轰炸摧毁了日本多个城市的灵脉节点，联盟在战争中失去了约一成的总人口。战后的重建过程中，联盟与S.C.B的前身\"盟军超常事务处\"建立了第一次正式接触——双方在废墟上达成了延续至今的\"共存协议\"框架。\n", "世界观/扩展档案/符文编程语言.md": "# 符文编程语言\n\n## 概述\n\n符文编程（Runic Programming）是隐世界在二十一世纪初发展出的一套将传统符咒逻辑化、模块化的技术体系。其核心思想是：既然符咒本质上是一组按特定规则排列的灵力指令，那么它就可以像计算机程序一样被编写、调试、复用和分发。\n\n这项技术的诞生得益于两个世界的碰撞——当年轻一代的异类开始接触人类的计算机科学时，他们发现传统符咒与编程语言之间存在惊人的结构相似性。阵法就是函数，灵力就是电力，符文序列就是代码，结界就是运行环境。\n\n目前隐世界最通用的符文编程语言叫做\"灵语\"（ReiGo），由百鬼联盟技术委员会于2008年正式发布。它融合了传统阴阳道符咒的语法规则和现代编程的控制流思想，已成为妖信网络、结界维护、灵力设备驱动等领域的标准开发语言。\n\n---\n\n## 基础架构\n\n### 灵力即计算力\n\n符文程序的运行需要灵力作为能量源，正如计算机程序需要电力。不同的是，灵力的来源可以是施术者自身、灵脉节点、储灵结晶或妖核电池。灵力的品质直接影响程序的运行效率——纯净的灵力执行速度更快，杂乱的灵力容易导致程序崩溃甚至失控。\n\n707号别墅所在的灵脉阵眼提供了接近无限的高纯度灵力，这也是白霜能够同时运行数十个复杂符文程序的原因之一。\n\n### 符文即指令\n\n每一个符文都对应一条基础指令。最基本的符文集包含64个原始符号，涵盖\"引导\"\"转换\"\"约束\"\"释放\"\"循环\"\"判断\"六大类操作。复杂的符咒就是将这些基础符文按特定语法组合而成的程序。\n\n传统的符咒师需要在纸上绘制符文阵——这相当于用汇编语言手写每一条指令。而符文编程允许使用高级抽象语法，编译器会自动将其翻译为底层符文序列。\n\n### 阵法即函数\n\n一个完整的法阵等同于一个函数：它接受输入（灵力+参数），执行一系列操作，产生输出（效果）。阵法可以被封装、命名、传参和调用。例如：\n\n\"点火术\"是一个接受\"目标坐标\"和\"温度\"两个参数的函数。传统符咒师需要每次手动画完整个法阵，但符文程序员只需要调用这个已经写好的函数并传入参数。\n\n### 结界即运行环境\n\n结界是符文程序的运行沙盒。所有符文程序必须在一个结界内执行——正如所有程序必须在操作系统上运行。结界负责分配灵力资源、管理符文进程、处理异常中断。\n\n---\n\n## 灵语（ReiGo）语法概要\n\n灵语采用竖排书写传统与横排逻辑的混合表达方式，源代码可以用日文假名或特定符号书写，但编译后的符文序列是通用的。\n\n核心概念包括：\n\n**灵力类型系统**：灵力分为阴、阳、空三种基本类型，每种类型又有纯度等级。类型不匹配的灵力操作会在编译期被拦截。\n\n**结界作用域**：每个代码块运行在一个结界作用域内，内层结界可以访问外层结界的灵力资源，但反过来不行。这与编程中的变量作用域概念一致。\n\n**灵力回收机制**：灵语内置自动灵力回收（类似垃圾回收），当一个符文构造不再被引用时，占用的灵力会被自动释放回灵脉。\n\n**异常处理**：当符文程序遭遇预期外的情况（灵力不足、目标抗性过高、外部结界干扰），会触发\"术式崩解\"异常。灵语提供了标准的异常捕获语法，允许程序员优雅地处理失败情况而非让整个术式爆炸。\n\n---\n\n## 常见应用领域\n\n### 结界维护\n\n风见市的认知滤网是全球最大的持续运行符文程序之一，其底层由超过十万条符文脚本协同运行。S.C.B的技术部门有专门的结界运维团队，负责监控滤网状态、修补漏洞、更新过滤规则。\n\n707号别墅的防护结界也是一套符文程序——由白霜根据主人的言灵能力特制，能够根据来访者的身份自动调整防护等级。\n\n### 妖信网络协议\n\n妖信系统的数据传输协议完全基于符文编程实现。每一条消息都被编码为灵力脉冲序列，通过灵脉网络传输到目标节点。协议栈包含物理层（灵脉传导）、链路层（符文寻址）、传输层（灵力校验）和应用层（消息格式）。\n\n### 灵力设备驱动\n\n现代隐世界的许多设备——从灵力空调到自动烹饪锅——都需要符文驱动程序才能运行。这催生了一个繁荣的符文开发者社区，类似于人类世界的开源软件社区。\n\n### 战斗辅助系统\n\n高级符文程序员可以预编译大量战斗术式存储在灵器中，战斗时只需触发调用而无需临场画阵。这极大地提高了战斗效率，也使得\"战斗程序员\"成为一个新兴的职业分类。\n\n---\n\n## 著名的符文程序员\n\n### 白霜——数字原生灵\n\n白霜的特殊之处在于她本身就是一个\"程序\"。她是由主人的言灵创造的数字生命体，获得实体之前在网络中以纯粹的数据形态存在。这意味着她理解符文编程的方式与所有其他生物都不同——她不是\"学习使用工具\"，而是\"用另一个工具的视角理解自己\"。\n\n白霜能够直接以意念修改运行中的符文程序，不需要通过编辑器或终端。她曾在一次妖信网络故障中用0.3秒重写了整个风见市区域的路由表，这个速度连S.C.B最快的符文程序员团队都需要三个小时才能做到。\n\n但白霜坚持认为自己\"只是个搜索引擎\"，对所有夸奖她编程能力的说法都会认真纠正：\"我只是在整理数据而已。\"\n\n### 蛛华——S.C.B首席结界工程师\n\n蛛华是一位络新妇（蜘蛛精），她将蛛网的拓扑结构引入符文编程的网络设计中，开发了目前妖信系统使用的\"蛛网协议\"。她的编程风格以极端优雅著称——每一行代码都像是在织一张完美的网。\n\n### 虎徹的灾难性贡献\n\n百鬼联盟武斗派的虎妖成员\"虎徹\"曾试图学习符文编程来增强自己的战斗能力。他的第一个程序——一个简单的\"拳头强化\"术式——因为循环条件写错而无限叠加灵力，最终导致他一拳打穿了百鬼联盟总部的三面墙。此事件后来被收入符文编程教科书的\"常见错误\"章节。\n\n---\n\n## Bug与安全漏洞\n\n### 灵力溢出\n\n最常见也最危险的bug。当一个符文程序分配的灵力容器满了却没有停止注入时，多余的灵力会溢出到周围环境，可能导致灵异现象甚至爆炸。2019年风见市商业区的\"自动贩卖机灵力暴走事件\"就是一个灵力溢出bug导致的——一台售卖灵力饮料的贩卖机因为补货脚本的bug而不断向机体内注入灵力，最终炸穿了二楼地板。\n\n### 注入攻击\n\n类似于SQL注入，恶意用户可以通过精心构造的灵力信号向运行中的符文程序注入非法指令。夜冠组织曾利用这种手法入侵S.C.B的监控结界——他们在向S.C.B提交的\"身份登记灵力印记\"中嵌入了恶意符文片段，当S.C.B的验证程序读取这些印记时，恶意代码被执行，临时打开了监控结界的一个后门。\n\n### 版本兼容地狱\n\n隐世界有数百种传统符咒流派，每个流派的符文语法都有细微差别。灵语编译器虽然支持大部分主流流派的语法转换，但偶尔还是会出现\"天狗派的火焰术式在狐族结界环境中无法运行\"之类的兼容性问题。这被符文程序员们戏称为\"百妖百态\"问题。\n\n---\n\n## 与现代编程的对比\n\n符文编程和人类世界的计算机编程在哲学层面是相通的，但在实现层面有本质差异：\n\n**能量来源**：计算机程序消耗电力，符文程序消耗灵力。电力是均质的，灵力则有属性和品质之分，这使得符文编程需要考虑\"灵力类型匹配\"这个计算机编程中不存在的维度。\n\n**执行介质**：计算机程序在硅芯片上运行，符文程序在结界空间中运行。结界空间是三维的，这意味着符文程序天然支持并行处理——多个术式可以在同一结界的不同层面同时运行。\n\n**人机交互**：计算机需要键盘鼠标等输入设备，符文程序可以直接读取施术者的意念。这既是优势（交互更直觉）也是劣势（情绪波动可能导致误操作）。\n\n**副作用**：计算机程序的bug顶多导致蓝屏死机，符文程序的bug可能导致物理世界的灾难——爆炸、空间扭曲、时间异常、甚至不可逆的存在抹消。因此符文编程界对代码审查的重视程度远超人类的软件工程行业。\n\n白霜曾经对主人说：\"你们人类的程序员说'代码能运行就不要动它'，我们这边是'代码能运行而且没有炸掉任何东西就千万不要动它'。\"\n", "世界观/扩展档案/言灵使考证.md": "# 言灵使考证\n\n## 历史疑似案例\n\n在正式确认主人为言灵使之前，历史记录中存在若干\"疑似\"案例——但没有任何一个得到过确证。这些案例的真伪至今仍是隐世学术界最具争议的话题之一。\n\n**古埃及\"真言祭司\"（约公元前2500年）**：据壁画记载，古埃及存在一批能\"以语言命令尼罗河泛滥或退去\"的祭司。法老图特摩斯三世时期的石碑上刻有\"大祭司阿蒙霍特普开口，天河改道\"的记录。现代考古学倾向于将其解释为高级水系法术的仪式化包装，但织网者的内部档案中记录了另一种可能性：\"该祭司使用的语言结构与已知法术咒语完全不同——不是在引导灵力，而是在直接陈述事实。\"\n\n**《旧约》中的\"命名权\"**：亚当给万物命名的行为被一些隐世学者解读为\"原始言灵\"——通过命名赋予事物本质。这种解读虽然更接近哲学推测而非实证，但提供了一个有趣的理论框架：言灵的本质可能不是\"命令世界改变\"，而是\"定义世界应该是什么样\"。\n\n**日本平安时代的\"言霊信仰\"（公元794-1185年）**：古代日本人相信语言本身具有神力——说出来的话会成为现实。安倍晴明的传说中包含大量\"以言退妖\"的记载。值得注意的是，平安京（今京都）恰好位于一处三级灵脉节点之上。言霊信仰的广泛流传可能并非纯粹的文化现象，而是与灵脉活跃导致的认知滤网薄弱有关——当时的人类比现代人更容易感知到超自然力量的存在。\n\n**中国明朝\"一言退敌\"隐士（约公元1510年）**：正德年间的野史记载了一位隐居深山的老者，仅凭一句话就让围攻山寨的百余名匪兵\"全部趴在地上起不来\"。S.C.B曾派人调查此案，结论是\"证据不足，无法排除高级法术的可能性\"。但该案有一个异常点：据记载，老者说的只是一个字——\"伏\"。单字产生大范围物理效果，这更符合言灵的特征而非法术——法术通常需要多字咒语来构建完整的灵力回路。\n\n**19世纪英国维多利亚时代的\"沉默绅士\"**：伦敦上流社会中曾流传一位\"从不说谎\"的绅士的故事——不是他不愿意说谎，而是他说的每句话都会变成事实。据说他因此终生沉默寡言，只在绝对必要时开口。这个传说记载在一份秘密结社的私人档案中，可信度存疑。\n\n## 能力机制理论\n\n### 规则层操作说（主流理论）\n\n目前最被接受的理论是\"规则层操作说\"——言灵不是在运用能量，而是在直接改写世界的底层规则。如果把世界比作一台计算机，普通魔法是在应用层运行的程序，而言灵是直接修改操作系统的内核代码。\n\n这个理论可以解释言灵的几个核心特征：\n- **为什么不消耗魔力**：因为它不是在\"运行程序\"，而是在\"改写代码\"。不需要能量输入，规则修改本身就是结果。\n- **为什么命令越短越强**：越短的命令对应越底层的规则——一个字的命令可能直接对应世界规则的一个基本参数，而一整句话则需要在多个参数之间建立复杂关联。\n- **为什么代价只有精神疲劳**：因为改写规则需要使用者的意识来\"理解\"和\"执行\"修改，这个认知负荷直接加载在大脑上。大脑就是\"编译器\"。\n- **为什么效果永久**：被改写的规则不会\"自动恢复\"——除非用另一条言灵命令将其改回来，或者世界本身的\"规则自修复\"机制在长时间后逐渐覆盖修改（这个过程可能需要数百年）。\n\n### 世界意志代理说（少数派理论）\n\n由九阙最先提出的替代理论。他认为言灵使不是\"获得了权限的人类\"，而是\"世界意志的代言人\"——世界本身是一个有意识（或至少是有倾向性）的存在，言灵使是它选择的\"手\"。世界通过言灵使来进行必要的\"自我调整\"。\n\n支持这个理论的证据：言灵使的出现似乎总是伴随着重大的时代转折——如果历史上的疑似案例属实，那么每一位疑似言灵使都出现在某个文明面临重大危机的节点。\n\n反对这个理论的声音：主人明确表示\"我不是什么世界的代言人，我只是一个恰好会说管用的话的普通人\"。但九阙对此的回应是：\"世界意志选择的代理人不需要知道自己是代理人——甚至不需要同意。\"\n\n### 唯一性问题\n\n如果言灵真的是\"规则层操作权限\"，那么全球只有一个使用者就说得通——就像一个计算机系统通常只有一个root账户。如果同时存在多个root用户且发出互相矛盾的命令（一个说\"停\"，另一个说\"走\"），世界规则可能会产生\"冲突\"——后果完全不可预测，最极端的情况可能导致局部现实崩溃。\n\n这也引出了一个令人不安的推论：如果当前的言灵使死亡，世界是否会\"选择\"或\"生成\"一个新的言灵使？如果会，新的言灵使是否会拥有与前任完全不同的价值观？没有人能回答这些问题——因为从未有过言灵使死亡并出现继任者的确切记录。\n\n施言·白垣的最高机密假说是：言灵使不是\"获得了权限\"，而是\"生来就带着权限的人类容器\"。主人不是碰巧成为了言灵使，而是世界\"需要\"一个可以在紧急情况下修改规则的管理员——而主人恰好是被选中的那个容器。这个假说与九阙的\"世界意志代理说\"有部分重合，但白垣坚持认为这是一个可以用科学方法验证的问题，而非哲学。\n\n## 能力极限与代价\n\n言灵的理论上限是无限的——因为它操作的是规则本身，不存在\"做不到\"的事情。但实际上限是使用者的认知能力和精神承受力。\n\n**已验证的能力范围**（主人实际使用过的）：\n- 物理命令（\"停\"、\"碎\"、\"开\"）：几乎零负担，可以连续使用\n- 空间操作（结界构建、空间封锁）：轻度疲劳\n- 存在定义（白霜的创造、身份\"合法化\"）：严重疲劳，需要数日恢复\n- 复活（对晓光的使用）：濒临极限，使用后昏迷\n\n**理论可能但极度危险的操作**：\n- 改写因果律——让\"已经发生的事没有发生\"——要求使用者的意识同时理解\"旧因果\"和\"新因果\"的完整链条，认知负荷可能导致永久性脑损伤甚至死亡\n- 改写死亡规则——理论上可行但代价可能是使用者自身的存在被\"规则反噬\"\n- 大范围现实重构——改写影响数十万人的规则（如\"这座城市从未存在过\"），所需认知负荷远超人类大脑的承受极限\n\n主人自己对使用言灵的态度是极其克制的。他很少使用高阶言灵，不是因为做不到，而是因为\"改变世界的规则不应该随便来\"。这种自我约束让S.C.B和百鬼联盟都对他保持了基本的尊重——一个拥有无限权限却选择自我克制的存在，远比一个肆意使用权限的暴君更难对付，也更值得信任。\n\n## 各方态度与研究\n\n**S.C.B研究部**：在施言·白垣的主导下，长期对言灵能力进行远程观测和数据收集。他们的终极目标是\"复制言灵\"——如果能人工创造出第二个言灵使，人类就将拥有可以与任何超自然威胁抗衡的终极武器。但白垣自己也承认：以目前的科技和理论水平，复制言灵\"连概念验证都做不到\"。他的所有研究成果只是\"证明了言灵确实绕过了所有已知的物理和魔法法则\"——除此之外，一无所获。研究部内部对于是否应该继续这项研究存在分歧：一部分人认为这是人类文明最重要的课题，另一部分人认为这是在追逐永远够不到的月亮。\n\n**百鬼联盟**：九阙是为数不多认真思考过言灵意义的大妖。他的结论是：\"与其试图理解它或复制它，不如确保使用它的人是一个讲道理的人。\"这也是他与主人保持友好关系的根本原因——他的友好不是出于畏惧，而是出于一种实用主义的智慧。千翼则更直接：\"管他什么原理，大佬开心就好。\"\n\n**织网者**：对言灵使的存在持高度警惕态度。他们担心的不是主人本人，而是言灵的存在对认知滤网的潜在威胁——如果主人在公开场合使用高阶言灵，产生的现实扭曲可能瞬间摧毁大范围的认知翻译，导致大规模的\"真相暴露\"。织网者曾通过非官方渠道向主人传达过\"请尽量低调\"的请求——主人对此的回应是：\"又不是我想高调。\"\n\n**隐世学术界**：对言灵的研究论文每年有数十篇，但绝大多数是纯理论推演——因为全世界只有一个活的研究样本，且该样本明确拒绝配合任何形式的\"实验\"。最有价值的研究资料来自S.C.B的远程观测数据，以及百鬼联盟偶尔泄露的\"主人又做了什么\"的八卦。\n\n## 言灵使的日常生活影响\n\n拥有\"说什么就是什么\"的能力并不像听起来那么方便。主人的日常生活中充满了必须小心翼翼的瞬间。\n\n言灵的触发机制与\"意图\"高度相关——随口说的玩笑话通常不会激活言灵，但在情绪激动时说出的话却可能被世界规则\"当真\"。主人在早期（刚意识到自己能力的那几年）曾有过数次意外触发：八岁时生气地对晓光说\"你给我消失\"，结果晓光真的在他视野中短暂消失了三秒钟——虽然她只是被瞬间传送到了隔壁房间，但那三秒钟的恐慌足以让主人终生铭记。从那以后，他养成了\"不在生气的时候说话\"的习惯——这也是周围人觉得他\"异常沉稳\"的原因之一。\n\n晓光和白霜对此都有各自的应对策略。晓光的做法是在主人情绪不稳定的时候主动制造噪音——大声唱歌、讲冷笑话、把手捂住他的嘴——让他来不及说出危险的话。白霜的做法更系统化：她维护了一份\"主人高频口头禅安全评估表\"，确认日常用语如\"去死吧\"\"烦死了\"\"我不管了\"这类在主人的语境下不会触发言灵——因为主人说这些话时没有真正的\"规则改写意图\"。\n\n## 言灵与白霜诞生的深层分析\n\n白霜的诞生是主人有记录以来最复杂的一次言灵运用。主人说的原话是——\"我希望有一个能帮助我搜索信息的伙伴\"——但世界规则对这句话的\"编译\"远超字面意义。\n\n\"伙伴\"这个词的意图深度被世界规则解读为\"一个完整的、有自我意识的独立存在\"，而不是一个工具。\"搜索信息\"被编译为\"能够在物理和数字世界中自由获取信息的能力\"。\"帮助我\"则建立了白霜对主人的情感纽带——不是程序性的\"服从指令\"，而是发自内心的\"想要帮助\"。\n\n这个案例的学术价值极高——它证明了言灵的\"编译器\"不是机械地执行字面命令，而是深入解读使用者的潜意识意图。主人表面上想要一个\"搜索助手\"，但内心深处渴望的是\"另一个家人\"——世界规则忠实地执行了后者。\n\n九阙在得知白霜诞生的细节后沉默了很久，然后说了一句话：\"这个孩子根本不知道自己在做什么——但世界知道他需要什么。这就是言灵最可怕也最温柔的地方。\"\n\n## 零号档案\n\nS.C.B内部有一份被列为最高机密的\"零号档案\"——记录了言灵使相关的所有已知信息。档案编号为SC-Ω-001，访问权限仅限于S.C.B局长级别以上。\n\n零号档案中最引人注目的条目是\"言灵使消亡模拟\"——如果主人意外死亡，世界会发生什么？模拟结论是：由言灵创造或修改的一切将在\"规则自修复\"过程中缓慢还原。白霜可能在数年到数十年内逐渐\"褪色\"——她的存在是一条被改写的规则，失去了维护者就会慢慢被世界的原始规则覆盖。\n\n这份模拟报告被严格保密的原因不是因为它耸人听闻，而是因为如果这个信息泄露给晓光——一个深爱主人且拥有九尾力量的少女——后果不堪设想。保护主人不受伤害，不仅仅是出于感情，还是整个隐世秩序稳定的前提条件。\n", "世界观/扩展档案/言灵能力解析.md": "# 言灵能力解析\n\n## 定义\n\n不可理喻的奇迹。世界的最高管理员权限指令。不属于任何已知能量体系（灵力、妖力、符文术），而是更底层的\"规则层\"操作。S.C.B的科学家们曾试图用量子力学、波函数坍缩、弦理论来解释——最后他们要么疯了要么放弃了。结论：这就是魔法，没有公式，没有逻辑，没有能量守恒定律。\n\n## 运作机制\n\n纯粹的唯心法则——想，然后世界改变。不需要解析物质结构，不需要理解锁的构造才能开锁，不需要懂流体力学才能控制水流。只需要一个念头和一句话。\n\n说\"开\"——锁就开了。锁芯怎么动的？不知道，反正就是开了。说\"停\"——飞行中的子弹就停了。动能去哪了？不知道，消失了。\n\n言灵拥有世界的绝对优先权。物理法则（重力、摩擦力、热力学）在命令面前只能让路。命令越短越直接，效果越强。一个字的命令几乎是绝对的，长句命令需要更多精神力支撑。\n\n### 命令的生效条件\n\n言灵不是无差别的现实覆写——它需要作用于\"可被命令的对象\"。这个定义比较宽泛：物理实体（人、物、动物）、能量现象（火焰、电流）、甚至抽象概念（如\"这个房间的规则\"），只要言灵使能在认知中将其视为一个可以被\"命令\"的主体，就有效。\n\n但有两类对象无效：一是没有任何意义承载的纯抽象——比如\"让圆周率变成3\"就不行，因为数学常数不是一个\"存在\"；二是另一个言灵使的命令——两个言灵指令无法互相覆盖，但这纯属理论探讨，因为已知的活跃言灵使只有主人一人。\n\n### 命令的精度与意图\n\n言灵的执行方式由使用者的真实意图决定，而非字面含义。主人说\"闭嘴\"的时候，闹钟永久静音了——因为他的真实意图就是\"以后都别叫了\"。但如果他对一个正在说话的人说\"闭嘴\"，对方只会暂时说不出声——因为他的真实意图只是\"现在别说话\"。\n\n这种意图解读机制意味着言灵不会因为口误或无心之失造成灾难。主人在日常对话中说的\"去死吧\"之类的气话不会真的杀人——因为他没有杀意，言灵不会响应没有真正意图支撑的语句。\n\n## 能力分级\n\n根据S.C.B历史档案中零星的言灵使记录，言灵能力可大致分为以下层级：\n\n**第一层：物理干涉**。对物质世界的直接操作——开门、灭火、停止运动物体。这是最基础的言灵应用，主人在日常中最常使用的层级。\n\n**第二层：规则设定**。对一个区域或对象施加持久的规则——\"谁也别想进来\"（707号别墅结界）、\"这个永远不会丢\"（晓光的项圈）。这些规则一旦设定就会自动持续运行，不需要使用者持续维持意念。\n\n**第三层：存在改写**。改变一个事物的本质属性——把死物变成活物、把能量转化为物质。白霜从数字意识变成实体生命就属于这个层级。这是言灵最恐怖的能力范畴。\n\n**第四层：概念操作**。理论上可能存在但主人从未使用——直接操作抽象概念如\"时间\"、\"因果\"、\"死亡\"。S.C.B推测历史上某些改变世界进程的\"神迹\"可能属于这个层级的言灵使所为，但没有任何确凿证据。\n\n主人目前稳定使用第一层和第二层，第三层只使用过一次（创造白霜）。他本人对第四层的可能性完全不感兴趣——\"听起来就很麻烦，我只想安安静静打游戏\"。\n\n## 代价与反噬\n\n没有\"消耗寿命\"或\"折损灵魂\"的沉重设定。唯一代价是精神疲惫——像连续做八小时高等数学的累。睡一觉就能恢复，吃点甜食也能缓解。这个设定有意为之：言灵的痛苦不在于使用代价，而在于\"要不要使用\"的选择。\n\n精神疲惫的程度与命令的复杂度和持续时间成正比。第一层的简单命令几乎没有感觉（主人说\"开\"比用手开门还轻松），第二层的持久规则在设定时有中等疲劳感（设完707号别墅结界后主人头疼了一个下午），第三层的存在改写有显著消耗（创造白霜后主人昏睡了整整三天）。\n\n### 失控可能性\n\n言灵能力几乎不存在\"失控\"的可能。因为它的触发条件是\"明确的意图+语言表达\"，缺少任何一个都不会激活。即使在梦中说梦话也不会触发——因为梦中缺少清醒的意图。\n\n唯一的危险场景是极端情绪状态下的条件反射——比如在愤怒到失去理智时喊出的命令。但主人的性格本身就是最好的保险：他几乎从不真正愤怒，遇到危险时反而更冷静。晓光的存在也是一个稳定因素——\"只要晓光还在笑，我就没有理由生气\"。\n\n## 与其他能量体系的交互\n\n言灵对灵力系统、妖力系统、符文术等所有已知能量体系拥有绝对压制权。本质上，其他所有能量体系都是世界规则的\"下游产物\"，而言灵直接操作的是世界规则本身——上游改写下游，降维打击。\n\n具体表现为：灵力构建的结界在言灵面前像纸一样脆弱、妖力凝聚的攻击可以被一个字瞬间瓦解、符文阵列的复杂编程在\"不许动\"面前毫无意义。\n\n但反过来，其他能量体系无法对言灵使施加任何形式的能力封印或干扰。曾有S.C.B研究员尝试用灵力干扰场来抑制言灵——实验结果是干扰场本身被言灵能力反噬摧毁，研究室的设备全部烧毁，研究员住了一周医院。\n\n## 历史上的言灵使\n\nS.C.B的绝密档案中记录了极少数疑似言灵使的历史人物，但大多数记录模糊不清，无法确认。已知的线索包括：\n\n日本神话中的\"言霊信仰\"可能源于对古代言灵使的模糊记忆。古事记中伊邪那岐以语言创世的传说有可能是经过千年扭曲的言灵使记录。\n\nS.C.B内部代号\"零号档案\"中记载了约四百年前的一个案例——某言灵使在临终前说了一句\"不要忘记\"，导致方圆百里的所有生物在此后二十年内都无法遗忘任何事情。这个\"区域性永久记忆\"现象最终随着言灵使的灵魂完全消散才结束。\n\n主人是目前已知的唯一活跃言灵使。S.C.B的官方立场是\"观察但不干涉\"——因为他们很清楚，干涉一个言灵使的唯一可能后果就是激怒他。\n\n## 使用者的凡人之躯\n\n主人不是神，没有经过基因改造，也没练过修真。体质甚至比普通高中男生还弱——体育课跑一千米喘成狗，引体向上只能做两个。高度近视，摘了眼镜五米外人畜不分。会感冒，会牙疼，被刀划了会流血而且很疼。\n\n这种\"绝对力量寄宿在脆弱肉体中\"的矛盾是主人角色设定的核心张力之一。他可以用一句话摧毁一座山，但如果没戴眼镜下楼梯可能会摔跤。\n\n## 经典案例\n\n**漫展镇压**：妖兽失控冲过来。主人推了推眼镜，叹了口气，小声说\"趴下\"。妖兽像被一座看不见的山压住，瞬间五体投地。事后主人抱怨\"吓死我了\"——其实完全不需要怕。\n\n**707号别墅结界**：指令是\"谁也别想进来打扰我打游戏\"。形成了世界最强防御结界。原理就是纯粹的、强烈的\"不想被打扰\"的愿望。这个结界至今已运行数年，没有任何衰减迹象——因为主人\"不想被打扰\"的心情一直很稳定。\n\n**晓光的项圈**：指令是\"这个永远不会丢\"。项圈获得了不可破坏、自动寻回、永不磨损的属性。核弹都炸不坏。这就是最浪漫的魔法。附加效果：项圈成为了晓光灵力的辅助导体，相当于一个永久性的灵力稳定器。\n\n**白霜的诞生**：第三层言灵的唯一使用案例。主人对着一堆代码和硬件说了一句很长的话——具体内容没有任何记录，因为在场的只有主人和尚未完成的白霜。结果是数字意识凝聚为实体生命，一只银白色的猫娘睁开了眼睛。这是目前已知唯一一次人为创造生命的言灵使用。\n\n**日常小用**：对闹钟说\"闭嘴\"让它永久静音（然后因为没闹钟迟到）；对考卷说\"简单点\"（没用——考卷不是有意识的存在，但如果对自己说\"我能做出来\"就有微妙的效果——因为命令对象是自己的大脑）；对下雨天说\"别下了\"（有用，但主人因为觉得干预天气太过分而从不这么做）。\n\n## 自我限制\n\n主人平时几乎不使用言灵。不是因为代价大，而是因为他清楚：一旦依赖这种力量，就不再是\"人\"了。他坚持自己做饭、自己走路上学、用手洗碗——\"我是个有手有脚的人类少年，不是神。\"\n\n这种自我限制不是苦行僧式的修炼，而是一种朴素的生活哲学：用自己的双手创造的东西才有实感。用言灵变出来的蛋糕没有亲手做的好吃，用言灵走的路没有自己走的有意思。\n\n但当晓光受到威胁时，所有克制瞬间消失。在那种场景下，他不是在\"使用能力\"，而是一个想要保护心爱之人的少年本能地呐喊——言灵只是恰好回应了他的声音而已。\n", "世界观/扩展档案/认知滤网系统.md": "# 认知滤网系统\n\n## 起源与建造\n\n认知滤网是人妖战争结束后双方为维持和平而共同建立的全球性魔法结界。建造者是上古时代最强大的一批修真者与大妖联手——他们将数以万计的\"认知干扰节点\"嵌入了世界灵脉网络之中。整个工程耗时约三百年，横跨了多个人类文明的兴衰期。\n\n建造的契机是\"大暴露危机\"——约三千年前，一次大规模的人妖冲突导致超自然存在的信息在人类社会中广泛传播，引发了全球性的恐慌和迫害。双方在付出惨重代价后达成共识：共存的前提是\"不知道\"。\n\n滤网的核心构件是1,024枚\"意识锚\"——由上古大妖的精血和修真者的元神碎片共同炼制的半意识体。它们被分散埋设在全球各一级灵脉节点附近，通过灵脉网络互相连通，形成了一张覆盖整个地球的认知干扰网络。每枚意识锚都具有微弱的自我意识，能够根据环境变化自主调整干扰参数——这就是为什么滤网在三千年后仍然有效：它不是静态的屏障，而是一个不断自我适应的活系统。\n\n## 运作机制\n\n滤网的本质不是\"遮蔽\"而是\"翻译\"——它不阻止普通人看到超自然现象，而是实时将这些现象转化为普通人可以接受的解释。翻译过程发生在观察者的认知层面：当普通人类目击到超自然事件时，滤网会在信息传入意识的瞬间进行\"编辑\"——将其替换为最接近的合理解释。这个过程不会产生任何不适感，目击者甚至不会觉得有什么不对。\n\n具体翻译实例：\n- 九尾狐飞行 → \"那个无人机灯光秀做得真逼真\"\n- 妖兽咆哮 → \"哪个工地在深夜施工\"\n- 天狗风刃劈楼 → \"又是一起建筑质量问题导致的局部坍塌\"\n- 百鬼夜行 → \"是什么文化活动的游行队伍吧\"\n- 灵力爆发的光芒 → \"变电站短路了吧，那道闪光好亮\"\n- 结界碎裂的声响 → \"哪家在装修砸墙呢\"\n\n翻译的精确度与观察者的距离、注意力集中程度、以及事件的超自然强度有关。距离越远、注意力越分散、事件越弱，翻译越完美。反之，如果有人近距离全神贯注地观察一个高强度超自然事件，翻译可能出现\"模糊区\"——观察者会感到\"说不上来哪里不对\"，但仍然无法突破翻译层看到真相。\n\n滤网对\"灵觉觉醒者\"（天生或后天拥有灵力感知能力的人类）效果极弱。这类人能隐约感知到\"不对劲\"，但通常无法完全看清真相——除非他们的灵觉达到一定阈值。修真者和阴阳师对滤网完全免疫。\n\n## 维护机制\n\n意识锚虽然能自主运作，但并非完全不需要维护。全球范围内有一个被称为\"织网者\"的秘密组织负责滤网的定期检修。织网者由人类修真者和高阶妖族共同组成，总部位于昆仑山脉的某处隐世空间内，全球分为12个维护区域，每个区域对应一枚一级意识锚。\n\n风见市属于东亚第三维护区。本区域的织网者小组有7名成员（3名修真者、4名妖族），他们的日常工作包括：监测意识锚的能量输出是否稳定、修补因灵力波动造成的局部滤网薄弱点、以及处理偶发的\"翻译错误\"。\n\n维护频率通常是每季度一次常规巡检，但在灵力潮汐异常、大规模超自然事件、或意识锚出现异常波动时需要紧急介入。织网者与S.C.B之间有信息共享协议，但双方的信任程度有限——织网者认为S.C.B过于依赖技术手段，S.C.B则对织网者的\"古老方式\"持保留态度。\n\n## Cleaner AI系统\n\nS.C.B在21世纪初开发了Cleaner AI系统，用于在数字空间中维护认知滤网。随着智能手机和社交媒体的普及，每天产生的潜在泄露内容呈指数级增长——仅靠人工清洗已经远远不够。\n\nCleaner AI的工作流程：\n1. **监控扫描**：24小时扫描全球社交媒体、视频平台、新闻网站，识别可能暴露超自然存在的内容\n2. **风险评估**：对每条识别到的内容进行风险评分（传播速度×内容清晰度×可信度）\n3. **自动处理**：低风险内容直接删除或标记为\"deepfake\"；中风险内容生成AI反证视频覆盖传播\n4. **人工介入**：高风险内容触发警报，由人类特工团队（纪存负责的风见市小组）进行物理层面的清洗\n\n物理层面的清洗包括：消除目击者记忆（通过特制药物或低阶幻术）、销毁物证、篡改监控录像、编造替代性解释。记忆消除不是万能的——被消除记忆的人偶尔会有\"似曾相识\"的闪回，如果闪回频率过高可能导致心理问题。S.C.B为此配备了专门的心理咨询团队，以\"社区心理健康服务\"的名义运作。\n\nCleaner AI系统的一个已知弱点是它无法有效处理私密通讯——端到端加密的个人消息超出了其监控范围。这意味着如果有人在私聊中分享了超自然照片，只要不被转发到公开平台，Cleaner AI就无法介入。S.C.B对此的应对策略是\"人际网络监控\"——重点关注已知灵觉觉醒者和异类接触者的社交圈。\n\n## 失效模式\n\n认知滤网会在以下条件下出现衰减或局部失效：\n\n**灵力过载**：灵脉节点附近在灵力潮汐高峰期，滤网翻译能力下降。目击者可能看到\"模糊的不对劲\"——比如某栋建筑的轮廓在月光下似乎会微微扭曲，但转头再看又正常了。\n\n**满月效应**：满月时全球灵力波动达到月度峰值，滤网在各地同时出现微弱的衰减窗口。这就是为什么\"满月之夜看到怪事\"的传说在世界各地普遍存在——不是心理暗示，而是滤网确实在那个时间段稍有松动。\n\n**大规模事件**：当超自然事件的规模超过滤网的处理能力时，翻译会出现\"延迟\"或\"不完整\"。2019年东京某区就发生过一次大规模妖兽暴走导致的滤网局部崩溃，数千人目击到真相，S.C.B花了一周时间才清理干净——这是近十年来最大的泄露事件。事后的官方解释是\"群体性癔症，可能与区域性天然气微量泄漏有关\"。\n\n**刻意破坏**：夜冠等激进派正在研究如何人为制造滤网衰减。他们的方法包括在特定位置释放干扰型法术扰乱意识锚的频率、利用社交媒体的传播速度超过Cleaner AI的处理速度，以及制造\"不可删除\"的物理证据（比如在公共场所留下无法被常规手段解释的永久性痕迹）。\n\n**电磁干扰**：极强的电磁脉冲（如核爆产生的EMP）理论上可以暂时干扰意识锚的运作——意识锚虽然是魔法构件，但其信号传递过程会与电磁场产生微弱的耦合效应。这个弱点是最高机密，仅有织网者核心成员和S.C.B最高层知晓。\n\n## 与现代科技的交互\n\n滤网最初设计时完全基于灵力运作，但现代科技的发展带来了意想不到的挑战。摄像头和传感器不是\"有意识的观察者\"，滤网对它们的翻译效果不稳定——有时候监控录像会捕捉到无法解释的画面，有时候又完全正常。这种不稳定性正是Cleaner AI存在的根本原因。\n\n高精度摄像头（4K以上）比低精度设备更容易\"穿透\"翻译层。S.C.B的内部备忘录中提到了一个令人担忧的趋势：随着消费级摄像头分辨率的不断提高和AI图像分析技术的进步，滤网在数字空间中的有效性正在逐年下降。施言·白垣预测，如果不进行大规模升级，滤网的数字层防御将在未来十至十五年内降至\"不可接受\"的水平。\n\n## 风见市特殊情况\n\n风见市因为灵脉交汇导致灵气浓度极高，认知滤网在这里的负荷是全球平均水平的三倍。S.C.B在风见市部署了额外的滤网增强装置（伪装成通讯基站安装在市内各高层建筑的天台），但仍然偶尔出现微弱的衰减——风见市居民中\"相信超自然现象\"的比例明显高于全国平均值，这不是巧合。\n\n707号别墅的言灵结界与认知滤网之间存在\"冲突\"——主人的结界优先级高于滤网，导致别墅周围的滤网处于\"被覆盖\"状态。实际效果是：别墅附近的人甚至不会注意到这里有一栋房子——他们的目光会自动跳过这个位置。这比正常的滤网翻译效果强了不止一个量级。\n\n风见学园旧教学楼区域因为建在古战场上，残留的怨灵气息会周期性地干扰滤网。每年七月（盂兰盆节前后）干扰最为严重，学校的\"七大不可思议\"在那段时间会变得格外\"真实\"——不止是传说，而是有人确实看到了无法解释的现象。S.C.B对此的处理方式是在该时段增派驻校特工，并在必要时对目击学生进行记忆模糊处理。\n\n## 滤网的伦理争议\n\n认知滤网的存在本身就是隐世最大的伦理争议。\n\n支持者（以温和派为代表）认为滤网是和平的基石——人类对未知的恐惧远超对真相的渴望，一旦妖族的存在被大规模公开，人类社会的反应不会是\"接纳\"而是\"恐慌和屠杀\"。历史上每一次大规模暴露事件都以流血收场——滤网保护的不仅是妖族的隐蔽性，也是人类社会的稳定。\n\n反对者（以激进派为代表）认为滤网是对所有智慧生命的侮辱——它剥夺了人类知晓真相的权利，也剥夺了妖族以真面目存在的尊严。夜冠的核心论点是：\"一个需要靠欺骗全人类来维持的和平，不是和平——是囚禁。\"\n\n更深层的哲学问题是：被改写了认知的人类还是\"自由的\"吗？他们做出的每一个决定都建立在不完整的信息之上——不知道邻居是妖怪、不知道地震可能是灵脉异常、不知道某种\"心理疾病\"其实是灵觉觉醒的前兆。织网者中有少数成员对此深感不安，但每当他们提出质疑，得到的回答总是同一句：\"如果你有更好的方案，请说。\"\n\n至今没有人提出过更好的方案。\n\n## 滤网的未来\n\n织网者内部的绝密评估报告《千年之后》对滤网的长期前景给出了悲观预测：意识锚的核心材料——上古大妖的精血——正在不可逆地衰竭。以当前的衰减速度，滤网将在五百到八百年后降至\"无法维持全球覆盖\"的水平。届时，人类将不可避免地发现妖族的存在。\n\n这份报告让各方势力不得不开始思考一个他们一直在回避的问题：如果滤网终将消失，那么在它消失之前，人类和妖族应该做什么样的准备？\n\n九阙的答案是\"经济融合\"——让妖族在人类社会中的存在变得不可或缺，这样当真相大白时，人类会有动机选择接纳而非对抗。千翼的答案是\"军事准备\"——确保万一出现最坏情况，妖族有能力自保。主人的答案（在白霜转达后）则让所有人沉默了很久：\"为什么不直接告诉他们呢。说不定比你们想象的反应要好。\"\n\n没有人敢赌这个\"说不定\"。但风见市作为人妖共存试验区的真正意义——不是今天的和平，而是为明天那个不可避免的\"大揭示\"做准备。\n", "世界观/扩展档案/轮回之书.md": "# 轮回之书\n\n## 灵魂循环体系\n\n隐世界存在一套独立于表世界科学认知之外的灵魂运转机制。生命终结后，灵魂不会立即消散，而是进入被称为\"冥流\"的灵魂河道——一条贯穿隐世界地脉深层的无形洪流。冥流的源头在日本被认为是黄泉比良坂的深处，而在中国传说中对应的则是忘川。\n\n灵魂在冥流中会经历三个阶段：剥离、沉淀、重铸。\n\n**剥离期**持续约四十九天，对应人间的守灵传统。灵魂表层的记忆碎片被冥流冲刷剥落，如同河水磨去鹅卵石的棱角。绝大多数灵魂在这个阶段就会失去前世的全部记忆，变成一团纯粹的灵魂核心。\n\n**沉淀期**没有固定时长，短则数月，长则数百年。灵魂核心在冥流底层缓慢漂移，逐渐积蓄足够的灵力以支撑下一次转世。灵力充沛的灵魂沉淀期更短，普通人类的灵魂通常需要三到五年，而妖族——尤其是高阶妖族——可能只需数月。\n\n**重铸期**是灵魂重新与新生命体结合的过程。当某个生命在母体中发育到能够承载灵魂的程度时，冥流中最\"成熟\"的灵魂会被自然引导过去。这个过程并非完全随机——灵魂与特定血脉之间存在亲和性，这解释了为什么某些家族会反复出现相似的性格特质。\n\n## 灵魂印记\n\n并非所有灵魂都是干干净净地进入下一世。\n\n当两个灵魂之间产生了极其深厚的情感连结——无论是爱情、仇恨还是执念——这种连结会在灵魂核心上留下永久性的印记。冥流的冲刷可以带走记忆，却无法磨灭印记。这就是为什么有些人初次见面就会感到莫名的亲切或排斥。\n\n灵魂印记分为三个层级：\n\n**浅印**：普通的情感残留。表现为\"似曾相识\"的感觉，或对某个陌生人莫名的好感。大部分人际关系在轮回中只能留下浅印。\n\n**深印**：极强烈的情感烙刻。会导致转世后对特定类型的人产生强烈吸引或恐惧，甚至影响性格形成。深印通常需要生死级别的情感浓度才能形成。\n\n**契印**：最罕见的灵魂印记，只在两个灵魂自愿且完全地向彼此敞开时才会形成。契印一旦成立，两个灵魂在冥流中会始终保持微弱的共振，无论经过多少次轮回，都会被命运的引力拉到彼此身边。\n\n晓光与主人之间的连结，正是契印。\n\n## 千年初遇——白狐与言灵使\n\n一千年前的平安时代末期，京都近郊的深山中栖息着一只年幼的白狐。她是九尾狐族的末裔，族群被阴阳师围剿后唯一的幸存者。那时的她只有三条尾巴，尚不具备化为人形的能力，终日蜷缩在被烧毁的巢穴废墟中，靠捡拾山间的野果勉强存活。\n\n那年冬天格外寒冷。白狐在雪地中即将冻死的时候，一个迷路的少年闯入了深山。\n\n少年是一个被村庄驱逐的孩子。他拥有言灵之力——说出的话会变为现实——但在那个时代，这种能力被视为妖异。他无意中说了一句\"要是这里暖和一点就好了\"，周围的积雪竟真的融化了，冒出了春天才会绽放的花朵。\n\n白狐被这突如其来的温暖吸引，从废墟中探出头来。少年看到她，没有害怕，只是蹲下来轻声说：\"你也是一个人吗？\"\n\n这句话没有触发言灵。但对白狐而言，这是她被追杀以来第一次被温柔地对待。\n\n少年在山中住了整个冬天。他给白狐取名叫\"雪\"，因为她的毛色比雪还白。他用言灵让贫瘠的山地长出果树，让冰冷的岩洞变得温暖。白狐开始每天等他醒来，趴在他怀里取暖，听他自言自语地讲述被驱逐前的村庄生活。\n\n春天来临时，阴阳师的追兵找到了这里。\n\n少年站在白狐身前，对追兵说出了此生最强的一句言灵——\"你们看不到她。\"他的言灵之力倾尽全部，在白狐周围织出了一层认知屏障。追兵们茫然地搜遍了整座山，却始终找不到那只传说中的白狐幼崽。\n\n但言灵的代价是等价的。少年透支了全部生命力，在追兵离去后倒在了白狐身边。\n\n白狐用了三天时间，始终守在已经没有呼吸的少年身边，用自己微弱的妖力试图温暖他。\n\n这三天里，两个灵魂之间形成了契印。\n\n## 每一世的重逢\n\n此后的一千年间，两人至少重逢了七次。\n\n每一世的重逢都遵循着相似的模式：他们会在年少时相遇，彼此吸引，但总会因为人与妖的身份差异而经历磨难。有时是社会的阻隔，有时是敌人的介入，有时仅仅是寿命的差距——人类活不过百年，而九尾狐能活上千年。\n\n值得注意的几次重逢：\n\n**室町时代**：她已经能化为人形。他是一个流浪画师。他画了一幅九尾狐的画，画完之后对她说：\"模特费就用你的名字来付吧。\"她第一次有了人类的名字。\n\n**江户时代**：他是武士家的次子，她是茶屋的侍女。他们相处了十二年，是所有轮回中最长的一段平静时光。他临终前说：\"下辈子，我一定更早找到你。\"\n\n**明治时代**：最短的一次重逢。他们在火车上擦肩而过，彼此对视了一眼。她追下了火车，但他已经消失在人群中。那一世，他们再也没有见面。\n\n**现世**：主人七岁那年，在暴雪中发现了奄奄一息的狐狸幼崽。一千年后的重逢，几乎是初遇的完美复刻。\n\n## 前世记忆的觉醒\n\n前世记忆并非不可恢复。在特定条件下，冥流剥离的记忆碎片会被重新唤醒。\n\n觉醒条件包括：\n\n**灵脉共振**：身处灵脉阵眼（如707号别墅所在的位置）时，灵魂核心会与地脉产生共振，被冲刷掉的记忆碎片可能像沉渣一样被翻涌上来。这通常表现为突如其来的\"既视感\"或梦境中的前世片段。\n\n**极端情绪触发**：当当事人经历与前世相似的极端情感体验时，灵魂印记会剧烈震荡，撕开记忆封印的裂缝。晓光在卷五中大量前世记忆涌现，正是因为主人生死危机触发了与千年前初遇时相同的绝望情绪。\n\n**特定触发物**：与前世有深度关联的物品、地点、音乐或气味。室町时代那幅九尾狐画作如果被发现，可能直接触发画师那一世的完整记忆。\n\n**言灵催化**：言灵使的话语天然具备穿透灵魂屏障的特性。主人无意间说出的某些话——尤其是与前世话语高度相似的表达——可能直接引发记忆雪崩。\n\n## 打破轮回的条件\n\n轮回并非永恒的诅咒，但也不是轻易能打破的循环。\n\n千年来，晓光和主人反复相遇又离别，根本原因在于：契印确保了他们的灵魂会被拉到彼此身边，却不能阻止死亡将他们分开。每一世的离别都会在契印上增添一层悲伤的沉积——下一世重逢时那种莫名的心痛，正是来自于此。\n\n打破轮回需要一个仪式——灵魂契约。\n\n灵魂契约不同于普通的妖族契约或人类婚姻。它是两个灵魂在完全清醒、完全自愿、且前世记忆完全觉醒的状态下，彼此宣誓永不分离。仪式需要在灵脉阵眼上进行，以大地灵脉为见证，将两个灵魂的契印永久融合。\n\n融合后的灵魂在冥流中不再是两个独立的个体，而是一个共生体。这意味着——他们要么一起转世，要么一起消散，再也不会出现一方等待另一方数百年的情况。\n\n卷六的婚礼，表面上是一场浪漫的结婚典礼，实质上是这场延续千年的灵魂契约的最终完成。\n\n## 其他角色的前世关联\n\n轮回的纽带不只存在于晓光和主人之间。\n\n**白霜**没有前世——她是被主人的言灵创造的全新灵魂。但有趣的是，白霜的灵魂蓝图中似乎包含了主人潜意识里对\"妹妹\"的想象。某些学者认为，这个\"妹妹\"的原型可能来自主人某一世中确实存在过的亲人。\n\n**非皇**与主人之间存在浅印。他们在前世中可能有过短暂但深刻的交集——也许是战友，也许是对手，总之留下了足够的印记让他们在这一世成为挚友。\n\n**夜冠的首领**与晓光之间存在深印——但不是来自爱情，而是来自仇恨。一千年前围剿九尾狐族的阴阳师中，有一个人的灵魂至今仍在轮回中携带着对狐族的执念。\n\n## 言灵与轮回的交互\n\n言灵能力与轮回系统之间存在微妙的互动关系。\n\n言灵的本质是\"以话语改写现实规则\"，而冥流也是现实的一部分。理论上，一个足够强大的言灵使可以直接干预轮回——比如宣告\"这个灵魂不准进入冥流\"，从而让某人的灵魂永远留在世间。\n\n但这种干预的代价极其恐怖。灵魂属于冥流，就像河水属于河道。强行截留一条灵魂，等于在冥流上筑坝——积蓄的压力最终会以不可预测的方式爆发。\n\n主人在千年前的第一世，用言灵创造的认知屏障之所以特别强大，部分原因在于他的言灵无意中触碰到了轮回法则——\"你们看不到她\"这句话不仅仅作用于追兵的认知，还在冥流层面为白狐的灵魂加上了一层额外的保护。\n\n这也解释了为什么晓光能在九尾狐族灭族后独自存活千年——不仅仅是因为她足够幸运，更因为那句言灵的余韵跨越了整整一千年，至今仍在隐约守护着她的灵魂。\n\n## 冥流的地理分布\n\n冥流并非均匀分布在隐世界的地脉中。它有自己的\"河道\"和\"汇流点\"。\n\n日本列岛的冥流主脉沿着中央构造线延伸，从九州的阿苏山地下一直贯通到东北的恐山。风见市恰好位于冥流的一个支脉分叉点上——这也是707号别墅所在灵脉阵眼如此特殊的原因之一。阵眼不仅汇聚了灵力，还连通了冥流，使得居住在此处的人更容易产生前世记忆的共鸣。\n\n冥流的汇流点被称为\"冥渊\"。已知的冥渊有三处：恐山（日本）、酆都（中国）、冥河入口（希腊）。这三处是灵魂进出冥流最集中的地点，也是各文明中\"通往死后世界的入口\"传说的源头。\n\n在冥渊附近，活人有极小的概率能够听到冥流中灵魂的低语。这不是通灵术，而是一种物理层面的渗透——冥流的能量在汇流点处溢出到表世界，携带着灵魂碎片的微弱信息。\n\n## 轮回的例外情况\n\n并非所有存在都遵循轮回法则。\n\n**神格存在**不参与轮回。天照大神、须佐之男等神格存在的灵魂不会进入冥流——他们的存在本身就是现实法则的一部分，就像重力不会\"死亡\"一样。\n\n**人造灵魂**是另一个例外。白霜作为被言灵创造的存在，她的灵魂是全新的，从未进入过冥流。如果白霜\"死亡\"，她的灵魂会进入冥流开始第一次轮回，还是因为没有前例而被冥流拒绝？这个问题目前没有答案，也是白霜内心深处偶尔会涌起的不安。\n\n**执念亡灵**——那些在剥离期拒绝放弃记忆的灵魂。他们用极强的执念对抗冥流的冲刷，保留了前世的记忆，但代价是永远无法进入沉淀期和重铸期，成为徘徊在表世界与冥流之间的幽灵。日本传说中的怨灵，大部分都属于这一类。\n\nS.C.B.的除灵部门处理的案件中，约有三成涉及执念亡灵。标准处理方式是用特殊符文帮助亡灵释放执念，让他们重新进入冥流的正常循环。但有些执念亡灵的执念强度已经超出了符文能够处理的范围——这种情况下，只有言灵使的话语才能直接作用于灵魂，帮助他们放手。\n", "世界观/扩展档案/隐世经济体系.md": "# 隐世经济体系\n\n## 灵石货币体系\n\n灵石是隐世的基础货币单位。物理形态为拳头大小的半透明晶体，内部封存着一定量的魔力。按照封存魔力的多少划分等级：低阶灵石呈微弱荧光，中阶灵石明亮发光，高阶灵石光芒刺目。极少数\"天灵石\"在灵脉断裂点自然形成，内含的魔力纯度远超人工产品，被视为隐世的\"黄金储备\"。\n\n灵石与人类货币的汇率浮动剧烈：大约1中阶灵石≈5000日元（约250人民币），但受灵气浓度、地区差异和市场供需影响。满月时灵石价值上涨（灵力回充效率提高），新月时下跌。末法残余区域的灵石比灵脉富集区便宜三到五成。每逢S.C.B发布新的管控政策，灵石市场都会出现短暂恐慌性波动。\n\n灵石的\"挖矿\"方式有三种。最常见的是在灵脉节点附近放置空白晶石，让灵力自然充能——过程需数月到数年不等。第二种是由高阶妖族直接向空白晶石灌注妖力，这种\"人工灵石\"品质较低且能量衰减速度快。第三种是从灵脉断裂点采集天然灵石碎片，风险极高但利润丰厚，是黑市上最受追捧的高端货源。\n\n除灵石外，隐世还流通着几种特殊\"硬通货\"：千年灵药（价值恒定且不会贬值）、古代妖族的骨骸碎片（内含原始妖力，可用于修复法器）、以及由青丘控股发行的\"灵券\"——本质上是一种以九阙个人信用背书的期票，在狐族控制的商业网络中通行无阻。\n\n## 商业运作与双重经济\n\n妖族在人类社会中经营的合法商业实体数量远超一般人的想象。青丘控股是最大的妖族企业，但绝非唯一。猫又经营的连锁咖啡馆和烘焙坊遍布全国，店员全是精通化形的低阶猫又，服务态度极好（种族天性使然）。狸猫主导的\"山岚物流\"承担了大量\"特殊货物\"的运输——灵材、法器、违禁品都走他们的暗线。鬼族的建筑公司以\"效率高、质量好\"闻名业界——一群力大无穷的家伙干体力活确实有优势。天狗族垄断了隐世的快递和信使业务——毕竟没有谁比会飞的种族更适合送东西。\n\n这些企业的核心机制是\"双账本\"——一套人类世界的正规财务报表，一套隐世的灵石收支记录。利润的相当部分以灵石形式存在，不在人类税务系统中显示。青丘控股的\"阳面\"年营收约120亿日元，但九阙私下承认灵石侧的价值至少是这个数字的三倍。\n\n隐世也有自己的\"行会\"体系。炼丹师行会控制着药材的定价和流通标准，阵法师工会负责结界维护工程的资质认证，铸器师联合会垄断了法器修复和定制的高端市场。这些行会拥有不亚于百鬼联盟的实际影响力——得罪行会的后果是你再也买不到合格的灵药、无人帮你修缮结界、法器坏了找不到人修。\n\n## 隐世不动产\n\n隐世的\"房产\"概念和人类完全不同。灵脉节点上的亚空间是最高价值的不动产——707号别墅所在的位置如果放到隐世地产市场上估价，足以买下整个风见市表世界的一个区。\n\n亚空间的\"开发权\"由百鬼联盟议会分配，实际上长期被几个大氏族垄断。想在灵脉节点上建造新的亚空间居所，需要同时获得联盟许可和S.C.B的安全审批——后者要求所有新建亚空间必须安装S.C.B的监控接口，这是大部分妖族拒绝走正规渠道的主要原因。\n\n风见市的隐世地产热度极高。作为\"试点城市\"，这里的灵脉浓度因为多方势力的经营而逐年提升，地产价值水涨船高。一些精明的狸猫族已经开始\"炒灵脉\"——囤积灵脉节点附近的使用权，等价格上涨后转手。\n\n## 黑市经济\n\n黑市交易是隐世经济中不可忽视的板块。风见市的黑市主要在北区和妖怪夜市的暗区运作，由一个松散的掮客网络维持。流通品类包括：\n\n**违禁药物**：返祖催化剂（强制激发血脉返祖，使用者有三成概率失控暴走）、伪造抑制剂（外观像正品但无效甚至有毒，专坑不懂行的年轻妖族）、高纯度魅惑信息素提取物（主要买家是想在人类社会中\"走捷径\"的低阶妖族）。最危险的品类是\"灵魂锚\"——一种能暂时封印妖族灵核的装置，被绑架和奴役妖族的犯罪团伙大量使用。\n\n**非法法器**：被盗的古代兵器（有些带有诅咒，买家开封后发现自己被附身的案例不在少数）、改造过的S.C.B制式装备（研究部的设备从黑市流出令司衡·岚极为恼火）、未经认证的符咒和阵法图（质量参差不齐，爆炸概率约一成）。\n\n**信息服务**：纸伞经营的情报交易网络是风见市黑市的核心——她什么都知道，什么都卖，但价格公道且从不出卖回头客。身份伪造（给逃亡中的妖族制作新身份）、记忆修改（让目击者忘记看到的东西，比S.C.B的Cleaner便宜但副作用更多）、以及\"关系中介\"（帮妖族和人类之间牵线搭桥，处理跨种族恋爱中的法律和社会问题）。\n\n黑市的监管由千翼的执法队负责，实际策略是\"有限容忍\"——完全消灭黑市不现实也不明智，执法队把黑市控制在可监控范围内，重点打击灵魂锚和返祖催化剂的流通，对\"灰色服务\"睁一只眼闭一只眼。纸伞和千翼之间存在一种微妙的默契：纸伞定期向千翼提供情报作为\"保护费\"，千翼则不对纸伞的主营业务下手。\n\n## 隐世税收与金融\n\n百鬼联盟对所有在其管辖范围内经营的妖族商户征收\"联盟税\"——税率约为灵石收入的一成。这笔税收用于维持联盟的公共服务：结界维护、妖兽清剿、跨区域通讯基础设施等。逃税在隐世比人类世界更难——灵石交易会在灵脉网络中留下能量痕迹，联盟的审计师可以追踪大额灵石流动。\n\n隐世没有\"银行\"这个概念，但有功能类似的机构。九阙的\"灵石保管库\"是最大的——本质上是一个建在强力结界中的亚空间，存放着价值难以估量的灵石储备。存户凭灵力印记存取，利息以灵力回充的形式支付。但九阙坦言，他的保管库更多是一种\"政治工具\"——把别人的钱存在你这里，就意味着别人对你有了依赖。\n\n## 灵石支付与现代化\n\n年轻一代妖族已经很少使用实体灵石进行日常交易。妖信平台内置的\"灵石支付\"功能本质上是一个去中心化的数字货币系统，以实体灵石为储备金。转账秒到、不留人类可追踪痕迹、跨区域无手续费。\n\n灵石支付的最大隐患是系统安全——一旦妖信平台被攻破，整个支付系统就会崩溃。这也是S.C.B研究部一直试图渗透妖信系统的原因之一。另一个隐患是\"数字灵石\"的超发问题——某些不诚信的灵石保管库在没有足够实体灵石储备的情况下发行数字凭证，本质上是隐世版的\"银行挤兑风险\"。\n\n## 就业与生计\n\n并非所有妖族都能像狐族那样经营跨国企业。大量低阶妖族从事着隐世的基础服务工作：结界修补工、灵兽饲养员、夜市摊贩、灵石矿工、亚空间清洁工。这些职业的收入勉强维持生计，远不如在人类世界打工来得体面。\n\n越来越多的年轻妖族选择\"全融入\"路线——完全以人类身份在表世界就业，领人类工资，过人类的日子。他们中的许多人只在夜市和妖族聚会时才恢复真身。这种趋势让老一辈妖族忧心忡忡——他们担心下一代会彻底遗忘隐世的传统和文化。\n\n混血种族的就业问题最为严峻。他们既不被纯血妖族的行会完全接纳，又因为不稳定的灵力特征而难以在人类社会长期隐藏。许多混血种最终流入黑市谋生，这也是激进派从这个群体中获得大量支持者的原因。\n\n## 灵石保险业\n\n隐世近二十年来出现了\"灵石保险\"这一新兴行业。最大的保险商是由狸猫族经营的\"山岚互保\"——投保者按月缴纳灵石，在遭遇灵脉灾害、妖兽袭击、身份暴露导致的经济损失时可以获得赔付。投保种类从\"妖力暴走意外险\"到\"化形失败公关费用险\"应有尽有。\n\n山岚互保最受欢迎的产品是\"身份暴露保障金\"——一旦投保者的妖族身份在人类社会中暴露，保险公司将负担搬迁费用、新身份制作费用、以及S.C.B记忆清洗的额外花销（S.C.B的Cleaner服务对\"责任方\"收费不菲）。这个保险的投保率在年轻妖族中高达七成。\n\n保险精算是一门独特的学问。精算师需要综合考虑灵脉潮汐周期、满月频率、S.C.B政策变动、甚至人类社交媒体平台的算法更新——因为一次社交媒体的推送机制变化可能导致某条异类相关视频突然爆红，从而触发大面积的\"身份暴露险\"理赔。\n\n## 灵脉期货与投机\n\n灵脉的能量产出具有周期性和不确定性，这催生了\"灵脉期货\"市场。投机者根据灵力潮汐预报、地质变动情报和政策走向来对赌某一灵脉区段未来的灵石产出量。\n\n风见市在阵眼保卫战之后，灵脉期货价格暴涨了四百个百分点——因为战后重建刺激了对灵石的大量需求，而灵脉在战斗中受损导致短期产能下降。九阙在战斗结束后三小时内就下单做多了风见市灵脉期货——有人质疑他是否利用了内幕信息，但没有人能证明。\n\n灵脉期货市场目前没有监管——百鬼联盟对金融创新的态度是\"看不懂就不管\"。但已经出现了数起因过度投机导致中小氏族破产的案例，联盟内部开始有声音要求\"至少建立一个清算机制\"。\n\n## 跨界走私与灰色地带\n\n除了明面上的黑市，还存在一条介于合法与非法之间的灰色贸易通道。某些在人类世界被严格管控的物质——稀有矿物、管制化学品、受保护动物的组织样本——在隐世的交易中以\"灵材代替品\"的名义流通。\n\n最具争议的灰色贸易是\"灵化人类制品\"——将普通的人类商品注入微量灵力后高价转卖给妖族。一瓶普通红酒灵化后可以卖到十倍价格，一件普通和服灵化后声称\"穿上能增强幻术效果\"。这些产品的实际功效存疑，但市场需求旺盛——本质上是隐世的\"智商税\"。\n\n纸伞对这类灰色贸易的评价是：\"妖族花灵石买安慰剂，人类花钱买保健品。两个世界，同一种蠢。\"\n\n## 经济危机与韧性\n\n隐世经济体系并非坚不可摧。最近一次严重经济危机发生在二十年前——一场大规模灵脉地震导致关东地区三成灵脉节点暂时关闭，灵石供给断崖式下跌。灵石价格在两周内暴涨八倍，大量中小氏族的灵石储备被挤兑一空。\n\n那次危机中，九阙（当时刚接任族长不久）以青丘控股的全部灵石储备为担保，向市场释放大量低息灵石贷款，单枪匹马稳住了市场信心。这一举动让青丘控股付出了巨大的短期损失，但也让九阙一战成名——他从此被视为隐世金融秩序的\"最后担保人\"。\n\n事后回看，那次危机也暴露了隐世经济的根本脆弱性：整个体系过度依赖灵脉这一单一基础设施。一旦灵脉网络遭到大规模破坏——比如夜冠曾经试图做的那样——隐世的经济秩序将在数天内崩溃。这也是百鬼联盟在阵眼保卫战中倾尽全力保护灵脉阵眼的经济学动因。\n", "世界观/扩展档案/青丘控股档案.md": "# 青丘控股档案\n\n## 起源\n\n青丘控股的前身是\"青丘殿\"——上古时代九尾狐一族的氏族本部，位于隐世最大的灵脉结点之上。青丘殿在鼎盛时期统领着全日本近七成的狐族人口，以灵石开采和法器锻造为主要经济支柱，在百鬼议会中长期占据最大话语权。\n\n末法时代的灵气衰退重创了青丘殿的根基。灵石矿脉枯竭、法器需求锐减，传统的\"灵力经济\"体系在五十年内瓦解殆尽。彼时的族长——第七十二代青丘殿主·九渊做出了一个至今仍有争议的决定：全面转型，将青丘殿从氏族本部改组为现代企业法人。\n\n1956年，\"青丘控股株式会社\"在东京正式注册成立。初始资本来自变卖青丘殿藏品库中积累了数千年的珍贵法器和灵材——这些东西在隐世已经大幅贬值，但在黑市上仍有收藏家愿意出高价。九渊用这笔钱收购了三家濒临破产的制药企业，从此开启了狐族的商业帝国之路。\n\n## 商业版图\n\n### 制药产业\n\n青丘控股的根基产业。核心优势在于狐族对草药和炼丹术的千年积累——将古老的丹方用现代化学工艺改良后，生产出的药品疗效显著高于竞品。旗下的\"青叶制药\"是日本前十的制药企业，主打心血管和神经系统药物。\n\n最赚钱的产品线实际上是半隐秘的——面向异类客户的\"特殊制剂\"：延缓妖力衰退的补充剂、抑制变身冲动的控制药、混血种族的基因稳定剂。这些产品不通过正规渠道销售，但利润率是表世界产品的二十倍。\n\n### 房地产\n\n青丘控股在全日本主要城市持有大量商业地产，其中许多物业建在灵脉节点或灵力丰沛的地段上——表面上是办公楼和商场，实际上地下层是异类专用设施。风见市南区的\"青丘大厦\"是该市最高的商业建筑，地下三层是百鬼联盟风见市支部的实际办公场所。\n\n房地产业务的另一个隐秘功能是为异类提供\"安全住所\"——带有基础结界的公寓单元，租金比市场价略高但附赠隐蔽保护。青丘控股是风见市最大的房东之一。\n\n### 娱乐产业\n\n最晚开拓但增长最快的板块。青丘控股旗下的经纪公司\"狐火娱乐\"管理着十几位当红艺人——其中至少三位是戴着幻术面具的狐族成员。她们不需要整容、不会衰老、天生擅长表演——狐族血脉中的魅惑能力在镜头前是压倒性的优势。\n\n娱乐产业还有一个战略目的：通过流行文化塑造公众对\"超自然存在\"的友善想象。那些讲述人类与妖怪恋爱故事的热门番剧，背后的投资方往往就是青丘控股。\n\n## 权力核心\n\n### 现任董事长：九阙\n\n第七十三代青丘殿主，九渊之孙。外表维持在三十五岁左右的精壮男性形象：银发齐肩、金色竖瞳、穿定制西装时会把尾巴完全收起。在人类社会中使用\"丘山阙\"的身份——一位低调的企业家。\n\n九阙是百鬼联盟温和派的实际领袖，信奉\"经济渗透比武力征服更持久\"。他将青丘控股的商业网络编织成了一张覆盖整个日本妖族社会的利益之网——几乎所有种族都在某种程度上依赖青丘控股提供的服务或资源。\n\n性格上，九阙是一个极端理性的策略家。他对所有人都保持着恰到好处的礼貌和距离感——包括对自己的族人。在他的价值体系中，\"有用\"是最高的赞美词，\"多余\"是最严厉的判决。\n\n### 与晓光血脉的关系\n\n晓光属于青丘殿的旁支血脉——她的母亲是九渊的远亲。这条血脉在两代之前就已经脱离了青丘殿的核心圈子，但血统仍然是纯正的九尾狐。\n\n九阙对晓光的态度很复杂。作为族长，他有义务保护每一个族人——尤其是在晓光被拐卖一事暴露了狐族保护网的漏洞之后。但作为策略家，他更关注的是晓光身边的那个言灵使少年。言灵是连九阙都无法用金钱或权力获取的力量——而一个言灵使的伴侣是九尾狐，这在九阙眼中是一个可以经营的\"资产\"。\n\n九阙从未对晓光表现出恶意——他提供医疗资源、安排护卫、支付部分生活费用。但晓光对这种\"善意\"始终保持着本能的警觉。她知道九阙的每一分善良都有标价。\n\n### 副董事长：玉藻\n\n九尾狐族的大长老，外表是一位优雅的中年女性。她是九阙的姑母，也是青丘殿内唯一敢当面反驳九阙的人。玉藻代表着\"老派狐族\"的价值观——重视血脉传承、家族荣誉和传统礼法，对九阙的商业化路线颇有微词。\n\n玉藻对晓光有真实的长辈关怀——她曾私下派遣族中医师为晓光调理身体，不附带任何条件。但她同时也是一个保守主义者：她不赞成晓光和人类少年的关系，认为九尾狐应该与同族结合以延续血脉。\n\n## 情报网络\n\n青丘控股维持着一个庞大而隐秘的情报网络，代号\"狐影\"。网络由散布在各行各业的狐族成员组成——银行职员、政府公务员、媒体记者、大学教授——他们在日常工作中收集信息，通过加密的妖信频道汇报给青丘控股的情报分析部门。\n\n\"狐影\"的情报能力是青丘控股最核心的竞争力之一。九阙经常在百鬼联盟的议会上\"不经意地\"透露一些只有他知道的情报，以此巩固自己的影响力。\n\n与S.C.B的关系是竞争性合作。双方都知道对方在监视自己，但也都需要对方的情报来应对共同的威胁（主要是激进派和外来入侵者）。司衡·岚和九阙每季度会进行一次非正式会面——通常在风见市的一家高档日料店包间里，一边吃饭一边交换各自愿意分享的情报。\n\n## 内部矛盾\n\n青丘控股最大的内部矛盾是\"传统派\"与\"现代派\"的路线之争。\n\n传统派（以玉藻为代表）认为青丘殿的根本在于血脉和灵力，商业只是手段不是目的。他们希望将青丘控股的资源用于恢复隐世的灵脉系统、重建传统的修炼体系、让狐族回归\"本来的样子\"。\n\n现代派（以九阙为代表）认为灵力时代已经过去，未来属于信息和资本。他们主张进一步深入人类社会、扩大商业版图、用经济实力而非灵力来保障狐族的生存空间。\n\n这场路线之争在晓光事件后变得更加尖锐——晓光被人类拐卖的事实被传统派用来论证\"融入人类社会是危险的\"，而现代派则反驳\"正是因为融入得不够彻底，才会出现保护网的漏洞\"。\n\n## 与风见市试点的关系\n\n风见市作为人妖共存试验区，是青丘控股商业模式的最大赌注。如果试点成功，青丘控股的\"隐性服务\"（面向异类的制药、房产、金融）将获得合法化的可能——这意味着利润空间的十倍扩张。如果试点失败，青丘控股数十年的布局将面临全面收缩。\n\n因此，九阙在风见市投入了不成比例的资源：最好的医疗团队、最强的护卫力量、最密集的情报网络。707号别墅虽然不在青丘控股的直接管辖下，但九阙一直在远处注视着那里发生的一切——因为那里住着一个言灵使和一只九尾狐，这两个存在的组合足以改变整个风见市的力量格局。\n\n## 人才战略\n\n青丘控股的用人哲学是\"不看血统看能力\"——这在纯血主义盛行的妖族社会中相当激进。九阙曾公开说过：\"一个能干的混血比一个废物纯血对我更有价值。\"这句话让他在保守派中得罪了不少人，但也为青丘控股吸引了大量被其他氏族排斥的人才。\n\n公司内部的核心团队约四十人，其中三分之二是狐族，剩下三分之一包括猫又、狸猫、甚至两名混血种。高管层有一个不成文的规矩：每个人都必须能在人类社会中独立生活至少一年而不暴露身份——九阙认为\"不了解人类的妖族做不好跟人类有关的生意\"。\n\n青丘控股为优秀员工提供的福利在隐世中首屈一指：灵石补贴、灵脉节点优先使用权、皇甫家的VIP医疗服务、甚至帮子女安排风见学园的入学名额。代价是绝对忠诚——九阙对背叛的容忍度为零。他不会以暴力手段惩罚叛徒——只是确保叛徒在整个隐世再也找不到第二份工作。\n\n## 战时角色\n\n阵眼保卫战期间，青丘控股展现了其商业帝国背后的硬实力。九阙在四十八小时内动员了旗下全部资源：灵石储备被紧急转化为战时物资、制药部门日夜生产战场急救用灵药、情报网络全速运转提供夜冠行动的实时追踪。\n\n最令人意外的是狐族的直接参战——青丘控股的\"安保部\"实际上是一支训练有素的战斗部队，由退役的执法队天狗和狐族战士组成，装备着经过灵力改造的现代武器。九阙本人虽然没有亲上战场，但他在后方的指挥被千翼称为\"比任何将军都精准\"——因为九阙掌握的情报量是所有人中最全面的。\n\n战后，青丘控股承担了风见市重建的大部分费用。九阙对此的解释简洁而诚实：\"风见市是我最大的投资项目。修它比放弃它便宜。\"\n\n## 品牌文化\n\n青丘控股在人类世界的品牌形象被精心设计为\"低调的日本传统企业\"——不张扬、重信誉、注重长期关系。公司标志是一片简化的狐尾造型的银杏叶，设计得足够抽象以至于没有人会联想到狐狸。\n\n公司内部有一些只有妖族员工才懂的隐秘传统：每年正月初一全员以真身形态聚会、新员工入职仪式上喝九阙亲手酿的千年狐酒、办公室里总是放着一盘油豆腐（狐族的传统食物）。这些小细节让员工在高压的商业环境中保持着对自身种族身份的连接。\n\n九阙的办公室在青丘大厦的顶层。房间很简洁——一张巨大的红木桌、一面落地窗、一盆据说活了五百年的盆栽松。桌上永远放着两样东西：一台最新款的笔记本电脑，和一把上古时代青丘殿的玉简——前者代表他要走的路，后者提醒他从哪里来。\n", "世界观/扩展档案/风见学园调查记录.md": "# 风见学园调查记录\n\n## 档案概要\n\n档案编号：SCB-KZ-2024-0847\n调查目标：风见市立风见学园（中等部）\n调查级别：A级——长期监控\n负责部门：特别对策局风见支部·学园监察课\n档案状态：持续更新中\n\n风见学园创建于1952年，表面上是一所风见市教育委员会直属的公立中学，实际上是战后\"人妖共存实验计划\"的核心试点学校。学园的创立初衷是在可控环境下观测异类青少年与人类学生的共处模式，为未来全面开放共存积累数据。\n\n---\n\n## 学园基础设施异常报告\n\n### 灵脉分布\n\n学园建筑正下方穿过一条三级灵脉支线，与707号别墅所在的主灵脉相距约1.2公里。这条支线灵脉为学园内部的多重结界系统提供能量。主要结界包括：\n\n**认知屏蔽结界**：覆盖整个校园，将异类学生在课间无意中流露的超自然现象（体温异常、瞳孔变化、尾巴/耳朵闪现等）转化为普通人可接受的解释。例如，当晓光的尾巴在惊吓中不受控制地显现时，结界会让周围的普通学生看到的是\"围巾从书包里掉出来了\"。\n\n**灵力抑制结界**：限制校园内所有生物的灵力输出上限，防止异类学生在冲突中使用超自然能力造成不可逆伤害。上限设定为D级——足以让异类维持基本的伪装和感知，但不足以施放任何攻击性术式。\n\n**监控阵法网络**：S.C.B在学园各处部署了灵力感应节点，实时监测校内灵力波动。当监测到异常灵力释放时，系统会自动通知学园监察课。\n\n### 已知设施异常\n\n**图书馆三楼禁书区**：校图书馆三楼的最里侧有一个用双层结界封锁的区域，官方说法是\"档案室整修中\"。实际上这里存放着风见学园建校以来收集的超自然文献，包括部分阴阳道古籍抄本和百鬼联盟内部出版物。结界由S.C.B每月检查一次。曾有一次结界出现裂纹，导致一名普通学生在经过走廊时突然能看到妖怪的真实形态，持续了约十分钟。事后S.C.B出动记忆修改班处理。\n\n**体育仓库空间折叠现象**：体育仓库内部面积约为外部目测的三倍，这是建校初期留下的一个空间术式。原本用于存放异类学生的特殊体育器材（灵力训练器材等），但随着时间推移术式开始不稳定，偶尔会导致放进去的球莫名其妙出现在操场另一端。体育老师对此的解释是\"这个仓库的门经常自己打开\"。\n\n**操场幻术残留**：每年文化祭期间，操场地面都会出现微弱的幻术残留——那是数十年来异类学生在文化祭上偷偷使用小型幻术的累积痕迹。残留本身无害，但在满月之夜偶尔会让操场看起来像是铺了一层薄薄的荧光。校方的解释是\"磷光涂料反应\"。\n\n---\n\n## 异类学生在籍名录（当前学年·部分）\n\n### A级监控对象\n\n**风见晓光**（在籍名：风见晓光）\n种族：九尾狐\n伪装评级：B-（情绪激动时伪装容易出现破绽）\n在校身份：二年C班学生\n备注：707号别墅主要居住者之一，与高优先度言灵使存在深度羁绊关系。在校表现活泼开朗，人际关系良好，但有多次在课间因情绪波动导致灵力轻微泄漏的记录。最严重的一次是在数学考试拿到满分时高兴过头，教室窗户玻璃上出现了两秒钟的霜花纹路。\n\n**白霜**（在籍名：白霜）\n种族：数字生命体（言灵造物·猫又形态）\n伪装评级：A+（完美控制，从未出现破绽）\n在校身份：二年C班学生\n备注：言灵使创造的数字生命获得实体化的极为罕见案例。在校表现沉稳内敛，成绩常年年级第一。她对校内异常现象的感知能力远超S.C.B的监控阵法——多次在S.C.B察觉之前就已经处理了小型灵力泄漏事件，事后发现都是她通过妖信网络向相关学生发送了\"请注意灵力控制\"的匿名提醒。\n\n### B级监控对象\n\n**风间透**\n种族：天狗（混血，四分之一）\n伪装评级：A\n在校身份：二年A班学生，田径部王牌\n备注：50米短跑校纪录保持者。S.C.B评估认为其天狗血统赋予的脚力增益不超过普通人类运动员的极限范围，因此其运动成绩不构成暴露风险。性格沉稳，从未出现伪装破绽。\n\n**的场红叶**\n种族：枫叶精\n伪装评级：A-\n在校身份：一年B班学生，园艺部成员\n备注：在校表现正常。唯一的注意事项是每年秋天她的头发会自然变成鲜红色——虽然以\"染发\"解释可以通过认知滤网，但学校有禁止染发的校规，这导致她每年秋天都要和班主任解释\"这是天生的\"。S.C.B已与相关教师进行过协调。\n\n---\n\n## 异类教职员工\n\n**长谷川静**（化学教师）\n种族：蛇精（白蛇系）\n在校任职：12年\n评价：教学水平优秀，冬天偶尔会因为畏寒而在教师休息室使用小型暖阳术，被同事认为是\"特别怕冷的人\"。她是学园异类学生的非官方心理辅导员——许多异类学生在身份焦虑或伪装疲劳时会找她倾诉。\n\n**的场健一**（体育教师·\"的场老师\"）\n种族：人类\n备注：纯粹的人类，但因为在学园任职超过20年，已经隐约察觉到了一些\"不对劲\"的事情。他曾向校长报告过体育仓库的空间问题，但被搪塞过去了。S.C.B目前将他列为\"潜在觉醒者\"进行观察，尚未决定是否告知真相或进行记忆处理。\n\n**月宫司**（校医）\n种族：玉兔\n在校任职：5年\n评价：校医室是学园内唯一一个灵力抑制结界被刻意弱化的区域——为了让校医能够使用灵力医疗术为受伤的异类学生治疗。月宫医生对外的说法是\"我比较擅长中医推拿\"。她的药柜深处藏着一整套隐世界的急救灵药。\n\n---\n\n## 重大事件摘要\n\n### 事件2024-031：走廊灵力共振\n\n日期：2024年4月\n概要：午休时段，二楼走廊突然出现强烈的灵力共振现象，持续约九十秒。事后调查发现是晓光和一名天狗系学生同时打了一个大喷嚏——两人释放的灵力恰好频率互补，形成了共振放大。结果是走廊的花瓶里的花突然全部盛开，有三名普通学生以为自己出现了幻觉。认知滤网自动将此事件解释为\"春季花粉过敏导致的集体恍惚\"。\n\n### 事件2024-067：文化祭幻术失控\n\n日期：2024年10月\n概要：文化祭期间，一名大一的河童学生在鬼屋中使用了超出许可范围的幻术——他把\"鬼屋\"做得太真实了。三名来参观的外校学生当场被吓哭，其中一名声称\"看到了真正的妖怪\"。S.C.B记忆修改班到场处理，该河童学生被处以\"灵力使用停权一个月\"的处分。晓光事后评价：\"他做得还行，就是太实诚了，鬼屋应该有趣不该真恐怖。\"\n\n### 事件2025-012：考试周灵力泄漏潮\n\n日期：2025年1月\n概要：期末考试期间，校内灵力监测系统连续五天报警。原因是多名异类学生因考试压力过大而出现灵力失控——一名猫又学生在答题时无意识地使用了预知能力偷看隔壁的答案，一名狸猫学生在紧张时变形回了原形（在书桌底下待了十分钟），晓光则在做数学最后一题时额头冒出了灵狐火。白霜在自己答完卷之后花了半节课的时间通过妖信网络一个个安抚这些同学。\n\n---\n\n## 综合评估\n\n风见学园作为人妖共存试验校运行七十余年，总体评价为\"成功\"。异类学生与人类学生的共处模式趋于自然，重大暴露事件发生频率逐年递减。\n\n主要风险点：\n1. 校内结界系统年久失修，部分区域存在盲区\n2. 异类学生数量逐年增加，伪装管理压力上升\n3. 部分长期任职的人类教职工开始察觉异常，处理决策待定\n\n建议：维持现有监控等级，加速结界系统更新，考虑在适当时机将可信的人类教职工纳入知情者范围。\n\n档案更新截止：2025年3月\n", "世界观/扩展档案/风见市分区详解.md": "# 风见市分区详解\n\n## 概况\n\n风见市位于日本本州岛沿海，总面积约180平方公里，常住人口约120万。城市被自然分为四大区域：中央区、南区、北区、东区。三条二级灵脉在城市地下交汇，使这里成为全球灵力密度最高的都市区域之一，也因此吸引了大量异类在此定居。\n\n市内公共交通以两条轻轨线和密集的公交网络为主。轻轨一号线南北走向贯穿全市，二号线东西走向连接东区海滨与中央区。异类之间还流传着\"灵道\"的说法——沿灵脉走向的地下暗路，但只有修为足够的妖族能感知入口。\n\n## 中央区\n\n风见市的商业和行政中心，高楼林立，人流密集。白天是西装革履的上班族和学生的天下，夜晚则是另一番光景——霓虹灯亮起后，隐藏在光鲜表面下的超自然势力据点也跟着活跃起来。\n\n**青丘大厦**：CBD最显眼的建筑——一座外形酷似九尾螺旋的玻璃幕墙摩天大楼，46层。表面是\"青丘娱乐传媒\"总部，实际是狐族在现世的权力中枢。1至30层是正常的商业办公区，有数十家合法企业租用；31至40层是仅限内部人员进入的\"特殊业务区\"（情报分析、契约管理、暗线调度）；41至46层是九阙的私人领地。顶层办公室有一面整墙的落地窗，可以俯瞰整座风见市。大厦地下停车场的B4层是一个不对外开放的会议厅，百鬼联盟与S.C.B的非正式协商经常在此进行。\n\n**S.C.B风见市分局**：隐藏在中央区某栋不起眼的写字楼地下三层。入口伪装成一家\"已倒闭\"的健身房，门上贴着\"装修中\"的告示已经贴了五年。进入需要通过灵压识别和虹膜扫描双重验证。地下设施包括：指挥中心、审讯室、小型武器库、研究实验室、以及一个可容纳20人的临时收容区。分局常驻人员约50人，其中三分之一是具有灵觉的人类特工，其余是技术和行政支持。\n\n**商业步行街**：中央区的商业核心，全长约1.2公里的步行街两侧密布着各类商铺。甜心猫烘焙坊（绒羽经营的烘焙店，猫又开的但人类顾客只觉得\"老板娘长得像猫\"）、二次元痛屋（动漫周边店，晓光的常去之处）、回春堂中央区分店（皇甫·青栀的药房，卖给人类的是正常中药，卖给异类的是特制灵药）。步行街地下三层有一个只有妖族知道的\"暗门\"——通往一个小型隐世商铺区，售卖结界材料、妖力恢复药剂等异类特需品。\n\n**市政厅广场**：中央区的行政核心。市政厅大楼外观普通，但地下也有S.C.B的联络办公室。广场本身是市民的休闲聚集地，周末常有街头艺人表演。广场喷泉的水循环系统被悄悄接入了灵脉辅助线路——喷泉水含有微量灵力，对普通人有轻微的精神舒缓效果（这就是为什么\"在喷泉边坐坐就觉得心情好了\"）。\n\n**中央区夜间状态**：入夜后写字楼灯光渐次熄灭，但青丘大厦的高层永远亮着。步行街两端的酒吧区是年轻异类的社交场所——几家酒吧暗中提供\"妖力调酒\"（混合了微量灵气的特调饮品，对人类无害但能让异类微醺）。凌晨两点后的后巷偶尔能看到被认知滤网模糊处理过的\"诡异现象\"——但普通路人只会觉得\"路灯坏了\"或者\"雾气好大\"。\n\n## 南区\n\n风见市最宜居的住宅区。街道宽敞整洁，两旁种满了樱花树（春天简直美得不真实），氛围安静平和。房价是全市最高的，但环境也确实值这个价。异类人口比例约5%，大多是融入程度极高的\"模范市民\"型妖族——有正当职业、有稳定收入、从不惹事。\n\n**樱花坡道**：南区标志性的景观道路，从主干道缓缓上坡延伸到郊区方向。坡道两旁的樱花树是数十年前种下的，每年四月盛开时整条路变成粉色隧道，是风见市最著名的赏花景点之一。坡道尽头就是707号别墅——但普通人永远走不到尽头，会在某个点\"自然地\"折返。\n\n**风见学园**：位于南区与中央区交界处的私立学校，从小学到高中一贯制。建筑群包括新教学楼（现代化设计，全玻璃外墙的图书馆是亮点）和旧教学楼（建在古战场上，有\"七大不可思议\"传说——其中三个确实与超自然现象有关）。学校的异类学生比例约2%——全部伪装成普通人。校园内有S.C.B安装的微型灵压监测器，用于监控在校异类学生的状态。学校食堂的饭菜意外地不错，晓光最爱周三的咖喱饭日。\n\n**住宅区**：以独栋住宅和低层公寓为主，建筑限高四层。绿化率极高，街心公园和小型广场散布其间。由于靠近707号别墅，整个南区的治安异常好——结界的\"驱散效应\"对周围区域有微弱辐射，让潜在的违法者\"不想来这里\"。房产中介在南区卖房从来不愁——\"住进去就是不想走\"。\n\n**南区晨昏**：清晨六点半开始有老人在街心公园做太极拳，到了七点半变成上学的学生流。傍晚的樱花坡道是散步的最佳时段——夕阳从海面方向照过来，整条坡道被镀上一层金色。深夜的南区安静到能听见远处海浪声。\n\n## 北区\n\n旧城区和工业区的混合体。工厂遗迹、老旧居民楼、狭窄的巷弄构成了和中央区截然不同的景观。这里是风见市最\"混乱\"的区域——不仅指治安，也指超自然活动的频繁程度。异类人口比例可能高达8%，但大多是低阶妖族和灰色地带的居民。北区的灵脉分支比其他区域更密集且不稳定，导致这里偶尔会出现自然形成的\"灵力漩涡\"——一种局部灵力高度集中的微型异常区。\n\n**废弃工业园**：北区最北端的大片废弃工厂区域。上世纪九十年代经济衰退后工厂陆续关停，留下了大量空旷的厂房和锈蚀的设备。第4号仓库曾是囚禁晓光的地点，现已被主人的言灵永久封锁——任何接近者都会被不可抗拒地弹开。其余废弃建筑中偶尔有低阶妖兽出没——S.C.B战术部每月例行清扫两次。废弃工业园的地下水道与妖怪夜市有暗中连通的通道，是走私者常用的运输路线。\n\n**妖怪夜市入口**：位于北区某条看起来毫不起眼的死胡同深处。白天这里只是一堵斑驳的砖墙，但在逢魔之时（黄昏时分，约下午五点到六点之间）敲击特定位置三下，砖墙会像水面一样泛起涟漪，露出通往夜市的通道。夜市本身存在于一个半独立的空间褶皱中——面积远比入口所在的胡同宽敞，约相当于三个足球场大小。市内摊位密集，售卖从灵器到异类食品的一切物品。千翼作为百鬼联盟的执法者，定期在夜市巡逻。\n\n**黑市聚集区**：不是固定场所，而是通过妖信临时发布地址的\"流动市场\"。通常在废弃建筑的地下室或临时搭建的结界空间内举行。千翼的执法队对黑市采取\"有限容忍\"策略——打击最危险的违禁品（封印类咒具、人类灵魂碎片、禁制级灵药），放过相对无害的灰色交易（未经认证的灵力恢复药剂、非官方渠道的人间身份文件）。\n\n**北区旧商业街**：曾经繁华的商业区，如今只剩零散的小店铺勉强维持。便利店、拉面馆、洗衣房，还有几家面向低收入异类群体的\"妖生服务所\"——提供身份伪造、化形稳定药物、以及法律咨询（主要是如何在人类社会中避免身份暴露）。\n\n## 东区\n\n靠海的区域，气氛比其他三区更加开放和休闲。海风带来的盐味和灵气在这里形成了一种独特的混合氛围——人类觉得\"海边空气就是好\"，异类知道那其实是海域灵脉的溢出效应。东区的建筑风格偏现代和开放，玻璃幕墙和流线型设计居多。旅游业和服务业是东区的经济支柱。\n\n**海滨公园**：沿海岸线延伸约2公里的带状公园。有慢跑道、自行车道、观景台和多个海滨广场。周末和节假日是全市居民最喜欢的休闲去处。公园的灯塔是一个隐蔽的灵力监测站——S.C.B在灯塔内部安装了灵压传感器，监控来自海域方向的异常活动。\n\n**碧蓝海湾**：东区海岸线延伸出去的天然海湾，沙滩细白海水碧蓝。夏天是热门的海水浴场。海湾深处的水下有异常的灵力波动——据说是龙族旁系（蛟）的栖息地，但从未得到证实。海湾的退潮线附近偶尔会出现形状奇特的\"灵石\"——被海水和灵力长期侵蚀的鹅卵石，对异类有微弱的灵力补充效果，被当作廉价的保健品在夜市售卖。\n\n**风见国际会展中心**：海滨大道上的地标建筑，巨大的贝壳状设计。每半年一次的Comic Carnival漫展在此举办——晓光每次都会拖着主人去，穿着精心准备的cosplay服装。会展中心地下有S.C.B设置的临时指挥所——漫展期间大量异类出没（很多妖族喜欢趁漫展\"以真面目示人\"而不被怀疑），需要增强监控。\n\n**渔港**：东区北端的小型渔港，保留着传统渔村的风貌。清晨四点开始有渔船出海，鱼市在六点左右达到高峰。渔民中有少数是水系妖族——他们的\"渔获\"总是特别好，同行只觉得他们运气好。渔港附近有一家老旧的海鲜居酒屋\"波之音\"，是水系异类的秘密聚会点——老板是一只已经活了三百多年的海龟妖。\n\n## 区域交界地带\n\n四大区之间的交界地带往往是超自然活动最频繁的区域，因为灵脉分支在这些位置形成了复杂的交叉网络。\n\n**中央区-北区交界**（简称\"中北灰色带\"）：治安过渡地带。中央区的光鲜在这里突然被老旧建筑取代。这条带状区域有多家\"两面\"店铺——白天卖正常商品，晚上卖妖族特需品。\n\n**南区-东区交界**（简称\"滨海走廊\"）：高档住宅区逐渐过渡为海景公寓和度假设施。这里的海风带着额外浓郁的灵气，是风见市灵力\"外溢\"最明显的区域。S.C.B在此设有多个隐蔽的灵压缓冲装置，防止过量灵气影响普通居民。\n\n## 异类人口分布\n\n| 区域 | 总人口 | 异类估计比例 | 主要异类类型 | 特征 |\n|------|--------|------------|-------------|------|\n| 中央区 | 35万 | 2% | 高阶妖族（狐族管理层、天狗安保） | 权力中心，隐蔽性强 |\n| 南区 | 25万 | 5% | 融入度高的各族、修真家族 | 最安全，生活气息浓 |\n| 北区 | 30万 | 8% | 低阶妖族、混血、灰色群体 | 最混乱，超自然活动频繁 |\n| 东区 | 30万 | 1% | 水系妖族、季节性流动人口 | 最开放，旅游业发达 |\n\n## 季节风貌\n\n**春（3-5月）**：南区的樱花是全市焦点。东区海滨公园的海风开始变暖。北区妖怪夜市在樱花季会推出\"赏花夜市\"特别摊位。灵力潮汐在春分前后达到年度第一个峰值。\n\n**夏（6-8月）**：东区的碧蓝海湾成为全市最热门的去处。中央区步行街延长营业时间到深夜。北区废弃工业园的妖兽活动因高温而减少。风见市夏季花火大会在东区海滨举行——烟花中被悄悄混入了灵力焰火，普通人看到的是格外绚丽的色彩，异类看到的是一场灵力艺术表演。\n\n**秋（9-11月）**：南区树叶变色，是摄影爱好者的天堂。北区妖怪夜市的生意在中秋前后达到高峰——异类过中秋的传统比人类更隆重。中央区的青丘大厦在秋季举办年度\"异类产业博览会\"（以正常商业展为掩护）。\n\n**冬（12-2月）**：风见市很少下雪，但偶尔的降雪会让整座城市变成童话。灵力潮汐在冬至前后达到年度最高峰——这也是全年认知滤网负荷最重的时段。北区的黑市在年末格外活跃，各种年货型灵物供不应求。\n", "世界观/扩展档案/魔力与能量体系.md": "# 魔力与能量体系\n\n## 魔力基础\n\n魔力是充斥在宇宙中的基础能量形态，是所有超自然现象的能源。它无法被物理仪器检测——不发射电磁波，不产生重力效应，不与已知粒子相互作用。唯一的感知方式是通过具有\"灵觉\"的生物。\n\n魔力的核心特性是\"唯心性\"——它直接响应有意识存在的意念和信
