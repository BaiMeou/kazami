<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIbot 项目浏览器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- 侧边栏 -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <h1>AIbot</h1>
      <div class="subtitle">AI 角色扮演 + 世界观构建项目</div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="home">
        <span class="tab-icon">&#9751;</span>
        <span>首页</span>
      </button>
      <button class="tab-btn" data-tab="files">
        <span class="tab-icon">&#128193;</span>
        <span>文件</span>
      </button>
      <button class="tab-btn" data-tab="novel">
        <span class="tab-icon">&#128214;</span>
        <span>小说</span>
      </button>
      <button class="tab-btn" data-tab="search">
        <span class="tab-icon">&#128269;</span>
        <span>搜索</span>
      </button>
    </div>

    <!-- 首页面板 -->
    <div class="tab-panel active" id="panel-home">
      <div class="home-panel" id="home-content"></div>
    </div>

    <!-- 文件面板 -->
    <div class="tab-panel" id="panel-files">
      <div class="file-filter">
        <input type="text" id="file-filter-input" placeholder="过滤文件名..." />
      </div>
      <div class="tree-wrap" id="tree-container"></div>
    </div>

    <!-- 小说面板 -->
    <div class="tab-panel" id="panel-novel">
      <div class="novel-panel" id="novel-list"></div>
    </div>

    <!-- 搜索面板 -->
    <div class="tab-panel search-panel" id="panel-search">
      <div class="search-input-wrap">
        <input type="text" id="search-input" placeholder="搜索文件名或内容..." />
        <div class="search-status" id="search-status"></div>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="main">
    <div class="content-header" id="content-header">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="header-actions" id="header-actions"></div>
    </div>
    <div class="content-body">
      <div id="content-scroll">
        <div id="content"></div>
      </div>
      <div id="toc"></div>
    </div>
  </div>
</div>

<!-- 阅读模式遮罩 -->
<div id="reading-overlay">
  <div class="reading-toolbar">
    <span class="rt-title" id="reading-title"></span>
    <button class="rt-close" onclick="APP.closeReading()">关闭 (Esc)</button>
  </div>
  <div class="reading-body md-content" id="reading-body"></div>
</div>

<!-- 快捷键帮助 -->
<div id="shortcuts-modal">
  <div class="shortcuts-content">
    <h2>键盘快捷键</h2>
    <table>
      <tr><td><kbd>/</kbd> <kbd>Ctrl+K</kbd></td><td>聚焦搜索</td></tr>
      <tr><td><kbd>Esc</kbd></td><td>关闭弹窗 / 返回首页</td></tr>
      <tr><td><kbd>&larr;</kbd> <kbd>&rarr;</kbd></td><td>上/下一章（小说模式）</td></tr>
      <tr><td><kbd>Ctrl+R</kbd></td><td>阅读模式</td></tr>
      <tr><td><kbd>?</kbd></td><td>显示此帮助</td></tr>
    </table>
  </div>
</div>

<!-- 快捷键提示栏 -->
<div id="shortcut-bar">
  <span class="shortcut-hint"><kbd>/</kbd> 搜索</span>
  <span class="shortcut-hint"><kbd>Ctrl+R</kbd> 阅读模式</span>
  <span class="shortcut-hint"><kbd>?</kbd> 快捷键</span>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
